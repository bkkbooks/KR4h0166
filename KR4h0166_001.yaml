body:
  text: 南宋雜事詩卷一錢唐沈嘉轍撰蘢蔥佳氣儷山川南渡開基大寶傳為有文章京樣好中興留得幾遺編宋會要紹興元年內殿宣示大宋受命中興之寶中興御府藏玉寶十有一一曰鎮國神寶二曰受命寶三曰天子之寶四曰天子信寶五曰天子行寶六曰皇帝之寶七曰皇帝信寶八曰皇帝行寶九曰大宋受命之寶十曰定命寶十一曰大宋受命中興之寶方輿勝覽飱月香水影之清文章京樣覽雲陳銀山之壯意氣天豪年玉海建炎三年胡安國上中興䇿十四篇紹興二權邦衡獻中興十議四年汪藻上建炎中興詔旨三十七册七年林保獻中興龜鑑八年李昌言進中興要覽十篇九年汪伯彥上建炎中興日厯五卷十二年漢州布衣陳靖獻中興論統淳熙十二年上中興禮書先是紹興元年趙子書上言政和宣和因革禮渡江後皆失請事加修纂至是書成賜名中興禮書嘉泰二年費士寅等續纂中興禮書八十卷又李綱編建炎中興記三卷張浚進中興備覽四十一篇李璧中興戰功録敘云中興十二處戰功列於銓法熊克撰中興紀事本末一名中興小厯文獻通考梁克家等上中興會要二百卷何異撰中興百官題名五十卷末案以上諸目惟禮書續禮書備覽戰功録紀事本會要百官題名並見於文淵閣書目而文淵閣所藏更有中興聖政中興百官年表中興編年備要中興繫年録中興政要中興大事記內閣書目有施清臣中興三朝聖訓焦氏經籍志有陳均中興編年舉要菉竹堂書目有中興目録絳雲樓書目有中興繫年要録大抵中興諸書見於諸簿録者可考也其不録者皆佚巳惟焦氏所載髙宗實録五百卷孝宗實録五百卷光宗實録一百卷寧宗實録三百卷此據宋史藝文志而列之未必有完書也炎炎大詔下彤階摩勒青珉兩壁排喜得華恩加上舍眀朝宰相送光齋古文淵鑑宋髙宗幸學手詔朕聞周建外史掌五帝三皇之書漢選諸儒定九流七略之奏文德之盛後世推焉仰惟祖宗開建册府凡纍朝名世之士由是以興而一代致治之原蓋出於此朕嘉與學士大夫共宏斯道乃一新史觀新御榜題肆從望幸之忱以示右文之意嗚呼士習為空言而不為有用之學久矣爾其勉修術業益勵猷為一德一心以共赴亨嘉之會用丕承我祖宗之大訓顧不善歟曝書亭集宋髙宗御書石經紹興十三年知臨安府張徵摹石淳熙四年詔知府趙磻老建閣於太學題曰光堯石經之閣元時楊璉正伽造白塔於行宫故址取石壘塔杭州路亷訪經厯申屠致遠力持不可已損其什一明嘗熟吳訥乾州宋廷佐先後按浙或覆之廊或甃以瓴甋崇正末廊圮嵌諸壁中左易二書六詩十有二禮向有學記經解中庸儒行大學五篇今惟中庸片石存爾其南則理宗大書御製序四碑右則春秋左氏傳四十八碑闕其首卷通計八十七碑非足本矣秦檜一跋吳訥椎碎其詞見學士院中興紀事本末君子無取也列楓窗小牘思陵以萬幾之暇御書六經論語史記傳刋石立於太學王宗沐續資治通鑑紹興十三年作太學以嶽飛宅為之在前洋街宋史紹興十三年七月國學大成殿告成奉安廟像明年二月國子司業髙閎請幸學上從之帝遂作先聖及七十二子贊冠以序文親灑宸翰揭之大成殿上二十六年石刻於國子監淳熙四年孝宗幸太學嘉泰二年寧宗幸太學淳祐元年理宗幸太學咸淳三年度宗幸太學七朝野雜記太學養士最盛於崇光間紹興中詔以百人為額上舍生三十員內舍生百員外舍生百七十員每三年科場率四人而一若即行校藝而升上者則不待選舉而徑釋褐焉送癸辛雜識太學先達歸齋各有光齋之禮宰執則純金碗一隻狀元送鍍金魁星杯柈一副漕帥新除各齋有十八界送二百千酒十尊又學規輕者關暇重者前廊關暇又重則遷齋百寮印信久無存遺得龍章守子孫三百餘年十五押誰知制誥代天言朱子語録南渡後印信散失諸司往往借用舊印有以不便請者又因費重而止或問朱子奏狀借用縣印否曰豈惟縣印尉印亦可借嘗見縣丞借用漕使印諸司舊印借用上下彼此皆所不計簣齋雜著余家蓄有建炎敕文一紙孟御史陸銑安撫兩河時所受書以淡墨可二寸許筆勢飛動題建炎元年七月十八日璽識分明正思陵手筆蓋此時兩河尚在版圖也篁墩文集有題蘄水程氏所藏南宋録用伊川先生子孫誥祖太祖元押癸辛雜志宋十五帝御押太太宗太宗元押真宗仁宗英宗神宗宗帝哲宗徽宗理欽宗髙宗孝宗光寧宗且宗押度宗用霏雪録嘗聞宋故事惟押字上親書有字則不寶説略宋敕俱草書後用三省長官僉押銅三朝北盟會編髙宗得開圖書匠舒通能刋金銀圖書取縷塵白字令刋白文為璽由是人皆效之雄才始事氣方酣一尺書函懇再三可惜聲聲蘇武令至今遺恨諭江南朝野雜記靖康末髙宗與李忠定公書構頓首頓首天未悔禍乘輿蒙塵問之心焉如割巳令會兵返擊冀遂奉迎而歸方今生民倒懸諒非不世之才何以協濟閣下學窮天人忠貫金石是用盡復公舊職澤被斯人功垂竹帛乃公素志想投袂而起以振天人之溺以副蒼生之望所祝道中倍如保護謹啓構頓首觀此則髙宗屬意於忠定可見矣是詞譜紹興初都下盛傳蘇武令一詞聲韻凄楚言李綱丞相作偕厯代臣鑑王倫使北還綱疏曰今倫之歸與金使來乃以招諭江南為名不著國號而曰江南不云通問而曰招諭此何禮也陛下其勿輕許髙按李綱伯紀撰梁溪集一百八十卷蒲室集題宗書云髙宗為中興之主不能用李綱宗澤深為可惜然慈仁謹儉可謂守文之主肇運中興亦有由也小臣觸諱玉墀東聖主天懷寫至公一點君心千古事兒孫何地敢忘忠吹劍録髙宗䇿進士有犯御名者上曰朕豈以已妨人進取厯代臣鑑韓世忠得疾戒家人曰吾名世忠汝曺母諱忠字諱而不言是忘忠也荀玉海例言宋時極重廟諱如桓談為亘談荀勗為勉魏徴為魏證及貞觀作正觀􅏷征作嗣征宮縣作宫垂桓圭作植圭姤卦作遇卦此類甚多日知録朱子周易本義姤卦下以故為姤作姤為遇避髙宗嫌名也後鼠璞本朝避嫌名如勾姓本避髙宗諱故改音鈎或加金於傍或加絲於傍或加草於上或改為句或增為勾龍實同一勾也今讀勾踐作平聲者本此史緯勾龍如淵永康軍人勾姓本古勾芒髙宗即位避御名更勾為龍因呼為勾龍氏五雜組真德秀原姓慎因避孝宗諱而改闕又宋時避君上之諱最嚴宋版諸集中凡嫌名皆不書如英宗名曙而署樹皆云嫌名不知樹音原不同曙也欽宗名桓而完亦云嫌名不知完音原不同桓也仁宗名貞而貞觀改作正觀魏徵改作魏證不知徵貞不同音也又可怪者真宗名恆而朱子於書中有恆獨不諱不知其解或以親盡而祧耶太清樓本無完字匱紙橅來已再傳不愛女官元祐腳墨皇新拓紹興年書史往見藏蘇耆家蘭亭懷字內折筆抹筆皆轉側𥚹而見鋒法帖譜系舊見太清樓帖自開禧以後有𣙜埸中來者巳磨去亮字無右邊轉腳蓋避金亮諱也清河書畫舫髙宗本效黃庭堅書後以偽豫遣能庭堅書者為間遂改從右軍刻又法帖譜系南宋紹興中以御府所藏淳化舊帖板置之國子監稱紹興國子監本其首尾與淳化閣本略無少異御府拓者多用匱紙蓋打金銀箔者也字畫精神極有可觀淳熙修內司本淳熙奉旨刻石禁中卷帙規模悉同淳化閣本而卷尾乃楷書題云淳熙十二年乙已歲二月十五日修內司恭奉聖旨模勒上石英淳熙竒字訓釋云橅與模同墨皇出米芾寶晉光集詩築室南班傍帝畿仙源家寶巳芳菲凄涼望斷中天路朔雪橫空雁影稀愧郯録嘗考典故祖宗袒免親以上備環衛冠屬籍謂之南班通志略有本朝仙源積慶圖一卷宋史不􅖊嗣濮王宗暉曽孫也孝宗嘉其忠諒飲之酒顧太子曰此賢家寶也又史浩等上三祖下第六世仙源類譜仁宗玉牒復朝野雜記故事玉牒以首相領之紹興十六年初玉牒所以秦會之提舉又宗正寺仙源類譜其見數者三祖以下合二萬一千六十有六人靖康以來隔異域者遙為排連而已又宗室為狀元者乾道初汝愚中宏辭科者淳煕初彥中中童子科者慶元中崇襚三年六月已卯崇禭亦能誦六經免文解云人談輅宋理宗寶祐四年登科録凡五甲共六百一其中自玉牒者第一甲二人第二甲二人第三甲十八人第四甲五十一人獨未有在第五甲者可見宋室待宗藩之禮經世竒謀留遇僧者碭山人也金人見之曰全似趙家少帝遇僧竊喜紹興十年三京路通詔求宗室遇僧自言少帝第二子守臣遣赴行在乃詔劾治遇僧服罪後有自北至者曰淵聖小大王訓見居五國城朝野雜記建炎五年有自稱徐王棣者聞於朝上遣使逆之既至審驗則富順男子李悖也遂坐誅有婦人自稱榮德姬者按驗則婦人易氏也亦杖死上曰吾寧受百欺冀得一真紹興三年詔皇族有來歸者令州縣驗實以聞一朝姦細竟南奔和議終為保舉恩巳見秦家錯摺樣莫將冠冕付空言金國南遷録天會八年諸臣慮宋君臣復讎思有以止之魯王曰惟遣彼臣先歸使其臣順我佯不從而勉以聽或可以定忠烈王曰惟張孝純可忠獻王曰此事在我心裏三年矣只有一秦檜可用我喜其人置之軍中試之以事外雖拒而中常委曲順從而檜始終言南自南北自北因説許某著手時只依這規模分别今若縱之歸國彼喜慷慨説事必是得志水宋元通鑑達蘭攻楚州檜與妻王氏自軍中趨漣軍自言殺金監已者奪舟而來欲赴行在遂航海至越州帝命先見宰執檜首言欲天下無事須是南自南北自北朝士多疑其與何栗孫傅等同被拘執而檜獨還又自燕至楚二千八百里踰河越海豈無譏訶之者安得殺監而南惟范宗尹及李回二人素與檜善盡破羣疑力薦其忠檜入對首奏所草與達蘭求和書相又翟汝文雖為檜所薦然性剛不為檜屈至對案詬目檜為金人姦細故不得久居位老學菴筆記秦太師作相時裹頭巾當面偶作一摺謂之太師錯摺樣簪花書法注劉希金翠輕搖玉腕圍誰説芙容江上貌紅顔一代有危機談薈宋宫人有栁金簡翠腕闌是景陽宫胭脂井物注似今之手釧清河書畫舫劉夫人字希建炎間嘗主內翰文字及寫宸翰髙宗甚眷之朕金小史金主亮嘗有圖宋之意曰向者梁説嘗為言宋有劉貴妃天下之絶色也今一舉而兩得之所謂因行掉臂也集賢臺閣接飛簷九朽還摹土筆尖天慶喜存原粉本金章曽是弟兄兼妮古録趙伯駒與弟伯驌並以畫名髙宗嘗命二人合畫集賢殿稱旨賞與特厚畫繼畫家於人物必九朽一罷謂先以土筆撲取形似數次修改故曰九朽繼以淡墨一描而成故曰一罷罷者畢也清河書畫舫按伯驌乃伯駒之兄髙宗時嘗奉詔寫天慶觀樣命吳中依樣造之今玄妙觀是也圖繪寶鑑趙伯駒善畫山水花鳥竹石髙宗極愛之仕至浙西兵馬鈐轄趙伯驌善畫山水人物尤長於花禽點染輕盈頓有生意仕至觀察使書法申韓孰並肩鐃歌鼓吹似前賢太常錦瑟還驚訝律吕而今不再傳研北雜志趙子固目薑堯章為書家申韓又周公謹云薑堯章鐃歌鼓吹曲乃步驟魯師尹宙合編薑夔上書乞正樂赴太常同官校正樂師上錦瑟薑問曰此何樂衆官已有漫文之歎又令樂師曰語云鼓瑟希未聞彈之衆官咸笑而散去慶吳興掌故堯章長於音律嘗著大樂議欲正廟樂元三年詔付奉常有司收掌令太常寺與議大樂時嫉其能是以不獲盡其所議人大惜之按薑夔字堯章有白石詞五卷野溪亭市列柴門陶尸家家作酒樽縱有龍紋白芨碎新窰青器已無倫太平寰宇記杭州亭市山餘石鄉亭市村多陶户善作大甕今謂之浙甕四部稿南宋時處州章生兄弟皆作窰兄所作者視弟色稍白而斷紋多號白芨碎又考古括遺芳稱兄所作為哥窰稗編渡江後修內司造青器名內窰澄泥為範極其精緻油色瑩徹為世所珍後郊壇下别立新窰餘如烏泥窰餘杭窰續窰皆非官窰比所謂舊越窰不復見矣流五雜組柴窰之外有定汝官哥四種皆宋器也傳至今者惟哥窰稍易得蓋其質厚頗奈藏耳定汝白如玉難於完璧宋時宫中所用率銅鈐其口以是損價六研齋筆記南宋時餘姚有祕色磁粗朴而耐久今人率以官窰目之不能别白也絲鞋供御喚莊生雪藕抽針瑩緝成一尺繡茵塵不動退朝禹步寂無聲老學菴筆記禁中舊有絲鞋局専挑供御絲鞋不知其數嘗見蜀將吳珙被賜數百兩皆經奉御者夀皇即位惟臨朝服絲鞋退即以羅鞋易之遂廢此局翠夢窗甲稿瑞鶴仙贈絲鞋莊生云藕心抽瑩繭引針行處氷花成片金門從回輦兩玉鳬飛上繡絨塵軟末云待宣供禹步宸遊退朝燕殿按莊生蓋當時供奉者廂庭雖設莫紛拿和氣常生百姓家為報臨安破落户東宫昨日坐南衙洺水集城南廂官題名記粵自東幸於今百年錢唐版籍百倍往昔南北二廂設於關外而五方雜居水陸互市人滋衆市滋夥訟於廂庭者率繫縲纍日吏屬饜乃得去兩浙名賢録趙立夫知臨安府入對理宗語之曰京師細民當一意摩撫使常在春風和氣中遂於府西建春和樓推廣德意咸淳臨安志紹興二十三年上謂大臣曰近今臨安府收捕破落户編置外州治本為民間除害而謂小火下者乃為人訴其恐嚇取錢令有司仔細根治務得其實先是行在號破落户者巧於通衢竊取人物故有是命續資治通鑑建炎三年升杭州府為臨安府親愧郯録乾道七年詔皇太子判臨安府珂案本朝王為南衙故實自有明據然則周必大所制詞有所謂肆考南衙之故實一新大尹之多儀及名稱未正者皆誤也駐蹕錢唐奈數何風光京洛過江多後門艤得龍舟好歌舞銷鎔是此鍋羣談採餘陳圖南莫知所出藝祖召之闕問天下始終事對曰一汴二杭三閩四廣再問則曰非臣所知也席青泥蓮花記江浙間路岐女有慧黠知文墨能於上指物題咏應命輒成者謂之合生其滑稽含玩諷者謂之喬合生蓋京都遺風也南七修類稿城中語音好於他郡蓋初皆汴人扈宋渡遂家焉故至今與汴音頗相似惟江干人言語躁動為杭人之舊音教諭張傑嘗戲曰髙宗南渡止帶一百過來按百音擺何近峯聞略今人呼謔之語皆有所本如宋都汴有家數者其下行貨惡濫故呼何數今越人云數頭者當是南渡之遺也樗留青日札劉豫金人入寇髙宗親禦之趙鼎因喻留後門之䇿乃起張浚為閩浙江淮宣撫備退保之地湖光隔岸龍舟御選四朝詩髙孝疇詩朱簾白舫亂艤夕陽今日歡遊復明日便將京洛看錢唐會西湖遊幸記西湖杭人無時而不遊凡締姻賽社親送葬經會獻神無不在焉故杭諺有銷金鍋之號偏愛黃冠祀紫都為仙為帝總虛無馬遷也強宗元教誰續華陽位業圖齊東野語女冠吳知古用事內宴演參軍教坊輩請簽文書參軍怒曰我方聽觱栗請至三四胥前擊其首曰甚事不被觱栗壤了又俗呼黃冠為觱栗升清河書畫舫宋徽宗為東華帝君髙宗為元載孔天帝下生子筠溪牧潛集余居臨安有持大板史記列傳以老為首心甚怪之莫知其本所出問諸博書者亦莫知也因閲國朝會要見宣和間有旨升老子於列傳首乃悟所見蓋宣和本今不行也心事誰知默禱間滿朝敢道相公姦九年伍伯無人識去訪東南何處山江湖雜記檜既殺武穆向靈隱祈禱有一行者亂言譏檜檜問其居址僧賦詩有相公問我歸何處家在東南第一山之句檜令𨽻何立物色立至宫殿見僧坐決事立問答曰地藏王決檜殺嶽飛事數卒引檜至身荷鐵枷囚首垢面呼告曰傳語夫人東窗事發矣昨非菴日纂錢一為皂𨽻因秦檜酷刑責人嘗至死後雖少悔只以流血為度隸乃汚豬血在板如是九年忽一日立班中見足離地而起檜呵其為妖隸以前情曰某今日應上升遂乘雲而去古箋葉葉染松煙監本猶珍後代傳歐瘦顔肥生態別宦囊須辦買書錢朝野雜記監本書籍紹興末年所刋也九月張彥實待制為尚書始請下諸道州學取舊本書籍鏤版頒行從之然所取諸書多殘缺故胄監刋六經無禮記正史無漢唐二十一年輔臣復以為言上謂秦益公曰監中缺書亦令次第鋟板雖重有所費不惜也由是經籍復全先是王瞻叔為學官常請摹印諸經疏及經典釋文許郡縣以贍學或省係錢各市一本置之於學上許之今士大夫仕於朝者率費紙墨錢千緡而得書於監云刻五雜組書所以貴宋版者不惟點畫無訛亦且箋精好若法帖然凡宋刻有肥瘐二種肥者學顔瘦者學歐行欵疏密任意不一而字勢皆生動箋古色而極薄不蛀中興詞翰坐春風科第繽紛出學宮花月平章二百載詩名終是首文公癸辛雜志乾淳文淳厚謂之乾淳體端平江萬里自成一家淳祐徐霖魁南省尚性理時競趨之以釣科第咸淳末諸人倡為變體謂之换字文章內多用莊列語文獻通考淳熙十四年鄉試得進士王容以下上天姿英眀大廷䇿士多自升黜不盡由有司是舉王容蓋自第三親擢為榜首時儒生迭興辭章雅正號乾淳體無少室山房詩藪大抵南宋古體當推朱元晦近體出陳去非此外略有三等尤楊四子元和體也徐趙四靈大中體也劉戴諸人自為晚宋而謝翺七言古時有可採焉雲漢昭回奎宿明巖菴猶記大蘇名從來國運關文運莫誤文章喫菜羮庚溪詩話徽宗幸寶籙宫醮筵其主疏道流伏地久之方起上詰之答曰值奎宿奏事上問何神對曰本朝臣蘇軾也上大驚守萬厯杭州府志東坡菴在錢唐縣西六里東坡為時止此後人鑒石為室名曰東坡菴弱洹詞記事續鈔南宋之文氣浮而詞細靡故國益如葉水心之譎周平圉之漫陳平齋之雜放農田餘話宋南渡後文體破碎詩體卑弱惟石湖翁為平正至晦菴諸子始一變時習模仿古作故有神頭鬼面之論之老學菴筆記建炎以來尚蘇氏文章學者翕然從有語曰蘇文熟吃羊肉蘇文生吃菜羮春衫新翦瑞香羅插座頻宣小妓歌四色饅頭紅白酒花茶坊裏喚厮平波夢粱録蒸作麵行賣四色饅頭薄皮春繭孝仁坊口水精紅白燒酒曽經宣喚其味香美入口便消大街有三五家開茶肆樓上專安著妓女名曰花茶宴等不奉色業藝專為探聽妓家賔客趕趂唱喏飲所在以獻香送歡為由謂之厮波南瓦邀棚北瓦過繡巾小妓舞婆娑遊人不盡香塵擁簫鼓開場打野呵市肆記或有路妓不入勾欄只在要鬧寬濶處做場謂之打野呵又如北瓦羊棚樓等謂之邀棚咸淳臨安志南瓦在清冷橋西有熙春樓北瓦在衆安橋之南亦名下瓦有羊棚樓明逺髙樓夜半鐘書聲蚤巳聽潛龍凡塵留得天人像願浹春風遍九農剡源集佑聖觀記觀有明逺樓阜陵嘗讀書其中應朝野雜記佑聖觀淳熙三年建以奉佑聖正武靈正君十二月落成或曰正武像蓋肖上御容也農庚溪詩話孝宗春賦浹土膏之流潤將勸功於九碧草凄其帶露遊絲飄其曳空丹緑衆芳超遙兮春風春風兮歸來信吹萬之不同埤雅廣要孝宗母張氏夢崔府君擁一羊丁未生孝宗於秀州小名羊髙宗選飬宮中賜名瑗適與崔府君同名難將肥瘦定官家總屬天潢貌似花從此中興開七葉狸奴偏是判龍蛇合璧事類紹興詔令訪求伯字號七歲以下者十人入宫十人中擇一肥一癯留肥而遣癯未出思陵云更子細觀令二子叉手立忽一貓走前肥者足蹴之上曰此貓偶過何踼之安能勝重耶遂留癯而遣肥者癯者即孝宗也誰主西湖造化功總相宜咏畫圖中四時分判拈題日不見蘇公與白公學吟載有遊西湖詩誰主西湖造化功峰分南北境相通四時風物絃歌裏兩岸人家圖畫中堤栁送迎忘爾汝棹聲來往自西東風波便作恩波看此樂君王與我同逃禪詞趙祖丈畫西湖圖名曰總相宜作水龍吟詞咏之時方輿勝覽西湖在州西周回三十里山川秀發四畫舫遨遊歌鼓之聲不絶好事者嘗命十題有曰平湖秋月蘇堤春曉斷橋殘雪雷峰落照南屛晚鐘麯院風荷花港觀魚栁浪聞鶯三潭印月兩峰插雲州案此為十景之始可知出於南宋其來已久道苔衣集西湖詩山氣又晴晴又雨樓臺依寺寺依山山無聲詩一作兩峰出雲孤梅雪堅壁長城慕勇功中興想望野人同醫身醫國皆司命星陷無如奴僕宫漁隱叢話髙宗南渡有稱中興野人題詞吳江橋上有云敵騎長驅三犯闕誰作長城堅壁四朝聞見録臺臣有論列秦檜王繼先二人者上曰檜國之司命繼先朕之司命自此言者遂沮又髙宗自能推步星命或臣下不能始終仰副聖懷則曰吾奴僕宫星陷也柏子池邊弱栁新珠簾十二列宫嬪耕夫織婦排香几不問蒼生問鬼神楊太后宮詞雲影低涵柏子池秋聲輕度萬年枝宣玉海紹興中於潛令樓璹畫耕織二圖髙宗召對示後宫彖貴耳録憲聖在南內愛神怪幻誕等書郭暌車志始出洪景盧夷堅志繼之梅粉松黃作湯餅銀鰣青蟹供芳醹氷天不愛花交菜玉肺朝朝出御厨山家清供紫帽山人作梅花湯餅初浸白梅檀香末和麵作餛飩皮每一疊用鐵鑿如梅花樣者鑿取之可想一食不忘西湖辭又云大理寺訪陳秋巖評事留飲二童歌歸去來以松黃餅侑酒又云正粉油餅芝麻松子胡桃蒔蘿六者為末拌和入甑蒸熟切作肺樣後苑名曰御愛玉灌肺以此見九重崇儉不嗜殺之意年蟹略有湖蟹潮蟹魚月令廣義引武林遺事云每五月富春江上鰣最盛數人捕之移時百里達於城市變戒菴漫筆杭州俗呼黃矮菜為花交菜謂諸菜多成異種俗多南渡遺風賣氷者呌大雪以大雪收者佳糴芝麻者呌何何舊姓何者鬻此故也蹴得金爐動地驚旋看鐵塔起佳城九重相與殷勤問想道卿兒已長成宋史紀事本末太子屬疾宫人蹴地上金爐有聲驚悸疾轉劇遂不起初張浚以敷嘗姦帝位議去之朝野雜記建康初太子得疾未瘳有金香爐宫人誤觸之仆地有聲太子應時驚搐不止上命斬宫人於廡下少頃太子薨年三歲而朝野遺記方伯彥潛善養安之際外傳北風極徑汪黃傲然謂無事故上亦不甚虞比江都宫中方有所御幸而張浚告變者遽至矍然驚惕遂病薰腐故眀受殂後二宫皆絶孕苗劉之變植虛器於前星蓋特二凶狂妄耳春宫未辦庚申而浚在建業乃建議殞之過矣今明受之殤在鐵塔下父老尚能言蓋當時併乳嫗皆掩之云子鶴林玉露髙宗問張魏公卿兒想甚長成對曰臣年十四脫然可語聖人之道為國掄才費藎思雖於簡牘亦無遺誰知淪落天街客三十青錢一首詩四朝聞見録趙忠定商確駢儷以為此最不可忽居政地問以此觀人至尺牘小簡亦然此掄才報國之端也每漁隱叢話仇萬頃未達時挈牌賣詩首三十文停筆磨墨罰錢十五苻離一敗盡南奔道士空傳相法明聞説相公多睡語休將心學誤蒼生何氏備史張魏公素輕鋭喜功好合虛譽苻離軍潰國家數十年所積資械蕩棄無餘方其甘寢晏然稱是心學然當萬衆崩解時一人心法遽能收拾否夫夷堅志張魏公冀夫人日齋道人一員有一客曰人當生貴子既見公揖公行數步即呼為相公清齊東野語張魏公出督陛辭與髙宗約曰臣先驅道約至汴京作上元嶽飛聞之曰相公得非睡語乎浚史緯張浚屢奏欲取山東德夀謂孝宗曰毋信張虛名將來必誤大計至符離師潰可謂知臣莫若君矣落魄人傳王實之盛朝多見石湖詩醵錢説虎邀呆子不似狂生敕賜時齊東野語王實之莆田人有文名落魄不羈為正字日囚輪對及故相理宗曰姑置衛王王曰何容保之至上怒曰此狂生也後歸鄉里自稱敕賜狂生即白獺髓石湖范參政初官其同參者聞為吳郡人云呆子范又後因醵會日云請呆子虎清賞録文穆好談虎構一軒曰説敢與陽烏一體尊河山影出已黃昏清泠泉底銀牀上籕法曽書明視孫螢雪叢説詩僧上秦師垣夀曰不祝公兮椿與松椿松老大空無用不祝公兮龜與鶴龜鶴汩沒徒泥中祝公願作天上月歲歲年年常皎潔錦城初動五更鐘引領衆星朝北闕秦大喜書史會要秦檜能篆書金陵文廟井闌上刻其所書玉兔泉三字亦有可觀湖隄何地葬桃花簡簡芳名未可誇賺煞西泠橋畔客幾番松下覓香車咸淳臨安志蘇小墓在湖上周紫芝云湖堤步遊客言此蘇小墓也詩云野水橫分青草陂誰埋玉樹與瓊枝湖邊山自向人緑門外栁今何處垂行雨行雲均是夢施朱施粉未相宜一從蕙死蘭枯後剛道桃花好面皮唐雙名志蘇小小一名簡簡咸案蘇小墓並不在錢自武林舊事載在西湖而淳臨安志亦載引周紫芝詩為證然唐人徐凝有詩云嘉興縣裏逢寒食落日家家拜掃回惟有縣前蘇小墓無人送與紙錢灰陸廣微吳地志亦明載在嘉興縣側或謂李賀歌有西陵下風吹雨之句然西陵即西興亦並不在錢唐似不足據後之志墓者當考正之對坐金獅映日明彩雲仙隊奏瑤笙黃羅盒賜東宫食石首魚􅻣土步羮詩林韶濩楊萬里德夀宫慶夀口號雙金獅子四金龍噴出香雲繞殿中太上垂衣今上拜百王曽有箇家風間二老堂雜志殿上大宴有蠻人控金獅子對設柱文獻通考宋女弟子隊曰彩雲􅋖隊隨隱漫録每日賜太子玉食批司膳內人所書也如酒醋白腰子三鮮筍炒鵪子烙􅻣石首魚土步辣羮海鹽蛇鮓煎卧烏熓湖魚糊酒蟹江珧青蝦辣羮酒醋蹄酥片生豆腐醋腦子清汁雜熰湖魚肚兒辣羮之類薰風駘蕩水芙容聞道氷船江上供瓜果浸來消永日宫官小殿講中庸雞肋編二浙少氷雪紹興壬子車駕在錢唐是冬大寒屢雪氷厚數寸北人遂窖藏之燒地作窨臨安府委諸縣皆藏明年五月天中節天適晴暑供奉行宮有司大獲犒賞其後錢唐無氷可收時韓世忠在鎮江率以舟載至行在晝夜牽挽謂之進氷船種松漠紀聞西瓜本出塞外自洪忠宣奉使歸得其蒔之禁圃鄉囿江石湖集碧蔓凌霜臥軟沙年來處處食西爪桐集西爪足解渴割裂青瑤膚詩林韶濩真德秀宫夏詩午漏遲遲滴玉壺清隂羃羃布庭除直教底事消長日大學中庸兩卷書香雲漫與白雲遊千載錢唐豈得休讖語何須憂鼎折元勳一代在春秋秀水間居録趙鼎起於白屋一旦拜相以臨安相府為不足居别起大堂竒花佳木環植周圍堂之四隅各設大爐為異香數種每坐堂中則四爐焚香煙氣氤氲合於坐上謂之香雲山堂肆考金明縣道士自稱白雲片鶴遊汴見趙鼎大呼曰中興名相他日又遇鼎曰吉陽相逢後鼎紹興五年為相有重名晚竄吉陽忽見白雲曰憶昔日之言乎當雞肋編會稽士人有錢唐休者有名於時趙丞相國人薦之方議除擢會邊報警視奏目中適見其姓名趙不悅曰錢唐遂休乎因置不用趙引折彥質為樞密其院中奏牘書名相次人有譛之者謂趙鼎折為不祥乃與錢事相類古今以讖語而為禍福者多矣宋元通鑑辛棄疾帥長沙時士人或訴考試官濫取第十七名春秋卷棄疾察之信然索亞榜春秋卷兩易之啓名則趙鼎也棄疾怒曰佐國元勳忠簡一人胡為又一趙鼎擲之地案趙鼎字元鎮撰忠正德文集十卷四字髙廟所賜宸翰中語也又得全詞一卷青絲覆額灑銀豪寶騎裝鞍繫錦韜殿隔珠簾宣賜宴庭開花燭慶同牢朝野雜記髙宗一朝童子求試者三十六人授官者五人萬頃彭興張宗柔朱虎臣劉轂惟虎臣能排陳步射及讀書故補承信郎劉轂以小校子五歲善騎射故補校尉虎臣又賜金帶孝宗一朝童子求試者七十四人命官者七人有吕嗣興者四嵗能誦書切韻變四聲書八卦上召見俾靣吟詩授右從政郎令伴皇孫榮國公讀誦乾道八年春也又授王克勤右從事郎李如圭林洽何耀並迪功郎何致逺將事郎郭洵直下州學光宗一朝童子求試者十七人無補官者惟從仕郎吳鋼年九歲能誦六經語孟以夀聖親姪孫特改承務郎壬子四月也父談薈吉水李如圭七歲中童子科孝宗召見與其隔珠簾賜宴𢎞簡録熊克家素儉約除起居郎嘗愛臨川童子王克勤之才將妻以女而乏資遣會草制獲賜金遂以歸之人稱其介謝江漢叢談茶陵談昭寶七歲應童子科登第啓傳入禁中理宗見而異之栁絲髙颭紅旗小蘭栧平移妓樂來十錦亭邊春市散風光老去舊樓臺西湖賦湖詠維百先言御園爰有聚景圖經所尊致坤宫之孝養據震位以生藩來四朝之遊幸攬衆逺以平吞南有翠芳蘭栧在焉接蓬萊於中沚賓慧日於前軒北有玉壺紅鵑尚存去環碧兮百棹隔水月兮一垣慶樂有梅關桂林之勝珍禽異獸之繁亭連棟為十錦碑蝕苔以千言記南園之絶景扁西湖之洞天此皆始屬於禁籞又不但嘗錫之侯藩羅又云想見進魚羮之宋嫂猶多乘鶴舞之優人翦飣采花之籃範飴為穿栁之鱗飾木兵於小桁串家具於修筠柘彈象弩畫棍髹盆羅襪淩波金叉照春鞠澗小集聚景園口號淺碧池塘連路口淡黃楊栁護簷牙舊時歲歲春風裏長見君王出看花竹影參差臨斷岸花隂寂厯浸清流遊人難到闌干角盡日垂楊覆御舟乾淳歲時記蔣苑使小圃花木匼匝立標竿射垜秋千梭門寒升菴外集陸放翁詩云秋千旗下一春忙畫工作食仕女圖秋千架作兩繡旗眼蒲江詞西湖調寄栁梢青鬭草褰衣濕翠秋千瞥飛紅蛻岩樂府西湖泛舟調多麗云館娃歸蘇臺遊鹿銅仙去漢苑飛螢西湖賦白珽作曾聞緦服到臨平龍德宮中祭奠誠二帝魂遊沙漠外何來朽木與燈檠函史紹興十二年己丑帝易緦服奉迎徽宗皇帝及顯肅皇后鄭氏懿節皇后邢氏梓宫至奉安於龍德别宫和雲谷卧餘全遼志云五國城頭有宋徽宗墓然則議成而梓宫至臨安蓋以空櫬給宋朝考五國城一名五國城頭在三萬衛北一千里自此而東分為五國故名距京城三千三百里宋元通鑑紹興五年上皇卒於金五國城年五十四遺言欲歸葬內地金主亶不許朝野雜記欽宗之喪舉哀於天章閣南以學士院為几筵殿遙上陵名曰永獻暨乾道中朝廷遣使求陵寢地金人許以遷奉且併歸靖康梓宮朝廷難之金人乃以禮葬於鞏縣云五癸辛雜志楊髠發徽欽髙孝光五帝陵初徽欽葬國城數遣使祈請於金人欲歸梓宫几七年而後許髙宗親至臨平奉迎易總服寓於龍德别宫至是被發二陵皆空無一物徽陵朽木一段欽陵木燈檠一具而已野獲編欽宗陵柩無尸止有木燈檠一枚按欽宗柩在北髙宗不肯歸金世宗以一品禮葬於鞏洛之原柩且不還安所得燈檠也談輅紹興十二年皇太后韋氏至自二金而靖康帝故未歸也豈當時不云請耶抑不遣耶至十一年始遣巫伋迎之而究顔亮不知歸後何處頓放伋遂唯而退志考三朝北盟會編邢皇后歸至中途上仙案田引癸辛雜識言欽宗梓宫歸臨安者誤矣回首中原長草萊金門土稚幾疑猜紛紛小腳船中客爭買西湖黃胖來渭南集嵩山景迂鄜畤排悶詩莫言無妙麗土稚動金門鄜夫善作土偶見宫禁及貴戚家爭以髙價取之為玩喪亂阻隔南人不復知此句遂亦難解嫂夢粱録小腳船專載賈客小妓女荒鼓板燒香婆白獺髓迎春黃胖起於湧金門外地有杏花園遊人多取其黃土戲揑為人形爾家鄉風物嗜鳴蛙聖主頻頒惠愛加寫到坐魚資雅博市門日日送冬瓜四朝聞見録杭人嗜田雞如炙即蛙也憲聖渡南以其酷似人形力贊髙宗申嚴禁止都人習此不能止售者至刳冬瓜以實之置諸食蛙者之門謂之送冬瓜又黃公度帥閩宿戒庖兵市坐魚三斤庖兵不曉時林執善為州學録庖人問焉林語以可供田雞三斤庖兵納入公度笑曰誰教汝庖以善對黃公遂館林於賓閣云中興香繞玉階深瞻笏頻頻用表忱鵷鷺兩行齊拜舞閣門多是鮑魚音香乘光宗萬幾之暇留意香品合和竒香號東閣雲頭香其次則中興復古香老學菴筆記紹興中朝參止磬折遂拜今閣門習使先以笏叩額拜拜皆然謂之瞻笏亦不知起於何年也貴耳録孝廟時取北人於閣門充贊喝聲雄如鐘有京洛氣象嘉定來多以明台溫越人聲皆鮑魚音矣德夀書名滿市㕓一丁猶是賦三千不須更問燈籠錦翼翼宫旗插糞船齊東野語德夀宫建房廊於市㕓役者不知體凡門闔輒書德夀宫汪應辰出劄極言之上不懌會德夀宫市燈籠錦不得太上曰比已得之汪應辰家物也宋稗類鈔南渡後浙中賦稅全是橫斂丁錢有至三千五百者人由此多去計會中使作宮中名字以免稅辛幼安云曽見糞船亦插德夀宫旗字蘋蘩亦可助調羮老嫗驕兒御賜名獨坐綸扉兩朝宰閨中不許號先生黃氏日鈔賈似道始生之日錢唐宰郭應酉以詞賀之并頌其母蓋賈之母朝命封兩國賜號賢夀槎菴小乘賈似道母胡氏贈秦齊兩國賢夀休淑莊穆夫人諡曰柔正又秦檜妻王氏自號沖正先生見陸務觀王佐墓志名朝野遺記秦檜妻王氏素隂險出其夫上兩浙賢録秦檜妻王氏陳乞舊所得思數未領者自稱沖正先生王佐為祕書省校書郎駁之曰妾婦安得有此稱向者誤恩今得追正安前幾樹碧桃花曽駐龍旗耀日華兩岸水聲芳草路居民猶話宋官家西湖百詠年來青烏碧桃花築室安前即是家玉貌星冠隨絳節雙成不及魏無瑕武林梵志髙宋南渡議西溪建立行宫因幸西溪相度形勢遂駐蹕於沈氏有沈諸者進食獻茶帝大悅曰西溪且留下後遂相傳為駐馬沈兩西溪梵隱志西溪有三橋多植栁濃隂夾道東西涯民居臨水花木周廬亦稱花市又安前之名特裴墩董竈並著其義未詳滿苑奇花擁至尊宛書宸翰代天恩細看御寶新紅沫猶有香生粉指痕太平清話四明樓璹繪耕織圖後此圖流傳人間見逐段下有憲聖慈烈皇后題字皇后姓吳配髙宗其書絶相似又御前應制多女流也碁為沈姑姑演史為張氏宋氏陳氏説經為陸妙慧妙靜小説為史惠英隊戲為李端娘影戲為王潤卿之霏雪録宋故事禁中處分事付外謂之內批又謂御批皆內夫人代書至留青日札徑山宋時萬夀襌寺大碑其中一御寶今如朱砂印痕風雨不剝滅此名紅沫也香水銀盆看浴時圍紅攪亂小叉枝浮浮花果爭相取少婦偏尋立棗兒夢梁録育子滿月外家以彩畫錢或金銀錢雜果及珠翠𩕄角兒食物送其家大展洗兒會煎香湯於銀盆內下洗兒果用色綵繞盆謂之圍盆紅尊長以金銀叉攪水名曰攪盆叉撒於盆中謂之添盆又盆內有立棗兒少年婦爭取而食之以為生男之徵三臘移窠過别房銀盆彩蛋與眠羊賓親來慶洗兒會只少崑山粥米莊夢粱録三朝與兒落臍炙囟七日名一臘十四日名二臘二十一日名三臘女家與親朋俱送膳食又兒落胎髮畢抱兒遍謝諸親及抱入姆嬸房中謂之移窠又育子父母家以銀盆或綵盆盛粟桿一束上簇通草花朵貼五男二女意思及眠羊卧鹿以綵畫鴨蛋百二十枚及芽兒繡棚彩衣至壻家齊東野語楊和王第六女事向子豐一日向妾得男楊以為巳出王厚遺其女且撥吳門良田千畝以為粥米今向氏有崑山粥米莊束禾何必再三將軌革當年亦渺茫獨坐中書書剝字果然紅日壓無光老學菴筆記秦會之專國軌革中又多三人各持禾一束曰秦字也其言亦頗驗及秦氏廢亦無人占得此卦矣司宋稗類鈔乾道中駁放秦塤等科名方集議時中誤以駁為剝衆畏中司護前遂皆書曰剝又謝石拆春字謂秦頭太重壓日無光忤檜死於戌祕書省坐狀元憨紅履磚巾侈笑談石鼓墨文今在否裝池碑版付枯蟫朝野雜記紹興十二年秦申王當國其子熺始冠多士十五年以秦熺提舉祕書省南宋相眼陸務觀云嘗記先人説紅鞋飾帶始唐莊宗施之優人文昌雜録滑臺賈昌朝畫像猶黑鞋不知紅鞋起於何時渡雲麓漫鈔元祐間有溫公帽伊川帽未有巾之名江後方著紫衫號為窄衫盡巾巾之製有圓頂方頂磚頂琴頂秦伯陽以磚頂服去頂內之重紗謂之四邊淨石鼓文辨鄭樵模寫其字之可曉者而隨用其見以為之辨南劍州州學以鄭本鋟木紹煕辛未有以墨本見示者建康秦丞相家藏本也點畫糢糊皆不可讀日甘露園短書秦熺當其父檜執政十九年中無不煆酒器無日不裱背書畫碑版空向權門去附名龍圖曽是説端明蘇家骨月皆零落悔不閹奴序弟兄或淳臨安志紹興元年禮部尚書秦檜參知政事龍圖閣待制孫覿賀檜有曰盡室航海還復中州四方傳聞感涕交下漢蘇武節毛盡落止得屬國唐杜甫麻鞋入見乃拜拾遺檜以為譏巳大怒快雪堂集跋宋孫尚書覿尺牘云聞之毗陵人尚書實大蘇公遺體孫老得公棄婢而生畏時禁不能自明而詳其顚末於家乘親朱子語録梁師成自謂東坡遺腹子待蘇叔黨如弟兄諭宅庫云蘇學士使一萬貫以下不須復慧考香祖筆記坡公往陽羡憩村舍見一童子頗聰出對句云衡門稚子璠璵器童子應聲曰翰苑仙人錦繡腸坡喜之童子即覿也然則遺體之説妄矣披孫覿字仲益撰鴻慶集四十卷木隂斜轉月娟娟片紙驚看戴角豜判得棄官何處去雲中來往翦頭仙夷堅志秦檜下嶽飛大理獄周三畏鞠之遇夜間行見古木下一物似豕而角周却步此物徐行至獄傍小祠而隱經數夕復往月甚明又見前怪首有片紙書發字樵書大理卿周三畏不肯勘問嶽武穆挂冠而去不知所之後於延安葭州山中有翦頭仙人日飲淨水三甌與人論及宋事咸陽寃死仙輒大哭問其姓曰姓周後忽不知其何從而去空中墜名帖二紙書周三畏拜謝乃知翦頭仙即周也佃客當時嶽五郎廬山淚血灑松篁獄辭一紙書天日不願千年姓氏香宋稗類鈔嶽太尉本是韓魏公家佃客每見韓家子弟必拜學圃萱蘇初嶽飛從戎留妻養母姚氏既而河北淪陷訪求數年不獲俄有自母所來者寄聲曰為語五郎勉事聖天子無以老嫗為念也飛竊遣人迎之往返十有八然後歸奉之後宣撫襄陽母死與子雲跣足扶櫬歸葬路人無不涕泣既葬廬於墓側云揮麈録張唐老自九江來聞嶽侯父子伏誅唐老去歲在匡廬正覩嶽侯葬母儀衛甚盛一僧為言嶽葬地雖佳掩壙之後子孫須有非命者然經數十年再當昌盛同話録嶽武穆獄案今在莆陽陳魯公家世本無獄辭但大書天日昭昭天日昭昭八字是罪案乃是細書與前筆迹不同不知後來如何粘成卷也片竹莊舊藁讀嶽鄂王行實詩一堂中紙千年身後名賜來盾樣襲文綈玉軫金徽御墨題不見薦紳稱四絶曽知閣譜重江西玉海髙宗賜洪皓御銘盾樣琴一上曰古人琴製不同朕製盾樣以示不忘武備之意佩楚軒客談端淳薦紳四絶楊嗣翁琴趙文中棋張溫夫書趙子固畫清容集琴述往年錢唐楊司農以雅琴名於時有客三衢毛敏仲嚴陵徐天民在門下朝夕損益琴理刪潤别為一譜以其所居曰紫霞名焉自渡江來譜之可考者曰閣譜曰江西譜閣譜由宋太宗時漸廢至皇祐間復入袐閣今世所藏金石閣畫之精善咸謂閣本蓋皆昔時祕閣所庋而琴有閣譜亦有義也方閣譜行時别譜存於世良多至大晟樂府證定益以閣譜為貴别譜復不得入其學寢絶紹興時非入閣本者不得待詔曰江西者由閣而加詳焉按楊纘字繼翁寧宗楊后兄次山之孫也號紫霞翁緑雲深擁御袍黃一枕琉璃清夢長花竹後來誰弛禁海棠樹樹染天香松隱集題禁中黃石榴安石開花比御衣皺紅繁緑不能竒上林别有嬌黃貴如翦氷綃襯玉肌又禁中茶蘼詩密葉素華青羽帔繁香秀色六銖衣枕間為插琉璃滿清夢泠泠入翠微宋元通鑑內侍移竹栽入內趙鼎見之責曰艮嶽花石之擾皆出汝曺今欲蹈前轍耶因奏其事帝改容謝又紹興二年禁買花木珍禽臨安諸門不許放入自海棠譜一卷錢唐陳思撰開慶元年自敘云海棠杜陵絶吟至鄭谷已為舉似本朝列聖品題雲章奎畫烜耀千古此花盛傳於世余因採集諸家為一編曰海棠譜酬唱詩章洵雅嫻窄衣絲履識龍顏五雲玉座傳香逺射垜前排招箭班武林遺事孝宗幸玉津園講燕射禮皇太子宰執皆從賜宴上服顔巾窄衣束帶絲履內侍御帶進弓箭看箭人喝看御箭教坊樂作射垜前排立招箭班皇帝射中太子以下各拜稱賀上賦七言詩丞相以下屬和又招箭班者服紫衣幞頭叉手立於垜前御箭之來能以幞頭取勢轉導入的亦絶技也松隱集從駕玉津園詩天子行春御六龍五雲回暖泛晴風和鸞寶苑梅花路賸有香傳玉座中東京夢華録招箭班外又一人口銜一銀碗兩肩兩手共五隻箭來則能承之射畢駕歸宴觀此南渡制度皆承祖制千秋聖節拜彤宸詔賜餼牲及下臣慶禮常聞南北使金人擇日作生辰宋史髙宗天申節五月二十一日孝宗會慶節十月二十二日光宗重明節九月四日寧宗瑞慶節十月十九日理宗天基節正月五日度宗乾會節四月九日玉堂雜紀宰執及親王生日預申學士院撰詔書及賜目一紙祖宗時牲餼外又錫器幣過江後牲餼耳米麵本色羊準價酒則臨安醞造加以黃封周益公年譜七月甲子中使賜生日生餼米麵羊酒松漠紀聞金人生日各分占良時尼堪以正旦烏舍以元夕烏雅美以上已國主亶以七夕等生老學菴茟記淳熙已酉金邉帥移文境上曰皇帝日本是七月今為南朝使臣冒暑不便已權作九月一日諸生伏闕捲堂歸當路無才愛養違寧逺荒阡寒食候尚餘草木戀春暉清夜録淳祐十二年武學為同舍求棺木京尹余太監晦差伍作搔撿揭帛裂衣暴露兩日齋衆同太學伏闕上書不報各捲堂散去司業蔡抗申奏即就出浙江亭呼吏出榜云就撥官會一百萬照甲牌俵散以表賑恤之意者成化杭州府志宋有寧逺阡葬太學生死而無歸在方家峪梯子嶺下國子司業王介撰記江上風吹羅剎沙九重遙拜護仙查攢宫巳建容車出萬國齊簪白奈花聞見録顯仁太后龍輴將渡會稽上預恐風濤為孽於宫中默禱清忠廟及篙御既戒浪平如席揮麈録紹興初昭慈聖憲皇后升遐朝論欲建山陵曽公卷以謂帝后陵今存伊洛復中原即歸附矣宜以攢宫為名徽堅瓠集寧德皇后從徽宗蒙塵紹興五年訃音來州唐輝使休寧尉陳之茂撰疏文云十年罹難終弗返乎蒼梧萬國銜寃人盡簪乎白奈大理埋魂骨已枯復仇九廟獻軍俘拚香棄雪清風鎮誰寫將軍嘗后圖宋元通鑑史嵩之遣使以孟珙所獲金哀宗遺骨及寶玉法物并俘囚等獻於臨安備禮告於太廟藏其骨於大理寺獄庫州癸辛雜志史嵩之開判湖閫與孟珙合元兵攻蔡獲亡金守緒殘骸以歸且繪八陵圖以獻這見只篇宋人嘗后圖上有題云棄雪拚香無處著面孔一綜兒是清風鎮的樣子那將軍是報粘罕的孟珙四海歡聲傳墨本恤刑寬政頌皋陶頻年獄吏宣恩處青火桁楊享少牢山堂肆考紹興二年詔以恤刑手詔刻石頒諸郡縣奉使魏良臣曰北人得上親筆恤刑墨本曰恤刑如此民心安得不歸書宋史淳熙元年守臣胡與可奏三院獄空上賜璽奬諭古杭雜記舊傳三歲拜郊或明堂大禮所有在前誤國姦臣首級在大理寺者必以文祭蓋訛傳謂以汚穢之物祭之其實乃少牢也其文云國祭于三年恩霈汝雖誤國然今亦不忘汝之舊特用以祭今日士師非禾絹申王巳見卧書齋滿朝伴拜母多語還有臺端肉簡牌困學記聞誠齋為章燾墓銘云今日士師非禾絹士師也宋明帝紀胡母皓專權奏無不可時人語曰禾絹閉眼諾胡毋大張槖禾絹謂上也蓋謂秦檜顓政士師非主上之士師也山堂肆考宋秦檜初為太學生號秦長腳一日睡於窗下有異人來詣檜語其同舍郎曰他日此人誤國害民天下同受其禍諸君亦有死其手者悉劉時舉續資治通鑑自檜當國士大夫之名望者屛之逺方齷齪委靡不振之徒一言契合即登政府仍止除一廳謂之伴拜稍出一語斥而去之王宗沐續資治通鑑楊願為中丞迎合檜意以舉劾人號之為肉簡牌鐵豸班心列諫官滿朝人指滿朝歡一遭白簡書名姓又使家人製藥丸王宗沭續資治通鑑章鑑居位號寬厚與人多許可時目為滿朝歡劉時舉續資治通鑑紹興元年何淡同知貢舉劉光祖除殿中侍御史首上學術邪正之章及奏名被旨入院拆卷出同院謂光祖曰何自惚見公所上章數日為之恍日餌定志九他可知也當時深悔和魚須蚤列江西詩派圖齋閣焚香滌研外煎茶偏自喚昌奴困學紀聞徐師川以諫議召程致道在西垣封還除書言與中貴人唱和魚須之句為人所傳詩説雋永徐師川贈中貴鄭公諶詩平生不善劉蕡䇿色色人中自有人漁隱叢話師川因鄭諶而進致身樞府東湖集中與鄭唱酬亦多又呂居仁江西宗派圖推豫章黃山谷為詩祖列陳師道潘大臨謝逸洪芻饒節僧祖可徐俯洪明林敏修洪炎汪革李錞韓駒李彭朝沖之江端本楊符謝薖夏倪林敏功潘大觀何顗王直方僧善權二十五人以為法嗣謂源流皆出自豫章也宋史新編徐俯字師川號東湖七歲能詩為山谷所知以父禧死事受通直郎邦昌僭位遂致仕工部侍郎何昌言與弟昌辰避邦昌諱皆改名俯買婢名昌奴客至即呼前驅使之客堯山堂外紀徐師川是山谷外甥晚年欲自立名有稱其源自山谷者公讀之不樂答以小啓曰涪翁之妙天下君其問諸水濵斯道之大域中我獨知之濠上案此則師川久已無渭陽之情矣且藉閹寺以進身倒行逆施皆晚年之事以邦昌名其婢頗覺可嘉特表出之栖雲花月小坡仙元祐儀型屬後賢天寶遙遙千載事又從詩酒薦青蓮山堂肆考宋趙逵資州人纍遷至中舍髙宗以其文章似蘇軾人號為小東坡有棲雲集行世厯代臣鑑張浚與趙鼎共政多所引擢從臣朝列皆一時之望人號為小元祐清容集跋汪龍溪外制草崇觀詞臣以扇對全語為髙獨龍溪先生痛掃時弊盡復元祐之舊不幸為秦氏子擯斥劍南集題跋孝宗一日御華文閣問周益公曰今代詩人亦有如唐李白者乎益公以放翁對由是人競呼為小李白虎頭金甲列前扄天眷牛車去不停尋得周家姊妹帖朔風腸斷讀零丁楓窗小牘靖康已前汴中門神多番㨾戴虎頭盔而王公之門至以渾金飾之識者謂虎頭男金飾便是金人在門也以弔伐録太上皇太上皇后鄭氏至金營諸王嬪御下畢至親王二十八人帝姬一十五人皇太子一人諸王男女一十六人一三朝北盟會編金人遷天眷於通塞州去燕山府十五百里給田十五頃令種蒔以自養王經濟類編上皇離青城金人以牛車數百乘載諸後宮皆金人牽駕不通華言林放翁題跋周侍郎尋姊妹帖方建炎多故羣盜如士大夫罹禍有盡室不知存亡者觀周公所書可為流涕今案東漢戴良有尋父零丁即尋人帖子也八罪彈章上玉階育翁負鼓唱荆叉梅溪莫笑元辰命曽憶無衣卧學齋王宗沐續資治通鑑侍御史王十朋論史浩懷姦悮國等八罪遂罷浩知紹興府天祿識餘玉蓮王梅溪先生十朋之女孫汝權宋進士與梅溪為友敦尚夙誼先生劾史浩八罪汝權實慫惠之史氏所最切齒遂妄作荆叉傳竒謬其事以衊之人升菴外集潛説友宋安撫使今傳竒王十朋有此訛為錢餘姚許浩賦荆叉百詠已鞠坡叢話王十朋云術者謂豫命犯元辰故仕輒豫笑曰有是哉戲作問答語又王十朋寓居臨安偶值乍寒諸生有陳元佐劉士宗各借以衣童生謝偉謝侃濟以衾因作二詩以贈茂案王十朋字龜齡撰梅溪奏議三卷報史緯陳之嘗毁浩浩擬之茂進職上曰卿以德怨耶浩曰臣不知有怨若以為怨而以德報之是有心也莫濟詆浩尤甚浩薦濟掌內制上曰濟非議卿者乎浩曰臣不敢私害人按史載史浩寬厚如此荆叉之作果何為耶禪牀夜午春生夢書閣燈青月覆香一種癡情何處是風流都入選優場古今女史宋女貞觀陳妙常尼年二十餘姿色出羣詩文俊雅工音律張于湖授臨江令宿女貞觀見妙常以詞調之妙常亦以詞拒詞載名媛璣囊後于湖故人潘法成私通情洽潘密告于湖以計斷為夫婦即俗傳玉簪記是也內警心録陳淳祖為賈似道之客守正為諸客所疾人亦惡之一日諸姬爭寵密竊一姬鞋藏淳祖牀下意欲并中二人也賈入齋見之心疑焉夜驅此姬至齋門誘之淳祖不答繼以大怒賈方知其無他遂勘諸姬得其情由是極契淳祖後遂有知南安軍之命金元院本演其事一餅清甌雪點初晚香和月入簾疏空傳舊㨾紅綾袋貢録先將小鳳除咸淳臨安志周必大賜筆記次韻詩天香謾炷薰常歇貢茗虛霑樣頓殊晨壁搖風愁幕冷夜窗透月喜簾疏注雖賜香而火禁甚嚴不許炷爐諸位總賜茶三百斤舊每斤即一紅綾袋凡十餘團今乃給黃袋拆而分之以一餅為一斤殆典吏移易也千北苑茶録先人作茶録當貢品極勝之時凡有四餘色紹興戊寅充攝事北苑閲近所貢皆仍舊其先後之序惟躋龍團勝雪於白茶之上及無興國岩小龍小鳳蓋建炎南渡有旨罷貢三之一而省去之也蒸五雜組茗有片有散片者即龍團舊法散者則不而乾之如今之茶也始知南渡之後茶漸以不蒸為貴矣丞相生辰馹使聞四方車馬巳紛紛漫誇天慶觀中列不及髙家九錫文續資治通鑑韓托胄却生日賀儀仰奏官遍行關報時士大夫或獻紅錦壁衣承塵地衣之屬修廣髙下皆與中堂等有獻紅牙果卓正珠搭檔遇生日大臣以下皆排列所獻於天慶觀之廡下都人競往觀焉九談薈韓托胄生日髙似孫獻詩章每章用一錫字以寓九錫呵殿歸來報舉觴迎門三十六鴛鴦南園又有間風月蚤逐笙歌過别房王宗沐續資治通鑑韓托胄愛妾張談王陳四人皆知郡夫人丹鉛録寧宗時武學生華嶽池州人上書極論韓托胄之惡并詆程松之納妾倪僎售妹蘇師旦獻妻書奏托胄大怒下之大理貶建寧圜土中死於獄近觀厯代名臣奏議可謂詳矣而嶽奏不在其中故表出之夜半中宫調虎符軟纒能敵鐵鞭無九重尚抆追回淚去國誰憐趙汝愚四朝聞見録虎符半在禁中半在殿巖開禧間慈眀隂贊寧皇誅托胄出御批授錢象祖象祖授殿岩夏震震遣其帳下鄭發王斌邀韓車於六部橋徑出玉津園夾牆韓身裹軟纒用鐵鞭中韓隂乃死地名磨刀坑又寧皇時聞韓出玉津園亟用箋批殿司前往回韓太師慈明持箋泣且對上云若欲追回他我請先死寧皇抆淚而止主之其制刻篆中分宋史建炎改鑄虎符樞密院説纂趙汝愚橫遭謫去國之日天為雨血京城人以盆盎貯之色殷然聞宋史本傳史彌逺錢象祖等赴延和殿以殛托胄帝不之信越三日帝猶謂其未死蓋是謀悉出中宫帝初不知也行間江南孰自謀私財官物已都休出師不草當時詔伴簡何來雙髑髏𢎞簡録金購得托胄族人韓元靚使行間於宋送令渡淮宋督府邱崈奏之宋方欲盟即遣崈護元靚北歸因密諭崈使歸罪邊將以請和自四朝聞見録開禧兵端既啓國用漫虧托胄上表謂家藏先朝錫豫金器六千兩上之寧皇優詔允其請天下笑韓之欺君筆麈韓托胄出師數衄自悔失圖私出家財二十萬以助軍興而募人持書赴金求和然竟不免於函首朝野雜記韓托胄將舉兵先以業正則直學士院蓋藉其名使草出師詔也正則喻其意堅辭三四於是用李璧草之宋元通鑑嘉定元年王柟以韓托胄首蘇師旦首至金金主璟御應天門備黃麾立仗受之百官上表稱賀懸二首并畫像於通衢令百姓縱觀然後漆其首藏於軍器庫遂命完顔匡等罷兵袈裟偏袒醉醺醺多少山靈奉事殷不引紅粧看花棒風流傳得起棺文靈隱志道濟侍者台州李氏子初參矑堂知非常僧然飲酒食肉有若風狂監寺不能容矑堂云法門廣大豈不容一顛僧人遂不敢言及逺公既寂出居淨慈在本山有化砌靈隱至錢唐門街道疏淨慈寺志神運井在香積廚內泉極甘冽皎焉沖照其下縱廣約二丈餘窺深悸魂內外引汲不竭嘉定時有六甲神常協僧道濟運木於此故云相傳其脈與江水通又名通江又濟顛常為陶師兒作起棺文下火文親古杭雜記杭州市肆有喪之家命僧為佛事必請戚婦人觀看主母則帶養娘隨從養娘首問來請者曰有和尚弄花棒鼓否而請者曰有則養娘爭肯前去花棒鼓者謂每舉法事則一僧三四棒鼓輪轉拋弄諸婦女競觀之以為樂多案陶師兒事已詳第四卷中兹不列封章誰道左司賢獨秉鈞衡十七年癡漢滿朝緣底事金人歲歲問胡銓甘露園短書胡淡菴上髙宗封事是范左司璿作范擬上淡菴慮其親老禍且不測取以為已意上之非淡菴筆也今人知有淡菴而不知有范璿范璿之不幸耳昨非菴日纂紹興末朝士多饒州人時人語曰諸公不是癡漢公宋稗類鈔乾道初金使來猶問胡銓今安在張魏曰秦檜持柄十九年只成就得一個胡邦衡再考談薈宋申王檜以紹興八年右僕射同平章事擅政進少保太師以二十七年殂凡十七年案胡銓撰忠簡奏議四卷得遇天家畢骨董虛將薰染供郊園金龜巳苦多尸氣彞鼎輸他列死軒三朝北盟會編畢良史字少董以買賣古器書畫赴行在思陵方搜訪古玩恨未有辨其正偽者得良史甚悅月給俸二百千而食客滿門時號貧孟嘗後權知東明縣搜求古器書畫復載以達行左人又號之畢骨董久紫桃軒雜綴古鼎彛皆黃銅今人得之地中者嵗色變自應爾今郊廟所製乃用藥薰染作蒼黑此何理然則藥燒銅物已起於宋矣一癸辛雜志景定中向若水墓為賊所劫其棺上為槅盡貯平日所愛法書名畫時董正翁得其蘭亭一卷正定武刻也後有名士跋語甚多其精神炯炯透出紙外正翁極珍之然尸氣所侵其臭殆不可近或教以擅香能去尸氣遂作檀香函貯之然付之庸工裝潢頗為裁損所謂金龜八字云皆研北雜志畢少董命所居之室曰死軒凡所服用上古壙中之物玉如彼含蟬是也煙飛小朵斫雲根梅子青青客打門詩酒四時春萬樹紅亭却建別家園太平清話范石湖小峨嵋靈璧石也煙江疊嶂太湖石也天柱峰英石也皆歸休時間玩語林范至能喜啖梅人嘗致一斛奩至能食之須臾而盡雲酒小史范至能有萬里春酒四部稿范至能有霞酒平𢎞簡録張説乾道七年除簽書樞密院事朝論不中書舍人范成大不草詞説罷為奉祠説語人曰范至能亦胡為見攻指所坐亭曰是材植皆致能所惠案范至能撰石湖集錦官先進牡丹衾分賜宫袍出上林象尺薰爐寒夜永文窗深度美人針文獻通考乾道二年户部言左藏東西庫每歲所賜賜袍親王宰執以全匹餘裁裂給之請皆照以全匹上從之又賜窄錦袍有翠毛宜男雲雁細錦獅子練鵲寶照大錦寶照中錦凡七等應給賜袍者皆五件次四件次三件次二件尚淳熙玉堂雜記十月朔賜錦襖子學士院四金雕書八搭暈錦宰臣使相天下樂舊蜀錦譜建炎三年始織造錦綾被褥乾道四年即廉訪司潔巳堂創錦院有上貢錦官誥錦細色錦等其名有八答暈樂盤毬窠簇四金雕窠水林檎翠地獅子天下大獅子大馬雙窠雲雁正宜男百花露瑞草雲鶴孔如意牡丹魚穿花鳳紅雪花毬大百花雀六金褥紫皂段子褥聚八仙被天馬四飛魚被正紅大被皂大被青大褥色中緋大被江正紅雙連椅背多正紅單椅背樓輟耕録髙宗渡後𣙜埸購求為錦標如克絲閣克絲龍水克絲百花攢龍摘克絲龍鳳鵲紫寶階地紫大花五色簟文小珠方勝鸞青緑簟文紫鸞鵲霞百花龍黃龜紋鸞珠焰絳紫曲水樓紫荷花紅雲鸞霞雲一名霄青閣青大落花團紫摘珠龍團盤青櫻桃路皂方團白花龜褐方白花方勝象毬衲柿紅背綬樗蒲瑞宜男八寶照帶草花暈龜蓮暈天下樂盤練鵲銀鉤細花雕翠色獅子地盤毬翔鸞遍芙蓉水藻戲魚七寶金龍遍地雜花倒仙牡丹遍地白蛇龜紋卷黃地碧牡丹方勝也輟耕録一條厲君太鴻第六錦褾裝池一首注今所謂宋錦者其名色蓋詳於南渡行都矣向注偶略因録於此宸書曽為擬汾陽勳業淮西亦可方一字裹巾一把雪慚無秦蜀入封疆山堂考索髙宗御書郭子儀傳賜韓世忠又書裴度傳賜張浚三朝北盟會編韓世忠既罷兵柄為樞密使乃製一字巾入都堂則裹之出則以親兵自衛檜頗不喜韓蘄王神道碑王在軍中獨馳騎馬使一把雪執信字旗一把雪者其兵之曺號孟趫捷善走之人也王庶家傳公為兵部侍郎對殿口陳手畫秦蜀形勝利害上大喜之翠翹筆底散天葩豔豔芳容暈曉霞樺燭影中二十二杏紅箋上寫春華焦氏説楛翠翹洪內翰侍人題畫竹云翠翹戲筆字畫婉媚程大昌題詩戲作風枝斜再惱玉堂宿異聞總録臨安倡女儀二十二名與頗慧悟能立成詩詞豫於席間與紙筆即賦詞大略美吾兄弟有鄱江英氣鍾三秀之句千秋廟貌錦江濆獻助謀猷四木君可惜月湖佳子弟空傳遺墨號升聞續成都記武侯祠壁間嵌一小碑上鐫繪像衣冠甚古雅題云丁黼字文伯石埭人也宋嘉定初進士有詩名以忤史彌逺出帥成都元人入蜀公不屈死之詔諡恭愍賜廟涎溪有司春秋祀瀛奎律髓成都太守自國朝以來至今皆畫像云附王宗沐續資治通鑑薛極與胡矩聶子述趙汝述史彌逺最親用事時人謂之四木姪清河書畫舫史守之越國公浩之孫衛王彌逺之仕終朝奉大夫中年避勢逺嫌退居月湖寧甫田集史守之退處月湖與慈湖諸公講肄為樂宗書碧沚二字賜之太平清話宋史守之心非叔父彌逺所為著升聞録以寓規諫九市官街新築成青裙販婦步盈盈三更歌笑明燈火巡檢傳呼出御營渭南集凡都城橋梁道路皆包道成力治之費至緡錢百餘萬續文獻通考宋理宗嘉禧中臣寮言蔬菜魚肉日用所須販夫販婦所資錐刀以營升斗若皆以官價強取之終日營營錢本乾沒華谷集詩天上歸來打六更夢回搔首正瞢騰玉霜初上三更月絳綵猶明九市燈聲徹銅魚催勘箭影斜金雀在觚稜帝鄉東望重回首佳氣何時到五陵幕學詩初稿天街夜步詩風不停雲月更清千門繡笑歌聲御營巡檢無拘束走馬天街夜達明賜來金臼耀街衢百藥無如用呪符佛佛不知煩惱界才辭禁籞即酆都船窗夜話孝宗嘗患痢德夀憂之過宮偶見小藥局遣使宣之至語以食湖蟹多故至此醫曰此冷痢也用新米藕節以熱酒調服數服而愈德夀乃大喜以金杵臼賜之乃命以官至今呼為金杵臼嚴防禦家飛靈隱志天醫波利多乃天醫菩提化身淳熙間居來峰山堂肆考杭州慈聖院有吕公池宋乾道間髙僧能取池水呪之以施病者輒愈號聖水池平遂昌雜録馬都録者號靜齋以道法際遇度宗賈章以海味進謝后啖之泄瀉不止馬進符水飲之而愈因言曰臣上告佛佛繼今他人進飲食不可造次供御言出賈已知之甫出禁門即下臨安府獄面刺雙旗押付酆都寨嵗寒亭外過西村橫幅窗開坐小軒半樹梅花流水上酒標挑出竹籬門遂昌雜録孤山之隂一亭在髙阜上曰歲寒繚亭皆古梅亭下臨水曰挹翠閣皆斗拱砌成極為宏麗蓋盧董兩璫以內府錢建西太乙宫又能以其餘資建兩閣可謂能事又寶塔下西為善住閣其間有山中四時小窗橫幅安樂窩之類其結構皆明敞可喜稍西陟為江湖偉觀武林舊事孤山有西泠橋又名西村數搜采異聞録都城酒肆皆揭大簾於外以青白布幅為之或挂瓶瓢帚秆時人多詠於詩才到綸扉捧賜金茅簷曽憶淚雙淋紫衣中貴宣丞相玉海金柈請點心夢占類考趙雄微時最貧母在無以卒嵗夫婦對泣次日掃除拾銀一錠重二十五兩由此稍活後入相例賜白銀百錠既受而缺一錠將以詰守藏吏夢左藏庫神告曰某年月日巳先借用一錠覺而憶正掃除得銀之月日也君吹劍録孝宗詔每日常朝不必宣宰相名趙雄奏前臣名禮也上曰蘇洵嘗言名呼而進退之非所以禮貌大臣丞相不必辭數宋稗類鈔趙溫叔丞相阜陵素喜之且聞其善噉倍常人會史忠惠進玉海容酒三升一日問曰朕作點心相請命中貴捧玉海賜酒至六七繼以金柈捧籠炊百枚遂食盡上為之一笑食經珍品過堂厨忘却家鄉椒數株書畫悅生别録上空存屈角印葫蘆貴耳録天台桐菌逺致色味必變乃併桐木致之賈相供饌又賈師憲喜苕溪鯿魚趙與可造大盤養魚千頭作機使灌輸不停魚遊泳自得數舟上下遞運不絶始豐稿賈氏族譜天台賈氏在宋為最盛余少在鄉里所聞而知者惟知漢州之奇有遺惠在鄉里蜀多美椒漢州解官歸㩦其種蒔之其味辛烈不減蜀産至今人稱漢州椒云由漢州而下皆仕宋有階至承議郎承節郎者而其别出之族有擁旄二鎮秉鈞兩朝者蓋甚顯矣云云卷清河書畫舫賈似道留心書畫家藏名迹多至千其宣和紹興祕府故物往往乞請得之其名迹標題見於悅生别録字又賈師憲所藏書畫皆有古玉一字印相傳是封又謂之屈角封乃長字也印大將及二寸其篆法用李陽冰新意盤屈成文前無此體當是唐時所作又有悅生葫蘆印悅生賈堂名也腳古今法書范神仙起居注思陵故物標綾上有曲封并悅生葫蘆印蓋似道柄國時御府珍祕多歸私家泉布行都巳號繁一時交鈔又番番銙牌尚寫臨安府官劵何來天市垣錢譜髙宗建炎通寶興元寶紹興通寶建炎元寶通建炎重寶元紹孝宗隆興寶乾道寶嘉淳熙元寶開光宗紹熙元寶通寧宗慶元通寶泰元寶禧元寶開禧寶嘉定元寶理宗大宋通寶寶嘉煕元寶紹定通寶淳祐元寶端平元寶寶祐元寶端平通開慶元寶宋景定元寶十度宗咸淳元寶命少帝德祐元寶史紹興二八年七月已卯取公私銅器悉付鑄錢司民間不輸者罪之以元史劉宣言交鈔所起宋紹興初軍餉不繼造此誘商旅為沿邊糴買之計各至正直記宋季銅銙牌長三寸有竒濶二寸大小不同皆鑄臨安府三字而鑄錢貫文曰一百之等之類額有小竅貫以致逺最便於民近有人收為鑰匙牌者亦罕得矣二老堂雜志近嵗用會子特官劵耳不知何人目為楮幣遂入殿試御題若正言之猶紙錢也乃以為文何耶槎菴小乘臨安天市垣耳宋髙宗南遷建都於此家筵靜看無聲樂别館爭排鎮宅錢練得桃花繡甲隊義兒相送上江船三朝北盟會編醫官王繼先於宅傍創一别館畜臨安名妓劉榮奴其子悅道則畜金盻盻父子聚麀令妓女時作歌舞聞淵聖升遐乃令妓女舞而不歌舉手頓足為戲名為啞樂於湖州舊館别創大第自都下載見錢二十萬貫前往排垜謂之鎮宅錢刀又隂養無賴惡少五百人置桃花甲竹槍牌棒及劍等日夕訓練為殿中侍御史杜莘上言令編管福建居住子孫並勒停中興遺史張俊撫諭楚州王勝為中軍統制或譖勝欲殺俊俊以事責勝送建康軍中自效後俊罷樞密勝潛至行在見韓世忠世忠具宴招醫師王繼先飲酒行世忠出勝拜繼先為父繼先見上言勝可大用遂有都統制之命王勝又名王黑龍中林泉野記王進為張俊帳下提轄專背印隨行軍呼為背印王至是除御前諸軍都統制進不恤士卒惟厚結王繼先及內侍以久權士卒皆不嘉之洓水摩崖孰與詳吳山故牒閲星霜傳來翠墨人休笑多少遺文在汴梁曝書亭集詣壑菴觀磨崖隸書家人卦考葉紹翁四朝聞見録吳自牧夢粱録皆云石壁刋字出司馬溫公筆獨周密謂是唐人遺迹後人于石旁刋右司馬溫公書六字其實非也家有宋鑑稱紹興六年十一月庚辰上諭大臣曰司馬光隸字正似漢人朕有五卷日夕置座右所書乃中庸與家人卦皆修身治國之道不特玩其字而巳今磨崖所刋家人卦後雜以樂記篇禮樂不可斯須去身至舉而措之百九十二言中庸道不逺人至無入而不自得焉百九十七言合乎宋鑑所載當時諸大臣聞思陵面諭請刋於石者此王參洧詩有云涑水崖碑半緑苔春遊誰向此山來也拊掌録紹興九年金歸我河南地商賈攜長安秦漢間碑刻求售於士大夫王錫老得一碑無一字可辨王獨稱賞不巳客曰此何代碑王不能答客曰某知之是名沒字碑也一笑而散三三茅寧壽觀后刻牒紹興二十年六月敕臨安府茅堂可賜寧壽觀為額故牒聖經賢史帝王資嵗嵗尋求詔有司試看獻書皆賜祿莫教攔駕進歌詩山堂肆考髙宗渡江獻書有賞或官有家藏者命抵家就録有鬻者即市之朝野雜記乾道初有衢州進士毛日新者以上書補文學約宋元通鑑咸淳十年饒州布衣董聲應進諸史纂兵鑑刑鑑詔充史館編校文字宋南宋相眼駕過德夀宫回有台州進士宗汝夫余臣縞素在望仙橋攔駕投進二黃册文字為街司所驅駕過呌呼不巳臨安尹為繳進乃萬世如見集其前太上慶夀歌頌其後乃追思上仙之辭刻板模印有旨令毁板押出界從來解額出前廊風雨青燈汲古堂聞道方州舉貢士等間香酒禱皮場朱子大全文集今以逐州新定解額之半而又析其半為德行之科明立所舉德行之目注云如解額百人則以二十五人為德行科有須溪記鈔汲古堂宋公子諸生國學之堂名也堂井故名德祐鼎遷堂廢學亦燬矣郡成化杭州府志宋貢院在錢唐門外王家橋試一之士謂之方州貢士燕翼貽謀録汴京試禮部者禱於二相廟二相者子遊子夏也二子不知何以稱相今行都試士皆禱於皮場廟不知士人之禱起於何時皮場乃皮剝之所也案廟在萬夀觀之晨華館與貢院為鄰上人心折龍州友湖海詩名姓氏芳並枕朱絲絃巳斷老娼休唱賀新郎名迹録辛稼軒印曰六十一上人蓋破其姓文也宋鐵崖集龍洲劉公墓表先生名過字改之廬陵人以詩俠名湖海間陳亮陸遊辛棄疾世稱人豪皆折氣岸與之交丞相周必大欲客之門下不就公常抗疏光宗請過宫屢與時相陳恢復方略謂中原可一戰而取詞苑叢談劉改之淳熙甲午預秋薦赴省試到建昌二更後有美人執拍來唱一曲侑酒云别酒未斟心巳醉忍聽陽關辭故里揚鞭勒馬到皇都三題盡當際會穩跳龍門三汲水天意令吾先送喜不審君侯知得未蔡雍博識爨桐聲君抱負却如是酒滿金杯來勸你劉與之偕至臨安果擢第道士熊若水謂之曰隨車娘子非人也今夕並枕吾於門外作法君當緊抱之勿令竄逸劉如所戒乃擁一琴耳龍洲詞賀新郎自跋云去年秋余試牒四眀賦贈老娼至今天下與禁中皆歌之敝衣蟲垢去邊陲九廟神靈已建基迎得鸞輿快活地龍綃收淚定歌詩山堂肆考宋道君北狩至五國城衣上見蝨呼為琵琶蟲以其形似琵琶也𢎞間録洪皓居燕十五年會金大赦得還見秦檜語連日不止因述金人言景靈宫太廟土木以為無意中原檜不懌三朝北盟會編初皇太后與喬貴妃相敘為姊妹而貴妃先遭遇遂薦太后亦得幸後北狩二人皆從及金人欲還太后也貴妃舉酒送行勸太后曰姊姊此歸見兒即為皇太后矣宜善自保重妹妹永無還期當死於此太后慟哭貴妃亦哭又曰姊姊到快活處莫忘了此中不快活太后曰不敢忘今日太后慟不止天眷在旁者皆哭太后自清河而下武又車駕如臨平奉迎太后上入幄朝見宰臣及文百官班幄外起居如儀上初曕慈容喜深感極淚濕龍綃衛軍歡聲動天地太后進宫滿城士庶夾道聳觀皆以手加額太后入居於慈寧殿文武百官上表稱賀亦有獻賦頌雅歌稱美聖德者令中書舍人程敦厚第其髙下敦厚以建昌軍進士章藻為第一知正州張昌為第二進士陸渙為第三昌特轉一官進士免文解一次虹光朗射天垂象鼎峙形成淮作邊送客津亭留不住一心何願頌三千劉嶸萬言書今年立春雷震大雪白虹貫日錢唐之地實天示象不可不修德以偃之吳伸萬言書兩國之勢未解鼎峙之形已分莫視疆場為太輕莫任籓離之太易竊憤録上皇在北遇阿計替出片紙上書紹興二字示之曰此南朝新改年號以淮為界矣趙丞相行狀公以和議不協罷相出守紹興首途之日秦檜乞備禮餞於津亭公相揖即登舟檜曰得旨餞送公曰議已不合何留之有即叱舟師離岸而去際格齋四六賀夀皇云心一臣三千願紀嘉名於盛我百爾九十蓋申景命於前規用成語最切洽漫彈雙韻唱如如簫鼓元宵擁繡裾好坐嘯臺恣雅博莫因家學注蟲魚癸辛雜志銀花髙文虎婢善小唱五百餘曲又善雙韻彈五六十套以元宵時近點燈來因取古人詩句有銀花垂院榜又銀花無奈冷等句為名時髙已近七旬喪偶多年買此以侍湯藥後攜歸越四朝聞見録髙疏寮居近城因城疊石曰南麓麓後髙數級登汲於甕泄之以管淙淙環珮聲入方池池方四五尺畫二卦於扁自麓之後登城為嘯臺鱉吹劍録髙內翰文虎作西湖放生池記以鳥獸魚咸若作禹事其子疏寮作蟹略以林和靖草泥行郭索作杜詩父子皆為博學強記所誤空題御墨金纒幹不見軍容黑大蟲一等英雄沙草外墓門殘碣卧松風三朝北盟會編李寶興仁府乘氏人也少無賴號為潑李敗金人於渤海廟鶴林玉露上書忠勇李寶四字於金纒幹上賜焉大齊東野語畢再遇屢遷至驍衛上將軍戰馬號黑蟲獨主翁能御之既死以鐵絙羈之偶聞金鼓聲長嘶斷絙而出健卒十餘挽歸云將軍已死汝莫生事馬聳耳汪然出涕長鳴數聲而死再萬厯杭州府志武義大夫畢進子武信軍節度使遇墓並在酉溪進兖州人建炎間轉江淮積階武義大夫再遇以恩補官屢有戰功擢至武信軍節度致仕卒年七十贈太師諡忠毅案志山埠內有李忠勇公神道碑其墓在焉郡邑諸志皆不載狀元局內士無雙單騎欣然犯敵幢一自明因辭國去人傳劉泆在清江文山全集舊例三魁唱名罷賜袍笏謝恩入幕賜御饌進謝恩詩出賜席帽於闕門上馬迎入期集所又名狀元局官給錢物供帳皂隸等於此聚同年待賔客刋題名小録賜聞喜宴進謝宴詩如此者一月然後率榜下士詣闕謝恩謂之門謝門謝後授初階狀元授承事郎簽書某軍節度判官廳事至後一科放進士榜則前一科狀元召入為祕書省正字名曰對花召又公平生嗜象奕以其危險制勝奇絶者命名自玉金鼎至單騎見敵為四十局勢圖悉讖其出處始末玉蓋公所居山名也宋元通鑑德祐二年命文天祥同吳堅謝堂賈餘慶使元軍見伯顔於明因寺伯顔劉公不遣回又文天祥至鎮江與其客杜滸等十二人夜忘天祥乃變姓名為清江劉泆東入海道又公于寶祐四年廷試第一案明因寺臨平鎮尼剎也符案癸辛雜志狀元局在祥寺金隄窅窅海波頽祝拜宫中香未灰笳鼓滿城馳鐵騎伯顔江上看潮回山村遺稿題宋宫觀潮圖金堤既成事已非錢唐江上開皇畿雕闌玉檻照東海貪看秋潮忘黍離中原不復民易主百萬貔貅宿沙渚倚樓望潮潮不來六帝同歸一邱土輟耕録元將巴延遣人入臨安駐兵錢唐江沙上太皇太后望祝曰海若有靈使波濤大作一洗而空之潮竟三日不至宋元通鑑三月巴延自湖州市入臨安城建大將旗鼓率左右翼萬户巡城觀潮於浙江又登獅子峰觀臨安形勝雲薖淡墨杭潮三日不至人謂天佑元興然巴延英雄豈有不知錢江如山之濤宿兵其地宋之叛將降卒充牣其幕自詭效忠豈不諫止濤之不至事或有之元兵必不駐此傳者文以為奇史臣襲之耳遊北傳聞皆丙子渡江天意屬庚申酒人祗愛梅花好踏遍孤山不計春兩鈔摘腴宋少帝丙子三月北遊正視聽抄宋少帝辛未九月二十八日申時生甲戌月十一日登位號天端節丙子三月十七日北遊宋髙祖劉裕丁亥生庚申即位國號宋丙子渡江國亡凡七百二十年至趙太祖丁亥生庚申即位國號宋先丙子俘李王後丙子大元渡江國亡庚申帝史外聞見録瀛國公初為僧居白塔寺中已而奉詔居甘州山寺有趙王者嬉遊至寺憐其老且孤留一回回女子與之延祐七年四月十六夜生一子明宗適自北方來蚤行見寺上有龍文五采氣即物色得之因求為子并載其母以歸元甘露園短書順帝即瀛國公稱合尊時所生之子世祖以庚申立立十五年而取宋順帝即以庚申生生十三年而取元子又初文宗欲立順帝為皇太子順帝乳母言非帝又言明宗亦自謂非其子遂謫居靖江曰洹詞紀事續鈔劉靜修閔元伐宋乃賦渡江題梅西風吹落戰塵沙夢想西湖處士家曰恐江南春減猶夫賦也年案庚申帝史外聞見録權衡撰敘元順帝三十六在位事謂之庚申帝者微詞也案通鑑博論寧王奉太祖詔編次直書為瀛國外婦之子綿延宋末六更之讖果其然與南宋雜事詩卷一
