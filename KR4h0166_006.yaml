body:
  text: 南宋雜事詩卷六錢唐勵鶚撰野店新興駐六軍開基節建兆初聞試聽一夜臨安雨便是天邊華蓋雲清波雜志髙宗自相州渡河初程宿頓問地名以新興店對幕府進言宋室中興其命維新又建炎初符瑞如氷泮復凝紅光如火雲覆華蓋其類不一言揮麈前録政和二年南京鴻慶宫道士孟若蒙進本宫每遇正月初四日為創業之日修設齊醮乞置節名開基以永崇奉詔從其請紹興中若蒙又以前績自陳仰惟太上皇帝中興再造復在南都豈偶然哉揮麈餘話車駕初至臨安府霖雨不止葉夢得等言州治屋宇不多六宫居必隘窄聖訓曰亦不覺窄但卑濕爾然自過江百官六軍皆失所朕何敢求安年三朝北盟㑹編紹興二遷臨安府於奉國寺基麗正門開散瑞煙六更才罷雁行聨别拋柘彈驅鴉地髙綴金鈴放鴿天鼠璞行在南內門名麗正蓋取重離麗正之義更豹隱紀談楊誠齊詩天上歸來有六更蓋內樓五梆鼓交作謂之蝦蟆更禁門方開百官隨入所謂六更也四朝聞見録紹興初髙宗建行闕於鳯山之中林木蓊如鴉以千萬噪鳴聒天髙宗在汴無山未嘗聞此至則大駭命內臣張去為領修內司諸兒聚彈射而驅之臨平赤崖間未幾復如初金又云東南之俗以養鵓鴿為樂內侍畜之尤甚寓鈴於腰風力振鈴鏗如雲間之珮景靈恭謝駕初回帽插宫花繡作堆除目傳宣休覆奏昨宵齊殿降恩來隨隱漫録景靈恭謝駕回宰相以下皆簪花報學詩初集觀景靈宫恭謝詩云不比常朝添覆奏來除目十餘家自注常朝除目覆奏而後出劄惟齊宫免案景靈宫在錢唐門內北即今演武場地渡江以後說繁華非復吟梅處士家堤上風開及第栁山中春到狀元花藏拙餘藁春日湖上詩飛鷁鳴鑣鼓吹喧繁華應勝渡江前吟梅處士今還在肯住孤山爾許年雪巖吟卷湖上春晴詩楊栁也如新及第向人爭舞緑羅衣咸淳臨安志徐清叟淨明院和御製詩衝凍細尋梅信息枝頭喜見狀元花貌取湖山玉色愈蕭郎絶筆院中無調鉛殺粉經營極敕寫天家瑞應圖清容居士集蕭照江山圖詩蕭郎解作湖山圖上皇一見玉色愈清河書畫舫蕭照中興瑞應圖前後凡六卷進御麋丸妙手供㫖教小米搨雙龍輕煤第一黃山産赦却蒼蒼九里松老學菴筆記紹興間復古殿供御墨新安戴彥衡所造自禁中降出雙角龍文或云米友仁侍郎所畫也中官欲於苑中作墨竈取西湖九里松作煤彥衡力持不可曰松當用黃山所産此平地松豈可用栁色青青食已寒香車菜市客爭看紅亭醋庫橋東住心似桃花一樣酸武林舊事清明前三日婦人淚妝素衣提攜兒女若玉津富景御園包家山之桃關東青門之菜市尼菴道院尋芳討勝極意縱遊街咸淳臨安志紅亭醋庫在菜市橋東南面北祕省蓬巒儼帝居風籖萬軸獻來初牆西措大窮寒甚只讀江東陸氏書中興館閣録祕書省蓬巒碑起居舍人木待問書提揮麈前録太上南渡詔獻書補官者凡數人秦熺舉祕書省奏請命天下專委守臣又有㫖録㑹稽陸氏所藏書上之今中祕所藏之書亦良偹矣夷堅志乾道初內侍陳源居在祕書省東連牆起樓樓下築臺每宴客張樂必於其處有閩士獻書警之曰宅西正是三館職多窮寒措大羡人富貴於心常以弗堪或能害我是後遂不復至東閣芬氲裛綺羅雲頭香法本宣和如何張趙為官日皂莢胭脂用不多齊東野語宣和時常造香於睿思東閣南渡後如其法製之所謂東閣雲頭香也老學菴筆記髙宗在徽宗服中用白木椅子錢大王入覲見之曰此檀香椅子耶張婕妤掩口笑曰禁中用胭脂皂莢多相公已有語更敢用檀香作椅子耶時趙鼎張浚作相也尊為隆祐過江年黑竹輿中后諭傳一自苗劉多事後都人總戴孟家蟬揮麈後録昭慈孟后紹聖三年以使令為禳禬之法詔徙處道宫思陵中興尊為隆祐太后孟后祖名元易元為隆字黑又云苗劉兵殺內侍脅制上為內禪之事太后乘竹輿宣諭以上仁孝曉夕思念二聖欲復讐雪恥大尉等皆名家不須如此有可談孟后衣服畫作雙蟬目為孟家蟬識者謂蟬禪意久之竟廢萬白石集觀燈口號遊人總戴孟家蟬爭託星毬眼圓鬧裏傳呼大官去後車多少盡嬋娟築毬吹笛共流離中瓦鉤䦨又此時檀板一聲雙淚落無人知是李師師汴都平康記政和間汴都平康之盛而李師師崔念月二妓名著一時李生門第尤峻靖康中李生與同輩趙元奴及築毬吹笛袁綯武震輩例籍其家李生流落來浙中士大夫猶邀之以聽其歌然憔悴無復向來之態矣案白獺髓中瓦前娼户李博士中瓦通後市街硬雨分明似李梅無端太學瓦皆摧儒官諱道天飛雹祭酒應為捕酒來軒渠録紹興十七年五月臨安大雨雹太學屋瓦皆碎儒官申朝廷不可言雹稱硬雨清波雜志紹興間張扶少持改國子祭酒時祭酒虛位亦久前騶接呼赴監供職學前居民驚懼曰官來捕私酒傳以為笑錦褾裝池數𣙜場百花樓閣五文章鴛衾官庫留遺物隱約風懷記蜀王輟耕録髙宗渡江後𣙜場購求為多錦褾如克絲作樓閣百花攢龍五色簟文之類又云孟蜀主一錦被一梭織成被頭作二穴如雲版樣此之謂鴛衾也楊元誠太史言兒時聞尊人樞密公於宋官庫親見之沈家丞相起書樓滿地香雲五體投猶勝申王格天閣十眉環侍瀹茶甌三栁軒雜識沈丞相該為樓貯書時禮佛其上人謂之五體投地之樓以對秦檜一德格天之閣清波雜志朱伯箕為秦伯和侍郎夀詞咸瞻格天閣見十眉環侍爭鳴絃索茶甌試瀹更良夜沉沉細酌籠袖嬌饒懶不勝琵琶槽面撥輕氷趙家小景佳山水畫上春衣雪色綾太平清話錢唐宋行都男女尚嫵媚號籠袖驕民景畫繼紹興間一時婦人服飾及琵琶筝面所作小山水實倡於趙士遵傾國名花一首詩御前草聖墨淋漓芙蓉玉貌描添線休遣君王怒淨師遊名山記臯亭山廣嚴院僧淨師紹興初被召作草首書名花傾國兩相歡宋主不悅賜罷子素集髙宗二劉妃圖詩秋風落盡故宫槐江上芙蓉並帶開留得君王不歸去鳯凰山下起樓臺繪事備考尚衣夫人劉氏畫用奉華堂印有宫衣添線圖枚卜圖補衮圖宫繡圖小雨春寒白晝長杏花紅遍錦胭廊熏爐巧樣姜娘子細炙龍涎幾品香居易録南宋姜娘子善鑄銅器閣佩楚軒客談浩然齊有古龍涎香自復古睿思東瓊英勝古清觀清燕閲古以下凡數品東朝鑾馭朔方歸南面方知樂事稀可惜嶽將軍不見深宫只著道家衣二老堂雜志紹興十二年太母還宫上曰朕自東朝之歸方知南面之樂中書舍人程敦厚行太后姪女韋氏十娘封郡夫人制全用上語眼七修類藁韋太后北歸至臨平因問何不見大小將軍耶人曰嶽飛死獄矣遂怒帝欲出家故終身在宫中道服也花市爭先競買栽朱門尤貴看新梅錢唐湖上春風蚤九月疏花對菊開石湖梅譜錢唐湖上早梅花豫嘗重陽日親折之有橫枝對菊開之句行都賣花者爭先為竒置浴室熏蒸令拆强名蚤梅終瑣碎無香硯童侍立太師窗夙搆佳文未易降貢院無煩戴羞帽紫綾册裏士無雙朝野遺紀程敦厚子山為中舍時秦檜善之一日呼入內閣坐候終日獨案上有紫綾褾一册書聖人以日星為紀賦末有類貢進士學生秦塤呈文采艷麗子山兀坐靜觀幾成誦及晚竟不出乃退子山叵測也及數日差知貢舉乃大悟以此命題乃孫果首選老學菴筆記秦太師第中窗上下及中一二眼作方眼餘作疏櫺謂之太師窗院夢粱録知貢舉主文官皆戴羞帽乘馭赴觀橋貢三朝北盟㑹編檜小奴硯童婢興兒方響敲殘事可驚玉堂天子出青城傷心祭了紅鸚鵡無復重呼萬歲聲外史徽宗是玉堂天子不聽玉皇說法謫降人間行楓窗小牘髙宗在建康有大赤鸚鵡自江北來集在承塵上口呼萬歲足有小金牌有宣和二字因以索架置之比上膳草草無樂鸚鵡大呼卜尚樂起方響久之曰卜娘子不敬萬歲蓋道君時掌樂宫人以方響引樂者故猶以舊格相呼髙宗為罷膳泣下後此鳥持至臨安忽死髙宗親為文祭之云金距絳囊何意朱紫乘軒駭散纒羅鬬死不逺長江來自汴水匪飢則附曰忠自矢謝跡雲端投身禁裏每呼舊人以勵近侍禽言若斯鳥官誰似云胡委羽歸魂鶉尾借號有鳥來朝無雉漸肯為儀厯仍輝紀尚饗東青門外九宫壇歲歲明禋走從官記取石湖齊宿句窗風隙月不勝寒徐一䕫宋行宮考九宫貴神壇在東青門外一里三石湖集次韻尹小稷察院九宫壇齊宿詩草草馳里蕭蕭共一餐吏方綿禮蕞公自將詩壇隙月窺牀近窗風刮坐寒鴉鳴未忍散端為合并難方輿勝覽九宫貴神太乙攝提軒轅招搖天符青龍咸池太隂天一說史堪嘲王與之舌端今古盡傳疑一時煙粉偏忺聽鐵騎兒兼銀字兒白獺髓行都紹興間有三市井人好談今古謂戚彥樊屠尹昌也彥乃皇城司快行屠乃市肉昌乃傭書有無名人賦詩曰戚彥樊屠尹彥時三人共坐說兵機欲問此書出何典昔時曽看王與之與之乃說書史人靈都城紀勝說話有四家銀字兒謂煙粉怪傳竒鐵騎兒謂士馬金鼓之事尚食遙供泛索并繡紅巾上合衣擎餛飩不熟伶官進棘寺應推丙甲生夢梁録大內進膳有紫衣捲腳幞頭者謂之院子家托一合用黃繡龍合衣籠罩左手攜一條紅羅繡手巾進入若非時取喚名曰泛索人霏雪録宋髙宗時饔人澮餛飩不熟下大理寺優扮兩士人相貌各問其年一曰甲子生一曰丙子生優人告曰此二人皆合下大理髙宗問故優人曰􅥪子餅子皆生與餛飩不熟者同罪耳上大笑赦原饔人蠻王獅子綴來齊九日花糕最可題狎客陳詞天一笑孟嘉陶令一身泥武林舊事九日菊糕為蠻王獅子於上客詞苑叢談康伯可附㑹秦檜求進為十客中之狎專應制為歌詞重九遇雨奉敕口占望江南云茱萸胖菊蕊濕滋滋落帽孟嘉尋篛笠休官陶令覓蓑衣兩箇一身泥上大笑春來湖上兩髙峰滴粉搓酥夢裏逄修態橫生花誥筆此詞應是為張穠詞綜王仲言云天台左譽與言䇿名之後錢唐幕府樂籍有名姝張藝女名穠色萟妙天下君頗顧之如帷雲翦水滴粉搓酥皆為穠作後穠委身立勳大將家易姓章疏封大國紹興中覔官行闕訪西湖兩山間忽逄車輿甚盛中覩一麗人褰簾顧君而顰曰如今若把菱花照猶恐相逄是夢中君醒然悟入即拂衣東渡一意空門王清波雜志嘗得一誥詞云朕眷禮勳臣既極異姓之貴疏恩私室并侈如夫人之榮以爾修態橫生芳性和適云云紹興間權外制某人行三朝北盟㑹編張俊妾張穠錢唐名妓也知書嘗代俊文字封榮國夫人和議初成返使車御容收得向龍沙白龜池屋秋風冷手著叢書記禁花兩浙名賢録朱辨字少章婺源人髙宗遣使問安兩宫為通問使十二年和議成始得歸獻金國所得六朝御容及宣和御書所述北方事狀秦檜沮之僅轉奉議郎未幾以疾卒於臨安府白龜池之寓舍朱辨曲洧舊聞木香始禁中有數架花時民間得之相贈遺今則盛矣夢梁録白龜池在錢唐門裏沿城南清修尼寺靜焚香傳是中宫賜寶坊還有藕花洲畔女翠深不礙宿鴛鴦咸淳臨安志清修尼寺在崇新門外右軍寨前紹興間顯肅皇后建仍賜額又云臨平山下有藕花洲即鼎湖也礙夢窗丁藳題藕花洲尼扇詞翠深不鴛鴦宿采菱誰記當時曲汝瓷古觶祕深宫修內司窰笵更工提舉昨朝新進入青花不與外間同梧溪集有宋髙皇夀成殿汝甕觶引窰輟耕録南渡邵成章提舉於修內司造青器名內模笵極精油色瑩徹為世所珍閒看鷗飛下小池影妻椅妾況凄其服膺齊裏諸先輩魁輔何由刻上碑鶴林玉露太學藴道齊前有小池忽一鷗飛下容與甚久一同舍生詩云昨夜雨餘春水滿白鷗飛下立多時録清波雜志紹興十三年再興太學吕榮義為上庠投進倡和詩有影妻椅妾語林下偶談陳自强本太學服膺齊生既當國齊中為立碑刻魁輔二大字南遷事事仿東都曾述江西詩派圖湅匠才成山谷褐臨安猶見典型無竹坡詩話吕舍人有江西宗派圖自是雲門臨濟始分矣揮麈後録舊見黃太史所服絶勝時在臨安呼匠染之始就名曰山谷褐玉練槌香破鼻聞薔薇露滑大瓢分御前漫賜黃封醖不及秦家有表勳武林舊事諸色酒名薔薇露御庫玉練槌祠祭酒小史秦檜表勳繫書錢要十分豐一闋書牆惱至公謝石空誇能拆字可憐身在討論中容齊隨筆紹興初范覺民為相以崇寧來創立法度例有泛賞建議討論行下吏部追奪雖公論當然而失職者浮議蜂起無名子改坡語云清要無因選舉艱辛繫書錢須要十分又云不如歸去作箇閒人免一回來一回討一回論大書貼於牆上邏者以聞朝議罷討論之舉二老堂雜志謝石善拆字徽宗特補承信郎後因范覺民作相討論追奪邵溥尚書第三子謂石我亦能拆字詰之則曰爾姓謝所謂身在討論之中名石則終身右選不能出頭也聞者大笑夷堅志謝石紹興八年來臨安層閣森沉白日閒敷文譏語豈難刪虎兒學士空供職憶否揮豪進楚山愧郯録紹興十年五月十一日內降詔曰恭惟徽宗皇帝宸章奎畫著在簡編崇建層閣以嚴寶藏恭以敷文為名按典故凡建閣降詔必著閣之所以名如煥章建閣淳熙十五年詔曰載稽帝世之隆無越堯章之煥還考敷文則隱其義而無其辭及考雲麓漫鈔曰徽宗書閣曰敷文取誕敷文德於兩階七旬而有苗格以寓譏誚是時秦檜當國其無君之心不可不誅焉畫繼米元章便殿賜對因上友仁楚山清曉圖友仁宣和中為大名尹被遇光堯官至工部侍郎敷文閣學士案天章敷文諸閣皆在大內東西馬海散如雲出格驊騮空一羣欲使廣南髙薊北詔將牽付殿前軍名馬記紹興七年五月廣右進出格馬十匹上留其一餘付殿前司曰馬之良者不必西北夢梁録吳越王牧馬於錢唐門外東西馬塍其馬蕃息號為馬海又云殿前司在鳯凰山八蟠嶺有御書閣凝香香堂整暇堂侯門歌舞出都城無奈更衣訴此情但向小屏啼絳蠟輸他三傑蚤知名夷堅志觀察使張淵紹興中以髙價往都城買美妾二十人而御之甚嚴小過必撻嘗延客環侍歌舞中席淵起更衣坐客葉晦叔之側一姝最麗乘閒語之曰恭人在太尉左右想大有樂處姝慘容不語指筵上燭云絳蠟分明㑹得咎齊東野語范石湖云朝士中姝麗有三傑謂韓旡朝伯谷家姬及趙彥博家姬小瓊也霓近體樂府贈趙富文家姬小瓊詞見了還非重理裳舞都無誤幾年一遇莫訝周郎顧花來瓊野玉光寒學士吟成傲熱官曉翦春氷送緹騎一枝慶忌宅邊看陳氏書録解題瓊野録一卷學士洪邁園池記述題咏曰瓊野者從維揚得瓊花植之而生遂以名圃留青日札南宋宦者陳源取瓊花孫枝接於聚八仙根上至今流傳杭褚家塘瓊花園是也地即春秋慶忌宅基氷宋鄭覺齊揚州慢瓊花詞記曉翦春馳送金莖露濕緹騎星流葉葉西風翠翦裁新涼氣味蚤相催金錢買得秋多少秋傍玉人雲鬢來夢梁録立秋日都城滿街呌賣楸葉婦女小兒翦如花樣插於鬢邊以應時序竹屋癡語清平樂咏秋葉詞盤枝翦翠葉葉西風意吹上玉人雲鬢底無限新涼氣味飄蕭露葉烟柔絶憐不逐宫流寄語多情宋玉悲秋得似宜秋天街春暖酒如油爭上和豐豐樂樓銀甕呈祥都不解屏間瑞應待人搜齊東野語中和和豐豐樂銀杓銀甕錢唐酒樓名圖野客叢書都下有銀甕酒庫或問何謂余考瑞應王者宴不及醉則銀饔呈祥蓋取此意夜來歸夢月橫西東閣重窺路更迷傳語郎君新得意酒酲無奈曉鴉啼能改齊漫録汪彥章在翰苑屢致言者作㸃絳脣詞或問曰歸夢濃於酒何以在曉鴉啼後公曰無奈這一隊畜生何年寓簡秦熺狀元及第汪彥章以啓賀㑹之有云三而奉詔䇿固南宫進士之所同一舉而首儒科蓋東閣郎君之未有本求屬對之工而熺父子怒以為輕已彥章自此得罪羇置湖湘德夀宫中撰册新書厨尤氏最移人明朝上夀天顔喜舞五花兒動酒鱗貴耳録德夀八十夀皇講行慶禮上尊號周益公當國差官撰册楊誠齊尤延之各撰一本進呈夀皇以楊之文聱牙不若用尤之文溫潤之貫穿今古士大夫目為尤書厨坦齊筆衡尤延癸辛雜識德夀宫舞譜有五花兒雁翅兒龜背兒雨過秋來禁苑西述懷詩格未曽低平生覽鏡雄心在接骨時聞喚小嵇庚溪詩話孝宗不忘中興之圖每形於詩詞如新秋雨過述懷云平生雄武心覽鏡朱顔在兩浙名賢録嵇清仁伯由汴扈蹕南渡世傳祕術夀皇躬騎射時有誤損應期而瘳宫中詫曰小小嵇正能接骨耶西蕃名劎敵吳鉤賜出寒光凜素秋底事武臣要重賞邊功漸近太平州名劎記紹興六年二月右相都督張浚請降御前西蕃寶劎給賜有功將士錢氏私志隆興初賀子忱知樞密院有武臣陳理公賞稱纍立戰功自宣和年第一次燕山府至紹興年第九次太平州謂朝廷推賞一次輕於一次賀正色云只為邊功一次近於一次武臣無詞聞者稱服垂衣暇日沐恩波四角金龍押帕羅紅粉抹胸緋裹肚貴從御退賜宫娥建炎以來朝野雜記乾道邸報臨安府浙漕司所進成恭后御衣有粉紅紗抹胸正紅羅裹肚癸辛雜識大臣家賜與帝后衣謂之御退衣服豫妻舍有御退羅帕四角皆有金龍小印鴛鴦飛處畫船橫白玉芙蓉兩朵生請看雙投橋下水有情爭得似無情七修類藁杭西潮南入路曰長橋宋志俗名雙投昨讀元馮士頤竹枝詞曰請看雙投橋下水新開兩朵玉芙蓉注云常有情人雙投橋下故長橋名雙投甘園地占社壇多大尹欣然不奈何留與花時誇好景水亭四望客經過玉照新志乾道中趙渭磻老尹臨安時巨璫甘升有别墅在西湖惠照寺西地連郡之社壇升欲取以廣其圃磻老欣然領命雨靜佳集辛亥二月望祭齊宫因遊甘園詩朝霏作連天濕花氣熏人到骨香四望水亭無正面有花多處背湖光案甘園在淨慈寺對禁中丹桂月如銀猶有張掄一曲新霜滑玉階行不得謫來蓮社作閒人花菴絶妙詞選張材甫掄號蓮社居士多應制詞有臨江仙咏禁中丹桂夷堅志紹興末知閣門事張掄赴後殿起居由隔門東澀道階趨下霜滑失足頓坐於地閣門職主朝覲彈奏臣僚失儀若本司官則自奏劾掄竟放罷楊監朝天乍缷帆一官一集換頭銜蒲橋暇日攜孫子幼圃花窠手自芟行都紀事楊誠齊名萬里為監司時巡歷至一郡郡守宴之官妓歌賀新郎詞以送酒其中有萬里雲帆何時到之句誠齊遽曰萬里昨日到守大慚監繫此妓瀛奎律髓注楊誠齊詩一官一集每一集必變以誠齊朝天集幼圃詩序蒲橋寓居有刳方石而實土者小孫子萟花窠菜本其中戲名幼圃夢梁録鹽橋東一直不通水旱橋名蒲橋志按蒲橋為誠齊寓居此類甚多皆從來郡邑所未備三橋旅舍寂無譁揭榜嚴宵燭影斜響卜已占婆惜得試文莫是董公遮夷堅志括蒼何湛叔存淳熙丁未赴省試館於三橋旅邸揭榜之夕遣僕探候久而不至有憂色因率同輩登橋聽響卜聞河畔婦人呼曰婆惜你得蓋吳人愠怒欲行打罵之詞俗謂之受記非吉兆也湛獨喜曰可賀我矣吾小名正為婆惜僕至果中前列倒坦齊通編淳熙丁未洪景盧知舉一考官大笑絶問之則云試卷中有用董公遮說漢王事以公遮為三老之名夢梁録韓府南曰軍將橋次曰三橋子僧到郊禋識御顔易安齊類虎丘山劈開溪石尋微徑窗外江光一抹間二老堂雜志易安齊溪石畫開髣佛虎丘之劎池但小耳上有數亭傍結小菴僅容膝自窗中望濤江際天如發雞甕也僧宗表年八十八上遇郊禋宿齊往往過之至今設御榻而皇城司遣親事官為閽者案易安齊在龍山郊壇側淨明院內近慈雲嶺記得明堂舊例無誤宣鎖院噪宫烏紫霞帔接紅霞帔慶慶堪憐作受奴玉堂雜記禁中以鎖院為重淳熙三年慶夀赦凡降麻官合加恩者用辛已明堂例免鎖院九月三日中書進熟狀魏王愷恩平郡王璩永陽郡王居廣並加食邑只乞降付院草制內夫人失於詳閲宣鎖陳直院明日內批付密院典字直筆吳慶慶降充紫霞帔不令供職主管大內公事慶國淑懿夫人劉從信降兩字夫人蓋懲其誤也馮留青日札紅霞帔宋宫人品名紹興間如張頑兒十一娘張正奴劉翠奴之類又有紫霞帔王受奴瑞石山隅帝式慿祧遷九室亦同升摩㬋羅自平江進原廟花樓又試燈建炎以來朝野雜記太廟自仁宗以來皆祀七世崇寧初取王肅說謂二祧在七世世之外乃建九廟奉翼祖宣祖咸歸本室焉紹興中徽宗祔廟以與哲宗同為一世故無所祧及升祔欽宗始祧翼祖髙宗與欽宗同為一世亦不祧由是淳熙末年太廟祀九世十一室及阜陵復土趙汝愚為相遂祧僖宣二祖而附孝宗有㫖集議時朱子方在講筵獨以九廟為正中興小厯紹興十三年景靈宫成祖宗神御自溫州來至是達於行在乃詣天章閣告遷徽宗及恭顯恭肅二后神御乙未並奉安於景靈宫四孟躬行獻禮上元結燈樓寒食設鞦韆七夕設摩㬋羅為方輿勝覽平江府土人工於泥塑所造摩㬋羅尤精巧湖蟹年年出葑田吳閶八跪進尢鮮不須將相矜雄略茅店青旗認鞠天隨隱漫録姑蘇守臣進蟹應制程奎草批答云新酒鞠天維其時矣上曰茅店酒旗語豈王言耶令陳藏一擬聞先臣援筆立成略曰內則黃中通理外則戈甲森然此卿出將入相之象也上乃恱咸淳臨安志西湖葑田産蟹土人謂之湖蟹富景園開聚景同宸遊風物冠城東百花池上花多少直到升仙橋外紅禁扁園有集芳慶樂聚景玉津玉壺富景翠芳並在杭都城紀勝城東新開門外有東御園今名富景園傳七修類藁東花園宋之富景園也內有百花池相舊矣今園前民家之後尚存大池孝宗嘗奉太后幸此板兒巷名白花蛇散巷乃百花池上巷也橋咸淳臨安志富景園規制略仿湖山又云升仙富景園前面赤知卿酒户亷小春茶味亦清恬重華宫裏他年宴滿席無多泛緑籖玉堂雜記淳熙丁酉十一月壬寅必大輪當內直上曰卿想不甚飲比賜宴時見卿面赤賜小春茶二十銙葉世英墨五團以代賜酒半經鉏堂雜志夀皇坐側有一牙籖筒凡二十半白緑酒樽至出白籖斟止半杯出緑籖則滿泛一席之間用緑籖止二三而已青兕雄姿剩一錢晚年空看緑苔圓吕婆名徹楓宸聽弱女叉分劇可憐宋史辛棄疾在耿京軍中僧端義竊印以逃辛追獲之義端曰我識君相乃青兕也力能殺人幸勿殺我辛斬其首歸報京正稼軒長短句侍者阿錢將行賦錢字贈之云杜陵好事留得一錢看又云從今花影下只看緑苔圓畿貴耳録吕婆即吕正已之妻淳熙間名達天聽京有二漕一吕搢一吕正已搢家諸姬甚盛必約正已通宵飲吕婆一日大怒踰牆詈之搢子一彈碎其冠事徹孝皇兩漕即日罷吕婆有女事辛幼安以微事觸怒逐之今稼軒桃葉渡詞因此而作按稼軒祝英臺近有寶叉分桃葉渡烟栁暗南浦之句天淨紗㡡薄似雲冷泉堂下翠涼分君王欲識民間事金合朝封豹腳蚊咸淳臨安志紗有天淨紗宴齊東野語夀皇語崇王曰聞湖州多蚊果否後侍因以小金合貯豹腳數枚進之東觀峩峩尺五天硯儲百九潑雲煙汴京公相無遺物七庫青緗值幾錢硯箋祕閣硯髙宗御押鄭亨仲詩石渠東觀天尺五右文儲硯一百九今所見七十五耳建炎以來朝野雜記中興館閣書目淳熙中所修也髙宗渡江書籍散失紹興初有言賀方回子孫鬻故書於道者上命有司市之洪王父為少監建言蕪湖僧有蔡京所寄書籍因取之以實三館五年九月大理評事諸葛行仁獻書萬卷於朝詔官其一子十三年初建祕閣又命即紹興府借故祕閣陸賓家書繕藏之賓農師子也按夢梁録祕書省經史諸子書籍凡七庫祕省藏書始末此段視揮麈録較詳菴酒店前楊栁風碧香酒暖十分空舞兒二八腰身小染就春衫不肯紅都城紀勝菴酒店者謂有娼妓在內而於酒閣暗藏卧牀也天下酒名記杭州有碧香咸淳志碧香庫在西橋東淡老學菴筆記紹興末縑帛有一等似皂而者謂之不肯紅亦退紅之類也垂髫妙女緑鬖鬖獨對經書四十三從此閨襜為進士淳熙省榜作新談留青日札淳熙九年女童林幼玉求試經書四十三件並通時年一十二歲賜為孺人或云林妙玉賜為進士者丹鉛總録女進士林妙玉也籜冠長笛最矜竒一曲惟將項下吹比似盧郎倚樓處沙河塘上少年時遊宦紀聞沙隨先生頃於行在見一道人以笛拄項下吹曲其聲清暢而不近口竟不曉所以然夢窗甲藁醉桃源贈盧長笛詞沙河塘上舊游嬉盧郎年少時一聲長笛月中吹和雲和雁飛驚物換歎星移相看兩鬢絲斷腸吳苑草萋萋倚樓人未歸不因馴象外藩通誰識臨安假國忠齒冷虛無新拜號太師竹倚一枝紅白獺髓寧宗恭淑后上仙而曹氏為婕妤平原特以為親屬偶值正里富國進馴象至平原語公瑾曰不聞有正里富國公瑾曰如今有假楊國忠號朝野遺紀婕妤曹氏姊妹通籍禁中皆為女冠賜虛無自然先生者左右街都道録者皆厚於韓托胄或謂亦與之昵圖繪寶鑑韓平原自寫琅玕大葉號太師竹蕭閒日誦度人經管領南湖尚典型詩客何妨原將種氷茹雪食髮星星武林舊事張鎡桂隱百果云南湖則管領風月北園則燕賓娛親又云都徽别館誦度人經處四朝聞見録鎡預史彌逺議誅韓托胄史以韓為大臣且近戚未有以處鎡曰殺之足矣史退謂錢象祖衛涇曰正將種也佳楊誠齊贊張功父像云門有朱履坐有桃李一何公子也氷茹雪食雕碎月魄又何窮詩客也淺色衫裁艾虎紗鬢邊千葉試榴花催教馬逺圖宫扇意思山前賞物華宋寧宗楊后宫詞一朵榴花插鬢鴉君王長得笑時誇內家衫子新番出淺色新裁艾虎紗夢梁録榴花有千葉者舊吳師道禮部集仙山秋月圖宫扇馬逺畫武林事端午先期學士院供帖子禁中排當例用朔日謂之端一設天師艾虎意思山子數十座巧粽結為樓臺舫輅詩人正樂是姜䕫私篆鷹揚與鳯儀一擔琴書留水磨秋聲夜夜故鄉思白獺髓慶元間士人姜夔乞正奉常雅樂竒雲煙過眼録姜堯章有鷹揚周郊鳯儀虞廷印甚吳夢窗詞藁姜石帚館水磨方氏詩武林舊事水磨頭近石函橋白石集湖上寓居荷葉披披一浦涼青蘆葉葉夜吟商平生最識江湖味聽得秋聲憶故鄉水仙廟下水連天佩玉峩冠像宛然喚取雪篷煙艇子任他豪貴占頭船咸淳臨安志袁韶水仙王廟記峩冠佩玉乘風載雲相羊於水月倒景之中仙有靈宜不宜耶清波雜志頃年西湖所置船舫如泛星槎淩風舸雪蓬烟艇扁額不一霞外集西湖春日壯遊詩豪家遊賞占頭船趰得風輕放紙鳶平原省吏史梅溪侍從申呈勢莫齊不道清才工樂府泉綃織就粉箋題四朝聞見録蘇師旦既逐韓托胄為平章專倚省吏史邦卿奉行文字擬帖擬㫖俱出其手權炙搢紳侍從柬札至用申呈到張功父史梅溪詞序史生之作情詞俱織綃泉底去塵眼中白首修書局正開洞微能識我重來一囊粟抵千壺酒自有蓮花博士才詞統陸放翁之出也韓平原招致之一夕夢故人相語曰我為蓮花博士鏡湖新置官也我去矣君能暫為之乎月得酒千壺亦不惡也遂以詩紀之云白首歸修汗簡書每因囊粟歎侏儒不知月給千壺酒得似蓮花博士無惟老學菴筆記豫去國二十七年復來賣卜洞微山人無恙書學官家筆勢騫楊家妹子最承恩偷從琴鶴圖中見嫵媚清詩粉指痕書史㑹要楊妹子楊后之妹書似寧宗馬逺畫多其所題語關情思人或譏之真蹟日録楊妹子題劉松年琴鶴圖詩清獻先生無一錢故應琴鶴是家傳誰知默鼓無絃曲時向珠宫舞幻仙特祠太乙留瓊館小著危亭緑樹間佳氣葱葱誰與辨武林山是虎林山學詩初集東太乙宫即事詩緑隂深處著危亭佳氣葱葱王武林一片紅塵飛不入杜鵑啼處白雲深自注宫後有亭乃武林山不七修類藁虎林即今祖山寺宋東太乙宫之山也知者改虎為武宋樓攻愧詩云武林山出武林水靈隱後山母乃是此山亦復用此名細考其來正有以從來有龍必有珠此雖培塿千山餘四朝聞見録云虎林即靈隱山因避唐諱改名武林楊正質又謂錢氏有國時此山在郭外異虎出焉故名吳音訛虎為武耳據三說惟楊為是若以避唐諱則漢志已名為武林矣又晏元獻輿地志云武林山錢唐泉所自出此可見武林自是靈隱而虎林之地又豈有泉之可出耶鸞綃閒引玉津遊正值南郊祀事修丙夜宓妃先犯戒却將聖像拜盤溝朝野遺紀光廟郊宿青城李后復至玉津行園亦犯玉女宓妃之戒韋居聽輿蘇州承天寺有神曰盤溝大聖光皇嘗宣像入內賜僧牒宜男圖子李家描蝶戲長春撲扇綃為愛鞠花香五月草蟲勾出雨珠跳書畫彚考南宋畫院李從訓有宜男圖馬麟有美人撲蝶蝶戲長春合卷石湖鞠譜五月鞠花心極大每枝只一花近年院體畫草蟲喜以此鞠寫生三朝御裹陳忠翊四世儒醫陸大丞指㸃賀家酥樣好合將扁榜一時稱老學菴筆記大駕駐蹕臨安故都及四方士民商賈輻輳又創立官府扁榜一新好事者取以為對曰鈐轄諸道進奏院詳定一司敕令所王防禦契聖眼科陸官人遇仙風藥乾濕腳氣四斤丸偏正頭風一字散三朝御裹陳忠翊四世儒醫陸大丞東京石朝議女壻樂駐泊藥鋪西蜀費先生弟子寇保義卦肆如此凡數十聨仙都城紀勝都下買物競趨有名之家如望橋糕糜後市街賣酥賀家草菴舊住萬松嶺能畫惟將畫出家月黑山深鬼吹火筆頭力便可驅蛇攻愧集釋智融俗姓邢以醫入仕南渡居臨安萬松嶺號草菴邢郎中官至成和郎年五十棄官謝妻子祝髮靈隱寺人不知其能畫山深多蛇忽作二竒鬼於壁一吹火向空一踏蛇而掣其尾蛇患遂除七寶山頭一俊人侍郎橋識舊京臣誰知竹暗雲深處更著梅亭句絶塵揮麈三録明清厠迹蹕路假居於臨安之七寶山俯仰顧盻聚山林江湖之勝於几案間前録云徐五丈敦立為二卿明清偶訪之坐間問曰度今此居侍郎橋何耶明清即應以仁宗朝郎簡杭州人以工部侍郎致仕居此里人德之遂以名橋兩朝國史本傳字簡之王荆公有寄郎簡之詩敦立大喜曰博聞如此可謂俊人矣雨四朝聞見録陳讜三茅觀梅亭詩竹密不知雲欲山髙盡見水朝宗繼是無有和者鼎按三茅觀在七寶山朱隨隱漫録云紹興初以牛賜三茅觀內有銘乃孝武孝建元年八月二日作西湖志以為漢建元鼎誤矣敦立名度作却掃編西湖衣鉢幾人傳長繞梅花拜墓田為問孤山林處士可曽一世對花眠雪巖吟卷讀林可山西湖衣鉢詩梅花花下月黃昏獨自行歌掩竹門只道梅花全屬我不知和靖有仍孫家升菴詞品林君復宋史謂其不娶無子然林洪著山清供言先人和靖先生云云蓋喪偶後遂不娶耳可按洪字山荷花萬柄倒池心小水晶宫望更深詩思只宜生此處雲山罨畫地銷金四朝聞見録白洋池在田家橋側芰荷渺然鷗鷺雜集號小水晶宫老學菴筆記紹興中有貴人好為俳諧詩如録樹帶雲山罨畫斜陽入竹地銷金江湖集列幾名家陳道人詩頗足誇攤向睦親坊畔賣相公語禁纍梅花瀛奎律髓注寶慶初史彌逺專權之際錢唐書肆陳起宗之能詩凡江湖詩人皆與之善宗之刋江湖集以售劉潛夫南嶽藁與焉宗之詩有云秋雨梧桐皇子府春風楊栁相公橋哀濟邸而誚彌逺也或嫁秋雨春風之句為敖器之作言者并潛夫梅詩論列劈江湖集板二人皆坐罪而宗之坐流配於是詔禁士大夫作詩紹定癸已彌逺死詩禁始解潛夫為病後訪梅絶句云夢得因桃却左遷長源為栁忤當權幸然不識桃并栁却被梅花纍十年坊又云陳起睦親坊開書肆自稱陳道人按睦親即今杭城弼教坊小隊宫妝候蚤朝石中靈鵲噪聲遙綰成不落新翻髻裹就春趺上馬嬌玉芝堂談薈宋穆陵宫中有靈鵲石石中有鵲每天將旦咸聞噪聲籹臺記理宗朝宫妃梳髙髻於頂曰不走落纎說略理宗朝宫妃束足直名快上馬兩湖勝槩得佳名飲緑亭前春水生好是上頭天氣近燕簾栁户作清明范石湖集李翬知縣作亭西湖豫用東坡語名曰飲録遂為勝槩夢粱録清明節凡官民子女未冠笄者以此日上頭燕史梅溪飲緑亭詞有栁户清明簾寒食之句和寧門內敞樓臺甲第初緣貴主開細草林花猶道逺內人遣自兩宫來栁待制集右開元宫圖一卷本宋理宗女周漢國長公主第在杭州清湖橋西第成於景定辛酉公主實以是年下嫁駙馬都尉楊鎮初理宗無子度宗自福邸入正儲二而謝后女獨有公主兩宫最所鍾愛有司希㫖為治第帷帳供御下乘輿一等居半歲猶以逺掖庭更卜和寧門內東穿堧垣為直道內宫宫婢朝夕通饋問而是賜第在清湖者惟居楊氏母蔚句曲外史集題周漢國公主甲第圖詩主家樓觀參差想是當年全盛時宫草細分乘輦道林花深隱泛舟池瑤臺仙去塵生海甲帳神來風滿旗好在畫圖留勝蹟五雲長護鶴笙祠公咸淳臨安志崇恩寺惠順賈妃攢所周漢國端孝主附焉公主妃所出按此與栁說不同斫竹為棚翠動搖行都也學借元宵魫燈珠網交垂處傀儡先裝獨自喬清夜録理宗淳祐三年京尹趙節齊預借元宵十二月十四日諸巷陌橋道皆編竹為張燈之計武林舊事燈品魫燈則鏤犀珀玳瑁以飾之珠子燈則以五色珠為網下垂流蘇又云大小全棚傀儡有喬三教喬迎親喬師娘喬宅眷獨自喬之類案前此徽宗有預借元宵事清霽亭前宴賞時盻兒歌韻裊遊絲官家不解閒愁悶休唱尋尋覔覔詞李祉陳盻兒傳庚申八月太子請兩殿幸本宫清霽亭賞芙蓉木樨韶部頭陳盻兒捧牙板歌尋尋覔覔一句上曰愁悶之詞非所宜聽可令陳藏一撰一即景快活聲聲慢隨隱漫録度宗令製桂詩秋桂庭前霽影涼萬重深翠護深黃恭迎兩殿臨清賞夀斚濃浮月殿香水月仙人半面妝浴堂門外見徐娘郎君可是無金屋畫取湖山近卧牀蔣捷竹山詞傅巖隱木如武林納浴堂徐氏女子於客樓其歸也亦貯之所居樓上圖西湖景於壁詞有水月仙人院宇到處有西湖如鏡之句捲地霜風葦盡枯淺斟低唱應開爐羅幃小釘金泥密紅入麒麟醉倩扶夢粱録十月朔貴家新裝暖閣低垂繡簾淺斟低唱以應開爐之序歸愚詞西江月咏開爐云風送丹楓卷地霜乾枯葦鳴溪獸爐重展向深閨紅入麒麟方熾翠箔低垂銀蒜羅幃小釘金泥笙歌送我玉東西誰管瑤華舞砌何當不吠犬成群日稅漁船扇冦氛因有宵衣難晝錦白麻紅燭敕摛文古杭雜記寶祐乙卯丁大全除司諫陳大方除正言胡大昌除侍御天下目為三不吠之犬清夜録開慶元年丁大全當國江鄂二郡守創例每一漁船日稅五千漁人不堪命遂渡北兵入冦鄂渚八月起復舊相吳履齊宅左揆直院洪魯齊芹草麻制云豫方重宵衣之憂汝不以晝錦為樂入趨延英之召亟奉天章之咨花樣連枝放杏桃街頭青紙價爭髙袖中自具南宫手波撇紛紛落翦刀志雅堂雜鈔向舊都天街有翦諸色花樣者極精妙隨所欲而成又中瓦有俞敬之者每翦諸家書字皆專門其後忽有少年能衣袖中翦字及花朵之類更精於二人於是獨擅一時誠齊集翦字吳道人翦李義山經年别逺公詩用青紙翦字作米元章體逼真清湖河水貫城流載酒船通屋後頭移得癖齊雞犬住吟詩破却一生愁咸淳臨安志髙九萬喜杜仲髙移居清湖詩笑移雞犬入城居無復遊從歎闊疏河水通船堪載酒桐隂近屋可修書飯香休憶辛田米羮美何慚丙穴魚我亦買山湖上住效芹時擬貢園蔬按杜旃仲髙金華人有癖齊集子夢粱録清湖河自府治前淨因橋過閘轉北由渡橋合湧金池水流至清湖橋衆安橋與市河合喬相無兒晚秉鈞上梁文語亦酸辛見滄閣上聞簫鼓濕雪明燈作好春齊東野語喬行簡嘉熙末自相位拜平章軍國重事年八袠矣作上梁文云有園有沼聊為卒歲之謀無子無孫盡是他人之物鼓絶妙好詞翁元龍雪霽登吳山見滄閣聞城中簫聲水龍吟詞有街聲暮起塵侵燈户月來舞地之句為按吳山石龜巷內寶奎寺宋相喬行簡故第後捨寺有理宗書見滄二字勒之崖石此田叔禾西湖志所載不知捨宅由於無子且曾有見滄閣也翁詞全首佳絶想叔禾未寓目故不采入耳西湖詩客習難除多挾中朝闊匾書笑殺壺山老居士竟勞秋壑搆華居瀛奎律髓注慶元嘉定以來乃有詩人為謁客者干求一二要路之書謂之闊匾副以詩篇動獲千萬緡如壺山宋謙父自遜一謁賈似道獲楮幣二十萬緡以造華居是也錢唐湖山此曹什伯為羣阮梅峰秀實林可山洪孫花翁季蕃髙鞠澗九萬往往雌黃士大夫口吻可畏簿録平原故物空著庭竹石屬蘇公文山二十魁天下獨重邦人學二忠鶴林玉露東坡謫儋耳道經南安於一寺壁間作叢竹醜石甚竒韓平原當國劄下本軍取之守臣以紙糊壁全堵脫而龕之以獻平原置之閲古堂中既敗籍其家壁入祕書省著作之庭偃曝談餘寶祐年登科録第一甲第一名文天祥字宋瑞小名雲孫小字從龍年二十文山集道山堂瞻御書詩著庭更有邦人筆稽首承休學二忠自注云著作之庭乃胡忠簡公書周文忠公立閣門贊拜盡宫嬪花外流鶯誤達晨春夏秋冬書月日釀成别是一家春隨隱漫録㑹寧郡夫人昭儀王秋兒順安俞修容新興胡美人永陽朱梅兒資陽朱春兒髙安朱夏兒南平朱端兒東陽周冬兒順政石潤兒髙平周賽兒通化聞潤兒潯陽陳宜兒胡安化沈咸寧黃新平皆上所幸也初東宮以春夏秋冬四夫人直書閣為最親王能屬文為尤親王非以色事主度皇亦恱德者也詣通鑑輯略度宗既立耽於酒色故事嬪妾進御晨閣門謝恩主者書其月日及帝之初一日謝恩者三十餘人創武林舊事亭名别是一家春度宗初或謂非佳䜟也未幾果驗六和寺塔俯江潯萬佛千燈出緑隂喜得神童能偶句青衫嘗從翠華臨兩浙名賢録柴蒙亨長臺人以神童聞端平二年初赴省從幸六和寺上指塔云一塔七層八面萬佛千燈蒙亨應聲云孤舟雙槳片帆五湖四海奕棋待詔總新僉方罫文楸巧藝兼何似宫中玉棋子似將漏水逐時添武林舊事棋待詔鄭日新等二徐文長别記度宗朝宫中有十二玉棋子上有十時字置盆水中逐時浮出不差晷刻藥洲遺墨已無倫壑相蘭亭更絶塵正是樊襄多事日只留勇爵付斯人志雅堂雜鈔廖瑩中羣玉號藥洲刻陳簡齊姜堯章任希逸盧栁南四家遺墨十三卷賈師憲命王用和翻開定武蘭亭三年而成酬以勇爵幾與定本相亂藝窗詞張矩作也中多夀賈相詞稱為壑相畫扇宸書進夀筵珠衣玉笏禮難全須從福邸投虹處記取銅華洗日年淵頴集宋度宗御書福王慶夀宫扇詩漢家諸侯奉大統㑹稽故邸王封重歲周甲子夀筵開賓客滿堂宫扇來掖庭嬪御侍圖史聖筆逡巡鸞鳯似清風外撲龍阜花明月中涵鏡湖水南國為家日已微禮官考禮是耶非前殿君臣朝玉笏後宫父子曵珠衣懷夢窗甲藁宴清都夀榮王夫人詞云長虹夢入仙便洗日銅華翠渚隆癸辛雜識福王次子黃氏所生即紹陵也黃氏封國育聖夫人按度宗父福王與芮為理宗之弟皆榮王子也理宗無子度宗入繼大統田志云度宗理宗同母弟也訛甚閫帥才長未足多稱心無賴轉橫波閏燈實録風流筆能殺漳南賈八哥三朝野史賈似道閫才有餘相才不足又云以元老之尊眉與賤娼潘稱心䙝狎姑蘇志鄭虎臣殺賈似道者吳人也其家居第甚盛號鄭半州四時飲饌各有品目著集珍日用一卷元夕閏燈實録一卷夏基西湖志張淑芳錢唐西山樵家女有才色理宗時選入宫賈相匿之為妾憶否琴邊奉至尊文君鬢影伴黃昏斧柯片石香痕濕留與遺民一斷魂湖山類藁汪水雲留燕臺一紀束書告行一時同人賦詩為别陳正淑詩云天山雪子落紛紛醉擁貂裘坐夜分明日馬頭南地去琴邊應是有文君入改蟲齊雜疏水雲宋末以善琴供奉國亡隨三宫燕久之請為黃冠南歸藏有賜硯背刻天錫永寶四字八分書右刻水雲二篆字左刻楷書絶句云斧柯片石伴幽閒堪與遺民共號頑試憶當年承賜字墨痕如淚盡成斑水南半隱傍花宫猶是承平處士風一卷十空經在否有兒不愧鞠山翁心史鄭思肖父鞠山翁諱起淳祐間居西湖有水南半隱在長橋作水南半隱記寶顔堂筆記鄭所南嘗著大無工十空經一卷空字去工而加十寓為大宋造語竒澀自書其後云當有巨眼識之問安兵已入宫時救日空教羽檄移麗景只今傳樂府松風吹冷浴龍池啽囈集咏吕文煥詩只將六載無消息太后宫中一問安注云大兵至臨安屯臯亭山文煥與范文虎九騎入城至大內謁宋太皇太后有三朝野史大兵渡江賈似道即出檄書布告中外云救日之弓救月之矢便直指於旌旗如礪之山如帶之河尚永堅於盟誓思古堂集臯亭山崇先寺浴龍池宋髙宗嘗洗手因名花案西湖十景始自南宋瞿宗吉稱周草窗賦木蘭慢張子成賦應天長皆晚宋名作今草窗十景詞已軼不傳獨張子成陳君仲所作具在各存五首以見勝槩其外南渡詞人題咏行都者亦摘句附卷尾起日湖漁唱蘇堤春曉調探春云上苑烏啼中洲鷺疏鐘才度雲窈篆冷香篝燈微塵幌殘夢猶吟芳草搔首捲簾看認何處六橋烟栁翠橈才艤西泠趂取過湖人少掠水風花繚繞還暗憶年時旗亭歌酒隱約春聲鈿車寶勒次第鳯城開了惟有踏青心縱蚤起不嫌寒峭畫䦨間立東風舊紅誰掃林平湖秋月調秋霽云十頃玻璃送逺目斜陽漸下閴題葉人歸采菱舟散望中水天一色碾空桂魄玉繩低轉雲無迹有素鷗間伴夜深呼棹過環碧相思萬里頓隔嬋媛幾回瑤臺同駐鸞翼對西風慿誰問取人間那得有今夕應笑廣寒宫殿窄露冷烟淡還看數㸃殘星兩行新雁倚樓橫笛斷橋殘雪調百字今云凝雲沍曉正䕷花才積荻絮初殘華表翩蹮何處鶴愛吟人正孤山凍解苔鋪水融莎甃誰憑玉勾䦨茸衫氊帽冷香吹上吟鞭來將次栁際瓊消梅邊粉瘐添做十分寒間踏輕澌薦鞠半潭新漲微瀾水北峰巒城隂樓觀留向月中看巘雲深處好風飛下晴湍雷峰落照調掃花遊云數峰蘸碧記載酒紺園栁塘花塢最堪避暑愛蓮香送晚翠嬌紅嫵款乃菱歌乍起蘭橈競舉日斜處望孤鶩斷霞初下芳杜投遙想山寺古看倒影金輪遡光朱户暝煙帶樹有林鷺宿憑樓僧語可惜流年付與朝鐘暮鼓謾凝竚步長橋月明歸去雨花港觀魚調驀山溪云春波浮渌小隱桃溪路煙正林塘翠不礙錦鱗來去芹香藻膩偏愛鯉花肥簷影下栁隂中逐浪吹萍絮宫溝泉滑怕有題紅句釣餌已忘機都付與人間兒女濠梁興在鷗鷺笑人癡三湘夢五湖心雲水蒼茫處梅淵詞麯院風荷調應天長云換橋渡舫添栁護堤坡仙舊缺今續四面水窗如染香波釀春麯田田處成暗緑正萬羽背風斜矗亂鷗去不信雙鴛午睡猶熟别還記湧金樓共撫雕闌低度浣紗曲自與故人輕榮枯换涼燠亭亭影驚艷目忍到手又成輕觸悄無語獨撚花鬚心事曾卜春南屏晚鐘前調云翠屏對晚烏榜占隄鐘聲又斂色幾度半空敲月山南應山北歡娛地空浪迹謾記省五更聞得洞天曉夾栁橋疏穩縱香勒前度湧金樓嘯傲東風鷗鷺半相識暗數院僧歸盡長虹卧深碧花間恨猶記憶正素手暗裁輕拆夜深後不道人來燈細窗隙春栁浪聞鶯前調云翠迷倦舞紅駐老妝流鶯怕與别過了禁烟寒食東風顫環鐵遊人恨柔帶結更喚醒羽喉宫舌畫船逺不認綿蠻晚棹空歇爭似湧金樓燕燕歸來鉤轉暮簾揭對語畫梁消息香泥砌花屑昆明事休更說費夢繞建章宫闕曉啼處穩繫金狨雙鐙籠月三潭印月前調云桂輪逼彩菱沼漾金潛虬暗動鮫室水路乍疑霜雪明眸洗春色年時事還記憶對萬頃葑痕龜坼舊遊處不認三潭此際曾識約今度湧金樓素練鶯窗頻照庾侯席自與影娥人移舟弄空碧宵風悄籖漏滴蚤未許睡魔相覔有時恨月被雲妨天也拚得北兩峰插雲前調云暮屏翠冷秋樹赭疏雙峰起南好與霽天相接浮圖現西極苕嶤處雲共碧謾費盡少年遊屐故鄉逺一望空遙水斷烟隔閒憑湧金樓㶑灔波心如洗夢淹筆喚起睡龍蒼角盤空壯商邑西湖路成倦客待倩寫素縑千尺便歸去酒底花邊猶自看得破書舟雅詞臨安晚秋調滿庭芳云南月驚烏西風雁又是秋滿平湖米蓮人盡寒色戰菰蒲數坦菴長短句中元栁洲作調酹江月云一葉扁舟聲柔櫓陡覺紅塵逺六橋三塔恍然圖畫中見雨孏窟詞西湖調風入松謁入扇栁風殘酒㸃衣花斜陽介菴詞西湖調金門云栁外晚來船集波底夕陽紅濕船月溪集錢唐記恨調水龍吟云晚來江闊潮平越吳榜催人去東澤綺語債錢唐北關舟中調月底修簫譜云小小船窗香雪照尊俎隨如百詠西湖餞春調江神子云栁外歸雅㸃㸃是離愁春空同詞湖上調菩薩蠻云駐馬緑楊隂酒樓三月碧山樂府次周公謹故京送别調三姝媚云今夜山髙江淺又月落帆空酒醒人逺彩袖烏絲解愁人惟有斷歌幽婉梅崖集漁浦有感調綺羅香云斜照帶一縷新愁盡分付暮潮歸去夢江村遺藁半間堂賦春雪調玲瓏玉云風窗淅􅉡驚錦帳春嬌是處貂裘透暖任尊前回舞紅倦柔腰蘭友古詞西湖調浣溪沙云虛掉玉叉驚翡翠緩移棹趁鴛鴦渡石屏詞寄豐宅之調賀新郎云錢唐風月西湖栁江來百年機㑹從前未有竹齊詩餘湖上調鵲橋仙云黃花似鈿芙蓉如面秋事凄然向晚于湖詞元夕調憶秦娥云多情又見珠簾揭遊人不放笙歌歇笙歌歇輕烟曉散帝城宫闕鳯和清正詞調西河云都㑹地東南王氣須記龍盤舞到錢唐瑞烟回起畫圖彩筆寫西湖波光溶漾無際記花草粹編羅志仁賦四聖觀調霓裳中序第一云舊日曾遊翠輦青紅如寫便面悵下鵠池荒放鶴人逺南宋雜事詩卷六
