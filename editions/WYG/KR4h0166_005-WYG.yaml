body:
  text: 南宋襍事詩卷五仁和趙昱撰鳯闕蟠空入畫圖天開佳麗定鴻模六飛新駐稱行在詔進詞臣賦二都徐一䕫宋行宫考在杭州鳯皇山下即唐以來州治也咸淳臨安志建炎三年髙宗詔以杭州為行宫時執政奏屋宇隘陋髙宗以百官六軍未得其所不御正寢紹興元年詔守臣徐康國措置且命不得華飾二年南門成名曰行宫之門三年以百官遇雨泥行非便詔梁汝嘉剏廊序於南門之内十八年名南門曰麗正北曰和寧東苑曰東華二十八年始增築禁城以今地考之南自勝果入路北則入城環至德侔天地牌坊東沿河西至山岡自北至山隨其髙下以為宫殿也玉海建炎中駐蹕臨安紹興八年三月詔復還十五年髙衮上二都賦十七年施諤上行都賦又紹興八年將還臨安命有司建太廟十二年作太社太稷皇后廟都亭驛太學十三年築圜丘景靈宫髙禖壇秘書省十五年作内中神御殿十六年廣太廟建武學十七年作玉津園太一宫萬夀觀十八年築九宫貴神壇十九年建太廟齋殿二十年作玉牒所二十二年作左藏庫南省倉二十五年建執政府二十六年築兩相第太醫局二十七年建尚書六府凡定都二十年而郊廟宫省始備行老學菴筆記大駕幸建康六宫留臨安則建康為在臨安為行宫今東京阻隔而臨安官司猶曰行在某司示不忘恢復也五丈新通御路寛盛朝故事詣圓壇腰輿三百分前導香裊輕煙䕶燭寒方輿勝覽紹興三十八年殿前都指揮使楊存中乞通展皇城十三丈以五丈作御路六丈作民居將來聖駕親郊由侯潮門徑從所展御路直抵郊臺大蒲室集杭州金剛顯教院記院始於紹興中妙空師惠齡居抗州之金剛嶺考之圖志龍山圓壇古有顯教院其墟久矣乾道中請於郡而復立院焉稊米集郊丘紀事詩内門朝日上金鋪寳玉籠煙出殿餘紅燭兩行分御道輦官三百奉腰輿奉寳玉輦官三百餘人謂之腰輿皆籠燭爇香而前葢故事也金桐葉葉走青騘羣從冠量貂尾籠儀仗依稀如昔日長髯重歎說元豐夢梁録明禋宿齋殿儀宰執親王頭冠九量加貂蟬籠巾侍從七量餘官六量至二量臺諫増豸角耳量者冠前額上排金桐葉是也有玉照新志紹興辛酉南郊時排設儀仗龍山茶肆一長鬚偉男子衣青袍於稠人歎曰吾元豐五年遊京師一見之後不曽再覩今者之盛殆與昔時無異焉斷鼇息馬費追摩無逸圖消白日過清宴銀鉤驚絢綵半規小璽粉痕多玉海髙宗書法斷鼇立極息馬論道龍畫螺書旁分徧列又嘗書無逸圖曰朕一無所好惟閲書作字自然無勌五播芳大全文粹玉璧御書無逸圖贊紹興改元之年四月皇帝陛下親灑宸翰書尚書無逸篇為圖以揭於經筵銀鉤絢綵鳯翬鸞翔而清宴之間於以省覽研味猗歟兹盛德事也汪砢玉珊瑚網宋髙宗御府手卷畫前上白引縫間用乾卦圓印其下用希世藏方印巻盡處下方用紹興二字印墨蹟不用卷上合縫卦印止用其下希世小印其後仍用紹興小璽龍興入彀俊英多桂子飄香競揣摩想見重花交葉下水晶影裏記登科老學菴筆記髙宗行幸揚州郡人李易為狀元次舉駐蹕臨安而狀元張九成亦貫臨安時以為王氣所在有又張子韶對䇿有桂子飄香之語趙明誠妻李氏云露花倒影栁三變桂子飄香張九成汝隂餘話沈必先日記言奏事殿中髙宗云近有人自東京逃歸聞張九成見為劉豫用事可怪必先奏云張九成在其鄉里臨安府鹽官縣寄居去行闕無百里之逺兩日前方有文字來幸陛下裁之上云如此則所傳妄矣蓋子韶廷試䇿流播偽齊人悉諷誦故傳疑焉翌日降㫖除秘書郎咸淳臨安志張九成字子韶錢唐人徙居鹽官若夷堅志建炎春一士人步城西有虹自地出圓影水晶老木椏槎有茅舍機杼之聲行入機張女子四五綰烏絲了髻玉肌雲質衣輕綃揎腕織組視之錦文重花交禁之下有字數行首曰李易如此十數問之女對曰登科記也運際清平慶主臣紅雲繚繞簇花新車聲歴犖還宫候大内遙呼女聖人武林舊事駕幸景靈宫大禮後行恭謝禮姜白石詩云六軍文武浩如雲花簇頭冠様様新惟有至尊渾不戴盡將春色賜羣臣又萬數簪花滿御街聖人先自景靈囘不知後面花多少但見紅雲冉冉來是日皇后車駕先還宫中呼后為聖人龍笛仙音奏内庭冷光秋夜徹青㝠碧琳堂外松風滿盡屏人間絲竹聽都城紀勝淳熈間德夀宫龍笛色使臣四十名毎中秋或月夜令獨奏龍笛聲聞人間誠清樂也朝野雜紀孝宗淳熈時作翠寒堂禁中嘗召趙丞相雄王樞使淮奏事堂下古松數十清風徐來上曰松聲甚清逺勝絲竹堂玉海淳熈禁中有偉觀碧琳堂碧蘚封碑廊廡前雲章揮寫倦勤年春風便面來諸院分得忘憂藼草篇白石樵唱辟雍詩冠帶百年夢昔遊今重嗟璧池春飲馬槐市暝藏鴉堂鼔晨昏寂廊碑風雨斜石經雖不火歲歲長苔花此題髙宗石經之碑今尚在郡學甫田集思陵留意字學尤喜寫經嘗曰寫字當寫經書不惟學字又得經書不忘嘗潛溪集思陵書神女賦思陵極留心書學九經皆親寫此乃禪位後所書春秋已髙而猶勿倦可謂勤已學玉海髙宗詔書親札雲章奎畫超冠古今道園古録髙宗書蘐草詩便面以賜内庭戚婉至館閣皆有之戒其殢酒祝以忘憂豈黄髮為期之意乎兵畧増删寓意時中興雄志復誰知自工賸水殘山後空賦新秋雨霽詩長水集寳元康定間西師不解命樞府論次兵畧撰武經總要書成四十四卷仁宗為序靖康後宋事日以不競孝宗發憤國難親御戎馬又増修二十六卷製序再頒之珊瑚網世評馬逺畫多殘山剰水不過南渡偏安風景耳又稱為馬一角珪水東日記明長陵愛温州永嘉郭文通畫有言夏馬逺者輒斥之曰是殘山剰水宋僻安之物也後貴耳録夀皇有中興之圖作新秋雨霽詩及春賦端平閒試詞科出春賦為題試者皆不知之五十年間士大夫罔聞之矣御案香飄古篆青摺將掌記坐昌庭黄僉標識横陳便一一監司上畫屏益公題跋淳熈間上勤萬機臨朝以方寸紙作掌記中摺之寘在御手内殿則留香案上三省樞密奏事即視所記一一宣諭巳乃收之率以為常諸方輿勝覽選德殿孝宗新剏作金漆大屏風分畫道各列監司郡守於兩行以黄僉標識居官者職位姓名其背為華彛圖楊后宫詞天下監司二千石姓名都在御屏中水嬉爭破浪花圓迎弄劉船與董船何似龍池春色裏蘭荃排動内湖邊夢梁録百花七寳金獅子何船羅船黄船董船劉船俱湖船名錢唐新志禁中德夀宫皆有大龍池萬歲山擬西湖飛來峰御舟之華春時競渡非外間可擬又有蘭橈荃橈硯池風煖縐魚鱗一册蘭亭寫入神曽侍御前三十帖詳觀㸃畫自超倫蘭亭博議髙宗呉皇后即慈福太后親翰墨尤愛蘭亭作小楷一本流傳内外陸升之春帖子云内仗朝初退朝曦滿翠屏硯池深不凍端為寫蘭亭擇玉海紹興十三年貴妃呉氏題御書云機政之暇鍾王而下三十帖親御豪素並加臨寫龍蟠鳯翥希偉蹟也古今法書苑髙宗翰墨志評余自魏晉以來至六朝筆法無不臨摹至若褉帖則測之愈深擬之益嚴姿態横生莫造其原詳觀㸃畫以至成誦不少去懐也芙容並蒂艷清江小妺邀憐羨一雙筆底芳蘭嬌阿母為裁宫體譜新腔楊后宫詞小小宫娥近水居雕楣繡額映清渠忽然攜伴凭低檻好似雙蓮出水初四部藳馬逺畫上有書賜兩府三字并有楊娃印章逺在光寧朝後先待詔寧后楊氏楊娃即后妺也以藝文供奉内庭凡逺畫進御及頒賜貴戚皆命楊妹子署題后兄石位太師稱大兩府書兩府者即石也四朝聞見録慈明楊太后越人通經史能小王書母張夫人以樂部被憲聖幸後以病歸李氏死葬西湖小麥嶺下地名放馬場憲聖常因樂部不協顧左右曰我記得張家今安在左右對巳死矣有女頗聦慧召后入時年十三旣長侍宴長樂寧皇目后有意憲聖宴寧皇賜之曰做好看待它日有福孤亭荒落㸃寒梅曽記先皇翠輦來花醉澄瀾都莫問行人猶待杏花開夢梁録聚景園孝光寜常幸後漸蕪圮僅有一堂兩亭其一亭無扁僅植紅梅侍從陸游詩曰聖帝憂民罷露臺春風側苑畫常開盡除曼衍魚龍戲不禁芻蕘雉兎來水鳥避人横翠靄宫花經雨委蒼苔殘年自喜身强健又作清都夢一囘又有水殿西頭起砌臺絲楊鬧處杏花開之句錢唐志天逸閣載聚景亭臺尚有花醉澄瀾諸名則七十二亭即田誌尚未能盡也朝來翠浪映朱門隨輦詞臣賦御園日莫三山詞畔過鳯城殘照近煙昏稊米集四聖延祥觀御園侍臣周紫芝從駕幸山亭詩附山結崇祠朱門照湖水湖流入中池秀色歸淨几眉桐江集方囘以香山山孤山為三山南遷蕭寺寄流離知閣荒臺餘斷碑認取隨龍多漫漶亂鴉清句起悲思癸辛雜識南渡初中原士大夫之落南者髙宗有西北士夫許占寺院之命趙忠簡居越之能仁寺曽文清居越之禹跡寺甚衆宅雲棲寺志寺近掘地得斷碑題曰宋隨龍余知閣界旁有石隱隱有詩蓋䕶蹕南來因家於此後捨宅為寺也余知閣詩幾年魂繞浙城西十里荷花漾錦陂踏遍兩峰三竺路又隨青嶂入雲棲洛邑名園歌舞沉亂鴉啼破幾深林何人學得香山老千載精廬有梵音千里旌旗擁六飛投簪欲上釣魚磯無端忽被閒雲引迴耀峰前掩竹扉望裏樓臺繞翠煙天中帖子禁中傳平分四地來遊幸文杏春桃孰後先玉堂雜記必大嘗自德夀宫後垣望見一樓巍然朝士云太上名之曰聚逺必大作端午帖子前後頗聞禁籞大畧併記於下宫中分四地隨時遊覽東地分曰香逺梅堂也曰清深竹堂也曰月臺曰梅坡曰松鞠曰三徑鞠芙容竹也曰清妍酴釄也曰清新木犀也曰芙容岡南地分曰載忻大堂御宴處也曰忻忻古柏太湖石也曰射㕔曰臨賦荷花山子也曰燦錦金林擒也曰至樂池上也曰半丈紅郁李子也曰清曠木犀也曰瀉碧養金魚處也西則曰冷泉古梅也曰文杏館曰靜樂牡丹也曰浣溪大樓子海棠也北則曰絳華羅木亭也曰旱船曰依翠茅亭也曰春桃曰盤松其詳不可得而知也有客春為下竺遊枕流亭下送春流桃花數萬隨流去恍在武陵源上頭省齋集丁酉二月二十日同部中諸公遊下竺御園坐枕流亭觀放閘桃花數萬隨流而下斷至集芳園是時海棠滿山郁李滿澗殆不數於人間世明日入都而桃花數枝伶俜窻外未時内直則海棠郁李方開遂賦二絶句云萬㸃紅隨雪浪翻恍疑身在武陵源歸來上界多官府人與殘花兩不言清勝堂前花萬重玉堂署裏兩芳叢應憐寓直清無侣聊伴衰翁宿禁中亂後瓊華出詔時凄涼忍讀孟家辭中興䇿自燕山定半臂輕綃屬趙岐古今彛語宋孟太后詔云漢家之厄十世惟光武以中興獻公之子九人念重耳之獨在三朝北盟㑹編徽宗自燕山密遣曹勛至賜帝絹半臂書其領曰便可即正來援父母孤臣泣血録徽廟北狩有諜者持一黄中單來御書云趙岐註孟子付黄潛善諸人審思之蓋孟即瑤華太后趙即康王髙宗由是中興上夀仙漿第四盤天基令節正清歡良卿拍板堯卿鼓玉軸琵琶又獨彈武林舊事天基聖節第四盞玉軸琵琶獨彈正黄宫拍王良卿杖鼔朱堯卿内院春來樂事寛骰錢一笑博君歡何如供職憂勤甚獨許恩辭煖盪官癸辛雜識新集理宗春時内院效市井關撲之戲皆小璫為之供純鏝骰錢以供一笑白獺髓禁中有煖盪官紹定間内司提轄陳詢益奏以謝質供奉舊無此例質愈加戰兢年餘謝遷他職陳奏謂質不當遷上曰汝見彼憂勤許時陳慚而退占踞僊宫二十年門生投拜勢熏天一鞭催走閩南道慚愧東朝王繼先白獺髓醫官王繼先顯仁太后御慈寧宫服其藥隨愈優游東朝幾二十年克副髙宗盡親之孝已而繼先恃寵舉朝阿附至有稱門生者後太后上仙竟黜福州卒鼠璞今以太后為東朝蓋用叔孫通傳惠帝東朝長樂事宏三朝北盟㑹編繼先占豐樂橋官地屋宇麗都人謂之快樂仙宫八角銀牌禁様班玉津園吏敢縁姦他時别有權宜事魏紫姚黄說孟關癸辛雜識淳熈禁中獲偽號人乃玉津園火工包四搜出敕入宫門假印一面於是盡易敕號内宫門號八角様禁衞號銀錠様殿門號四如意様之又魏叔髙娶穆陵親姊四郡主生關孫實全夫人愛甥慈憲每為求官穆陵命見凡異姓入宫必懸腰牌惟宗子可免一時權宜假名孟關以進時度宗亦與之同入宫四方有魏紫姚黄之傳案玉津園在洋洋橋天潢麟秀氣如雲南北都傳小使軍更有晩波紅濕句一時流與禁中聞鼠璞今稱宗寺曰麟寺王牒曰麟牒宗英曰麟趾之秀宋史本傳不尤宗室有武力嘗與金人戰雄張河南北盜皆避其鋒曰此小使軍也裏貴耳録趙介菴名彦端宗室之秀有賦西湖詞波夕陽紅濕阜陵問誰作左右云彦端曰我家裏人也㑹作此等語喜甚組繡年年進内家紅酥粉涴鬬鮮華波臣物土脩幾甸别置輕容貢軟紗文獻通考孝宗乾道中中宫常服有司進深紅大袖紅羅生色為領紅羅長裙紅霞帔藥玉為墜背子用紅羅衫子用水黄紗襠袴以白衫裙以明黄短衫以粉紅紗為之施宿㑹稽志歲貢越綾十疋輕容紗五疋紙十張瓷器五十事晴嵐遙疊海門青水色天光赴杳㝠渡口新傳置津吏輕裝緩泛許揚舲黙堂集錢唐江詩潮頭駕月衝殘夢水色浮空送峭寒十幅輕蒲連夜發不知身到海門山南雷文定錢唐之渡自昔為難孫覿誌汪思恩云㑹稽渡錢唐舟人冒利捆載而行半渡弭檝邀取錢物暴風猝至舉舟盡溺操舟者皆善泅獨免公為臨安守曰不戮此輩則殺人未艾也悉論殺之更造大艦十數毎艦受若干人製號如其數以五采别之置吏監總渡者給號登舟其舟人結直有定估除十之一備脩葺之費自此無一舟之覆蓋錢唐除暴風積水亦不甚險惟載人過甚舟力不勝則有覆溺之禍當事毎以空言申勅安得如汪守者而與之講濟人之事乎案鴻慶集汪諱思温咸淳臨安志紹興六年吕頥浩尹臨安始置浙江監渡官以舟大小定數多寡自是少風濤之厄堂開有美敞前楹江樹湖雲左右呈一片殘碑荒寺壁苔花畢畫尚分明成化杭州府志有美堂嘉祐二年梅摯建宋仁宗賜詩有地有湖山美之句摰乃築堂名之歐陽脩為記蔡襄書宋淳祐志有美堂錢氏初建江亭於此當在呉山冣髙處左江右湖故為登臨之勝而前賢題詠如東坡九日舟中望見有美堂上魯少卿飲處詩言舟中望見堂上燕集此必西湖也舊志言在郡城又可以見古城界於呉山矣淳祐六年府尹趙與獲古刻小碑於山巔太歲殿之側即仁宗御賜梅公詩也此堂故址益顯著云中按田志載有美堂在鳯皇山誤矣東坡九日舟詩田志已載不復録殿前醫老張防禦白髮終身拜影堂還有長生橋沈喜親書恩主奉和王志雅堂雜鈔醫老張防禦向為謝太后醫官後入楊駙馬家人目為張風子然其人尚義其家影堂之上作小閣奉理宗謝太后神御牌奉之終身書又掠屋錢人沈喜居長生橋楊和王忌辰必設位恩主供事人問其故云其家再世皆出楊府衣食今雖衰替然不敢忘鷂子趨承恩倍加北人倚醉惱官家歸來恰遇遺弓日淚絶魂凄蕭鷓巴藝流供奉志棋待詔沈姑姑上官夫人鼓板潘小奴傀儡盧金線張逄喜踢弄呉金脚呉鷂子等貴耳録蕭鷓巴嘗侍孝廟擊毬毎許其除歩帥久不降㫖鷓巴醉語云官家㑹亂說不除步帥怒送福州居住德夀問及鷓巴孝廟奏知德夀云北人性直可喚取歸後遇德夀發引日鷓巴號哭欲絶憶同優渥賜金蕉清隱閑居感舊僚後夜翠㣲亭上望月明如水馬蹄遙金陀粹編上遣鄭莊齋賜先臣金蕉酒器如韓世忠禮陶安學士集咏史韓世忠詩沙塵淨掃寂無譁第一中興不浪誇居士晩稱清隱號賢才勿用用奸邪清隱韓號也浙江通志韓世忠忤秦檜解兵柄逍遙湖上冣愛此山故建翠㣲亭紹興十一年冬岳飛死十二年三月世忠建此亭謝兵柄時獨遊焉岳有登池州翠㣲亭詩曰經年塵土滿征衣特地尋芳上翠微好水好山看未足馬蹄催趂月明歸蓋韓當時憶岳此詩故以名亭而亦隱痛之也亭在飛來峰半成化杭州府志翠微亭紹興十三年韓蘄王建乾道五年安撫周淙重建崇化堂新故府遷傷心刺出繡袍鮮岳家昔與張家並今日韓家有賜田玉海紹興十三年詔改岳飛第為國子太學堂曰崇化在前洋街有齋十二金陀粹編先臣刺繡為袍有誓作中興功臣御鶴林玉露韓世忠嘗議買新淦縣官田髙宗聞之札特賜云卿遇敵必克克且無擾聞卿買新淦田為子孫計今以賜卿聊旌卿之忠故其莊亦號旌忠當時諸將各以姓號如張家軍岳家軍朝廷頗疑聞其買田以為喜故特賜之無端髙架太平樓花腿生兵怨未休不敵韓軍銅面具背峞一奮決同仇雞肋編車駕渡江韓劉諸軍在外獨張俊一軍隨行在擇卒之少壯者自臀而下文刺至足謂之花腿京師舊日浮浪輩以此為誇今效之不使逃於他軍用為驗也然既苦楚人皆怨之加之營第宅房廊作酒肆名太平樓搬運花石皆役之衆卒謡曰張家寨裏没來由使他花腿蓮石頭二聖猶自歸不得行在蓋起太平樓紹興四年韓世忠自鎮江來朝所領兵皆具裝以銅為面具軍中戲曰韓大尉銅臉張太尉鐡臉世謂不畏人者為鐡臉時雲麓漫鈔建炎中興張韓劉岳為將人以為法當有張家軍韓家軍之語四帥之中韓岳兵力冣精又别置親隨軍謂之背峞勇健無比凡有堅敵遣背峞軍無有不破者見范參政致能說燕北人呼酒瓶為峞大將之酒瓶必令親信人負之范嘗使燕見道中人有負罍者則指云此峞也故韓岳用以名軍湖山歸隱號青松曽與開邊議不同堪笑當時希意㫖無端殘照怨西風減淳臨安志俞灝字商卿世居杭登紹興四年進士第開禧議開邊政府密引灝言輕脫寡謀之人不可信趙良嗣張覺徃轍可鑒歴麾節皆有聲寳慶二年致仕築室九里松買舟西湖㑹意處竟日忘返作詩自適號青松居士有集古四朝聞見録李李章璧開禧初韓欲興兵遣張嗣覘敵張還大拂韓㫖復遣璧璧還與張異辭階是進政府璧使北有詩云天連海岱壓中州煖翠浮嵐夜不收如此山河落人手西風殘照懶囘頭半篙晴色斷橋邊欲弔詞人認墓田幸藉知音揚薛輩冷花疎寺葬梅川絶玅好詞施梅川清明湖上遊春詞有云傍斷橋翠繞紅圍相對半篙晴色武林舊事施梅川墓施名岳字仲山呉人能詞精於律吕楊守齋為寺後樹梅作亭以葬浙江通志梅川墓在虎頭巖楊守齋植梅以葬薛梯飈為志李篔房書周草窻題蓋畫意呤情春水堤風流端在斷橋西胎仙尚與鳴臯字故遣荒亭塑鶴棲竹所唫藁重拜和靖先生墓詩秋風爾許悲懐古若為思鞠老泉堪薦山孤草亦萎髙風留塑鶴殘雨暗荒碑依舊梅千樹無花香似詩畫歸田録處士林逋居於杭州西湖之孤山逋工筆善為詩和靖集有鶴名鳴臯鹿名呦呦作詩以賦之花開西院賦雙英萼緑飛瓊並蒂陳翦賜近臣三百朶可曽分得紹興春松隱集西院賞牡丹夀聖親見雙花臣下皆未覩折以勸酒調浣溪紗春曉於飛綵仗明西園嘉瑞格和鳴花王特地獻雙英並蒂輕黄宜淡淡聨芳競秀勸盈盈飛瓊萼緑不勝情藏拙藁宫詞牡丹春籞正穠華有㫖今年不賞花翦落金盤三百朶内批分賜近臣家天彭牡丹譜牡丹有名紹興春祥雲子花也色淡佇而花尤富大者徑尺紹興中始傳一片湖山逺翠含􅌑瓏八面坐屏南施將纎巧藏朱邸十様亭臺照碧潭夢梁録南翠芳園舊名屏山園内有八面亭堂一片湖山俱在目前又慶樂園舊名南園賜福邸内有十様亭榭工巧無二烹宰親題教誡新放生恩遍及游鱗傳聞大節千官萃一棹延縁祝水濱咸淳臨安志西湖德生堂有理宗皇帝奎畫又有御筆戒烹宰文刻石立堂上玉海紹興時工部郎中林乂請以臨安府西湖為放生池從之又淳熈三年詔西湖係放生池不得採捕夢梁録四月初八日聖福皇太后聖節文武官於廣化寺起祝聖道場出西湖德生堂放生成化杭州府志放生池宋天禧四年守王欽若建慶元四年趙師剏德生堂於石函橋之西淳祐八年趙與更新之按欽若奏請西湖為放生池蓋指通湖而言故建德生堂在今之昭慶寺外非今所謂放生池一窪之地也勝蓮社約西湖南宋放生池也一枝笑靨倚西風異品香茸發禁中踏過馬畻紅杏雨鞠花髙墖鬬􅌑瓏花史臨安有大笑鞠其花白心黄葉如笑或云即枇杷鞠羣芳譜臨安西馬畻園子每歲至重陽謂之鬭花各出竒異者有八十餘種誠佩韋齋集西馬畻邊紅杏雨金牛寺外白楊風齋集經和寧門外賣花市見鞠詩有平地拔起金浮屠瑞光千尺照寒碧乃是結成鞠花墖蜜蜂作僧僧作蝶鞠花障子更􅌑瓏生採翡翠鋪屏風悉鞠譜余在臨安西馬塍園子每至重陽鬭花不暇求其名余於禁中大園子處得鞠品近六十種與外異者黄鶴翎黄羅撒報君知狀元黄翦金毬銷金鞠火煉金檀香毬黄五九鞠萬卷書金芍藥金孔雀金盞銀臺荔枝鞠銀撚絲試梅妝玉芙容一搻雪白雪團玉繡毬白疊羅水晶毬月下白玉牡丹玉寳相白西施粉鶴翎玉樓春紫霞杯紫牡丹朝天紫紫骨朶紫絨毬菡萏紅墨鞠狀元紅海東紅錦心繡口紫綬金章大紅袍慶雲紅帶笑鞠合歡鞠樓子紅冬鞠鶴頂紅猩猩紅西番蓮添色喜容海棠嬌赤金盤金錢豹醉楊妃平分秋色金鞠對芙容鴛鴦錦錦麒麟團圓鞠五色鞠順聖淺紫花街貴宅弄春幡小象裝成風景繁一十三層黄累戲嬌民爭入杏花園夢梁録立春街市以花裝欄坐乗小春牛春幡春勝各相獻遺與貴家宅舍亦豐稔之兆武林舊事大禮縳青城齋殿毎隊歌頭唱和杵歌等曲命象院教象前導蠻奴乗之手執短钁旋轉跪起悉如人意市井因競市繪塑小象以饋四方土霞外集嬌民技藝也天生鬭巧爭竒事事能稚子宜偏劇戲浪兒黄累十三層取宋稗類鈔湧金門有杏花園游人其黄土戲捏為人形三三五五逐春場鼓板嗤他亦號荒張五牛新翻誤賺引人聽到尾聲長都城紀勝街市有樂人三五為隊專趕春場看潮賞芙容及酒坐祇應與錢亦不多謂之荒鼓板古杭夢遊録唱賺在京師只有纒令纒達中興後張五牛大夫遂撰為賺賺者悞賺之意令人正堪美聽不覺巳至尾聲寒食家家栁眼明朝陵車馬出山城遙憐茸母煙生處望祭南屏實愴情夢梁録清明寒食家家以栁條揷門名曰明眼前五日發宫人車馬徃紹興攢宫朝陵至日車駕詣赤山諸攢宫廷鶴林玉露臨安淨慈寺後有望祭殿毎歲寒食朝望祭西京諸陵祝版詞蕝寓祭之權宜愈深愴慕無詞品徽宗在北遇清明日詩曰茸毋初生認禁煙家對景倍悽然帝城春色誰為主遙指鄉鬬涕涙漣注茸毋草名荒郊野祭棗薑擔靚婦遊逄三月三地上天宫春九莫牡丹新揷馬頭籃乾淳歲時記清明前三日家皆挿栁大家則加棗䭅於栁上上塚者多用棗䭅薑䜴而野祭尤多婦人淡裝素服提攜遊女分餕遊息崖楓窻小牘汴中呼餘杭百事繁庶地上天宫秋小藁湖上詩今歲春風特地寒百花無頼已摧殘馬畻曉雨如塵細處處筠籃賣牡丹夢梁録春光將莫百花盡開賣花者以馬頭竹籃盛之歌呌於市都城夜市客爭嬉名榜山三字畫竒聽到桃花三月放駸駸朝馬踏朝曦都城紀勝夜市除大内前後諸處亦然惟中瓦前冣勝又酒家酒閣名㕔院若樓上則又或名為山一山二山三之類牌額寫過山非特有山謂酒力髙逺也又官酒庫有樓曰西樓樓攻媿書榜後為好竒者取去喧方輿勝覽夜市三更燦爛樓臺之燈火春風萬井闐簾幙之笙歌夢粱録沙戲兒藏香細扇融和坊賣卦名桃花三月放者皆杭城夜市此日輕儇嗟士風謔談盆盎浴堂中摩㬋羅様黜雕戲燈禁自應先蠟紅癸辛雜識賈似道為相學舍纎悉無不知之雷宜中長成均直舍久圮遂一新之或書壁云碌碌盆盎中忽見古罍洗雷尚未之見一日見賈忽云碌碌盆盎中雷恍然不知所答久之入成均浴堂見壁書此乃悟云之三朝政要賈相患舉人猥衆御史請置士籍覆試日露索懐挾辛未榜李鈁孫者少時戲雕摩㬋羅於股間搜者視之駭曰此文身者事聞被黜之朝野雜記燈挾之禁近歲雖行國子監及南省行兩浙漕司則雖禁燈而已弛挾書之律矣其他郡國秋試達旦乃罷紹興二十九年王瞻叔䕶試復禁之然習俗已久今秉燭挾書如故易名盛典感人神一字忠奸大義申父老至今談六檜墓田新土賜麒麟天禄識餘宋贈岳鄂王諡忠武文曰李將軍口不出辭聞者出涕藺相如身雖已死凜然猶生又曰易名之典雖行議禮之言未一始為忠武之號旋更武穆之稱獲暏中興之舊章灼知皇祖之本意爰取危身奉上之實仍采勘定禍亂之文合此兩言節其一恵然今天下岳祠皆稱武穆此未定之諡當稱忠武為宜冕成化杭州府志宋少保鄂國武穆王孝宗為雪其初諡武穆寳慶二年改諡忠武元至正中加諡保義奪謚法通考申王秦檜紹興中諡忠獻開禧三年追王爵改諡謬醜嘉定元年史彌逺奏復王爵贈謚輔宋元通鑑寳祐二年詔太常釐正秦檜諡法因諭臣曰諡謬狠可也篁墽文集跋楊補之松檜圖云宋季有永嘉處士胡褒者憤秦檜之奸題其堂曰六檜蓋以六隱戮字也栁待制集六檜堂王淮記白翰墨叢紀岳武穆家謝昭雪表青編塵乙夜之觀簡悟壬人之譖湛淵集詠岳王孫縣尉復棲霞墓田詩岳鄂諸孫復墓田清明寒食起新煙道傍為我除蒼檜山下如今哭杜鵑髙廟神靈應悔此中原父老尚凄然西湖靡靡行人去却望棲霞轉可憐一聲清蹕訝天臨萬騎雲環相府深廟主蒼黄遷狡窟蠨蛸刺目極傷心播芳大全文粹駕幸秦丞相府啓元戎萬騎星拱轅門清蹕一聲天臨相府云云桯史望仙橋秦檜賜第其東偏即檜家廟西則一德格天閣之故基檜薨於位熺不能決去請以其姪烜為光禄丞留蒞家廟冀復居之言者請罷烜遷廟主於建康遂空其居掖垣清職棄如遺片石休嗟瘞草時不敵四夫人擘阮錦裀紅縐索新詞餘冬序録韓侂胄當國欲網羅四方知名士相羽翼嘗築南園屬楊萬里為之記許以掖垣萬里曰官可棄記不可作韓恚改命他人萬里卧家十五年皆其柄國日也事見楊本傳四朝聞見録陸游為韓作南園記又有鄭棫者嘗第進士自作南園記併礱石以獻韓以陸記為重仆鄭石瘞之地後韓敗鄭竟免琴又韓喜陸附已至出所愛四夫人擘阮起舞索公為詞有飛上錦裀紅縐之語淮南一蹶竟誰慿打諢翻將樊惱増江上竹光方快飲庭前何惜碎生菱四朝聞見録韓用兵旣敗鬚鬢俱白莫知所為伶優因上賜宴設樊遲樊噲旁一人曰樊惱揖問樊遲誰與取名對以夫子所取又揖問樊噲曰爾誰取對曰漢髙所命又揖樊惱云誰名汝對以樊惱自取又因郭倪郭杲敗值賜宴以生菱進於卓上命二人移卓忽生菱墮地盡碎一人云苦苦壊了許多生菱只因移杲卓添都城紀勝雜劇中副淨色發喬副末色打諢又或一人裝孤函史寧宗開禧用兵淮漢師敗薛叔似以怯懦為韓所惡項安世因貽侂胄書曰偶送客至江上飲竹光酒半醉書不成字韓大喜曰頂平甫乃爾閑暇遂除湖廣總督深堂羅木生前慮淺土蘆花死後悲在昔曽聞呼冷盞至今唯見說韓棃四朝聞見録韓侂胄敗籍其家卧内青紬帳後以羅木自圍其寢防刺也又韓敗韓功德寺佛像已輿他所而金碧木石俱空登其母魏國夫人塚旁有蘆束淺土半露問之乃韓之尸其首已送之北也又賣漿者敲其盞以喚人曰冷底喫一盞冷謂韓盞謂斬也又姑蘇有地名韓墩産韓棃為天下冠中都謂之韓㻻棃後因先皇諱改為韓村棃侂冑專國餽者不敢謂韓邨直曰韓棃蓋中都以外人為村故諱之唐突平章是牧童朝耕莫飯唱林風尋詩趙尹偏多事屏上空題杜宇紅昨非菴日纂侂冑過南園山莊趙師偕行至東邨别墅宛然鄉井見林薄中一牧童歌曰朝出耕田莫飯牛林泉風月共悠悠九重雖竊阿衡貴爭得功名到白頭趙呵曰平章在此誰敢唐突跡牧童至草廬屏上有詩云玉津園内行天討怨血空啼杜宇紅後韓為史誅於玉津園媚語相依北斗光園丁亦自頌師王惟憐他日雙扉掩零落寒亭晩節香癸辛雜識傅伯夀上韓侂胄啓有云人無恥矣咸依右相之山我則異於獨仰韓公之斗四朝聞見録南園乃慈福所賜韓者掌園金其姓皆武爵之近上者聽其滿口皆稱師王師謂太師王謂郡王韓敗後掌園之人閉園三日夜外人絶不與之通詩乂南園中有亭曰晩節香植鞠二百種亦取其祖句陸游記中不及云鐵槍雄盜渡淮南泣别紅妝赴碧潭後夜捷音仍不至相公區處又何堪三朝野史李全擾淮時史相彌逺在朝堂束手無䇿訛傳全軍渡江史夜半披衣起愛寵林夫人隨後見史欲投池中林急扶住泣曰相公且少耐區處數日後即得趙葵捷書宋史紀事李全能運鐵槍號李鐵槍歸路晴煙草色纎公餘息影任休恬斷堤野水梅花宅占取湖園六事兼咸淳臨安志賈魏公賜第葛嶺歸葛嶺舊居詩罷官歸舊宅山水得頻過息影堤邊樹清心湖面波勞無功可紀頑有命相磨見說連朝雨田家正剪禾春萬厯杭州府志賈似道題孤山詩半是樓臺換却幾囘獨立更消魂斷堤野水梅花宅千古春風一月痕恱生堂隨鈔洛人云園圃之勝不能相兼者六務寛大者少幽邃人力勝者乏閑古水泉多者無眺望兼此六者惟湖園而巳題名到處侍兒孫鵷鷺招邀半在門燈色秋山無限好相公風月細評論咸淳臨安志大仁寺山頂有石菴一名天然菴洞崖仿佛有東披題名咸淳三年賈似道遊山題名九月二十八曰賈似道領客束元嚞史有之廖瑩中黄公紹王庭來游子德生孫蕃世侍又旌德顯慶寺在小麥嶺題咸淳三年九月二十四日賈似道因展先墓為泉石一來客束元嚞廖瑩中俞昕黄公紹王庭子德生諸孫蕃世僧法照智印祖印文珦乙又龍井延恩院在風篁嶺題名靜庵丘攽賈似道未臘月來遊復亨泰侍後三十一年夏閏大丞相魏國公再登揆席少駐湖曲賜第因謁演福來此客廖瑩中陳詩川從子德生侍歲又龍泓洞題名咸淳丁夘七月十八日賈似道以事禱上竺囘憇於此客束元嚞俞昕張濡黄公紹王庭從子德生侍期而不至者廖瑩中又治平寺太傅平章賈魏公舊遊題名天台賈似道竺澤陸叡新安汪儀鳯永嘉沈厚潘方楊應華周之德曹元發黄德方陳淳祖以嘉熈戊戌元日登治平寺序拜煙雲閣上期而不至者鄭泌安劉翁孟寅趙希􅒷曹良朋曹又下天竺題名賈似道比以歲事禱靈隱迄幸有年飯僧已因過此山呉子聰束元嚞丘復亨俞昕廖瑩中張濡黄公紹王庭從焉子德生諸孫蕃世侍僧法照德寧時舉妙寧俱咸淳三年歲丁夘十月望江湖長翁集西湖詩遊客半鴛鷺自註云暇日朝士多在湖上雨咸淳臨安志賈魏公下天竺通元菴詩燈色難禁秋聲不離山籖飾泥金開劌精墨丸香印散煙輕後先向廖元相匹閱古堂過又恱生癸辛雜識賈廖刋九經本冣佳裝褫以泥金為籖家居易録賈似道鑒畫有恱生小印徃徃於士大夫見之癸辛雜識載其與門客廖瑩中刋書甚多聊志其目全唐詩話恱生隨鈔一百卷所援引多竒書九經以撫州􅒝鈔紙油煙墨所造冣精湧研北雜志韓侂胄閱古堂圖書皆向若水鑒定幢小品韓魏公閱古堂在定州侂胄建於臨安者仍祖名也琢就新詞唱箇儂恩私門吏得從戎黄金特鑄匜盤貴頌禹尚書勒篆工詞筌賈循州好集文士於館第時推廖瑩中為冣其詩文不傳偶見鈔本箇儂一詞頗富艶詞云恨箇儂無賴賣嬌眼春心偷擲蒼苔花落先印下一雙春跡花不知名香纔聞氣似月下箜篌蔣山傾國半解羅襟蕙薰㣲度鎮宿粉棲香雙蜨語態眠情感多情輕憐細閱休問望宋墻髙窺韓路隔尋尋覔覔又暮雨凝碧花徑横煙紅扉映月儘一刻千金堪值卸祙薰籠藏燈衣桁任裏臂金斜搔頭玉滑更恨檀郎惡憐深惜儘顫裊周旋傾側軟玉香鈎怪無端鳯珠微脫多少怕聽曉鐘瓊釵暗擘志雅堂雜鈔賈似道自江上奏功廖瑩中以從戎功特賜黄金百兩廖鑄匜盤以為酒器楊尚書作篆古勒銘有云國有大功一相禹胼曰余瑩中與隨斾旃文昌孫子是寳是用誰其銘之史臣楊棟乞將秘府藏千卷藼草芝蘭鸞錦裝五雀有圖崔白寫尾銜小印恱生堂清河書畫舫似道家藏名跡多至千卷其宣和紹興秘府故物徃徃乞請得之今録其稍隠僻者有薛濤藼草詩韓偓芝蘭帖錢鏐貢棗等帖内齊東野語思陵玅悟八法訪求法書名畫故紹興府所藏不減宣和其裝標裁制各有尺度印識如紫百花鸞錦碧鸞綾托褾之類雲煙過眼録崔白五雀圖皆賈氏恱生堂物其間一印云賢者而後樂此貯舞藏歌樂此生相公惟願頌昇平園泉歴歴都堪記洞口水香茶更清癸辛雜識賈相集芳園南山水樂洞賜園等志之郡乗有云藏歌貯舞流連光景使園圃常興而無廢天下常治而無亂非後天下之樂而樂者其誰能冽咸淳臨安志棲霞洞内有水洞深不可測水極甘魏公嘗調以瀹茗譚玉精詳誰與同古花文篆辨青紅何來媚士無相識盡去低頭拜玉工三朝野史賈相當軸收古銅器法寳用譚玉辨驗爭史緯似道當國監司郡守貢獻不可勝紀趙溍等獻寳玉陳奕至以兄事似道之玉工陳振民以求進囘首東都老淚垂水晶遺注忍重窺南朝還有傷心處九廟春風盡一犂續資治通鑑髙宗南渡有將水晶注碗𣙜場交易見之泣云此哲廟陵寢中物也又端平初金人失國元許本朝遣使朝陵殆三京之師一出元大怒陵廟盡犂為墟矣錢唐博士有文孫藏得雙環竹葉痕雒誦遙村燈火句自來詩律重金昆夷堅志錢唐關子東博士家其孫出乃祖所藏水晶絛環表裏瑩徹中有生竹葉一片春渚紀聞鐘聲互起東西寺燈火遙分逺近邨此余友關子東西湖夜歸所作非身到西湖不知此語形容之玅關氏詩律精深妍玅世守家法子東二兄子容子開皆稱作者浮溪集關注字子東世為錢唐人登紹興五年進士第教授湖州官至太學博士子東自號香巖居士有關博士集東野清寒自可憐愛花名稱鞠花仙年年風雨重陽日空酹西郊一掬泉萬厯杭州府志沈鞠山失其名字袁州宜春人由進士知錢唐嘗植鞠數百本以自樂晩節益堅適以九月九日殁朱文公挽之以詩愛鞠平生不愛錢此君原是鞠花仙正當地下修文日恰值人間落㡌天生與唐詩同一脉死隨陶令葬千年如今忍向西郊哭東野無兒更可憐鞠山名字失傳建樹無攷可據者晦翁一輓詞耳然賢者不輕與人繹其語意徴為亷吏云斷碑荒樹總飄零南圃關情草色青公子自餘今昔感夕陽秋水望西泠山中白雲詞張叔夏過慶承園有調寄髙陽臺詞云故園已是愁如許撫殘碑却又傷今更關情秋水人家斜照西陵註秋水觀賈相行樂處又自叙云園即韓平原南園僅存丹桂百餘株有碑記在荆榛中故詞句有亦猶今之視昔之感復嘆葛嶺賈相之故廬也中外叅差滴漏聲院中學士任凄清内門唱徹連珠諾珂繖搖心促那行玉堂雜記禁中四鼓乃在外三更閒學詩初藁夜歩臨安内門詩靜夜孤燈人未眠等行過内門前一聲唱徹連珠諾碧檻朱闌緑栁邊註皇城夜間唱連珠諾鶴山集紫宸殿詩珂繖搖心夢不成忽聽吏早放衙聲吹燈撥火供晨粥趂到皇城恰六更去老學菴筆記有官入殿門閤門輒促之曰那行予國二十七年復還朝儀寖有不同唯此聲尚存那去聲張家樂部已凋殘委骨春塵麥嶺寒占得青烏多吉兆百年詩禮盛衣冠四朝聞見録慈明楊太后葬其母於羣宫人塚旁葬處蓋天造地設山自南髙峰為岡阜至夫人壠忽踊去若龍昂首為嶺春陽發達夫人墳有物若鍾乳結成甓淵泉環繞源出百里其家克知詩禮福禄未艾也禁籞紅廊奉詔遊九翬四鳯翠光流慇懃好謝清寒客斷雨飄雲帝子愁武林舊事南渡公主無及嫁者惟理宗周漢國公主出降楊鎮先一日宣宰執詣後殿西廊看公主房奩有正珠九翬四鳯冠北珠花冠正珠翠領四時衣服等物三朝政要開慶元年四月上試進士賜周震炎等及第進身有差時周漢國公主方選尚丁大全欲用新進士為駙馬命考官寘震炎第一倡大平狀元之說以媚上震炎草茅士年幾三十矣恭謝日公主於屏内窺之不恱事遂寢焜煌宸翰䕶松風權奉天章寳閣中敬羨文明稱繼美成編百卷兩朝同媿郯録中興而後惟建天章一閣以藏祖宗御書今行宫大内之後萬松嶺有地舊名天章閣日厯載紹興十九年從義郎趙子嶔投進太祖御容一軸赴天章閣収奉訖咸淳臨安志祖宗諸閣在禁中藏祖宗御書圖籍寳瑞置學士直學士等員惟天章閣以奉列聖御容南渡重建不以除官蓋天字非臣下敢稱亦以神御所在不可與他閣例言也成玉海紹興二十四年實録院奉詔編次徽宗御集上之翰院擬撰閣日敷文書成凡詩百九十有五宫詞二百賦一序十二記十碑四䇿題九文七樂章二挽詞二十七雜文十五詩解九論語解二道德經解八南華沖虛經解二十聖濟經十科儀二政事手札千三百五十邊機手札二百四十四通為百卷上御垂拱殿再拜受書親製序冠於篇首權奉安於天章閣又開禧元年實録院上髙宗御集一百卷殿開打麥先農務臺設觀耕事灌耡璘箔傳來今不舉閑他繭館女尚書女紅餘志蚕箔名璘籍中文獻通考紹興二年上謂輔臣曰朕聞祖宗時禁有打麥殿今朕於後圃令人引水灌畦種稻欲知稼穡之艱難又命臨安府守臣度城南之田得五百七十畝有竒迺建思文殿觀耕臺神倉及表親耕之田蠶又紹興十五年太常王湛請按政和禮建親蠶殿室繭館請皇后就禁中行親蠶之禮朝㫖送禮部下太常寺討論不果行攷舊制皇后親蠶女尚書著貂蟬佩璽陪乘餅餌生香餽幾枚水沉黏瓣製徘徊兒家自㸃梅花粥露濕親封小蕊來夢粱録徘徊花貴官家以花片製作餅兒供送中誠齋集玫瑰詩别有國香收不得詩人薰入水沉傳是樓類書鈔本宋時有梅花粥楊誠齋云蜜㸃梅花帶露餐及脫蕊收熬粥食之取其助雅致清神思也將山家清供誠齋梅粥詩脫蕊收熬粥吃落英仍好當香燒曲頸當胸斜按嬌雲楸面子數峰描舊京式様都零亂賸有清歌大海潮篋衍集孔尚任大海潮小唫蟬兩琵琶歌其一龜錦褁周身翦犀鏤牙如縷織背上雙鈕蹲盤螭盈尺曲項玳瑁飾雲楸面了波濤生三十六峰尤竒特横挾不起斜按難滿輪明月遮胸臆大者名為大海潮南宋流傳今到北次東京夢華録教坊樂部前列拍板一行一色畫面琵琶五十面薄綃舊染露珠香宫㨾新翻梅雨涼底事頻誇天水碧曽無北紫鬬遐方紫桃軒雜綴峽石人積梅雨水以二蠶蠒繰絲織紬有自然碧色名曰松隂色享上價此法本宋寧宗宫禁有為之者一時號為天水碧天水本趙宋郡望碧者畢也未幾果有航海之應通雅淳熈中北方染紫極鮮明中國亦效之謂之北紫東都登頓下江南霜鬢風鬟意不堪文筆誰宗易安李秀齋方與鮑清菴貴耳録李易安居士趙明誠妻南渡來常懐京洛舊事晩年賦詞有於今憔悴風鬟霜鬢之句又清菴鮑氏秀齋方氏淳熈間二婦人文筆可繼易安之後易詩說雋永今代婦人能詩者前有曽夫人魏後有安李李在趙氏時建炎初從秘閣守建康作詩云南來尚怯呉江冷北狩應悲易水寒又云南渡衣冠少王導北來消息欠劉琨易四六談麈祭文唐人多用四六韓退之亦然故李安祭趙湖州文云白日正中嘆龎翁之機捷堅城自墮憐杞婦之深悲婦人四六之工者愁向天津聽杜鵑宫姬鵶鬢已堆殘忍聽笛吹南來怨三十六宫秋草寒志雅堂雜鈔陳石泉自北歸有北人陳叅政餞之木蘭花慢云歸人猶未老喜依舊著南冠正雪暗滹沱雲迷芒碭夢落邯鄲鄉心日行萬里幸此身生入鬼門關多少秦煙隴霧西湖淨洗征衫燕山從不見呉山囘首一歸難慨故都離黍故家喬木那忍重看鈞天紫城何處問瑤池八駿幾時還誰在天津橋上杜鵑聲裏闌干殿容齋題跋北人張侍御有侍兒意狀可憐乃宣和小宫姬也翰林呉激賦詞有仙姿勝霄宫鬢堆鵶江州司馬青衫淚濕同在天涯之句樓詞品南渡後有題聞笛玉樓春詞於杭京者云玉十二春寒惻樓角莫寒吹玉笛天津橋上舊曽聽三十六宫秋草碧韶華人去無消息江上青山空晩色一聲落盡短亭花無數行人歸未得宣和名艶舊時嬌煙墨青螺著意描淚濕臨安來市上鶯花蕉翠可憐宵玉照新志秦妙觀宣和名倡也色冠都邑畫工多圖其貌售於外方陸升之客臨安雨中一老婦人蓬首垢面丐於市藉檐溜以濯足泣訴於升之曰曽聞秦玅觀否妾是也雖掩抑困頓而聲音舉止固自若也北畫史㑹要盛陳顯工仕女泥面毎用螺青或煙墨水淡開謂之青娥粉白波含木葉洞庭秋院體新評御筆收誰畫江南好煙水園前第一數營丘妮古録氣霽地表雲歛天末洞庭始波木葉微脫春草碧色春水緑波送君南浦傷如之何海風吹不斷江月照還空四更山吐月殘夜水明樓此乃宋畫院試題思陵嘗自出新意以品畫師居易録畫家有兩李營丘北宋李成人皆知之南宋李永亦稱營丘知之者殊少王穉登云李營丘以山水擅名為宋畫院第一謂永也者寳顔堂筆記武林地有號園前宋畫院故址也賞識誰云定李唐折蘆蘭葉在豪芒南朝畫記何人續一一名圖發玅香畫鑒宋南渡畫院諸人僕於李唐差加賞識葉彛門廣牘梁楷撇捺折蘆描珊瑚網馬和之蘭描輟耕録陳德輝續畫記一卷髙宗建炎至幼主德祐乙亥一百五十人按是書今不傳書畫彚考南宋畫院李唐南畝饁耕圖長夏江邨圖馬和之關雎桃夭葛覃等圖蘇漢臣熾盛光佛像日月珠幢像鬟華菩薩像揭諦神像李迪湖石海棠圖水仙咏梅圖楊仕賢山水開精舎圖豐興祖照殿紅山茶圖㑹禽圖呉炳春池睡鴨圖鴛鴦瑞蓮圖折枝寒鞠圖蕭照赤松黄石圖採芝仙女圖劉松年耕織圖馬逺石鼎聨句圖旗亭記曲圖蓮舟邀月圖馬逵教鸚鵡仕女圖祝雞翁圖梁楷孫子牝牡八變陣圖世室明堂宗廟位次圖夏珪柏人宵征圖秋風斜谷圖溪橋暗雪圖雪夜歸帆圖陳居中落日照大旗圖王輝散花圖韓祜草蟲圖朱懐瑾寒花待雪圖響泉圖陳清波三潭印月圖蘇堤春曉圖石屋煙霞圖貝葉注經圖孫覺撲蝶仕女圖香䊵仕女圖胡彦龍北方毘沙門天王像諾矩羅尊者像授墖天王像天龍神鬼像散花神女像魯宗貴竹枝山鸕圖棃花白燕圖玉茗圖錢光普唼藻魚圖陳可久栁絲魚影圖蘇堅正誥事蹟圖崔友諒春山圖徐道廣華清宫圖李德茂白鷴圖顧師顔繡佛圖史顯祖陛羽品泉圖朱玉淩霄四帥圖朱光普農家迎婦圖秋山圖朱紹宗蕭翼賺蘭亭圖薄荷醉貓圖陳善清猨求木圖羣猨越澗圖開房石榴圖劉宗古詩女圖范彬六橋桃栁圖張仲紺珠蓮交頸鴛鴦圖按西湖志餘於畫院諸人著録寥寥予友厲君太鴻輯南宋畫院録八卷儲藏題跋蒐羅甚富此亦嘗鼎一蠻也國香零斷失清芬本穴浮根思不羣冣憶酒邊花下客氷絃愁滿賦湘雲雪濤詩評趙子昻宋宗室一人題子昂畫蘭云近日國香零落盡王孫芳草遍天涯蓋譏之也遺民錄鄭思肖字憶翁號所南福州人為太學上舍應宏詞科元兵南下扣閽上太后幼主疏辭切直忤當路不報初諱某宋亡乃改名思肖即思趙憶翁與所南皆寓意也坐卧不北向扁其堂曰本穴世界以本之十置下文則大宋也精墨蘭自更祚後為蘭不畫土根無所慿藉或問其故則云地為人奪去汝猶不知耶蘭鐵網珊瑚趙子固以諸王孫負晉宋間標格愛作蕙酒邊花下率以筆硯自隨畫史㑹要子固善水墨白描水仙梅蘭山礬竹石落薲州漁笛譜周草窻賦趙子固淩波圖詞國香流恨正氷銷翠薄誰念遺簪水空天逺應念礬弟梅兄渺渺魚波望極五十絃愁滿湘雲冷葉疎枝劇可哀空傳奉勅寫邨梅同時困頓南遷客破費胭脂幾許來春雨集楊補之旡咎所居蕭洲有梅臨之以進徽廟戲曰邨梅南渡後紹興中嘗畫作疎枝冷葉清意逼人自署奉勅村梅而徽廟不及見矣瘦已瘧編畫梅有名者如宋時楊補之作梅自負清有持入德夀者内中頗不便於逸興謂曰村梅補之因自題曰奉勅村梅云續書畫題跋記李唐初至杭無所知貨楮畫以自給甚困有中使識之曰待詔作也遂奏聞唐之畫杭人即貴之唐有詩曰雪裏煙邨雨裏灘為之如易作之難蚤知不入時人眼多買胭脂畫牡丹蟹腊蛇王藏畫簏花鬚魚鬛戲銅鉦年來不覩承平事想煞王生與戴生癸辛雜識故都戲事呈水嬉以髹漆大斛貯水小銅鑼為節凡龜龞鰍魚以名呼之浮水面戴戲具而舞王生畫花鳥人物千餘事定箭中物如花鬚魚鬛燕翅之類雖極微渺無不中之太廟前有戴生蓄異蛇數十種冣大者長數尺如殿楹呼為蛇王無他生産凡所資命惟視吾蛇在耳彷彿豢龍之技有道人負一簏視之皆枯蟹至百餘種如惠文冠如皮弁如箕如瓢如虎如龜如螘蝟或赤黒紺班如玳瑁或粲如茜錦其一上有金絲皆平日目所末覩花傳佳種玉瓏􅙎並蒂鴛鴦亦著紅更有蕭寥江路客宫梅不與野梅同盤洲集偶得梅一種疎枝清香附萼之花五出與江梅無異但花色微紅而五出之上復有一重或十葉或九葉他皆並蒂雙實俗呼為鴛鴦梅丁風月堂雜識玉瓏􅙎浙中謂之睡梅圖繪寳鑑野堂名未詳住廬山清虛觀善畫梅竹理宗因召見問曰卿所畫者恐非宫梅對曰臣所見者江路野梅耳遂號野堂風騷散佚罕流傳力購開雕讀御前空費元嘉詩禁密紛紛箋釋鬭新編六研齋三筆思陵極愛蘇公文詞力購全集刻之禁中庚溪詩話孝宗愛蘇軾文乾道中梁丞相叔子侍講席上因論文問曰近有趙䕫等註軾詩甚詳卿見之否梁奏曰臣未之見上曰朕有之命内侍取示之刻施註蘇詩王註正譌云分類蘇詩註三十二卷舊永嘉王十朋龜齡纂集洪武蘇州府志顧禧字景蕃呉郡人不求禄仕居光福山紹興間有司以遺逸薦不起嘗與呉興施元之註蘇子瞻詩行世呉興掌故司諫施元之字德初註東坡詩四十二卷與呉郡顧景蕃為之元之子宿推廣為年譜陸放翁序祖錢唐志廖羣玉有註坡詩以海陵顧註為而益以他註與戰國䇿皆欲刻而未成江南黄葉亂秋空偶感宸書野寺中遺藳不勝三致意無邊風月系文忠六研齋筆記武林潮鳴寺有宋思陵賜統制劉漢臣詩野寺參差落漲痕疎林欹側露霜根扁舟一棹向何處家在江南黄葉邨此蘇子瞻詩也起句第二字是水字只改一寺字遂掩而有之思陵博學斷不如是當由一時在寺中偶御筆書之以賜劉而寺中欲假以為重乃改字勒石以侈榮觀耳玉海乾道九年孝宗御製文忠蘇軾文集贊并序内贊云敬相髙風恨不同時掩卷之歎播以聲詩選德殿書賜蘇嶠嘗又先是有詔贈大師盡朝野雜記孝宗在翠寒堂曰子瞻以風月為無藏信哉上雅敬蘇文忠居常止稱子瞻或稱東坡學宋史本傳髙宗即位贈蘇軾資政殿士謚文忠峰攅千疊卧犀泉山水清居好味禪去住老僧休作偈菜園新詔賜嬋娟咸淳臨安志卧犀泉鄭戩靈隱天竺詩集序云若夫玉巖青壁犀泉龍賜峰攅千疊松排萬蓋山之境也據此則青壁檻卧犀泉皆在靈隱天竺之間住隨隱漫録閻妃以特㫖奪靈隱寺菜園為功德寺持沖癡絶示衆云欲去不去被去礙欲住不住被住礙云云成化杭州府志卧犀泉在醴泉側道學誰將倡盛朝獨聞忠讜冠羣僚清居賸有風徽在至竟人呼博士橋萬厯杭州府志李性傳字成之宗正寺主簿李舜臣之子宋寧宗嘉定四年舉進士歴轉運幹辦行在諸軍審計司進對有崇尚道學之言稱㫖遷武學博士嘗寓居武志坊巷以修武志故名其橋為博士橋巷曰武志坊十里山堤散客襟芹芽菰米趂幽尋雪甌初汎蓮花院第一泉香記小林誠齋集過臨平蓮蕩詩人家星散水中央十里芹羮菰飯香想得薰風端午後荷花世界栁絲鄉咸淳熙安志蓮花井在小林蓮花院范令光記臨平山後數十里井鹵惡余客小林四面散汲其味畧同與范右之蔡及之納涼蓮花院院有三井扣僧孰勝僧指露井冣良余亟取烹茗清甘寒冽自是日走躄奴二罌靳不輕費品此泉為小林第一荆山嶺半白雲開水面横斜盡野梅築得團蕉香裹住隔橋支杖一僧來西溪梵隱志春雪菴在荆山嶺左淳祐中沙門熈春號雪山結菴靜攝有樂靜堂植梅花砌出山城輦道長翠華頻幸過琳堂一十平八里秦亭路祇奉宸遊入禹航西溪梵隱志西溪留下谿路皆輦道石平如砥車浙江通志厯方井法華秦亭幾十有八里為南宋駕入禹航洞霄宫輦道臨又靈隱寺有輦路一路砌為城者南宋時為翠華幸也徑山集樓鑰徑山興聖萬夀禪寺記顯仁皇后髙宗皇帝皆常遊幸御書龍游閣扁榜蓀壁清幽圖史安秀生衣袂染秋蘭舊時寫出桃花扇小種歐虞香可餐佩楚軒客談金應桂字一之雅標度能歐書受知賈似道晩居西湖南山中築蓀壁山房左弦右壺中設圖史古竒器客至撫摩諦玩清談灑灑毎肩輿入城府幅巾氅衣望之若神仙然絶妙好詞篔房李彭老商隱寄題蓀壁山房詞調寄髙陽臺石筍理雲風篁嘯晩翠薇髙處幽居縹簡雲籖人間一㸃塵無緑深門户啼鵑外看堆牀寳晉圖書儘蕭間浴研臨池滴露研朱舊時曽寫桃花扇弄霏香秀筆春滿西湖松鞠依然柴桑自愛吾廬氷絃玉麈風流在更秋蘭香染衣裾照窻明小字珠璣重見歐虞南湖老去管風花小部新聲别院誇寒粟香茸有清供銀絲一鼓勝筝琶張功甫玉照堂詞南湖老矣無襟度但尊前踉蹡醉飲紫桃軒襍綴張功甫豪侈而有清尚嘗來吾郡海鹽作園亭自恣令歌兒衍曲務為新聲所謂海鹽腔也誠齋集木犀初發呈張功甫詩憶曽風露飄寒粟自領兒童拾落金為武林舊事約齋桂隱百果淳熈丁未秋余舍所居梵刹爰命桂隱堂館橋池諸名各賦小詩總八十餘首逮慶元庚申歴十有四年之久匠生於心指隨景變移徙更葺規模始全因刪易増補得詩凡數百綱舉而言之東寺為報上嚴先之地西宅為安身攜幼之所南湖則管領風月北囿則娯燕賓親亦菴神居植福以資淨業也約齋晝處以助老學也至於暢懷林泉登賞吟嘯則又有衆妙峰山包羅幽曠介於前六者之間區區安身嗜靜之志造物亦不相負矣或問余曰造物不負子子其惡負造物哉釋名宦之拘囚享天然之快適要當於筋骨未衰時今子三仕中朝顛華齒墜涉筆總無十二旬如之何則可余應之曰仕雖多不使勝閑日余之願也余之幸也敢不勉旃壬戌仲夏張鎡功父書東寺勅廣夀慧雲室真如軒種竹大雄尊閣千佛像奉靜髙堂寢西宅叢奎閣安四朝被賜宸翰用德勲堂祖廟以髙宗御書二字名壑儒聞堂前堂告詞取名現樂堂中堂用朱巖語安閒堂後堂綺賞正亭山水軒瀛巒勝處東北小堂前後山水互亭有四可栁堂花院應鉉齋筮得鼎卦故名法振藻取告詞中名藏宴頤軒有軒亦菴寳千墖鐵鑄千墖經千卷尚如願道場藥師佛壇定傳衣軒寫經寮書華嚴等大乘諸經約齋泰軒煙波觀南湖御風橋十間槎䦘春堂牡丹芍藥汎杞鞠亭北天鏡亭水心幅星舟名鷗渚亭月闕園羣仙繪樓前後十一間下臨丹桂五六十株盡見江湖諸山桂隱諸處總名今揭樓下清夏堂玉照堂梅花四百株碧蒼寒堂青松二百株書艶香館襍春花百餘槮宇修竹十畝水北院對山臨溪界華精舍夢中得名垂撫鶴亭近松株十芳草亭臨池味空亭臘梅雲石髙二丈廣四尺攬月橋容飛雪橋在梅林中十芙容池紅蓮十畝四面種芙蕊珠洞酴釄二五株珍林􅇎果小園村涉趣門總門入松逕衆安樂泉竹間井堂杏花莊酒店鵲泉井名妙峰山詩禪黄寧洞天葉景白軒寘香山畫像并文字臨文光軒臨池書軒杮二十株緑畫軒木犀側俯巢軒髙檜傍三無所要軒讀長不寐軒永摘星軒經餐霞軒櫻桃十餘株易軒詠軒道德凝薰軒聽楚佩軒蘭竹宜雨亭千葉海棠二十株夾流水鶯亭栁邊外滿霜亭橘五十餘株千歲菴仁皇飛白字經恬虚菴徽慿暉亭都徽别館誦度人處經乃宗御書美芝亭漪水湍嵐洞竹施無畏觀音銅像仙澄霄堂面東可登歗臺金巖隱書巖石五書在巖穴中望不可取釣古雪巖蒲新岩有疊翠亭茂林中容十許人坐磯菖澗上小石橋中池養金魚在山澗中不藏丹谷雲珠旒瀑張煎茶磴喜右各有詩在集此係録邁澹墨約齋鎡延湖海之士一日午酌數盃後命左右作銀絲供且戒之曰調和好又要有正味衆謂鱠也良久出琴一張請琴師彈離騷始知銀絲琴弦也調和好調弦也有正味蓋取淵明琴中有正味之意也案張功父園在南湖即今城北白洋池也去國靈芝寓逺坰故人落落似晨星歸來空谷風流甚賸有青山幾疊青四朝聞見録慶元元年韓侂胄欲逐趙忠定因以盡除天下之不附已者名以偽學朱文公去國寓西湖靈芝寺送者漸少惟平江木川李君杞獨從容叩請得窮理之學有紫陽傳授行於世通考纂畧熹登第五十年仕於外僅九考立朝才四十六日記太平清話朱紫陽畫深得呉道子筆法朝野襍紹興巳夘髙宗命召先生乞祠俟滿日赴行在劉忠肅除御史籍溪胡先生赴秘書正字先生以詩寄之云先生去上芸香閣閣老新峩獬豸冠留取幽人卧空谷一川風月要人看又甕牖前頭翠作屏晩來相對靜儀形浮雲一任閑舒卷萬古青山只麽青玉印荒江售釣師御名重識涕漣洏舊傳易運東都事先有爻辭兆德基槎菴小乗淳熈中明州士人過曹娥江見漁叟持巨鯉買得作膾腹中得小玉印有二字不能識以五千得之後為德夀宫提舉佩腰間光堯見之曰汝何以得此具以聞上凄然曰此我故物京師玉冊官鐫德基二字建炎避敵海上誤墮水中今四五十年不意復落吾目坦齋筆衡道君皇帝大觀二年戉子秋八月以易數一一口㐅㐅一乃御製易運碑刻之延福殿東壁其畧曰始建元基髙宗御字德基也曰紹興德夀謂紹興年德夀宫也曰承太乙循運盡在陽九之數髙宗聖夀八十一歲也其後事皆歴驗信乎聖哲先知之明因徃推來在天數者果不可逭歟彛鼎雲雷攷鑒精相傳薛篆與張評煙江莽蒼言司婦劫火消殘百感生張掄紹興古器評紀紹興内府諸器凡二卷掄字材甫南渡故老好填詞應制極其華艶毎進一詞上即命宫人以絲竹寫之嘗同曽覿呉琚軰進栁稍青西江月壺中天酹江月諸篇上極稱賞賜齎甚渥掄曽見汴都之盛毎多感慨惜草堂花間諸選不多録也見評後毛晉跋歴代鐘鼎款識南宋錢唐薛尚功手墓款識之文凡二十卷筆墨冣為精妙其討論有出於博古考古二圖之外者此卷流傳不專一氏迄未有刋本明季南州朱謀垔始序而刻之前有張雨趙孟頫楊伯嵒周密柯九思幹王倫徒泰不華王行周伯温豐坊諸跋字皆題其墨蹟也書嫏嬛記趙明誠幼時其父將為擇婦明誠夢誦一覺來惟憶三句云言與司合安上已脫芝芙草拔以告其父父解曰言與司合是詞字安上已脫是女字芝芙草拔是之夫二字汝殆得能文詞婦也鑒潄玉詞附載李易安金石録後序述購求之始品之精及遭亂後遷移之難散亡之易比再至臨安大畧盡失因序此録以存其名爭來南曲索烟花退舍生多近狹斜不道東風花有主空教分帖野猫家夢粱録散樂傳學教坊十三部惟以襍劇為正色又官妓如金賽蘭范都宜唐安安倪都惜潘稱心梅醜兒錢保奴康三孃桃師兒沈三姐等及私妓如蘇州錢三姐七姐李惜惜鼔板朱一姐媳婦朱三姐吕雙雙十般大胡憐憐婺州張七姐蠻王二姐搭羅丘三姐一丈白楊三媽舊司馬二孃裱褙陳三媽屐片張三孃半把傘朱七姐轎番王四姐火臂呉二媽浴堂徐六媽沈盻盻普安安徐雙雙彭新等後輩雖有歌唱者比之前輩終不如也謂貴耳録成均舊規引試凡先在三等而今在四等之退舍又學舍燕集㸃妓各齋集正出帖子用齋印書仰弟子某人到何處祗直燕集專有一等野猫兒卜慶等充報深雪偶談許左之寓飲妓坊欲狎之妓密有所懽在矣許賦詞云誰知花有主悮入花深處放直下酒杯乾便歸去蓋紹興間籍太學休澣日漫遊酒邊作也一餉湖亭瑤席通春風憶煞舊􅌑瓏城南路接橋南樹聽玉瓏􅋛便不同藏拙藁湖亭席上贈商素詩一曲春風已擅塲淺顰低囀更傳觴令人憶殺香山老舊日􅌑瓏也姓商能改齋漫録有士人不欲書名嘗於錢唐江漲橋為狹邪之游作樂府名玉瓏􅋛云城南路橋南樹玉鉤簾捲香横霧新相識舊相識淺顰低笑嫩紅輕碧惜惜惜劉郎去阮郎住為雲為雨朝還暮心相憶空相憶露荷心性栁花踪跡得得得其後朝廷復收河南士人陷而不返其友不欲書名作詩寄之且附以龍涎香云江漲橋邊花發時故人曽共著征衣請君莫唱橋南曲花已飄零人不歸士人在河南得詩醻之云認得呉家心字香玉窻春夢紫羅囊餘熏未歇人何許洗破征衣更斷腸玉牌狼藉冷香塵小閣空餘佛火新歌斷紅兠楊鐵史桞絲風漾不勝春堅瓠集云梁溪楊仲𢎞載一日遊鳯凰山過宋大内獨步微吟至披香閣扯拾玉牌一事上有詞云内人曉起怯春寒輕揭珠簾看牡丹一把栁絲收不住和煙搭在玉闌干為之憮然瞿佑詩話元廢宋故宫為佛寺西僧皆戴紅兠㡌故楊廉夫宋故宫詩用紅兠為韻名録登科決兆先蛛絲紅硯墨花牽天家結網非無效一榜爭看忠節傳歸愚集紹興戉午五月余與妹夫章道祖待省試於臨安之資國寺所用硯上結成蛛網衆以為登科之祥已而果然公筠廊偶筆宋寳祐四年登科録第一甲第一名文天祥第二甲第一人謝公枋得第二甲第二十七人陸公秀夫忠節萃於一榜洵為千古美談四水先生事退潛蒼華髪冷貌清恬搖思自擅薲洲趣笛譜西鄰一再拈剡源文鈔霅周密公謹與杭楊承之大受有連依之居元受和武恭王諸孫其居之苑籞引外湖之泉以為流觴曲水大受捐其地之西偏以居公謹故公謹亦為杭人半軒集有題周草窻畫像云宋運旣徂杭有弁陽周草窻志節不屈觀其自贊之辭可槩見焉其像藏長洲沈氏絶妙好詞秋崖李萊老寄弁陽翁詞云蒼華髮冷笑瘦影相看如竹四詞綜周密詞名薲洲漁笛譜按鄭元慶湖録云水者湖城以苕水餘不水前溪水北流水合而入於郡霅溪故名四水舊人詩四水交流霅霅聲是也據此則四水乃湖之地名公謹生於湖中年雖遷杭晩仍歸老弁山又號弁陽老人則四水潛夫之號亦猶是耳大滌洞天記杭城癸辛街楊府瞰碧園有茂林修竹之趣小架紅亭碧水環上元明月玉簫閑愁聽穉栁嬌黄後不忍重過昭慶灣霏雪録元帥夏謹齋若水居錢唐西湖之昭慶灣第宅百餘門乃故宋謝太后歇涼亭如眉夀堂百花堂一碧萬頃堂湖山清觀等皆宏麗特甚又架船亭水中毎元夕諸堂皆施五色簾放華燈上下輝映花草粹編湖海紀聞德祐太學生詞云穉栁嬌黄全未禁風雨穉栁謂幼君嬌黄謂謝太后衣冠南渡纂興亡囘憶東都舊事荒澒洞忽吹塵世換濃花淡栁說錢唐玉海王稱上東都事畧百十三卷其書掇取五朝史傳及四朝實録附傳而微以野史附益之野處類藁上東都事畧成書劄子王偁之父賞在紹興中為實録脩撰偁承其緒餘刻意史學斷自太祖至於欽宗上下九朝為東都事畧了竹山詞元夜閱夢華録齊天樂詞云華胥仙夢未被天公澒洞吹換塵世淡栁湖山濃花巷陌惟說錢唐而已南宋襍事詩卷五
