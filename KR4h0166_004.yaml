body:
  text: 南宋雜事詩卷四錢唐符曽撰龍衮宫衣拜玉階乾安樂奏紫雲開潮沙築得平如席五輅新從大禮來武林舊事冬至或元旦有事南郊自嘉會門至麗正門計九里三百二十步皆以潮沙填築其平如席以便五輅往來至期上服通天冠絳紗袍升自午階天步所臨皆藉以黃羅謂之黃道中貴一人以金合貯片腦迎前撒之時壇壝內外凡數萬衆肅然無譁天風時送佩環韶濩之音正如九天吹下也辨陽老人詩云黃道宫羅瑞腦香衮龍升降佩鏘鏘大安輦奏乾安曲萬點明星蔟紫皇臨池太母照鸞叉欄幕休遮秋水涯小住玉田香世界芙蓉尤在卧看佳四朝聞見録北宫與東園最近旬浹間即恭請憲聖臨幸屬芙蓉臨池秀發遂白憲聖請登龍舟撤去欄幕卧看尤佳憲聖欣然從之玉堂宣勸紫金盂秋色偏將山翠餘著就麟臺傳故事白團扇又賜親書石湖集寓直玉堂拜賜御酒詩歸雅陸續墮宫槐簾幕參差晚不開小雨逐將秋色至長風時送市聲來近瞻北斗璿璣次猶夢西山翠碧堆慚愧君恩來甲夜殿頭宣勸紫金杯麟臺故事程俱紹興初為祕書少監時庶事草創托三館舊聞撰為書曰麟臺故事浮溪集序髙宗以所御白團扇親書紫誥仍兼綰黃麻似六經十字以賜汪藻一帖鵝黃印擅竒鼠鬚瘦筆費尋思空餘內府裝褫手何處梅花問玉池輟耕録蘭亭一百十七刻乃理宗內府所藏裝褫作十册每版有內府圖書鈐縫玉池上又京師有鵝黃棗木印又舊梅花新梅花皆刻名太學牢丸細麵溲山厨筍蕨未堪儔諸儒坐飽彭生肉玉楮篇中著意收玉楮集饅頭詩幾年太學飽諸儒餘伎猶傳筍蕨厨公子彭生紅縷肉將軍鐵杖白蓮膚芳馨政可資椒實粗澤何妨比瓠壺老去齒牙辜大嚼流涎聊合慰饞奴武林舊事蒸作從食有太學饅頭翻出遊絲别樣多春蠶一縷奈愁何正書筆力無人繼博得思陵歎九歌攻愧集錢唐吳傅朋遊絲書前無古人云春蠶一縷來不斷石御定書畫譜仲明舉題吳傅朋草書詩鈞筆力歸毫芒得畫禪室隨筆傅朋正書為宋朝第一今觀九歌深蘭亭洛神遺意髙宗洞精筆法至為閣筆歎賞不虛也液雨深宫落葉零暖杯行處疊寒屏御爐新進嚴州炭不用桃紋鵓鴿青夢粱録十月中雨謂之液雨百蟲飲此而蟄不老學菴筆記髙宗幸臨安詔嚴州進炭止用土産用琴樣胡桃紋鵓鴿青多福階前竹一叢慿將妙偈問支公清風淇澳無尋處曲曲斜斜自不同指月録宋杭州多福和尚居多福寺僧問如何是多福一叢竹曰一莖兩莖斜曰學人不會曰三莖四莖曲研咸淳臨安志多福院乾道三年建移請今額三六齋筆記梅花道人一葉竹題云誰云古多福莖四莖曲涼隂生研池清風滿淇澳卷裏光隂客憶家墨梅飄落又天涯旗亭摘句空題遍新體何人愛杏花簡齋集髙宗喜陳去非客子光隂詩卷裏杏花消息雨聲中之句晚年益工旗亭傳舍摘句殆遍題寫號稱新體和容齋五筆崇寧朝時相不許士大夫讀史作詩政後稍復為之陳去非以墨梅絶句擢置館閣絲桐雖博思陵恱日給黃金未足誇有子絶絃教别藝幾年幾世遇官家四朝聞見録琴師黃震後易名振以琴召入思陵恱其音命待詔御前日給以黃金一兩後黃教子乃以他藝人語以爾子不足進於琴邪黃喟然嘆曰幾年幾世又遇這一箇官家黃死遂絶絃云參政門前畫戟枝客來倒屣未為遲爭歌燭影搖紅句見了何如不見時後村詩話嘉定更化收召故老一名公拜參政雖好士而力不能援謂客曰贄而來見者吾皆倒屣未嘗敢失一士外議何如客素滑稽答曰自公大用外間盛唱燭影搖紅之詞參政問何故客舉卒章曰幾回見了見了還休爭如不見賓主相視一笑清秋風月小裴回內苑無人共把杯聊寫一聨詩折簡橘香酒熟待君來四朝聞見録孝宗以太母故加眷吳郡王益益太母弟也秋氣向清聖意怡懌手書御札一聨云稱此一天風月好橘香酒熟待君來命近璫持賜益益入對頓首稱謝上笑曰聊復當折簡耳按此與西湖志所載異五字空題處士墓冷香魂斷喚難回當時若守臨安郡未必清風在鶴梅咸淳臨安志紹興有旨徙僧廬惟處士林逋墓詔勿遷菊潭集和靖墓詩定知魂在梅花上祗有春風喚得醒館老學菴筆記金使自云悟室之孫喜讀書鄧千里之道西湖至和靖祠忽問林公常守臨安耶千里但笑而已蛾雪蟾氷舞萬妝天街燈火數錢唐三更鼓吹聞清禁一笑君王樂歲康惜香樂府探春令元夕詞去年元夜正錢唐看天街燈火鬧蛾兒轉處熙熙笑語百萬紅妝女經鉏堂雜志元夕後三日宣嗣秀王及其諸子宴集夀皇云聞得外間鼓吹喧闐想是民間歡樂秀王云連年豐稔民間稍康所以致此才見貧兒打夜狐禁園鼓吹又喧呼東華門外龍池上埋祟年年果有無夢梁録十二月二十四日後街市有貧丐者裝鍾馗小妹等形敲鑼擊鼓沿門乞錢謂之打夜狐又除夕禁中呈大驅儺儀係皇城司諸班直戴面具著綵畫雜色衣裝手執金鎗銀戟畫木刀劎五色龍鳯旗幟以教樂所伶工裝將軍符使判官鍾馗六丁六甲神兵五方鬼使竈君土地門神户尉等自禁中動鼓吹驅出東華門外轉龍池灣謂之埋祟而散南又云入登平坊沿內城有內門曰東華沿內城面皆殿司中軍立寨名護聖寨寨門外左右俱置護龍水池案登平坊在今清平山巷對可想見宋內城故址也院籜宫桃白露零仙娥遺象翠亭亭空傳敕祭文凄絶縹眇雲中叩玉扃七修類藁云閻妃像在集慶寺按西湖志但云理宗御容一幅仇仁近山村集閻氏園池詩真妃已返鳯臺仙獨立池亭思愴然海嶽不傳青鳥信石房誰伴白雲眠宫桃移種難生實院籜初翻又引鞭凝碧荒涼絃管靜萍花浮滿釣魚船德隨隱漫録姚勉述敕祭閻妃文曰五雲縹眇誰叩玉扃上曰朕雖不德未如明皇之盛也茅山淤塞復開挑一閘長河暫閉潮八尺碧波亭下水清流今得過鹽橋咸淳臨安志茅山河縱復淤塞乃在人户稀少村落相半之中雖不免開淘而土泥有可堆積又長河堰下創置一閘每遇潮上則暫閉此閘則又梅家橋下量得水深四尺碧波亭前水深八尺鹽橋河亦無涸竭之理髮白從來能示老烏髭藥贈自何人笑他狀問箕仙語早向宫中召小陳四朝聞見録光皇春秋已富且又自宫中尹天府入侍重華從容啓上以有贈臣烏髭藥者臣未敢用上語光皇曰正欲示老成於天下何以此為召又今所請仙蓋小陳也光皇尹天府日久遣黃門其父以入上著白絹衫繫小紅絛見陳入避之徐遣召陳黃門設香案金屈巵酒金楪貯生果三飣炷香焚所問狀仙遂降於箕書光皇某年月日有所就黃門持以入出則就以酒勞陳且贈金帛遣出碧玉方池墨一泓秋風拉瑟老蛟橫宋臣自有綦卿在曾識操觚有殺生秋澗集德夀殿玉方池研詩玉斫坤形霮四溟丹書猶認夀宫名紛紛落墨蛟騰霧謖謖秋風拉瑟聲神物不知崑火烈碧絲今對玉堂卿眼中多少興亡事白髮孤臣最愴情自注當時同僚承旨留中齋學士劉東崖侍讀趙方塘皆宋人也上妮古録宋髙宗建炎以巳所常用之硯賜綦崇禮刻御書銘曰操觚濡墨兮中有殺生造次必思兮令世可行筵盞新從赤岸開待他北使賀春來傳宣直到班荆館風藥花餳賜得回武林舊事北使到闕先遣伴使賜御筵於赤岸之班荆館中使傳宣撫問賜龍茶一斤銀合三十兩并風藥花餳噴飯何須強效顰别時無復望車塵不知涕淚楊原仲何似藤州談笑人容齋五筆楊願善佞動作悉效檜嘗因食噴嚏失笑願於倉卒間亦佯噴飯而笑左右皆哂秦察其奉巳愈喜既亦厭之諷御史排擊而預告願涕淚交頤曰太師恩過父母一旦别去何時復望車塵馬足耶放翁題跋李莊簡公為檜逺謫藤州談笑而去青鞋布襪即日便行三處胥山一處雄廟名永固颯靈風笑他義祖閨中配何事仙妃亦濫封間窗括異志嘉興有胥山杭州吳山亦名胥山吳縣亦有胥山其名非一愧郯録中都吳山城隍廟額曰永固理十國春秋注徐溫妻白氏宋宗追封為原闕仙妃端平敗相樂相羊玉帶空傳出尚方日與門生飲酒快祗知風月在漁莊清雋集傳淳祐丁未鄭清之再相鄭震登門罵曰端平敗相何堪再壞天下被執女子俱下獄京尹趙與􅊸縱之鄭罷相乃免賜宋史鄭清之傳上遣中使賜御書輔德明謨之閣楮十萬緍為築室乃日與賓客門生相羊山水間舉又賜玉帶更賜第於西湖之漁莊又方與客飲杯曰今日飲此酒殊快癸辛雜識清之淳祐再相政事多出姪孫太原手昏繆貪汙有作詩譏云先生自號為安晚晚節何為不自安擔無市物纍歸裝日日還家費較量却與載書惟兩篋一般徒步出錢唐鶴林玉露楊誠齋立朝時計料自京還家之費貯以一篋鑰而置之卧所戒家人不許市一物恐纍歸擔日日若促裝者出宋史歐陽守道以言罷歸徒步錢唐唯書兩篋約齋桂隱閉間門接樹栽花法尚存羡殺貴人堂下竹盡將細麥拌陳根遊宦紀聞張約齋種花法春分和氣盡接不得夏至陽氣盛種不得二老堂雜志臨安貴人家種竹木以麥拌土置根下雖盛夏亦生卿冒風霜意不安盛秋之際馭征難繡韉香餅尋常賜祗領官家念苦寒金陀粹編賜鄂王敕卿盛秋之際提兵按邊風霜已寒征馭良苦如是别有事宜可密奏來又十二月大雪苦寒遣詔賜器物宣撫問兼賜御札云戰鞍繡鞍各一對龍涎香一千餅龍茶一合靈寶丹一合鐡簡一對賜卿至可領也搜閲虛勞歲月遲御前册進笑支持僅將婦女神仙語括湊唐人絶句詩四朝聞見録孝宗從容清燕洪公邁侍上語以宫中無事則編唐人絶句以自娛今已得六百餘首公對曰以臣記憶恐不止此上問有幾公以五千首對上大驚曰若是多耶煩卿為朕編集洪歸搜閲凡逾年僅得十之三至於稗官小説神仙鬼怪婦人女子之詩皆括而湊之逮以進御上固知不逮所對數然亦嘉其敏贍亦轉秩賜金帛已見雞竿樹上臺黃旗祗待鶴書開太平萬夀宣恩處滿道鈴聲報赦來武林舊事肆赦日駕自文德殿詣麗正門御樓教坊作樂宫架奏曲簾捲扇開宰臣以下分班立中書令稱有敕立金雞雞竿一起門上仙鶴童子捧赦書降下閣門提點開拆授宣赦舍人起居舍人一員摘句讀宰臣以下再拜俟讀至咸赦除之獄級奏脫枷訖罪囚應諾三呼萬歲而出金雞竿髙五丈五尺四面各百戲一人緣索而上謂之搶金雞先到者得利物呼萬歲諸州奏進院各有遞鋪腰鈴黃旗者數人俟宣赦訖即先發太平州萬州夀春府取太平萬壽之語以次俱發鈴聲滿道都人競觀樓下排列次第有宣赦臺雞夢梁録明禋禮成登門放赦金銜紅幡上書皇帝萬歲乞試同文慟未遭九重震怒𨽻波濤後來奉使中華日憶否宫門白紵袍四朝聞見録歲當大比有黃姓士人率其徒詣闕乞試同文館不報黃以其徒伏德夀宫祈哀太上覬宣諭孝宗德夀以間人不管間事卻其奏黃遂與其徒向宫門大慟且所服白紵袍也孝宗震怒敕有司杖黃背黥𨽻海島黃因竄入髙麗國主用為相後以使事至闕見於孝宗暨其主倦政遂授以國云鶉脯曾供祗候官清詞唱出玉笙寒凄涼老抱東都感猶譜金人捧露盤宋史本傳曾覿字純甫汴人紹輿中以寄班祗侯與龍大淵同為建王內知客老學菴筆記曾純甫問一客蕭鷓巴可對何人曰可對曾鶉脯多覿有海野詞一卷絶妙詞選純甫東都故老詞感慨如金人捧露盤憶秦娥等曲凄然有黍離之感砌下水潺潺玉笙吹暮寒亦純甫詞句緑幔緋簾挂竹義討春遊屐過分茶牡丹水餅丁香角踏遍湖堤問杏花夢梁録開沽店門首綵畫歡門設紅緑杈子緋緑簾幕貼金紅紗梔子燈廳院廊廡花木森茂大凡麵食店謂之分茶店更有絲雞麵桐皮麵皮又六部前有丁香餛飩此味精細又有牡丹餅薄春繭笑靨兒門宋稗類鈔湧金外有杏花園醮設天台空奏章乞兒火冷盡荒涼於今樹倒猢猻散不似平江周一郎老學菴筆記檜初得疾遣李季設醮天台行至天姥嶺下遇一士問曰為太師乎曰然曰徒勞耳季遂歸時談藪曹泳侍郎妻碩人厲氏餘姚大族女方泳盛鄉里奔走恐後獨碩人之兄厲德斯不然泳怒帥越時德斯為里正泳風邑官脅治百端竟不屈會之甫殂乃遣介致書於泳啓封乃樹倒猢猻散賦一篇沅武林舊事弄猢猻人平江周一郎猶盧溪集雷雨湘振滯冕皇恩普出九重天乞兒戀權門火應謂死灰能復燃刺申王作轔轔月馭上青冥流落人間有石經還驗中宫璽文在始知憲聖擅蘭亭中興小録吳后嘗臨蘭亭帖佚在人間咸寧郡王韓世忠得之表獻上驗璽文知為中宫臨本賜保康軍節度使吳益刋於石時紹興十五年秋七月丙寅本四朝聞見録髙宗御書六經嘗以賜國子監及石於諸州庠上親御翰墨稍倦憲聖續書至今皆莫能辨愛得清言畫手工至今繪苑遡餘風緑荷障子臨秋水一穗疏花上草蟲朱昱毗陵志於清言晉陵人工畫荷花獨步一郡寧宗朝以荷花障進特旨授承節郎圖繪寶鑑嘉定間清言專畫荷花草蠱世號於荷唱徹杭州更不回玉壺春賞遍樓臺遺民空掬中原淚猶説河流天水來宋稗類鈔謝處厚有誰把杭州曲子謳之句國老學菴筆記淳熙中河決入汴謂之天水來天水姓也遺民以為恢復之兆誰信君王嗜學竒筆痕墨滓遍淋漓才臨五百蘭亭本更寫香山秋水詞益公題跋白詩有秋水淅紅稻朝煙烹白鱗蓋於飲食默寓忠愛不忘君之意孝宗每愛書之三百餘年重遇聖明發揮可老學菴筆記髙廟臨蘭亭賜夀皇於建邸後批云依臨五百本來看兩宫篤學如此十年間味梅花詠一日春風楊栁愁俱是可人詩賈禍不如同泛北山舟後村集劉克莊詠落梅東君謬掌花權柄却忌孤髙不主張讒者箋其詩以示柄臣由此間廢十載集中有贈陳起詩陳候生長繁華地却以藝香自沐薰鍊句豈非林處士鬻書莫是穆參軍雨簷兀坐忘春去雪桉清談至夜分何日我間君閉肆扁舟同泛北山雲案春風楊栁陳起事詳見第六卷注中又賣書者别有小陳道人為賈似道編管一編小説奉升平德夀間消永日清笑喚何人來演史穆書生與戴書生武林舊事德夀宫演史有穆書生戴書生玉花挼碎泛春壺開謝春風夢蕊珠二十五枝香冉冉緑雲晴雪遍南湖朝天續集觀張功甫荼蘼詩有香雪南湖今誰有碎接玉花泛春酒武林舊事約齋北園有蕊珠洞植荼蘼二十五株産圖吉位用生方宫婢宣來踏逐娘先日申聞學士院淨除胎髮撰文章武林舊事宫中有娠令太醫宿直供畫吉位生方合用藥材催生物件又令踏逐老娘伴人乳婦抱洗女人淨又申學士院撰述胎髮祝夀文小學源流識者稀桃菜災栁卯辨纎微舍人手指雲萍録協字偏旁果是非湘煙録洪景盧周茂振入館謝啓云桃菜難悟栁丣本同閔康侯曰荀子幬菜敝而不反其常注菜讀為災古文篆卯字讀當為栁豫遊宦紀聞包遜字敏道在臨安謁魏舍人了翁蒙進因出雲萍録令書包有六子皆從心其間名協者舍人指曰此非從心乃是從十有館客李丈留心字學待為叩之少選李至遂及此云其義有二從十乃衆人之和是謂協和萬邦之協從心乃此心之和是謂三后協心之協李名肩吾眉人妙案肩吾有詞見絶好詞左右江湖駐蹕初鬱攸飛燼少安居休言兩火兼三火自是臨安火政疏楓窗小牘紹興二年五月大火被燬一萬三千餘家皆以為中興之初改元建炎致此但臨安撲救視汴都為疏目白獺髓紹定初御街中瓦前賣團子者為三火下店遂為失火之讖昭慶鐘樓竹影斜坡公手迹舊籠紗誰教粉墨移京口燈暗長廊起暮鴉二老堂雜志西湖昭慶寺有鐘在樓上東坡寫竹尚可辨竹下題云夫子方明弼康道嘉甫子瞻同遊庚午八月日題豫紹興庚辰往觀則已茫昧後移往鎮江府謝后功德院不復可見靜佳集昭慶寺詩幽尋得勝趣城市幾人能古栁深中磬長廊盡處燈畫龍聽説法塑佛看齋僧别寺經行遍兹遊昔未曽貴妃久矣返星軿猶有香魂屬望仙露重月斜凝立處玉梅花影淡如煙異聞總録咸淳間遊士胡天俊於梅樹下得一白羅帕上題詩云蕭蕭風起月痕斜露重雲鬟壓玉珈望斷行雲凝立久手彈珠淚湔梅花胡明日以帕示人趙氷壺駭曰吾亡妾杭人喬氏望仙貴妃姪女也去年暴亡殯梅樹下此正其筆迹也花邊無事蔟狨鞍乘轎都城許從官最稱踏青流水步繡裙挂在隔簾看雲麓漫鈔故事百官入朝並乘馬自渡江後方乘轎迄今不改竹屋癡語御街行賦轎云筠藤織就花紋細稱穩步如流水踏青陌上雨初晴嫌怕溼文鴛雙履要人送上逄花須住才過處香風起裙兒挂在簾兒底更不把窗兒閉紅紅白白簇花枝恰稱得尋春芳意歸來時晚紗籠引道扶下人微醉芙蓉髙閣倚層嵐兵氣休侵酒半酣暗浥龍巾兩行淚幾人回首望江南吳淵穎集理宗在宫中嘗被酒上芙蓉閣見淮上有黑䘲十餘年不散南逼江凄然淚下地下鉛筒黯淡秋赤松何處伴同遊他時雖逐圖南去説著蒼生祗益愁朝野遺紀嶽飛之斃於獄也獄卒隗順負其尸葬之北山之漘及其死也謂其子曰異時朝廷求而不獲必懸官賞汝告官曰棺上一鉛筒有棘寺勒字吾埋殯之符也後果購其瘞不得以一班職為賞其子始上告官悉如所言天七修類藁金陵士人召仙得詩云風露凄凄雨過疏窗有月到牀前夜深不作紅塵夢注得南華四十篇又云強金擾擾我提兵血戰中原恨未平大厦已斜支一木豈期長腳誤蒼生二人乃陳摶嶽飛寶墨叢奎四軸餘史家恩敕等瓊琚內官亦有金絲扇隨駕今朝盡賜書乾淳起居注淳熙五年太上賜史少保御書四軸隨駕宫人內官並賜金絲御書扇紅粉青襟盡北征昨宵丞相已書名秀才揀去將何用也與宫人合隊行水雲集有北師要討撒花銀官府行移逼市民丞相伯顔猶有語學中要揀秀才人又有三宫今日燕山去春草萋萋上玉階怡悵孤山第一春墓田處士有比鄰也知諫草名傳世空把梅花問故人深雪偶談秋壑送朝客詩頸聯云梅花見處多留句諫草藏來定得名宋稗類鈔賈似道别於西泠之外架樓臨之曰第一春梅塢氷盤角黍浴蘭時內司爭先雕刻竒亦有彩金紗盝子一枝通草貌天師楊太后宫詞角黍氷盤飣豆裝酒闌昌歜泛瑤觴或夢梁録浴蘭令節內司意思局以紅紗彩金盝子菖蒲或通草雕刻天師馭虎像於中老秦筆意授雕兒遂壞紅羅嶽字旗可惜東松菴壁上一行遺墨見淋漓宋史凡論人章疏皆檜自操以授言官識之者曰此老秦筆也桯史飛以紅羅為幟上刺嶽字秋崖小藁嶽飛帖王之討楊么也公過師吾里留題東松菴壁上老墨飛動忠義之氣如所謂同後軍王團練者蓋後來告變之王雕兒也野遊時到白雲堂麋性隨圓復就方贏得句傳山鳥起巖花衝落半溪香四朝聞見録恭孝儀王嘗遊天竺有山禽忽驚起衝落半巖花之句嘗自贊其容有性比山麋貌同野叟隨圓就方似無唯有云云蓋敘其推戴事也死葬西湖顯明寺天竺志天竺有白雲堂朝朝絃管戲春湖看過春風二月無獨有金橋垂栁色不曽寫入燕遊圖西溪梵隱志金四姥橋垂栁獨盛志雅堂雜鈔理宗有燕遊圖一軸曽入摛文備講筵賜氷支酒自年年明朝禁宿供宣訪又費餐錢日一千楊太后宫詞有翰林學士知誰直今日傳宣與賜氷玉堂雜記隆興初用正宗故實輪講筵學士院官直宿禁林每夕兩員以備宣引咨訪氷又翰林支快行家食殘三千又折酒錢三百别賜一擔若寓直支餐錢一千限日下支不許次日以南宋宫殿記摛文殿在玉堂之後東西二閣處詞臣和寧門外雨如塵遊騎歸來滿眼春雪色海鮮都上市却隨花果及時新古杭夢遊録自大內和寧門外新路南北寶玉珍異及花果時新海鮮野味竒器天下所無者悉集於此玉柵燈懸異巧名佳人遊賞遍春城歸來幾日間拋過又試東風絃管聲稊米集孤山寒食詩最憐隱者髙眠地日日春風是管絃夢粱録元宵牛羊司前有內侍蔣苑使家粧點亭臺懸挂玉柵異巧華燈女又公子王孫以紗籠喝道將帶佳人美遍地遊賞雪花吹浪過西陵今夜清遊興未曽載月小舟仍似舊有人江上吊詩僧攻愧集詩舊聞老具擅詩聲夜泛錢唐向鳯城今日清遊更豪逸雪花和月帶潮生自注法具字圓復紹興初詩僧也有月夜遊錢唐江詩云小舟為我載月色白沙翠竹光相射后復云白下金陵四百年無此豪逸老喚詩人薦得名寺前覔句寫間情晚雲涼雨吹應遍合轉橋東玩月行朱文公大全集同僚小集梵天寺坐間雨作已復開霽步至東橋玩月賦詩二首有層雲生薄晚涼雨遍空山之句朱又孝宗時侍郎胡銓以詩人薦同王庭圭內召故子自注詩云僕不能詩平生僥幸多類此已却村酤禁酒牌何須欄稅更安排欲尋栗里髙風處祗見春花落御街西溪梵隱志西溪留下西南三里有宋人禁酒牌即髙宗入山村酒肆喜其供奉精潔御書界牌以賜曰不為酒稅處是也後為陶家廂理宗朝有陶處士隱此水竹田桑夫耕婦織有栗里之風皆山川幽寂之處也置續文獻通考孝宗淳熙五年知臨安府吳淵乞復西溪發引欄稅上曰去城五十里豈可復置欄稅行張渢禁酒牌詩芳草承騎春花落御階染洗宫花敕字新鬻來猶帶舊家春可憐六尺青綾誥淚濕殘綃換帖人晞髮集有洗舊誥綾鬻將以為緣以紺繒易得之作手卷賦小樂章求好事者書其後詩曰吳宫輦路傷行客繭氷壓雲凝碧色門前新掃染家鄰借人鋪設殘衣帛宫花翦綾連院號覆取翻看成一道織紋宛轉敕字新知是初誰六尺誥城霞失彩宫蘚病中與海圖上衣領改顔幸售緣所遭褪藥玄香洗藍影青綢易得淚承睫擊築楚歌無故業歌殘求書好事人異代倘傳誥綾帖車駕蒼黃南渡日可憐應乏濟時才請看不識錢唐事猶頌東巡二月來老學菴筆記建炎三年春車駕倉卒南渡有侍臣陳劄子首曰恭惟陛下歲二月東巡狩至於錢唐吕相笑之曰秀才家不識時務萬緡宣賜遭時忌老去逄官是畏塗不用再看磨鏡帖蚤將居里釋麟符玉堂雜記御史王綸草劉婉儀進位貴妃制太上稱其有典誥體潤筆殆萬緡賜硯尤竒秦丞相不樂遭論列而去周必大嘗草其致仕制曰少則歌鹿鳴而薦於鄉老則釋麟符而居其里宋稗類鈔潘良貴少有氣節數忤權貴自少至老出入三朝在官不過八百六十日居不蔽風雨無尺寸之田有磨鏡帖行於世世以為名言自號默成居士心經一頌意云何百萬僧齋願豈多頑石更將鐫作佛莫言只解畫彌陀橫浦集錢唐喻氏子生不茹葷少妙畫學吳道子臻其能後專畫阿彌陀佛無為子楊次公喜之呼為喻彌陀為兒時嘗誦心經立願齋僧三百萬遊西湖多寶山輒作念曰異時當鐫此為佛其後遂為彌陀之像鹵簿圖成出北門贐儀丐得向南奔蜀王曽為頭顱計莫望西州掩淚痕四朝聞見録吳曦既用賂師旦遂舉全蜀以授之其在殿巖也常命工圖畫上乘輿鹵簿卷軸甚詳人問曰大尉何用此曦紿之曰把歸去教孩兒看了消災滅罪及出北關遂焚香拜天於鷁首云且得脫身歸去其反狀已萌於此矣遣宋史程松以書抵曦丐贐禮買舟稱曦為蜀王曦吏以匣封致餽松望見大恐疑其劒也亟逃奔使者追及松不得已啓視之則金寶也松乃兼程出峽西向掩淚曰吾今獲保頭顱矣烏巾山滿雪中花佳茗還將鬬玉芽恰自鼎湖龍去後錫塘誰訪白枇杷咸淳臨安志枇杷出於黃嶺前烏巾山小錫塘塢尤珍白色者上黃次之亦間出佳茗又淳熙間德夀宫嘗密遣人採訪惟烏巾山下汪氏廬前一本實大而味勝歲倍直以酬之又鼎湖即臨平山下藕花洲也賜食曽蒙出上方自緣身領膳曹郎絶知禁臠人間少異品空思細頸羊劒南集中秋書懷詩秋風社散日平西餘胙殘壺手自提賜食敢思烹細項家庖仍禁劈團臍自注昔為儀曹郎兼領膳部每蒙賜食與王公略等食品中有羊細頂甚珍豫近以惡殺不食蟹古玉簪圖舊刻成蘭亭貌出賺書生攜來竟貨錢唐市金錯猶題後主名蘭亭考古圖寫人物一軸唐右丞相閻立本筆狀賺書一段事書生意氣掦掦有自得之色老僧口張不呿有失意之態其狀如生紹又此圃江南庫所藏簪頂古玉軸猶是舊物又興元年七月望有攜此貨於錢唐郡人吳説得之見謝伋言舊有大牙籖後主親題刻其上云上品畫蕭翼籖報國翻成去國哀棄官肯許掖垣回如何鑑水龜堂老晚為南園撰記來誠齋集韓托胄築南園屬誠齋為記許以掖垣曰官可棄記不可得托胄權日盛遂憂憤成疾家人不敢進邸報適族子自外至言托胄近狀萬里痛哭呼紙書曰姦臣專權謀危社稷吾頭顱如許報國無路惟有孤憤别妻子筆落而逝記宋史陸遊傳晚年再出為韓托胄撰南園閲古泉見譏清議又常自稱為龜堂老子一朝鸞馭報歸期因識環環偽帝姬多被番人笑顔子怪他宫事教尼師四朝聞見録柔福帝姬徽宗女自金奔歸自言于上上憫之遂以髙士㒟尚主及韋太后北方歸持上袂泣未已遽曰奇被番人笑説錯買了顔子柔福死已久上以太母之命置姬於理獄具誅之東市柔福自聞太后將還鸞馭即以病告嘗以尼師自隨或謂此尼曽事帝姬故備知疇昔帝姬俱上在宫中事偽帝姬引見之日呼上小字尼師之教也京師顔家巷髹器物不堅實故至今謂之顔子生活三朝北盟會編韓世清敗劉忠於蘄州得一婦人自稱柔福帝姬小名環環手裊紅旗蹴白波翻頭若作等間過天街鼓樂迎歸後爭向尊前唱浪婆夢梁録八月潮怒勝於常時十八日帥座出郊教習水軍抗人有無賴之徒以大綵旗小青涼傘紅緑小傘兒各繫色繡段子滿竿伺潮出海門百十為羣執旗泅水以迓子胥向有前軍作弄潮詩曰弄罷江潮晚入城紅旗颭颭白旗輕不因會喫翻頭浪爭得天街鼓樂迎又云車駕幸禁中觀潮殿廷下視江中水軍教閲整肅部伍望闕奏喏聲如雷震其日帥司備牲禮草履沙木板祭於江中士庶多以經文投之禁殿風傳臚唱聲宫花紅處認頭名若教畫竹呈官卷誰與今年賀滿城貴耳録淳熙間省元徐履殿試用卷子寫竹一枝題曰畫竹一竿送與試官老學菴筆記陳亞今年新及第滿城人賀李衙推吳山避寇劇披猖簪珥無遺但淚妝若少侍晨雙篋贈廉郎沒興作徐郎揮麈後録廉宣仲布建炎初自山陽避寇南來攜巨萬至臨安寓居吳山下陳通等亂悉為劫掠不遺一簪宣仲昔與侍晨道士時若愚遊至是聞在賊間姑往訪之授以兩篋令二校防護出關趨霅川依曽空青泊僧舍宣仲張子能之壻外祖戲曰君正是沒興徐德言矣超然館裏歲華深盛有文心鄧牧心但覔賞音償宿願一生餘得伯牙琴武林耆舊傳云鄧牧字牧心錢唐人隱大滌山人稱為文行先生所居有超然館宴坐纍月不出時時作詩文以自娛其著有洞霄記遊山志雜文橐有都穆鐵網珊瑚錢唐鄧牧心先生生於宋世之季文數十首名曰伯牙琴荒涼九曲到叢祠忠武空勞有賜碑昨夜魂歸秋水觀不堪重現嶽家旗朝野遺記嶽侯卒於大理寺獄獄卒隗順負其尸出踰城至九曲叢祠中故至今九曲五顯廟尚靈輟耕録鄭元祐為嶽武穆王修祠墓疏賜墓田於棲霞嶺下建祀祠千秋觀西雲薖淡墨臯亭山伯顔取宋屯兵處方伯顔兵至是夕大雷電伯顔望見四山旌旗閃爍皆作精忠嶽家字伯顔宰牲為文告祭祭訖風雷乃止臨嶽侯傳侯中毒而死葬於安菜園內六更夢醒閲興亡瀛國秋風兩鬢霜因記華山陳處士紙錢無處是錢唐貴耳録真宗問陳摶國祚靈長之數陳奏云過唐不及漢紙錢使不得處數百年前巳先知止錢唐之讖渡元朝文類封瀛國公制王磐撰有云戈船競而天塹無慿鐡馬長驅而松關失險云云鳯舄霞裳翦霧開一聲清蹕八鸞回將軍會揖單于去親奉瑤池阿母來誠齋集題曹仲本出示譙國公迎請太后圖詩中有翠華黃屋從天降一聲清蹕萬人看輦中似是瑤池母鳯舄霞裳翦重霧將軍元是一縫掖忽攘兩臂挽五石長揖單于如小兒奉歸急輦如折枝紹興元祐事粗疏日厯參教玉牒餘不及開元表遺録太平留得有傳書困學紀聞紹興重修哲宗實録獨元祐八年事皆無存者參取玉牒日厯諸書以足之僅得成書中興後事紹興八年至二十五十年最為疏略內又孝宗問周益公云唐孫樵讀開元録雜報數事有宣政門宰相與百僚廷諫十刻罷編檢新舊唐史及諸書並不載益公奏太平御覽總目內有開元録一書祖宗朝此本尚存近世偶不傳耳容臣博加詢訪鏤將書印散中都七寶猶藏誥語無點筆一揮江上事邊風吹起九思圖逸民史王忠民當髙宗渡江劉豫僭立作九思圖及定亂四象逹之金主及鏤板印圖散於偽境以明大義紹興三年翟宗薦其忠節授宣教郎詔遣至行在忠民上疏辭以誥置牘中藏七寶山下力懇求去酒樓唱徹隔牆聞千乘花紅一色雲椎髻烏衣小龍女新傳歌譜玉華君林下詞選紹興間都下酒肆中有道人攜烏衣椎髻女子買斗酒獨飲女子歌詞以侑云朝元路朝元路同駕玉華君千乘載花紅一色人間遙指是祥雲回望海光新或記之以問一道士道士驚曰此赤城韓夫人所製水府蔡真君法駕導引也烏衣女子疑龍云垂老三橋卧旅樓梅花無語替人愁一宵飛去鸚籠在勝雪何緣似玉榴癸辛雜識别集方回字萬里號虛谷徽人也寓杭之三橋旅樓有二婢曰周勝雪劉玉榴方遊金陵寄二婢於其母周姬之家恣開杜陵之門勝雪者為豪客挾去方歸悵惋作詩有鸚鵡籠開綵索寬一宵飛去為誰歡之句先是方為庶官嘗賦梅花百咏以諛賈相龍尾金花識御顔五雲猶帶斫痕班如何硯亦論遭遇祕閣宸書一字頑春風堂隨筆宋謝墍知徽州於舊坑取石貢理宗初坑上常有五色雲氣如錦衾隨雲所覆處斫之老學菴筆記祕閣有硯思陵御書一頑字因謂之準敕頑硯隂陽雙柏翠光濃孤直何心貢九重曲竹只生安隱院管城子合受斜封太平清話南渡髙宗時髙麗國進隂陽柏一株僅二尺許每歲左花則右實右花則左實咸淳臨安志安隱院在臨平山南地生曲竹林次麟詩直節稜稜是此君耳孫却以曲為名首陽山下知難種只可斜封向管城載礫填窪尚典型北山仍與接南屏惠卿毁後潛增築依舊沿隄有九亭咸淳臨安志蘇公隄郡守吕惠卿奏毁之運又咸淳五年朝廷給錢命守臣潛説友增築載礫土填窪益庳通髙二尺袤七百五十丈廣皆六十尺沿隄舊有亭九亦治新之仍補花木數百本東坡詩六橋橫絶天漢上北山始與南屏通一簇紅鸞扇影遮景靈歸去擁如霞羣臣醉盡沾春色頭上風吹羅帛花夢梁録嘉定四年十月十九日降旨遇大朝會聖節大宴及恭謝回鑾主上不簪花又倐遇聖節朝會宴賜羣臣通草花遇恭謝親享賜羅帛花又詩曰景靈行駕到和寧頭上宫花射彩雲歸向慈嚴誇盛事誓殫忠力報吾君南薰廣殿戞風鈴馬逺曽圖淺色屏絶笑螺屏填十事鹿磯月峽夢難醒寓意編好事家藏宋馬逺畫南薰殿淺色屏障獻癸辛雜識别集王橚為螺鈿屏風圖賈相十事以曰度宗即位南郊慶成鄂渚守城月峽斷橋鹿磯奏捷草坪決戰安南獻象建獻嘉禾川獻嘉禾淮擒孛化隆祐鸞車已上仙攢宫初建謂當然誰憐伊洛諸陵寢有似錢唐向趙田東齋紀事隆祐太后升遐朝廷欲建山陵兩浙漕臣曽公卷謂諸帝陵寢今存伊洛不日復中原即歸葬矣宜以攢宫為名僉以為當原經鉏堂雜志趙子固向伯升錢唐二佳士其先太人攜家南渡各有中原田契兩籠其初日望恢復慿契復故業至今七十餘年竟成無用粉墨應須尚雅馴畫中草草最通神試看嗜酒梁風子減筆能將伏院人圖繪寶鑑梁楷嘉泰年畫院待詔賜金帶不受挂於院內嗜酒自樂號曰梁風子院人見其精妙之筆無不驚伏傳於世者謂之減筆海道空教寫作圖不堪南庫盡荒蕪璽文還驗當時篆玉紐雙龍記有無元祕書志王士點商企翁祕書監關到物件有杭州海道圖一軸又收致寶四顆皇帝行寶白玉雙龍紐一顆上帶紅絨縧系欽崇國祀之寶青白玉五螭鈕一顆光堯夀聖憲天體道性仁誠德經武緯文太上皇帝之寶蒼玉實碾螭紐一顆上有舊黃絨小縧系宋皇帝寶象牙素紐一顆上有裂璺白紗巾拭淚痕多半臂分明念九哥空寄金鐶人不見奈他蝴蝶鬭飛何北狩見聞録徽廟出御衣之襯一領俗呼背心又索於懿節邢后得所帶金耳鐶子一隻上有雙飛小蝴蝶俗名鬭髙飛云是今上皇帝在藩邸時製以為的驗及皇太后信令曹勛見上奏之詔誥丁寧且泣且囑曰無忘吾北行之苦又以拭淚白紗手帕子付臣曰見上深致我思念淚下之痛拂石曽經御坐來易安齋裏賦詩回春風吹瘦橫斜影上番先探青蒂梅四朝聞見録光堯親祀南郊因過易安齋為賦梅巖孝宗和云秀色環亭擁霽霞原闕水艷數枝斜束君欲奉天顔喜故遣融和放早花髙宗嘗問主僧云此梅喚作甚梅僧對曰青蒂梅又問曰梅邊有藤喚作甚對曰萬歲藤稱旨賜僧階上嘗拂石而坐至今謂之御坐石能傳車輅劉宗古善寫天神胡彥龍鯨海風波中興業不圖坐右作遺蹤畫繼劉宗古宣和間成忠郎亂後歸江左朝廷方尋訪車輅式而宗古進本稱旨除提舉車輅院事圖繪寶鑑胡彥龍善畫人物天神紹定畫院待詔有雲麓漫鈔建炎三年航海幸台州祥符寺今壁間詩云黃帽當年駕舳艫東浮鯨海出三吳中興事業風波惡好作君王坐右圖斷橋月即短橋時夜夜荷風度栁絲蕩漾香魂向何處試聽順受老人詞花菴中興絶妙詞選吳禮之字子和錢塘人有順受老人詞五卷王生陶氏月夜共沉西湖賦霜天曉角吊之云連環易缺難解同心結癡騃佳人才子情緣重怕離别意切人路絶共沉煙水闊蕩漾香魂何處長橋月斷橋月橋按西湖志本癸辛雜識載王陶事但云都人作長月短橋月以哀之不記全篇且不知作者姓字得此可以補之短橋花菴本作斷橋是斷橋可名短橋也亦前此所未聞龍井松風鶴夢涼水聲人語近僧廊風流最是淳熙日尚有東坡植海棠靖逸小藁秋日遊龍井詩引道煩雙鶴攜囊倩一僮竹光杯影裏人語水聲中不雨雲常濕無霜葉自紅我來何所事端為聽松風海二老堂雜志壬午三月已亥酌龍井入夀聖寺有棠一株蓋蘇公手植者摺扇無多一握慳宫紗新弄玉連環誰教楊妹親題字蜂趕梅花落碎班耆舊續聞摺骨扇詞云宫紗蜂趕梅寶扇鸞開翅數摺聚清風一捻生秋意搖搖雲毋輕裊裊瓊枝細莫解玉連環怕作飛花隊今於湖集載此詞來春風堂隨筆今世所用摺扇亦名聚頭扇南宋以詩詞咏聚扇者甚多豫收得楊妹子所寫絹扇面摺痕尚存夢梁録小市周家摺揲扇鋪蓴絲春貢點薑芽筍劚黃鶯餉內家還有宫厨生菜美鏗然寒齒嚼梅花會稽續志湘湖貢蓴羣咸淳臨安志筍之類有黃鶯筍貓頭筍哺雞筍芳譜宋憲聖后每治生菜必於梅花下取落花雜之册后儀文詔翰林制詞應費幾番心官家潤筆須矜貴先賜黃金二百金武林舊事册皇后儀先一日宣翰林學士鎖院草册后制詞賜學士潤筆金二百兩次日官聽宣布皇后三辭不允太史局擇日行册立禮池上金魚䇿䇿遊落花如泛碧溪流紛然萍草交回處解道紅蟲飼此不鼠璞南渡駐蹕王公貴人園池競建豢養之法出焉有金銀兩種鯽魚金鰍時有之金餐為難得魚子多自吐吞往往以萍草置池上待其放子撈起曝乾復換水復生魚黑而白始能成紅或謂因所食紅蟲而變中又六和塔寺後池有此魚如金色打馬圖成賦更工蕭蕭竹粉一番風長篇紀事尤竒絶題贈行人赴紫濛打馬圖李易安著并撰賦一篇雲太平清話莫廷韓云向曽置李易安墨竹一幅麓漫鈔李易安有才思其詞已版行於世他文少有見者其上樞密韓公工部尚書胡公詩序云紹興癸丑五月兩公使金通兩宫也易安父祖出韓公門下見此大號令不能忘言作詩各一章以寄意以待採詩者云上韓公云三年夏六月天子視朝久凝旒望南雲垂衣思北狩如聞帝若曰嶽牧與羣后賢寧無半千運已過陽九勿勒燕然銘勿種金城栁豈無純孝臣識此霜露悲何必羮捨肉便可車載脂土地非所惜玉帛如塵泥誰當可將命幣厚辭益卑四嶽僉曰俞臣下帝所知中朝第一人春官有昌黎身為百夫持行足萬人師嘉祐與建中為政有臯夔漢家畏王商唐室尊子儀是時巳破膽將命公所宜公拜手稽首受命白玉墀曰臣敢辭難此亦何等時家人安足謀妻子不必辭願奉天地靈願奉宗廟威徑持紫泥詔直入黃龍城北人定稽顙侍子當來迎仁君方博信狂生休請纓或取犬馬血與結天日盟上胡公云胡公清德人所難謀同德協心志安脫衣已被漢恩暖離歌不道易水寒皇天久隂后土濕雨勢未回風勢急車聲轔轔馬蕭蕭壯士懦夫俱感泣閭閻婺婦亦何知瀝血投書干記室天生性氣同虎狼不虞預備庸何傷衷甲昔時聞楚幕乘城前日記平涼葵丘踐土非荒城勿輕談士棄儒生露布詞成馬猶倚崤函關出雞未鳴巧匠何曽棄樗櫟芻蕘之言或有益不乞隋珠與和璧只乞鄉關新信息靈光雖在應蕭蕭草中翁仲今何若遺氓豈尚種桑麻敗將如聞保城郭婺家父祖生齊魯位下名髙人比數當時稷下縱談時猶記人揮汗成雨子孫南渡今幾年漂流遂與流人伍欲將血淚寄山河去灑東山一壞土契丹國志紫濛契丹地名晉慕容氏自云有熊氏之裔邑於紫濛之野案方虛谷稱紫濛為契丹館名誤也海錯江珍聚玉京百年王氣怒潮平誰憐抗論陳同甫蚤以三分著史名豹隱記談嘉熙中吳潛論錢唐建都以隂陽家言海門巽水蚤晚兩朝後為潮沙湮塞殆天啓國家以轉移之機也文獻金源洛水塵建炎留得趙家春一篇帝統遵王命猶有龍南著集人羅鄂州集有帝統論一篇言光堯內禪事文多不載餘冬序録金之髙陵楊興宗史不著名元裕之記其當宋渡江而著龍南集以見正統之所在不以身之所生而自限也可謂卓識之士案後楊廉夫正統辨其説本此南宋雜事詩卷四
