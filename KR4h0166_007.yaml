body:
  text: 南宋襍事詩卷七仁和趙信撰帝都繡錯列山川警蹕初聞鳯詔傳從此六飛臨幸後七朝都屬太平年葛灃帝都賦序云錢唐據東南之都㑹號天下繁盛之樂土山川之秀麗井邑之浩穰人物之豐景槩之美考按圖籍見於前人之稱述備矣因摭其大略總而賦之淵鑑類函宋髙宗定都臨安詔曰昔在光武之興雖定都於洛而車駕徃返見於前史者非一用能奮揚威靈遞行天討上繼隆漢朕甚慕之朕荷祖宗之休克紹大統夙夜危懼不常厥居比者巡幸建康撫綏淮甸既已申問邊圉奬率六軍是故復還臨安内脩政事繕治甲兵以定基業非厭雨露之苦而圖宫室之安也遂定都故今以臨安府為行在所曰朝野襍記髙宗六飛至錢唐觀表裏江湖之勝嘆吾舍此何適吕頤浩上言曰金人專以聖躬為定今駐蹕錢唐足避其鋒矣帝意遂決人皆以偏安責秦檜不知實頤浩成之也艮山門外曉風尖玉輦低遮錦軟簾佳處但從東麓望一方新緑畫春奩宋史紹興十二年玉輅成前有横軾後垂錦軟簾歲寒堂集艮山東麓南渡宸遊看新緑之處青燈如豆夜書開蒸餅嘗教市得來著就公餘詞一卷落花縈草憶簫臺北窻炙輠云姚進道在太學日毎夜必市兩蒸餅未嘗食明日輒以飼齋僕同舍皆怪之子韶問曰公所市蒸餅不食徒以飼僕何耶進道曰固也某來時老母戒某之學中夜間饑則無所得食宜以蒸餅為備某雖未嘗饑然不敢違老母之戒也市之如初進道名述堯華亭人所著有簫臺公餘詞詞綜作錢唐人名見咸淳臨安志進士表電窻窈窕燭花明蓮漏傳籖已四更輾卷不知雙目痛親持玉管賜佳名揮麈後録髙宗諭宰臣云王某所進兵制甚佳朕連夕觀為目痛賜其書名曰樞庭備檢玉輦當年幸翠岑親書小字是泥金紫駝尼裏樗蒲錦貝葉傳來盡梵音湖山勝槩髙宗嘗幸薦福寺呉太后手書金剛經有楊太后跋及髙宗御書心經並刻石藏下天竺靈山墖下内齊東野語思陵妙悟八法訪求法書名畫故紹興府所藏不減宣和其裝褾裁制各有紫駝尼裏樗蒲錦褾清賞堂前按管絃至尊偏喜杏花天教坊嘌唱無由入供奉空傳何總憐南宋故都宫殿記翠寒堂萼緑華堂環秀堂清賞堂齊東野語太皇冣知音極喜歌木笪人者以歌杏花天遂補教坊都管伴藝流供奉志嘌唱賺色何總憐陳伴施二娘兩囘斤斧赦蒼官淮海新詩動玉鸞從此月波亭上望緑隂仍作畫屏看靈隱遺事靈隱寺僧元肇號淮海寺有古松大數十圍與月波亭相對史彌逺遣人伐松淮海作詩云大夫去作棟梁材無復清隂覆緑苔惆悵月波亭上望夜深惟有鶴歸來山房隨筆穆陵在御閻貴妃父良臣起香火功德院欲於靈竺下伐松供屋材淮海又作詩曰不為栽松種茯苓祗縁山色四時青老僧不為移松去留與西湖作畫屏詩徹於上遂命勿伐佳䜟昭然可不疑歡聲父老望旌旗仁和門外江東道馬首聞呼趙不衰揮麈後録髙宗自建康避入浙東至蕭山有列拜於道側者揭其前曰宗室趙不衰上大喜曰符兆如此吾無憂矣立是時選御舟篙工有趙畢勝之䜟黄閣優閒塞責餘千函日攬四方書緘題併字如忘却逺道空勞使者車宋史紀事本末陳自强為相言路阨塞有泛論君德時事皆取其陳熟緩慢略無攖拂者言之或問之則愧謝曰聊以塞責耳干又陳自强貪鄙四方致書餽必題其緘云某物若併獻凡書題無併字則不開内使龍茶宣賜囘班荆館為使臣開湖山景物家鄉地幾度迎風喚筆來武林舊事北使到闕賜御筵於班荆館傳宣撫問賜龍茶一觔銀合三十兩入蜀記班荆館者北使宿頓及賜燕之地距臨安三十六里可桯史施宜生閩人也有僧相之曰面有顴骨可公卿子身之毛皆逆上且覆腕然則必有合乎此而後可貴也龜山僧介之北不數年仕至禮部尚書時盟好方堅而諜者傳逆亮調兵之事無虚日金來賀正旦宜生為使至天竺語館使張燾曰今日北風甚勁又取几間筆扣之曰筆來筆來於是始大警三顧頻煩運幄籌令公帳下領兠鍪笑他帶汁南奔日還憶軍中借木牛龍洲詞贈殿帥郭杲云細栁營開團花袖窄人指汾陽郭令公案杲倪侂胄黨開邉時統兵北伐者宋稗類鈔嘉泰開禧間郭倪位殿巖自謂卧龍復生酒後輒詠三顧頻煩兩朝開濟陳景俊為軍漕讌之曰木牛流馬則以煩公既潰自度不復振對客泣時彭法傳師在坐曰此帶汁諸葛也雲龕居士老詞人唫得官梅托興新不忿開遲怨風笛酒邊記唱漢宫春小學紺珠南渡三詞人李邴汪藻樓鑰也二能改齋漫録李漢老建炎末自簽書樞密遷知院三月而罷為梅詩托意云綿霜歴雪忿開遲風笛無情抵死吹鼎實未成心尚苦不甘桃李傍疎籬玉照新志漢老少日作漢宫春咏梅膾炙人口所謂問玉堂何似茅舍疎籬是也政和中王黼為相忽招至東閣開宴出其家姬十數人酒半唱是詞數日有館閣之命案邴號雲龕居士任城人紹興初參知政事卒謚文敏小歩宫門日影殘青青楊栁望中寒行朝臨遍蘭亭石得似先皇墨未乾蘭亭考紹興初遣中貴衞茂實交河南地界是時講好之初使人徃來中都宫闕尚容觀瞻衞因與同事趙彦恬遍歴其間至一閤壁庋上有小匣徽皇御筆題云正定武蘭亭整有十軸遂置其匣袖之以歸使囘各藏其一餘皆上之九重世珍珠船紹興乙未六月思陵常臨褉序賜刻劉光子堯仁進之孝宗親洒宸翰於後敢矜紅斾笑儒酸緑鬢青衫蚤聽宣擬得䇿題學士院内批左藏賜餐錢玉堂襍紀試文多在學士院内侍省差官一員充監門前一日學士宿院進䇿題候内批依次早乃引試支左藏庫錢三十緡充餐錢周必大以秘書少監寓直翰苑發䇿嘗賦詩寄程同年云當年給札踏金鑾重到依然九月寒學士䇿詢學士䇿秘書官試秘書官自憐緑鬢非前度尚喜青衫總一般寄語浙東程閣老莫矜紅斾笑儒酸牡丹秋影曉霏微自賞湖光近釣磯還與蘇隄漚鷺約不將五組易蓑衣江湖長翁集詩春光陸續委東流看到湖邊安石榴更與蘇隄漚鷺約辦舟來賞牡丹秋自注俗目芙蓉為秋牡丹五雲莊四六餘話周益公謝宫祠表曰晨趨鳯闕綰組之光華夕侣漁舟披一蓑之藍縷降封麻卷閤門通熟狀親承鎖院中儤直自來知制誥詞頭日日看屏風玉堂襍紀内封名色不一儤直時或未詳其體院吏必以片紙録舊作於前謂之屏風兒又几鎖院或親被㫖或受熟狀即關閤門閤門即報御史赴文德殿聽麻麻卷自内出宣贊大聲擿首尾詞及堦位姓名下數句并所除之官而讀之不盡宣也莊嚴雕飾紙衣僧蓼葉芹花滿鉢稜一自翠華行幸後袈裟金縷伴禪燈四朝聞見録觀音髙五丈本日本國僧轉智所雕轉智不御煙火止食芹蓼不衣絲綿常服紙衣號紙衣和尚髙宗偕憲聖嘗幸觀音所憲聖制金縷衣以賜之及挂體僅至其半逐再製衣以賜案五丈觀音在龍山勝相寺紹興誰念舊封疆黄閣歸來錢滿囊愛殺當時髯吏部裝成千載墨猶香宋稗類鈔渡江後吕元直作相堂厨每㕔日食四千至秦㑹之當國毎食折四十餘千於是始不㑹食又胡忠簡作字勁挺孝宗曰卿寫字宛如卿為人得卿紹興戉午所上封事真跡太上與朕玩久之太上曰留為後代式其後為檜批抹汙漬者多朕啓太上令工逐行裁去裝褙之矣二老堂詩話胡邦衡多髯初除吏部郎官或以髯吏部為戲長日空教掩竹扉雨泥融浄燕初飛劇憐春盡無憂館乙乙楊花欺客衣朝天集都下無憂館小樓春盡旅懐二首病眼逄書不敢開春泥謝客亦無來更無短計消長日且遶闌干乙百囘不關老去願春遲只恨春歸我未歸冣是楊花欺客子向人乙乙作西飛延風揖月鎮從容西掖揮豪不再逄贏得竹絲胎髮樣即今同受管城封玉楮集試廬陵賀發竹絲筆詩此君素以直節名延風揖月標韻清何人心匠出天巧縷㭊毫分勻且輕居然束縛復其始即墨紆朱封管城世門官爵豈必計且幸一家同汗青太平清話宋時有雞心筆檀心筆小兒胎髮筆猩猩毛筆鼠尾筆狼毫筆詔咸淳臨安志張彦實掌制誥楊原仲並居西掖誥多張與之潤色閒戲成筆一絶云包羞曽借虎皮䝉筆陣仍推作鋒未用吹毛强分别即今同受管城封原仲以為誚已愬於秦檜罷為宫祠蕊官宣喚按新歌爭捲珠簾踏舞鞾春到十三門裏路内宫齊著縷金羅楊太后宫詞新翻歌譜甚能竒宣索蕊官入管吹又聞道蕊官三十六美人爭為捲珠簾心史宋行在十三門色談薈宋時宫人多以麝香縷金羅為衣裙嬾向橋邊問得仙一篷秋雪晩漁天歸來迷却蒹葭里暫就僧房借榻眠西溪梵隱志紹興間有老翁自言姓朱不火食能前知品度蒼然坐橋而化故曰得仙又宋南障湖俗呼河水亦名渦水又曰蒹葭深處沙岸縈迴秋深荻花如雪故其地又名秋雪隨隱漫録度宗御製晩望詩鷗鷺歸烟渚秋江挾晩晴老漁閑艤艇坐待月華生新聲歌罷半含顰兠褁花枝别樣春一盞鶴飛消渴露軟屏風底笑夫人南宋相眼周子充之侍妾曰芸香姓孫氏錢唐人淳静謹畏精於女工頗能為新聲事公於行在所時年十七而夢粱録有一等貧家父母兄姊所倚老惟色可取奩具茫然議親者以首飾衣帛加以諸物送徃謂之兠褁居說略周益公有鶴飛盞注酒則鶴飛乾則滅韋聽輿周益公夫人妒有媵公盻之夫人縻之庭公過之當暑媵以渴告公以熟水酌之夫人窺於屏曰好個相公為婢取水公笑曰獨不見建義井者乎只管催歸歸計無杜鵑早已呌西湖如何月夜天街上撥盡琵琶唱鷓鴣明詩綜昔宋南渡李御史粹伯菩薩蠻詞云杜鵑只管傕歸去知渠教我歸何處蒙泉詩藁三月十六日西湖聞杜鵑詩云辟榖未能那廢食買山所欲尚無錢咸淳臨安志乾道四年臣僚言今都人静夜十百羣吹鷓鴣撥琵琶使一人黒衣而舞衆人拍手和之道路聚觀不可不懲詔從之一枝芍藥倚東風讀得詩書正後宫縱有迎康天賜兆都縁貴相産重瞳談薈髙宗皇后呉氏父呉近常夢至一亭曰迎康旁值芍藥一枝獨放一花花下白羊一隻后以乙未生髙宗為康王時選入宫新朝野襍記呉皇后京師人也年十四入宫少長封興郡夫人上自海道還進才人又進婉儀時邢后在朔庭後宫惟后與婉儀為上列而后讀書萬卷翰墨絶人自是寵遇日至顯仁太后來歸明年遂正位宫壼致南宋相眼洪邁云顯仁本㑹稽人紹聖蘇丞相頌仕居丹陽有老婢韋出家為尼嘗給事蘇丞相其妹即顯仁也初攜登頌榻通夕遺溺不已頌曰此甚貴非此能住宜攜以入京㑹哲宗擇室女二十人分賜諸王顯仁在選入端王宫曁即位才一幸而生太上𢎞簡録韋太后開封人崇寧中入宫為侍御得幸夢神投胎遂生髙宗沙岸波光積翠鋪風標公子下菰蒲不知春曉西湖上染出南山黛色無清河書畫舫劉松年西湖春曉圖派髙宗御題劉松年畫紈扇詩南山晴翠入波光一溪聲繞路長最愛早春沙岸暖衮風輕浪拍鴛鴦荷葉如錢三月時幅巾藜杖一追隨爾來勝事知多少惟有風標公子知帝姬金屋自風流奩具封章孰與儔一種貧家深巷女落花滿地不知愁却埽篇政和間采周之王姬之稱而改公主曰帝姬郡主曰宗姬縣主曰族姬公主之號建炎初復之朝野襍紀故事宗女適人皆内侍與有司主之以昭穆益疎乃給奩具然有司不時給宗女貧不能行多自稱不願適者觀又凡宗室封女之制使相女封淑人節度使碩人察使令人等身亡皆任子孫一人不見文章立墓門牧牛亭上泣奸魂東窻事犯須臾事夜半猶然憶子孫佩韋齋集秦檜為相恬權恃援沮復仇之議誅殺勲舊誣䧟忠良死之日詔撰神道碑士大夫無肯執筆者蓋山堂肆考檜墓在建康墓上豐碑矻立不鐫一字當時士大夫鄙其為人兼畏物議故不敢立神道碑忠野客叢書金陵牧牛亭秦檜丘壠在焉有移忠旌兩寺相去五里金碧相照揚誠齋過之題詩於壁雲邁淡墨岳侯之獄以檜妻王氏一言而死有押衙何立者檜命徃東南第一峰勾幹恍惚人引至隂司見夫人帶枷備刑楚毒難堪語立曰告相公東窻事發矣押衙復命言其事檜憂駭數日亦死按丘氏遺珠有方士伏章見檜與万俟卨俱荷鐵枷檜屬方士曰可煩傳語夫人東窻事發矣此說與此不同雞鴻慶居士集載秦檜之跋後山集後有云病起聞唱不寢書此以付塤堪按塤堪秦檜二孫也松柏青青繞券臺麪棋彩段紙錢堆拜墳兒女悲霜露莫向菩提拭淚來乾淳歲時記祀先例用時果彩段麪棋又程氏遺書拜墳則十月一日拜之感霜露也寒食從常禮祭之飲食則稱家有無聲滄洲集菩提寺詩一畆方塘幾劫灰哭聲未了笑催六橋煙栁相逄處半是菩提拭淚來自註菩提寺臨安人火葬之地按寺在錢唐門外今廢紫花羅服稱風流花散東風暖氣浮莫使蚤梅欺晩杏一般春色有清愁淵鑑類函宋髙宗紹興二年賜呉益紫花羅公服賦林下詞選梅嬌杏倩俱宋呉七郡王姬工詞翰常詞相謔梅嘲杏滿庭芳云杏花何太晩遲疑不發等待春深杏嘲梅滿庭芳云梅花何太早蕭疎骨肉葉密花稀菱角香薫紫繡裾瑤津小艇採芙蕖花前坐賭長歌罷贏得寒光水玉魚稗史彚編慶元呉監稅菱角香乃不假印手捏而成乾淳起居注淳熈六年三月太上太后並乘步輦官裏乗馬遍遊園中再至瑤津西軒入御筵物談薈南宋宫人有寒光水玉魚係楊太正潤肺湖上清遊佛子家粉雲酥雨壓楊花今朝妙出春風手六一泉烹雙井茶清苑齋集孤山寒食詩二月芳菲在水邊旅人消困總隨縁晴舒蜨翅初勻粉雨壓楊花未放綿朝天續集以六一泉煮雙井茶中有句云細叅六一泉中味故有涪翁句子香重門鐵葉鎖金環只戀鉤春桺幾彎如此江山亭在否精能圖上看名山呉越備史抗城凡七十里門凡十皆金鋪鐵葉用以禦侮諸門皆有星橋惟艮山門獨無無懐小集湖上觀栁偶記龍泉先生勾春栁一絲之句感而有述云斷槎無葉又無枝得似勾春栁一絲不是畫舩棲泊處白鷗飛下立多時此七脩類藳杭城舊有如此江山亭在呉山天望觀乃宋遺民有為而作也清河書畫舫王維精能圖在紹興秘府前有思陵御題乾卦紹興小璽按精能者名山之目也宜雨亭邊趂晩隂春風流水海棠林酒闌睡醒圍千葉人在紅雲無處尋武林舊事張功甫衆妙峰山内有宜雨亭種千葉海棠二十株夾流水誠齋集觀張功甫園中海棠有約齋妙出春風手人在中央花四旁驅蝗無法老農嗟䆉稏風香稻試花賽社不須祠莽將滿塍新水聽鳴蛙脚氣集朝廷禁捕蛙以其能食蝗也徃居易録南宋劉漫塘宰為蝗神劉金壇人有專祠祀之則蝗不為災俗呼莽將錦塢山中花滿川雲煙四壁畫前賢遊人不盡傷今昔遙望孤山放鶴仙咸淳臨安志建炎初始建錦塢菴紹興二十一年額治平寺有閣三間面揖孤山扁曰煙雲四壁舊畫古賢像今尚存李鄴侯白文公趙清獻張忠定范文正蘇文忠諸公像芸籖玉榜落枯蟫秘省龍章品再三鈿匣金題誰拾得盡隨花鳥散江南松隱集新建秘書省呈李秘監詩道山賢範久推藏聖德重興接耿光招隱稍來周俊造紬書行見漢天章掛簷玉榜昭新渥揷架芸籖識舊香喜見諸儒在天禄嘉謨應欲贊時康筆叢宋淳熙中聚書至四萬四千八十六巻陳騤等四庫書目後屬璔益至五萬九千餘卷中興館閣續録南渡後秘閣所藏徽宗御題畫三十一軸百又圖畫一百八十七軸御府續行降付并舊藏九十一軸嘉定三年并用都堂印仍於畫背用秘書省印又名賢墨蹟一百二十六軸一冊續行降付八十九軸竹廊風細裊茶煙御餅龍文宫女煎昨夜外臣貢新茗金奩拜賜紫雲鮮瀛奎律髓梅聖俞建溪新茗詩有云粟粒烹甌起龍文御餅嘉註南渡後宫禁嬪御日所飲用即此品姚氏殘語紹興進茶自髙文虎始一洺水集茶詞歲貢來從玉壘天恩拜賜金奩春風朶紫雲鮮明月輕浮盞面想見清都絳闕雍容多少神仙歸來滿袖玉爐煙願侍年年天宴莫把杭州作汴州山河牛角為誰謀西湖水石無情況縱少蘆花也是秋彛堅志金人南侵髙宗奔杭有人題詩呉山子胥祠云遷杭不已思閩廣牛角山河日入尖四朝聞見録髙宗六龍未知所駐觀錢唐表裏湖山之勝嘆曰吾舍是何適𢎞簡録黄㽦嘗從郭雍朱熹學熹深期之累官大理寺簿憤時不樂閒行西湖慨然嘆曰我昔在南北山一水一石無不品題今無復情況何耶日稊米集湖亭之勝大似江上但無蘆葦二月二十移植數千本詩云大年著色山前雨摩詰無聲句裏秋已是湖山無限好更栽蘆葦伴輕鷗晝長紅紫競含芳繡錦亭邊鬬草忙妃主一時齊掩口輸他内侍嚼生薑乾淳歲時記二月一日中和節排挑菜宴預備花斛上植生菜薺花諸品以金箆挑之賞則珠玉金銀罸則唫詩念佛飲冷水吃生薑以資戲笑故都宮殿考有綉錦亭七揷髙鬟茉莉花茜雞䗶雁巧筵奢樓中妝㸃嬌兒女荷葉新裁半臂紗乾淳歲時記茉莉初出之時其價甚穹婦人簇帶多至七揷所值數十券不過供一餉之娱耳又乞巧小兒女多衣荷葉半臂設茜雞䗶印鳬雁水禽之類試罷尋春上翠樓雙鬟半軃聽歌喉燭花紅篆揮毫處從此佳人喚狀頭夷堅志洪邁試詞科出院同試者五人至抱劍街娼孫小九家置酒於小樓而燭結花若連珠孫曰今夕燭花呈祥其為登第可證願各賦一詞洪詞臨江仙有云釵頭小篆燭花紅直須將喜事來報主人翁桂月十分春正半廣寒宫殿匆匆姮娥相坐曲欄東雲梯知不逺平歩躡東風果奏名得第手把青芝說舊恩雪香亭畔掩啼痕宫花零落收銀鑰卸下歌妝出禁門談薈南宋宫人有青芝雙虬如意是六朝宫人所遺禁扁有花光亭雪香亭雲泉詩集寄行宫監門王以道詩云玉鉤簾外前朝栁鬭鴨闌邊小艶葩莫道君王不曾問好收銀鑰䕶宫花朝野襍記李王二才人俱明艶髙宗愛之及上賓憲聖毎見之常感愴孝宗聞之特許自便空王不管有情痴一晌貪歡醉酒巵揾盡深閨兒女淚玉釵何處寄相思玉照新志張安國春日諧友遊西湖至普安寺於窻戸間得玉釵半股青蚨半文想是遊人歡洽所分授偶遺之者各賦詩以紀其事王明清詩云凄涼寳鈿初分際愁絶清光欲破時紅燈緑幕近黄昏幾醉藍橋風月罇新樣杏花髙髻子衣香綷䌨進歡門武林舊事元夕諸妓夜賣各戴杏花冠兒危坐花架又諸色酒名呉府藍橋風月夢粱録食店門首以枋木及花樣沓結縛如山棚窻牖皆朱緑五綵裝飾謂之歡門思陵八法果堪珍絹本親披草洛神閱古堂中十二帖笑他婢又學夫人清河書畫舫思陵洛神賦絹本大行草書後署德夀宫書玉照新志米元章帖十二册各以其類為册如手簡家書詩文各分類聞是韓侂胄故物中間韓魏公家園池詩各有閱古珍玩大印其後歸史衛王府人雪舟脞語婢之婢世謂之重臺羊欣書似婢學夫米芾學欣書故髙宗謂米字為重臺思陵八法事見前絶皇明文徴聶大年髙宗遺墨詩摩挲五十四驪珠勝滕王蛺蝶圖惆悵彩雲飛不盡至今遺恨滿西湖拘没皆歸南庫藏須還御筆煥天章宫亭西畔悲家市瓦屋江州是故鄉金陀續編本部據江州申見在岳飛田産屋宇等有人承佃田三頃一畆地九十一畆水磨二所廊房草瓦屋共一百五十一間岳家市見今只存六十間地基屋宇共二百九十間奉聖㫖令給還又前後被受御筆手詔無慮數百章不幸為權臣厚誣悉被拘没今聞見在左藏南庫架閣比䝉詔太常議謚而本家别無文字可以稽考欲望朝廷給付本家參考庶使子孫久逺珍藏奉聖㫖令左藏南庫搜檢給還玉楮集初還故居詩元是廬山莫逆交宫亭西畔著衡茅盟鷗似怯經新浪怨鶴還知宿故巢一沼種蓮衣可製萬竿脫籜杖輕敲不須海若猶然笑乞與杯堂樂芥㘭台星朗耀紫垣中賢牧堂前像巳工衮冕師王生意在栁洲更與坐龍宫雙槐歲抄㑹稽郡治有賢牧堂趙師􅋷帥浙東使門吏陳詞乞増已像四朝聞見録湧金門栁洲龍王祠帥臣趙師􅋷重塐五王旒冕珪服畢具其中三像一模韓侂胄一模陳自强一模師􅋷時韓陳猶在臺臣惟於疏中及師􅋷自貌其像不敢斥韓陳云上又開禧時政府惟有陳自强居相位民謡謂之天台星少人間宣幹多孤峰西轉水東流風月臨平動客愁幾處桑麻邨舍外漁姑多住藕花洲咸淳臨安志臨平山上有墖有龍洞細礪洞有天井下有東嶽廟景星觀峙立兩旁又有藕花洲即鼎湖也水沈金部汝諧詩有山勢分明飲鼉孤峰西轉鬱嵯峩之句故宫忍見舊冬青一墖如山雪涕零欲訪影魚香骨案更從何處叩英靈槎菴小乗至元間得南國有總統者發掘先宋江南陵寢其間金寳不可勝計取梓宫中尸體置於故宫殿基上建石墖壓之以厭勝江南人凢宗廟神主人民版籍皆置於其下髙一十三丈解酲語西僧楊璉正伽啓掘宋帝諸陵寢徽宗陵得走馬烏玉筆箱銅涼撥繡管髙宗陵得正珠戱馬鞍光宗陵得交加百齒梳香骨案理宗陵得伏虎枕穿雲琴金猫睛為徽龍肝石為軫緑玉磬楊貴妃物度宗陵得五色藤絲盤影魚黄瓊扇柄按元史楊璉正伽為江南釋教總統發掘故宋諸陵之在錢唐紹興及其大臣衆墓几一百一所内殿傳來宴近臣酒酣歌罷笑宫嬪當前欲乞詞人筆香霧輕飄解領巾齊東野語孝宗内宴酒酣内人以帕子從曽覿乞詞一團寒月白鱗鱗太史占來上瑞新後苑已圖耕織事民間又見踏犂陳近異録慶元間季冬二十夜月如初出時臨安嘉興人皆見其團如望太史奏是為上瑞其地當十年大稔訪玉海景德二年内出踏犂式付河北轉運使令詢民間可用則官造給之又紹興中樓璹畫耕織二圖四十五事為五言詩四十五章髙宗召對以進呈宣示後宫定帖初來彩盒呈筵前冣喜寳釵横含情一樣春閨女多少羞容受壓驚夢粱録伐柯人兩家通報擇日過帖各以色綵襯盤安定帖然後相親又如新人中意即以金釵揷於冠髻中名曰揷釵又若不如意則送綵緞二疋謂之壓驚則姻事不諧矣酒衣簇蓋盡銷金綵幣紅羊報吉音鬚掠巾環相答外一罇魚水用心深夢粱録媒氏徃女家報定加以雙羊牽送以金缾酒裝以大花銀方勝紅綵銷金酒衣簇蓋酒上又女氏即於當日囘定禮以珠翠鬚掠皁羅巾段七寳巾環又用金銀打造魚箸以綵帛造像生葱雙株掛於魚水罇外妓樂迎來㯶轎前雙擎寳鏡照團圓兒童拾果攢花斗爭乞攔門利市錢夢粱録至親迎日借官私妓女及樂官鼓吹引迎花檐子或椶檐花籐轎前徃女家迎取新人又尅擇官執花斗盛五穀豆錢綵果望門而撒小兒爭拾之謂之撒穀豆以壓青陽煞耳又樂官妓女互念詩詞攔門求利市錢車又新人下車一妓女倒朝行捧鏡青花氊上歩紅蓮佳兆乗龍跨錦韉百子帳中看合髻綵絲雙結兩心聯夢粱録新人下車左右女使扶持而行踏青氊花席上先跨馬鞍背平枰而過又男左女右結髮名曰合髻綰又禮官請兩新人出房叅堂男執槐簡掛紅緑綵同心結倒行女掛於手面相對而行謂之牽巾塗金貼套蜜油缸還送花冠鵞蛋雙親串三朝餪女後並肩絮語坐紗窻夢粱録三日女家送冠花緞鵞蛋以金銀缸兒盛油蜜頓於盤中四圍撤帖套丁膠於上又女家或於九朝内移厨徃壻家致酒謂之餪女㑹歲晩西廬冷不禁風餐雪嚙惱詩人清寒仙境非人世何處能囘晹谷春誠齋集左藏南庫西廬下紙閣負暄戲題左帑大禁清寒非人間有也而庫官孔仲古汲季承史伯載心匝天功剏一火閣不薪不炭煖亦非人間有予以小晹谷名之且賦絶句水衡仙客任氷天雪嚙風餐更禁烟不是移來小晹谷老夫凍折兩詩肩案左藏庫在清湖橋銀榜恭書幸翠華玉壺私酒愧官家三千庫米都蠲却一任東風轉栁花老學菴筆記德夀宫德夀殿皆夀皇御書旁署臣某恭書四字桯史右正言袁孚論北内有私酤光堯怒孝宗諭曰太上怒甚昨日方宴太上賜酒一壺親書德夀私酒於上思陵録四月庚辰國忌行杳運司令承受奏每糴米五千石内二千石御前酒庫三千石德壽酒庫内批德夀宫三千石更不供納遂申中書省照㑹望武林舊事夀皇承歡兩宫楊誠齋詩云長樂宫前翠華玉皇來賀太皇家青天白日仍飛雪錯認東風轉栁花白練分馳滚畫毬毬門髙築殿西頭芙蓉秋晩誰先得爭唱紅旗第一籌玉海淳熈四年命閤門稽太宗朝擊毬典故仍先習儀詔擊毬御朋是日三少使相執政已下各分朋侍立上擊過毬門囘馬御殿皇太子以下稱賀周續資治通鑑淳熈四年九月閱蹴毬於選德殿必大年譜同宰執赴芙蓉閣觀擊毬内宴選德殿有御製詩昊穹垂佑福羣生涼德惟知監寺成禾黍三登占叶氣簫韶九奏播歡聲未央秋晩林塘靜太液波閑殿閣明嘉與臣鄰同燕樂益脩庶政答丕平宋史有司除地東西為毬門加以采繢承㫖二人守門衛士二人持小紅旗唱籌御龍官錦繡衣持歌舒棒周衞毬場東西建日月旗教坊設龜兹樂於兩廊鼓各五閤門預定分明狀取親王近臣駙馬都尉以下悉預服異色繡衣左朋黄襴右朋紫襴烏皮鞾冠以華揷脚折上巾天廏院供馴習馬帝乗馬出教坊大合涼州曲馬皆結尾内侍發金合出朱漆毬擲殿前通事舍人奏云御朋打東門帝擊毬教坊作樂奏鼓毬既度颭旗鳴鉦止鼓帝囘馬從臣奉觴上夀貢物以賀始命諸王大臣馳馬爭擊毬門兩旁置繡旗二十四而設虚架於東西堦下每朋得籌即揷一旗架上以識之帝得籌樂少止從官呼萬歲羣臣得籌則唱好得籌者下馬稱謝又有歩擊者乗騾驢擊者時令供奉者朋戲以為樂云武林舊事築毬左軍一十六人毬頭張俊蹺毬王憐等特設山林髙士寮常從講易問逍遙一朝杖履紅塵去琴韻松風久寂寥四朝聞見録孝宗聖性超詣尤精内景時詔山林脩養者入都寘之髙士寮人因稱之曰某髙士有謝髙士以從臣薦講易於宫中孝宗問以老莊之學易如剛冣後灑掃髙士堂亦稱髙士無甚異惟善於趨謁陸三山因齋宿升宫扣其廬有三蒼童對奕聞松風間有琴絲棋奕聲陸公心羨何異神仙扣童願見髙士童答以髙士已出去某御藥處陸因歎曰髙士亦見御藥耶笑而出髙似孫真誥序云易如剛太乙宫髙士也號玉京外臣歌吹年年豐樂樓春晴三十六梯遊千官墖下題名姓風景依希似汴州湖山勝槩豐樂樓為朝紳同年㑹拜鄉㑹之地鴨絶妙好詞韓疁浪淘沙豐樂樓詞云裙色草初青鴨波輕試花霏雨濕春晴三十六梯人不到獨唤瑤箏艇子憶逄迎依舊多情朱門只合鎖娉婷却逐彩鸞歸去路香陌春城刻江左十五子詩註煙霞洞口千官墖南渡諸臣姓名初開棘院立新科别取名流博學多底事分經誇蕊榜傳來謬種竟如何日知録髙宗立博學宏辭科凡十二題制詔誥表露布檄箴銘記賛頌序内襍書六題分為二場每場體制一古一今南渡以後得人為盛多至卿相翰苑者宋史各房分經始於理宗紹定二年又理宗朝有司命題茍簡發䇿用事訛舛所取之士既不精數年之後復命主文時謂之謬種流傳天章燦爛半山霞白石清泉有道家誰到永和尋石鼓多從水甕看桃花咸淳臨安志臯亭山寧宗御書三字為扁有崇善靈惠王祠名半山廟旁有水甕及桃花塢又敖陶孫詩樵路縈連入翠微清泉白石可忘機雲中犬吠劉安過樹杪春深望帝歸又桐扣山在臨平山之西晉武帝時岸壊出石鼓擊之無聲張華取蜀桐木刻作魚形而扣之聲聞數里抱拙小藁市井蕭條景物非居人猶號永和堤永和堤即臨平驛路燦錦亭前瀹茗香即看百戲列迴廊影花扇底招關撲分取金錢松子量乾淳起居注乾道三年三月車駕與皇后太子過宫起居二殿訖先至燦錦亭進茶夢粱録大街關撲如漏塵扇柄異色影花扇勝老學菴筆記市人有以博戲取人財者每博必大號松子量不知何物語也九仙有夢順人情臚唱傳來互有名魚雀不同松栢貴自然公自不如卿湧幢小品陳僕射俊卿謁九仙祠問功名夢仙曰前程在黄公度口陳過黄黄曰我狀元子榜眼陳曰何尊已而卑人黄曰然則狀元爾榜眼我廷試黄果元陳榜眼髙宗曰卿上何竒黄曰披綿黄雀美通印子魚肥陳曰地瘦栽松栢家貧子讀書髙宗曰公不如卿改陳為元堂花看罷冶遊歸去逐西畻燕子飛衫紫紛紛裁御愛鬬將春色上春衣癸辛襍識有馬畻堂花紫燕翼貽謀録中興以後行都貴錢皆衣黝紫以赤為御愛紫無敢以為袍衫者獨婦人以為衫褑爾栁堤紅舫宣魚户煖殿春燈㸃蟹胥聞道民間供汎索菌丁昨夜又新除蟹譜嘗見監御厨王染院云御食經中亦有煮蟹法但不常御賜命則進又錢唐置魚户蟹户專掌捕魚蟹時玉楮集蟹至正月重出謂之看燈蟹州夢粱録非取喚謂之汎索菌譜合蕈産於台嘗進上標以台蕈上遙見誤讀合蕈因承誤既充苞貢遂以此冠於諸菌桃栁春工費主持妄遭蒲縳笑無知横行介士風流甚西子湖頭作判司夷堅志步司將狄訓綀五更至錢湖門覺有物觸其足取視則一巨蟹長三尺形模怪醜命卒執送於家坐假寐夢一人長髮容貌可惡淡緑袍軟幘黒鞾烏犀帶持手版揖曰某乃西湖判官月課曽遺政府羞當時穢德有箕裘斬新節帖開言路湖上平章十六秋宋史紀事本末以陳自强為右丞相言路阨塞每月按舉小史一二人謂之月課又似道既相引薦奔競之士又引外戚子弟為監司郡守進倡優奉帝為遊燕臺臣有諫者宣諭使裁去謂之節帖忠肅公集賈平章故第詩豪華汩没幾星霜廢宅空遺孔道傍鼠跡印塵盈故榻燕巢經雨落空梁紫雲影斷人千古金谷花殘夢一場世事興衰只如此啼鴉不必怨斜陽當年富貴付猴形飲博場中幾醉醒相法若應為大守可無萬里嘆彾行齊東野語賈似道少日有人善相一日來值其跣卧因嘆惜再三私語客曰相公貴極人臣而足心肉陷是名猴形恐異時不免有萬里之行少又徐謂禮自誇閱人多竒中與賈似道為姻賈年荒於飲博其生母胡夫人苦之扣徐云君相法言之何如徐曰夫人勿多憂異日必可作小郡太守曽因神馬駐三軍香火南來第一勲廟貌忽為丞相怒居民空自殺王雲南渡録髙宗徽宗第九子也封康王靖康之變質於金與金太子同射康王三矢俱中以為此必揀選宗室之長於武藝者冐名為此留之無益遣還換真太子來髙宗得逸奔竄疲困假寐於崔府君廟中夢神人曰金人追及速去之已備馬於門首康王驚覺馬已在側霜蹄霧鬛昻然翹立躍馬南馳既渡河而馬不復動下視之則泥馬也此宋稗類鈔髙宗至磁州宗忠簡假神道以止之曰有崔府君廟甚靈可以卜珓有馬更顯應遂入燒香其馬啣車輦等物塞了去路遂止不徃一日北使來秦檜出接少憇廊廡上告以故檜曰余以為功今都歸功於神恐不便即日毁之宋史紀事本末王雲副康王使金宗澤迎曰肅王一去不返大王復去何益願勿行王出謁嘉應神祠雲在後民遮道諫王勿北去厲聲指雲曰正賊也因執雲殺之宗考湖州府誌南潯南柵建炎二年金人陷楊州髙南幸金人追之帝至潯懼追者見及匿嘉應神祠中月下俄見泥馬忽動跨之而行遂入杭州舊封康王寺今褒能教寺俗呼康王寺按髙宗從未至湖州此載或恐有誤外案顯應觀祀崔府君在湧金門乞將主簿玉雙瓶瀹水風前上雪亭飲取第三春貢好解從官栁醉微醒平園集周必大胡邦衡生日以詩送北苑八胯日鑄二瓶曰賀客稱觴滿冠霞懸知酒渴正思茶尚書八餅分閩焙主簿雙瓶揀越芽妙手合調金鼎鉉清風穩到玉皇家明年勅使宣臺醜莫忘幽人賦葉嘉省齋藁賦詩謝送賜茗復以丙申小春四銙寄贈詩云淳熈又貢第三春驛騎星馳渡劍津七祖師泉難話舊八功德水且嘗新雪亭烹處休裝景火閣煎時却可人只恐春從官栁動樂天還欲醉精淳註官桞邦衡侍婢名初聞響盞㸃葱茶迎酒旋開賣酒家横笛一聲吹入破便從竹葉換梅花夢粱録今之茶肆列花架安頓竒松異檜等物於其上裝飾店面敲打響盞又冬月添賣七寳擂茶饊子葱茶府至正直記故宋過府官及數貴例䝉賜酒却於官支給以鼓吹歸謂之迎盃都城紀勝暑天兼賣梅花酒用鼓樂吹梅花引曲破漠曲洧舊聞杭州酒名有竹葉清碧香白酒續松記聞燕京茶肆設雙陸局如南人茶肆中置棋具也江左曽傳定武本宣和殿裏幾囘看八千禊帖空留得蠒紙應無似牡丹蘭亭考定武者乃江左所傳晉人㑹稽石也輿太平清話唐太宗蘭亭用玉石刻之文宗朝舒元作牡丹賦刻之碑隂熈寧間薛紹彭聞公厨有石用以鎮肉取視之乃刻牡丹賦於碑隂者遂易之以歸長安大觀中詔取置宣和殿或云艮嶽瑪瑙亭靖康之亂尚方珍寳悉歸金獨此石金所不識遂棄不取建炎初髙宗駐蹕廣陵宗澤守東都見之遣騎疾馳進行在未逾月金南侵大駕幸浙倉卒失之紹興中密㫖尋訪竟不獲録芝園前集賈師憲竄逐時朝廷命王孟孫簿其家石刻蘭亭多至八千匣朝來宫婢藥囊添滿院飛花掩畫簾手把輕羅還絮語每逄三月病懨懨神仙通鑑皇甫坦先生善布氣韶位有甄孃孃病躄累年踊而後能步太后命先生亦為布氣即釋踊而行及將還山留一扇於禁中曰有發寒熱者以此扇當差未幾宫中多患瘧用之皆驗萬厯杭州府志陳沂其先汴人扈蹕而南遂為錢唐人嘗治康王妃危疾有竒效賜御前羅扇凡宫中有疾欲不時召之者聽持扇入禁中金吾閹寺皆不得沮仕至翰林金紫良醫考癸辛襍志紫紗衫羅扇不得入宫一叢東閤碧琅玕花水隂隂晝影寒但覔隔窻通小飲嬾從祕省借書看玉堂襍記學士院東閤窻下小池旁植金沙月桂之屬海棠郁李玉繡毬各一株硯北襍志宋嘉定間著作郎曽從龍請嚴臣僚借書之禁紹定三年三月詔祕書省書籍非備省官母得借書許從監少置簿有欲關文籍為檢閱較正等用即先批簿以慿請取俟還本庫隨與㸃収或借出已久亦須檢舉以察隱遺從祕書監葉禾言也一奠神輿列祖筵焚香端為奉賓天公家楮券猶傳世例得堯夫用紙錢楓窻小牘思陵神輿就祖道祭百官奠哭紙錢差小官家不喜諫官以為俗用紙錢乃釋氏非聖主所宜以奉賓天也今上抵於地曰邵堯夫何如人而祭先亦用紙錢豈生人處世如汝能日不用一錢乎鼠璞楮券聽稱責以傳别特民間私相稱責以為符驗公家未嘗為之紹興間錢端禮議令𣙜貨務給降諸軍見錢公據關子三百萬芙蓉楊栁見梳妝燕子歸來覔錦梁滿目湖山仍似舊長橋何處弔朱孃湖山類藁兵後汪水雲登太内芙蓉閣宫人梳洗處詩有楊栁兮青青芙蓉兮㝠㝠美人不見空淚零錦梁雙燕來又去夜夜蟾蜍窺玉屏為水心詩鈔朱孃曲憶昔翦茅長橋濱朱孃酒店相鄰自言三世充拍户官抛萬斛嗟長貧义畫簪花技冣工涉兒趨奉亦匆匆滑稽把色尋常事艶段爭如無過蟲夢粱録有一等手作出入宅院趨奉即君子弟為幹辦襍事挿花掛畫帮涉妄作謂之涉兒都城紀勝襍劇中先做尋常熟事一段名曰艶段次做正襍劇或添二人名四裝孤老吹曲破斷送謂之把色全以故事務在滑稽又隱於諫諍故隨便跣露謂之無過蟲乗輦何妨可祀神要將喜怒任權臣六宫歌管春風夜蕭寺焚香拜美人齊東野語度宗壬子歲有事明堂將登輅雨至賈似道欲少候行宫使胡顯祖請乗輦上從之似道必欲去顯祖竟追削顯祖本太常禮官以女為美人故至此有㫖美人胡氏追毁命婦告送妙淨寺削髮為尼圖畫新翻黄䗶箋幛歌山水潑雲煙欲從符印求正蹟記取書題善雅傳清河書畫舫思陵行書子美題奉先劉少府新畫山水幛歌黄䗶箋真蹟都穆鐵網珊瑚思陵宸翰下有行書一聨其印文曰善雅蓋宋景獻太子書而善雅其堂名也教駿人皆似九方邊臣重驛貢驪黄使船不用淩波檝驥院新編第幾綱玉海建炎四年詔騏驥院差教駿五十人赴御馬院養馬又建炎元年招募習水善波操舟便利之人令擬到軍號樓船軍詔從之綱又邕州置買馬司必四尺二寸以上每百匹為一金史尼堪曰南人使船如使馬烏可敵也角繻包髻出彤庭任子當年只六齡若到軍中備反側井泉不獨紀銀瓶宋史本傳韓彦直世忠子六歲入見髙宗命作大字即拜跪書皇帝萬歲帝拊其背曰他日令器也親解孝宗丱角之繻傳其首謂金陀續編初飛與張俊承詔視世忠軍徃辭檜檜之曰且備反側檜為此語欲激其軍使為變因以罪世忠耳飛答曰楚州之軍即朝廷之軍也檜色變惡飛語直湖壖襍記銀瓶小姊者岳武穆季女也武穆被難女欲叩闕上書邏卒攔止之遂抱銀瓶墜井而死按孝宗初追復武穆原官以禮殉葬訪求其後槩予録用襁褓以上皆官之女少者候嫁則官其夫武穆有女安孃女夫髙祚補承信郎岳雲女大孃岳雷女三孃候出嫁日夫客與補進武校尉俱載在金陀粹編中則銀瓶小姊殉孝而死寧不經御㫖追贈且岳珂為武穆孫而編中曽不一及之耶紅頰香孩梳鵓角青鬟嬌女簇牙魚落花軟襯春趺小為看風光九十餘留青日札宋淳熈中剃削童髮必留大錢許項左右束以綵繒宛若博焦之狀曰鵓角愧郯録近世中都闠鄽鬻冠飾者率為物象螭一角而兩足鳥翼而鴟尾通國服之謂之牙魚萟林伐山南渡後妓女窄韈弓鞋如良人故當時有蘇州頭杭州脚之諺童夫人尚有童心雪色獅猫愛䕶深堂上氍毹春不管伺他風蜨卧花隂老學菴筆記秦檜孫女崇國夫人小名童夫人愛一獅猫失之遍索不得咸淳臨安志都人蓄猫長毛白色者名獅猫蓋不捕之猫徒以觀美特見貴愛糖霜水飲涼生齒暖閣春囘乍減寒昨夜宿酲猶未醒又聞宰相罷堂餐南宋相眼唐璘見蔣峴尚書家子弟言理宗丙申四月乍暖飲糖霜水過多頓甚汪之道有異謀欲奉上為太上皇賈似道聞之密告其姊貴妃轉聞亟逐之宋季三朝政要紹定元年明年上飲宴過度史彌逺卧病故時人譏之曰隂陽眠燮理天地醉經綸戲經濟類編董宋臣逄迎上意宫中進倡優傀儡諸以奉帝為娯樂盡糖霜譜跋晦叔作糖霜譜余聞之且久偶獲七篇讀於大慈之方丈院紹興二十四年卧雲菴守元書龍檐歸寧鹵簿齊賜筵意思繡飣棃同時眷屬皆恩賚生色文羅翡翠箆武林舊事后出宫至祥曦殿上升龍檐出和寧門至皇后家賜筵皇后繡髙飣十楪果子意思十件又皇后散付本府親屬宅眷翠冠翠扇翠箆環刺繡領生色羅金銀錢金盆盞婕妤寺水注方塘髙揭銀鉤寫鳯凰羞殺易書供斧劈松門仍榜狀元郎四朝聞見録方家峪有劉婕妤寺泉自鳯山而下注為方池上揭鳯凰泉三字乃於湖張紫薇孝祥所書夏執中為后兄呼為夏國舅至寺中謂於湖書未工遂自書三字易之孝宗幸寺中不復他語但詔左右以斧劈為薪止用孝祥書三千玉貌各含愁羅帶相攜赴碧流明月夜寒彈怨語琵琶聲咽故宫秋宋元通鑑元人索宫女内侍及諸樂官宫女赴水死者以百數水雲集一匊呉山在眼中樓臺疊疊間青紅錦帆後夜烟江上手抱琵琶憶故宫亂墳誰與一盃羮深羨花宫有世情至竟餘杭門外路居人不識薤歌聲成化杭州府志愍忠資福普向寺南渡初殿帥楊存中請建於北山鮑家田青芝塢專充殿司諸軍瘞所置僧以守香火院文獻通考諸寺院之多産者類諸求貴臣改為墳冀免科敷詔户部申嚴行下成化杭州府志杭城舊有十三門惟餘杭門在北不得出居人之槥内教場開練虎賁雕戈千騎曉雲屯將臺金鼓黄旗動勅賜將軍射鐵盆玉海乾道二年十一月幸白石大閱場三年三月宣殿前選鋒等軍馬軍九百騎入内教射鐵盆鐵簾營四年十月幸茅灘大閱前一日於教場東列幕宿皇帝登臺舉黄旗諸軍呼拜者三舉白旗變方陣為備敵之形舉黄旗變圓陣為自環内固之形舉赤旗變銳陣諸軍魚貫斜列為衝敵之形舉青旗變直陣上親御甲胄指授方畧六師歡呼犒賞有加焉錦標爭過一清堂畫鼔敲殘亂夕陽更有戈船迎弄處十分打扮是錢唐武林舊事玉蓮堂原名一清堂競渡爭標於此捷都城紀勝西湖春仲浙江秋仲皆有龍舟爭標輕可觀有金明之遺風見隨隱漫録余少觀金明池水戰為之目動心駭比錢唐水軍戈船飛虎迎弄江濤出汲聚散如神以視金明池如兒戲耳猶在軒集競渡櫂歌建雲斿建雲斿土風到處總相朝了霍山朝岳帝十分打扮是杭州上苑鶯花赴試春南宫佳兆遇魁神東風不解相思句愁煞紅簾粉淚人暌車志錫山許宗美以夀皇登極恩赴省詣太乙宫禱焉禱已周行廊廡間才舉足見二神位云河魁從魁宗美甚喜洎南宫揭榜何自然為省元而宗美以詩賦魁前場蓋符二魁之姓名云林下詞選易祓彦章長沙人寧宗朝狀元以優校為前廊久不歸其妻作長相思詞寄之云朝有時暮有時潮水猶知日兩囘人生長别離來有時去有時燕子猶知社後歸君行無盡期臨軒安用捉刀為對使偏輸聰慧時一闋清詞新譜出杏花春雨有誰知癸辛襍識寧宗不慧而訥於言每北使入見隂以宦者代答詞筌宋寧宗浣溪紗看杏花詞花似醺容上玉肌方論時事却嬪妃芳隂人醉漏聲遲珠箔半鉤風乍暖雕梁新語燕初飛斜陽猶送水精巵朝衫香褪獨徘徊睡思初濃水閣開怪得無人理紈扇緑隂猶自摘青梅昨非菴日纂趙葵嘗避暑水亭作詩云水亭四面朱闌繞蔟蔟遊魚戲萍藻六龍畏熱不敢行海水煎徹蓬萊島身眠七尺白蝦鬚頭枕一枚紅瑪瑙六句已成葵遂睡去有侍婢續云公子猶嫌扇力微行人多在紅塵道不古今女史趙葵同知樞密院朝罷歸私第而諸姬見葵徃訪之乃羣聚摘青梅有一姬善詩賦葵責令賦詩云柝聲黙報蚤春囘滿院春風繡户開怪得無人理絲竹緑隂深處摘青梅倚翠偎紅作大師畫船天外送歌兒含情無限闌干曲惆悵參横月落時談藪樓叔韶鏞初入太學與同窻友厚善休日乃相率出城買小舟沿葦行將十里舍舟陟小坡行道微髙下又二里得精舍門徑絶卑小而松竹花草楚楚然友款於門即有小童應客主人繼出乃少年僧姿狀秀美進趨安詳殊有富貴家氣象揖客曰久别甚恩欵接都不見過何也便起推西邊小户入華屋三間窻几如拭玩具皆珍竒喚侍童進㸃心素膳三品甘芳精好撤器命推窻平湖當前數十百頃其外連山横陳樓觀森列夕陽返照丹碧紫翠互相映發漁歌菱唱隱隱在耳騁望久之僧以麈尾敲闌干數聲俄有小畫舫傍湖而來二美人徑出登岸靚粧麗質王公家不過也僧命具酌指顧間觴豆羅陳窮極水陸左右執事童皆姣好杯行美人更起歌舞僧與友謔浪調笑歡意無間樓神思惝恍正容危坐噤不敢吐一語伺僧蹔起挈友臂扣所以友愠曰子但飲食縱觀何用知如許而觴十起巡夜已艾僧復引客至小閣中卧具皆備曰姑憇此遂去壁外即僧榻試穴隙窺則徑擁二姬就寢友醉甚大鼾樓獨徬徨不寐起如厠一童執燭密詢之此為何地童笑曰官人是親戚何須問樓反室展轉通宵時側耳聽聲但聞鼻息齁齁而已將曉僧送之門鄭重而别由他徑絶湖而歸樓惘惘累日疑到非人間其後出處參商竟不克再諧鴛鴦打散合蟬陳今古詞章集混成一段霓裳一歌曲愛他三十六番新癸辛襍識故都德夀宫舞譜其中皆新製曲多妃嬪諸閣所進内有左右垂手雙拂合蟬舞頭舞尾打鴛鴦場等曲皆前所未聞亦可想見承平和樂之盛也齊東野語混成集脩内司所刋古今詞歌之譜靡不備具霓裳一曲共三十六段太后令内人歌之凡用三十人每番十人奏音極髙妙遺像猶思墜紫雲臯亭空見伯顔軍一從南北飄零後還有梅邊生祭文水東日記文山像上有太傅錢唐于公謙題云烏乎文山遭宋之季狥國忘身舍生取義氣呑寰宇誠感天地陵谷變遷世殊事異坐卧小閣困於羈繫正色直辭久而愈厲難欺者心可畏者天寧正而斃弗茍而全南向再拜含笑九泉孤忠大節萬古攸傳我瞻遺像清風凜然于公每懸此像於座側數十年如一日也復夢占類考文天祥大父夢一兒乘紫雲而下已而上行生天祥名雲孫字天祥後以字行字履善及廷試第一理宗見其名曰天之祥乃宋之瑞也字之曰宋瑞啽囈集文文山詩註伯顔至臯亭山除樞密使右丞相奉㫖詣北軍講解見伯顔陳大誼留營中不遣文山全集空坑之敗夫人與佛生栁小孃環小孃顔孺人黄孺人皆為俘至元帥所已失佛生必有愛其俊秀養為已子矣呉文正公集跋文丞相與妹書一代三百年有此臣一家數十口有此女臣不二君女不二夫臣盡節而死女全節自生不愧於天不怍於人可傳千萬世卓哉曼卿出其門藏此帖甚珍之噫誠可珍也觀此為之流涕書系天祥過南安遣人告墓以弟壁之子陞為嗣又寄弟詩曰親喪君自盡猶子自吾兒宋遺民録宋太學生廬陵王鼎翁作生祭文丞相文歴陳其可死之義又反覆古今所以死節之道激昻奮發累千五百餘言録數十本驛途山店俱貼之大義在速文丞相死國然丞相從容就死固不係鼎翁之文而鼎翁之志可悲矣鼎翁名炎午號梅邊所著有吾汶藁桑海英風不可攀南朝寂歴舊江山惟餘幾輩才人在詩卷長留天地間淵頴集呉萊桑海遺録序云淮隂龔開聖予撰文宋瑞陸秀夫二傳叙其前後死節精忠激烈誠有在於天地而不在今古者予故私列二傳以發其端詢之故老徴之襍記題曰桑海遺録以待太史之采擇焉翁天地間集謝翺所編其詩為家鉉翁文天祥文及謝枋得鄭協柴望徐直方何新之王仲素謝鑰陸壡何天定王曼之范協呉子文韓集林景昭凡十七人明宋濓著謝先生傳云天地間五卷蓋未完書也元月泉唫社潛齋呉渭清翁集渭以故宋義烏令入不仕退居呉溪延致方韶父謝臯羽呉子孟作月泉唫社四方唫士從之以田園襍興命題凡得二千七百三十五卷三子為其評校選中二百八十名甲乙其名次出一榜各有賞給今列其詩者僅六十名題名多隱號間有重名因詩為次第一羅公福杭清唫社三山連文鳯也第二司馬澄翁義烏馮澄也第三髙宇杭州梁相也第四仙邨人註古杭白雲社第五山南隱逸義烏劉應龜也第六子進分水魏新之也第七栗里金華楊本然也第八倪梓義烏陳堯道也第九全泉翁孤山社全壁也第十吕淡翁東陽吕文老也第十一方賞桐江方德麟也第十二鄧草逕三山劉汝鈞也第十三魏子大註武林九友㑹第十四喻似之分水何鳴鳯也第十五躡雲建德梓州翁合老仲嘉也第十六玉華唫客分水林子明也第十七田起東崑山劉蒙正也第十八唐楚友孤山社白珽也第十九識字耕夫武林社秦州周暕也第二十學古翁桐江趙必范也第二十一社翁釣臺姚潼翔也第二十二騎牛翁三山高鎔也第二十三天目山人義烏呉瑀也第二十四安定書隱義烏胡南也第二十五槐窻居士浦陽黄景昌也第二十六姜仲澤金華姜霖也第二十七陳柔著武林社陳必曽也第二十八方尚老桐江方子靜也第二十九朱孟翁東陽人也第三十愛雲仙杭白雲社趙必折也第三十一陳希邵義烏陳舜道也第三十二劉時可雙溪人也第三十三岳重武林九友㑹僧了慧也第三十四雲東老唫義烏許元發也第三十五避世翁義烏洪貴叔也第三十六觀我金華楊舜舉也舜舉即本然之字第三十七徐端甫義烏人也第三十八龜潭朱釋老金華人也第三十九樵逸山人洞江李萼也第四十柳圃月泉陳君用也第四十一臨泉僧志寧杭人蔡潭也第四十二唫隱俞自得金華人也第四十三東湖散人註古杭人第四十四仇近村古杭仇逺也第四十五陳緯孫註即分水何鳴鳯第四十六陳鶴臯註即月泉社陳君用第四十七冷清建德王進之也第四十八感興唫註桐江人第四十九王進之建德人也即上冷清第五十元長卿義烏陳希聲也第五十一聞人伯仲即陳希聲第五十二戴東老註月泉社人第五十三子直註即魏新之第五十四襲慶苕水陳文増也第五十五九山人註寓杭第五十六桑柘區金華人也第五十七栁州註月泉社人第五十八草堂後人杭人也第五十九君瑞桐江人也第六十青山白雲人杭人也已上詩皆全後又列摘句有無機老農子問田農夫唐人機軸忘懷老人五雲山人老農劉存存石姥寄客雙澗雲水白雲人傅宣山自家意思栁耆俞如山跨犢者山野人盤隱末子扶杖夫廷雲翁自適郭建德駱侕賓陳帝臣晩靜竹簔笠翁俞埜處藍田道人林泉生傅九萬才人其間或有名或無名大抵皆宋末遺老也舊有黄顥序明正德中田汝耔重序刋行谷音清江杜本伯原輯遼東王澮洛陽程自脩瑯琊冉琇河東元吉曲阜孟鯁廣漢安如山成都王翥襄陽師嚴廣陵張琰漢陽汪涯建安詹本四明皇甫明子長沙丁開括蒼鮑輗京口崔璆姑孰魚潛瑞陽柯芝柯茂謙廣陵邵定豫章熊與龢宜春晏七大庾孫璉臨江楊應登楊雯旴江曽澈乂無名氏番陽布衣瀟湘漁父閩清野人羅浮狂客凡二十五人無名氏四人詩一百首蜀郡張榘跋云皆宋亡元初之節士多幽人清詠之辭題曰谷音者山谷之音野史之類也唐宋遺民録程敏政編自序云宋末王鼎翁謝臯羽玉潛三子其名不載於宋史因輯其遺文以備史事并附録張毅甫方韶卿呉子善龔聖予汪大有梁隆吉鄭所南林景曦諸人之作而係庚申君事實於後凡十五卷得樂府補題集中倡和作者為王聖與周公瑾王理馮祥父唐英發吕和甫李商隱練行之唐玉潛趙正卿李師吕張叔夏仇仁近凡十三人又無名氏二人共詞三十七首合為一卷陳維崧四六序云嗟乎此皆趙宋遺民之作也粤自雲迷五國橋䜟啼鵑潮歇三江營荒夾馬夀皇大去已無南内之笙簫賈相難歸不見西湖之燈火文不備録南宋襍事詩卷七
