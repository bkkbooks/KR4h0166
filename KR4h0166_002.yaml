body:
  text: 南宋襍事詩卷二錢唐吳焯撰艮嶽曽經號鳳皇東京特地擬餘杭奇亭巧石神霄夢月上俄聞唱海棠雲麓漫鈔政和五年命内官梁師成築山於景龍門側象餘杭之鳳皇山遂賜名鳳皇後神降有艮嶽排空霄之語又名艮嶽今臨安府大内麗正門之正面即兹山也艮嶽記介亭最髙於諸山前列巨石凡三丈許號排衙石案介亭排衙石俱在鳳皇山側宋之都杭有先兆矣雲麓漫鈔徽廟内禪幸淮浙嘗作小詞名月上海棠末云孟婆且與我做些方便其意指風竟成孟太后䜟華陽宫記事艮嶽有飛來峰靖康字讖啟金微名罩黄羅局上飛誰道漢家兵制闕隂符蚤巳著神機鐵園山叢談靖康改元中書擬進年號取日靖四方永康兆民請號年曰靖康其文為十二月立康也後一年康王中興位北狩見聞錄曺勛扈從北行時太后未知主上即嘗用象戲局子裹以黄羅書康王二字貼將上禱曰令三十子俱擲於局若康王字入九宫者必得天位一擲其將果入九宫補漢兵志宗正少卿錢文子以班史無兵志因而補之蓋有慨乎南渡後兵食冗濫而富平符離之役棄師累十萬莫正其罪假漢兵志以寓意焉也神機制敵太白隂經南宋内府鈔本兵家之要典凡十卷末有寫勘監收等名更鑄新銘帝命宣儒臣皇祐有遺編洛鍾不響土圭冷太史頻煩測會天建炎以來朝野雜記紹興十六年鑄景鍾髙九尺天子親祠上帝則用之以皇祐黍尺為準於是上命秦檜銘之曰徳純懿兮舜文似躋夀域兮孰内外薦上帝兮偉兹器聲氣應兮用久視貽子孫兮彌萬世皇祐新樂圖記仁宗皇祐二年院逸胡瑗等奉詔修凡三卷十二篇㑹天厯寳祐四年荆執禮等算造南渡以後自綂元至㑹天厯名凡七改是嵗在丙辰元日立春因定是名學士尤焴被命製序具註頒行我好來朝即便留行都不改舊杭州歌聲隱隱江湖上虹氣分眀志斗牛毘陵錄髙宗生時徽宗夢呉越錢王引上衣云我好來朝便欲留我終須還我山河淳熈十四年宰執奏事延和殿上因論髙宗諡法語及此事案此稱錢王指俶也舊志謂是武肅皆祖洪邁之説吳越世家疑辯李琪武肅王碑江湖之上棹有歌聲斗牛之間獄無寃氣歲幣年年訝許同紅蠶南國號靈蟲巧機花匠休離手柿蒂原充職貢中蓉塘詩話樂天詩紅袖織綾誇柿蒂柿蒂綾紋也也夢粱錄杭産綾曰柿蒂狗脚後人改為杮葉者妄山元豐九域志杭貢綾三十匹蠶丘陵學有黄省曽蠶經一卷言杭地事最詳欲負龍歸計太貪鸞聲先報下江南栁林一議驅俘馘誓不尋盟死不甘北窗炙輠宇文虚中始陷於金後仕為國師遂得其柄令南北講和太后之歸資其力也後欲挾淵聖以歸為人告變論死韋迎鑾七賦太尉曺勛墨跡勛自奉還徽宗梓宫及太后乃作迎鑾七賦題分為七實止一篇其裔世居海鹽保有此巻後歸花山馬氏余得見之脚氣集金諸大臣㑹於黒龍江栁林議遣秦檜歸國言彼得志吾事可濟檜至計果得行廢殺諸將而南北之勢定金亦徳之誓書中必有不輕易相語而檜亦發宇文虛中事以報之此金人自言之見於金國南遷録不裹冠巾女聖人雕弧那羨十流銀更饒艷思輕紅句粉涴香梳十指春四朝聞見録髙宗憲聖吳后侍髙宗航海金騎猝至欲挐御舟后發一矢應弦而倒髙宗重於視師后奏曰若臣妾裹尺五皁紗須一往矣射弧矢譜有蹺蹬弩最為利害張憲巾林之伏張浚狐關之捷皆用此弩制勝此書不著撰人紹興間曽進御者萬䪨石齋筆談憲聖能詩題徐熙牡丹云吉祥亭下千枝看盡將開欲落時却是雙紅深有意故留春色緩人思題芍藥云穠李夭桃掃地無眼明驚見玉盤盂揚州試識春風面看盡羣花總不如日日攻書腕骨靈清江白鹿拓朱欞鉤金不獨松門字先飾涪翁戒石銘書學纂要髙宗在内殿作書日有程課寫至正直記宋紙有單鈔清江名曰白鹿乃龍虎山籙之紙又曰白籙郡四朝聞見錄紹興二年六月頒黄庭堅戒石銘於縣亦用金書不獨飾吳說九里松字也咸淳臨安志九里松一字門亦曰松門亂似羣雅腫似豬聫綿新體果何如銀漿蠲紙沙錐利好趂游絲一筆書書苑菁華吳説傅朋出巳意作游絲書世謂前代無有趙與時云唐書吕向能一筆環寫百字若縈髪然號聫綿書即此體之朝野類要臨安有鬻紙者澤以粉漿使之瑩滑謂蠲紙太倉稊米集題吳博朋游絲書聊將畫沙錐幻出蟲網壁山岳英靈久不磨虎兒談律繼梁羅子瞻風采人門重豈獨斜川號小坡曲洧舊聞李廌方叔祭坡公文皇天后土鑒平生忠義之心名山大川還千古英靈之氣小字錄蘇子由子遲小名梁适小名羅逺小名虎兒東坡詩髙談付梁羅詩律到阿虎案思官成忠郎秘書省捜訪北宋末人稱東坡朝野襍記髙宗雅敬蘇文忠止稱子瞻或浮溪集蘇軾孫符改宣教郎勅有云賈生眀王道漢録賈嘉之能魏公進忠規唐表魏謨之烈人門並用今古所同其振爾之家聲以待予之器使小文湖州竹派坡公詩考可能為竹寫正坡解與竹傳神小坡蘇過也有斜川集愛他鉤勒與横欹恨不生同黄米時繡幄裁成翰墨志一規眀月下宫墀筆麈山谷書善用鉤勒米家父子得横欹執同後村題跋光堯喜書畫自恨不與黄太史米南宫時髙宗翰墨志一卷今見於王氏書苑者全凡二十六條有自序養䝉集思陵金書扇詩超然塵外萬緣空得失何須問塞翁鉤畫尚留奎壁潤歛歸明月一規中錢源霅霅接龍溪才過横坑二水齊白日隂崖呌鶗鴂野花開遍刺棠梨雲麓漫鈔靈隱寺東西瀵二水東龍源横過寺前即龍溪冷泉亭在其上西曰錢源二水合出横坑橋案龍溪龍源宋時之名今志所無絶品銘心未肯降翰林花月醉春江清明不見河中景湖上空聞戲綵艭向氏圖畫記翰林張擇端善畫城郭舟車人物其所作清明上河圖西湖爭標圖二圖紹興中入内府並選入神品龍衮遙升啓虎闗奉常官立最先班宣和雅樂如何補知在先皇指節間夢粱録明禋詩龍衮初升殿陛階奉天酌祖蕆皇儀虎闗夕啓咸來熈從坐紛綸衛百祗雲麓漫鈔紹興十六年禮器局造祭器用博古圖雅樂用大晟府制度大晟樂之景鍾當時用徽宗指三節為三寸盖崇寧四年所鑄者是也此樂府雅詞首冠調笑絶句云是九重傳出大晟樂之遺音枉被人稱紫府仙原芝怎不究先天君王雅愛通經士圖畫龜龍進巨編四朝聞見錄張孝祥精於翰墨人稱紫府仙惜其與南軒諸人為友而不能續伊洛之統于湖居士集紹興二十四年芝産太廟前楹張孝祥作原芝文推衍符瑞之説周易經傳集解福清林黄中著凡三十六巻淳熈十二年進御降詔褒美案此書精研該貫苐以其曽糾朱子學者非其人而黄勉齋集祭黄中文有云玩羲經之爻象究筆削於獲麟立朝正色雖當世大儒或見擯斥著書立説雖前賢篤論不樂因循然則朱門髙弟稱許亦至矣徐尚書開雕經解此書不入或亦以朱子故與亭深喬木貯張穠直上彤庭認筆蹤不似韓家失機表勸君餘暇誦車攻剡源集張忠烈王開國於循而置邸於杭所居之坊曰清河有喬木亭在焉因為之記雪履齋筆記張俊有愛姬乃錢唐妓張穠頗涉書史柘皋之役俊發書囑以家事穠引霍去病趙雲事以堅其心俊以其書繳奏上親書奬諭張韓皆中興名將皆有竒女子又皆出微賤亦竒矣中興編年紹興五年上書車攻詩以賜輔臣曰當與卿等勉勵以修政事松花如粟布前除嶺脊猶傳古宅徐一笑湖西梅處士茂陵書去野亭虛北窗炙輠錢唐兩處士林和靖居孤山徐沖晦居萬松嶺夾湖相望徐之孫㣼猶守故廬語人曰先祖有言子孫世世勿離錢唐永無兵燹徐精數學也按先生名奭賜號沖晦金鈴獵獵降香回佛跡多憑梵夾開不信香山老尊宿玉顔花貌坐蓮臺朝野類要内宫有祈禱賜香於天竺大士按五百羅漢名記宋時記江隂軍乾明院羅漢名號净慈寺亦有五百塑像曺勛為記特以名不著於梵夾此名號不知何所本淳熙三山志懐安大中寺有八百羅漢像是又不止五百也弟曲洧舊聞蔣穎叔用香山僧懐晝之請取唐律師子義常所書大悲之事云國莊王不知是何國王有三女幼者多玅善施手眼救父此與楞嚴經及大悲觀音等經頗相失華嚴云善度城居士鞞瑟眡羅頌大悲為猛勇丈夫今香山乃大悲成道之地謂是生王宫以女子身顯化考古徳翻經所傳者絶不相合不知穎叔何意而粉飾之以猛勇丈夫易為女子也赤岸前頭赤羽驅平江供遞五千夫龍茶宣賜無箋表蚤駕氷篺過鼎湖雲麓漫鈔金國每年賀正旦使平江排辦司供役凡五千三百十四人武林舊事北使到闕先遣中使至班荆館宣賜龍茶香合雲䝿耳錄道君北狩凡金人有賜賚必索一謝表麓漫鈔賀正多值氷雪有司作浮筏前用巨碓𢷬氷謂之氷篺以迎北使䧺闗入界三千里上國于京六十程累葉統傳分歲月兩家書在記和盟大金國志自臨安府餘杭門起至䧺州舊界口凡三千二百七十里又自雄州起至金之上京㑹寜府凡二千七百五十里通計六千零二十里子剡源集天台潘可大裒宋自建炎丁未迄徳祐庚金自天輔戊戌迄天興甲午撥提綱要各為南北紀年案三朝北盟㑹編宋朝散大夫清江徐夢莘商老撰此書分三編上宣政中靖康下炎興靖康以後採諸家纂紀二百六十餘種最為詳洽總二百五十卷後又有集補五十卷未見早聞玉盌出塵闤更設淘沙最慘顔不計本根江乗壘空教保䕶劍門山劉豫事跡豫見兵士賣玉盌疑非民間物鞫之果出山陵中金人發掘時得之豫遂置河南淘沙官發掘諸陵括取棺中水銀等物上代陵寢及民間塚墓無有免者案北宋發陵起於金人繼於逆豫惜其時無冬青引後人不復傳述耳考王惲秋澗集載豫祖塋在阜城縣元時尚稱御莊石馬存焉天道固難問矣下東南防守利便有建康根本論嘉景定建康志白本江乗之白石壘玉牒初草定中詔臨安府北山劍門嶺毋得伐石以張齊賢論其洩山川之氣故也案栖霞嶺又名劍門嶺才罷三盃丞相嗔想夫憐曲有前因從今閣下乗龍聓莫解金刀與别人雲麓漫鈔秦相十客郭知運逐客吳益嬌客郭臨安人登科以少俊選為孫婿秦每夕必留三盃郭多夜出秦嘗以佩刀分遺諸壻郭獨失秦怒㑹夜出令門者勿納遂罷親吳宜興人以門䕃遂令繼郭為姻改秩為臨安倅秦薨罷之兒家不繫守宫砂曽拊金枝綴玉葩細馬盤䭾成隊去傷心猶奏後庭花蘆蒲筆記資政王復守徐州與子佾均死靖康之難和議成上憫其忠令佾諸女入禁中命宫嬪養之凡十餘年一日曝書内庭上見囊封有忠烈二字亟取閲乃王氏女入内事即日召見賜金幣敇命遣嫁歸潛志宋宗室家姬流落於金吳彦髙詞云南朝千古傷心事猶唱後庭花天上何曽下玉棺人間偷把淚珠彈可知故鬼依新鬼祏室前頭巳奉安中興編年紹興三十一年八月淵聖凶問至詔臣民發哀成服廟號欽宗遙稱獻陵明年閏二月祔木主於太廟案咸淳臨安志紹興四年命守臣梁汝嘉建太廟於瑞石山左以奉列主後又設配享功臣位於横街南西湖志謂太廟獨缺欽宗不祀考欽宗祔廟詳於宋史嘗下詔議配享功臣廷臣謂欽宗在位不久無可當配享者故缺焉咸淳志記配享諸臣名於列宗之下因無欽宗田誤讀此志耳髙宗不復父兄千古議之乃責其不祀欽宗冒昧一言遂啟後來罔謗不可不辨漢祖闗前兵有壘劉伶臺下酒如池閉闗頌酒斯何意知是風流女畫師志雅堂襍鈔李伯時盧鴻草堂圖曽收入髙廟劉娘子位者有奉華大小二印又有閉闗頌酒之裔一印此劉家事然以婦人用之恐不類也畫法年紀劉妃工畫人物規模不定事逡巡和福寧須怨相秦可恨將軍無死地荒郊一竁賈宜人識遺紹興中張燾上言曰一紀之間命相十四執政遞遷無慮二十人宜其和戰紛紛迄無成功故燾直謂規模不定也詔知稼翁集解試以和戎國之福發䇿南宋相眼臨安府訪求岳將軍尸其墳在錢唐門外當時私號賈宜人墳鄴邸金陀著錄成桃溪難認手題名未詳蘄國爭三字猶賴文昌傳一生玉楮集岳珂封鄴侯進紀恩詩之岳珂著金陀粹編二十八卷續編十三卷述家王事最詳雲麓漫鈔宜興張渚張氏圃臨水號桃溪岳侯曽館其家題名㕔事云近中原板蕩金人長驅如入無人之境將帥無能不及長城之壯余發憤河朔起自相臺總髪從軍大小二百餘戰雖不及逺涉邊荒亦足快國事之萬一今又提一壘孤軍振起宜建康之城一舉而復今且收兵養卒以待如或朝廷見念賜予器甲使之完備頒降功賞使人䝉恩即當深入邊庭迎二聖復還京師取故地再上版籍他時過此勒功金石豈不快哉此心一發天地知之知我者知之建炎四年六月河朔岳飛書岳陷罪其家洗去隱隱猶見案此篇見於粹編者作五岳祠盟記寥寥數語故拈出之窣輔編年錄岳鄂王獄具秦檜言岳雲與張憲書其事體必須有蘄王爭曰必須有三字何以使人甘心案此三字與中興紀事本末同今皆作莫須有恐不若紀事之得其實也之金陀粹編珂自序先王勲在王家名在國史遺跡存者文昌章公傳而上之朝案珂忠武之孫敷文閣待制霖之子圭田新錫奉烝嘗無復東家舊講堂天水兒童幾輩輩風煙隔斷栁林莊朝野雜記中興後衍聖公孔玠奔至行在上以孔子林廟隔絶特賜衢州田以奉祠事東家襍記先聖四十七代孫孔傳編首列杏壇圖説里清波别志國家上世陵寢在保州保塞縣東三十御荘在焉號栁林荘孔門弟子自清羸髹塑俄更舊表儀為有龍眠傳搨去可曽新樣畫淳熙咸淳臨安志淳熈四年建石經閣遂新兩學議者以廟中諸賢舊像無福厚氣象遂令改塑其舊像遷於首善閣李龍眠有孔門弟子畫像刻於石藏石經閣嶧雨鳬雲天際昏誰從配食憶魚門七篇幸不亡金鏡敇付東朝細討論朝野襍記兖州鄒縣有孟子廟政和中詔以樂正子克配享并從祀公孫丑萬章浩生不害孟仲子陳臻充虞屋廬連徐辟陳代彭更公都子咸丘䝉髙子桃應盆成括季孫子叔渡江後鄒魯隔絶孔廟既立而孟獨無行在諸賢宜留意也史名勝志魚門古鄒城也東宫備覽靖康時侍御胡舜陟上言以中書舎人胡説之乞令皇太子講諸經而廢孟子竊謂孟軻氏發明聖道豈可以為百家而黜之使皇太子不聞七篇之義今請東宮官進講仍舊制用孟子伐鼓淵淵揮扇同巧思射覆女郎中後来傳得千文虎字畫分離讔謎工賓退錄都下擊鼓射字之伎全用切韻法該以兩詩詩皆七言全用支齊有平無仄以應鼓節亦有揮摺叠扇同是一法藁武林舊事諸色伎藝人射覆有女郎中七修續余有一敗帙惟序可讀乃勝國謎社之書名曰千文虎野雲戲罷擲金錢􅠎撲爭傳冷節前聞道十家春繡倦不扶綵索上秋千雲麓漫鈔歲將除都人相率為儺俚語謂之打野狐亦呼野雲戲又􅠎撲食物法有禁令凡元正冬至寒食三節京尹出榜放三日或以數十笏銀或以樂藝女人為一擲其他百物無不然孝宗儉徳記宮中無秋千之戲父子唐虞有憲章夘山宫闕可相望紛披玉撿勞雙隻曽悔中書去一綱簫臺公餘詞薰風解慍手握乾符躬揖遜廊廟無為天子親傳萬歲巵恩覃湛露和氣歡聲均海宇嵩岳三呼父子唐虞千古無寒松隱集徳壽宮春帖子曉來簾幙捲東風尚有春下綺櫳徳滿人間和氣浹夘山宮殿瑞雲中延玉牒初草李安行奏寧宗曰陛下雙隻皆視朝而訪之時不及雙隻猶言雙日單日謠玉笥集咏史有一綱為李忠定作也鈞容法部幾班頭半是吳歈半楚咻誰解緑腰花十八但教小令整歌喉朝野類要教坊之名唐時屬太常本朝増東西兩教坊又别有化成殿鈞容班中興後因之紹興末臺臣王十朋上章請罷凡名伶俊伎留充徳壽宮其餘多隸臨安府雖有教坊之名多是市井之輩不知音律花碧雞漫志琵琶六么一名綠腰其曲中有一叠名十八又有人過鈞容班教坊問曰某宜何歌必曰汝宜唱曹元寵小令飲馬歌殘絡馬銜浮屠軍巳越重巖㝷宫儻入黄鍾調蚤向陽山進一帆松隱集飲馬歌邊頭春未到雪滿交河道暮沙明殘照塞烽雲間小斷鴻悲隴月低淚濕征衣悄歲華老自注此腔傳自金中飲午馬即横笛吹不鼓不拍其音凄斷聞烏珠每對陣吹此則鏖戰無還期也建康集征烏珠詩快飲莫辭金鑿落先聲須破鐵浮屠注金將下親兵皆精練號鐵浮屠軍至正直記文丞相入燕聞軍中歌阿刺來曲驚曰此正黄鍾之音南人不復興矣建炎航海記建炎海上之役烏珠由鄞入海望大洋中隱隱一山問海師何所對曰陽山烏珠嘆曰吾得至此足矣下令返棹其日御舟將如館頭亦遏於風不爾幾殆蓋天所以開中興云親見宣豪寫洛神殘碑重捲淚宫嬪後来石刻應鋪敘猶記花門舊日春書史㑹要髙宗自言學書惟視筆法精神朕得王獻之洛神賦六行置之几間日閲數十過自覺於書有所得碑玉林詩話髙九萬觀思陵墨本詩淡黄越紙打殘盡是先皇御製詩白髮内人和淚看為曾親見寫詩時本石刻鋪叙建昌曾宏父撰叙髙宗御書石經末特詳南渡後秘閣帖亦加詮訂毛詩一卷誦交交風過泠泠竹韻敲偶為尋花行别殿棚簾不捲結蠨蛸瘡洲集春日夫人閣詩君王著意在經幃無復瓊林宴賞時從此六宮休鬭草碧紗憲下讀毛詩孝宗儉徳記上在禁中凡先皇游玩之處多扃鐍不御清鍾杳杳碧波深墖影扶雲出梵林何取香山舊詩句一山兩寺漫追尋詩人玉屑中興後詩如趙天樂冷泉夜坐鐘樓晴聴响池水夜觀深秋聲集靈隱詩兩峰墖影天垂蓋千佛林光地布金竺東坡詩集自注往在䖍州天竺寺見白公親書天寺寄韜光詩案此則䖍州别有一天竺寺因韜光原住靈隱寺故有天香桂子之句咸淳志稱舊志不收此詩是也稜層孤墖倒江波六合於今號六和不見一瓶明似雪龍山依舊莽煙蘿四朝聞見錄衛涇字清叔自僉幙奉召而不入國門翺翔於江上六合墖又宋藝圃集李沆有題六合墖詩山雪溪集王銍云余與郭壽翁别於錢塘追送至龍白墖寺又江月松風集白墖詩宋宮傳自唐朝寺白墖崔嵬寢殿前案此則一白墖唐代物宋時巳稱在禁中嘉木揚喇勒智裒宋陵骨而建稱鎮南墖俗一瓶墖者又一墖也西湖志雖兩載白墖不為疏明又考清江集穆陵行云江頭白墖今不見則鎮南墖自明初剗去之也如此兩墖本末朗然今志多誤皇壇髙敞坐神農指向吳山第一峰藥局有方還證類不知仙草閟靈踪咸淳臨安志南渡初有商立者攜神像至杭舎於呉山因以為祠都人有疾禱者必應遂以其神為神農云案商立所攜之神即指為神農西湖志誤作閣上另塑一神農像當從咸淳志太平惠民和劑局方紹興六年置藥局四所一曰和劑局十八年改熟藥所為太平惠民局取大觀刋正藥局方添補紹興寶慶淳祐諸方暨呉直閣諸局方定證類本艸大觀初唐慎㣲撰紹興中詔王繼先校附以釋音付國子監鏤板種白雲仙人靈草歌凡圖靈草五十四各附以歌南宋秘府書也館閣蔵書校更繁綜甄簿錄列庭軒崇文舊目依稀見去盡源流割幾番朝野襍記中興館閣書目淳熈中修渡江後書籍散佚紹興十三年建秘書閣以秦熺提舉秘書省掌求書籍至是數十年所藏充牣乃命館職為書目陳騤領其事網例皆倣崇文總目凡七十卷案今中興館閣書錄十卷淳熈四年陳騤撰李燾序續錄十卷嘉定三年館閣重編其後次第補錄迄於咸淳然今所傳非完書也鄭崇文總目六十六巻舊於各書下疏明源流自樵盡削之今所傳者僅書名耳手畢應防典墨兵野人識小太言􅘱尚書筆札經題後雪柏霜松無此清分門瑣碎錄孫樵謂史書為墨兵泰朝野襍記秦主和議禁私史秦死郡國多鋟本嘉中言者請仍舊禁淳續資治通鑑長編李燾撰乾道初命給筆札寫進熈十年上其書自建隆至靖康凡九百八十卷舉要六十八卷詔付秘書省案此書今所傳者一百七十五巻從閣本錄出南軒集李文簡長編如霜松雪柏生死文字間有水心集長編自春秋後才此書文鑑經時未始刋惛惛理學㒺糾彈家山尚有圖書在不比東莱費墨丹宋文鑑臨安書坊先有聖宋文海孝宗得之命本府校刻益公請加銓擇上屬之吕伯恭書成賜名皇朝文鑑有近臣密啟云奏議中有詆及祖宗政事者不可示後世乃更命直院崔大雅增損後有道學之禁以有伊川文遂詆伯恭上不復降出此書當時迄未刋也家山圖書文公私淑弟子之文傳於許魯齋其書以易中庸古大學古小學參列成圖綱領條目極為精詳朱子語類朱子云吕伯恭編次文鑑徒耗損精力無所禆益稽古如何不鑒今輪臺甄别倍森森可知千古公言是惜爾搜羅系譜心龔頥正著元祐黨籍譜系一百卷悉取籍中三百九人各為傳佚者四人而已案頥正後又著續稽古錄美侂胄功侂胄死詔臨安府毁其書中梁溪漫志紹興間詔贈䘏元祐黨籍諸賢言者謂多奸邪下詔甄别其人本帶經堂集蔡京手定黨籍原有二本南渡後合二校勘詳定慮中有奸人耳所云三百九人乃京第二本案宋史崇寧元年籍黨人凡一百二十人御書刻石端禮門者是為第一本元祐忠良寃始雪慶元理學禍重胎寧知御閣移碑去又見神州置牓来中興編年慶元偽學之禁凡五十九人宰執四人趙汝愚留正王藺周必大待制以上十三人朱熹徐誼彭龜年陳傅良薛叔似章穎鄭湜樓鑰林大中黄由黄黼何異孫逢吉餘官三十一人劉光祖吕祖儉葉適楊方項安世李惪沈有開曾三聘游仲鴻呉獵李祥楊簡趙汝談趙汝譡陳峴范仲黼汪逵孫元卿袁燮陳武田澹黄度張體仁蔡幼學黄灝周南呉柔勝王厚之孟浩趙鞏白炎震武臣三人皇甫斌范仲任張志逺士人八人楊宏中周端朝張衜林仲麟蔣傅徐範蔡元定吕祖泰慶元三年知綿州王沇上言請令省部置籍下臨安府吏部郎黄子由上言人主不當待天下以黨不必置籍以示不廣木幾子由降去元神仙通鑑林靈素侍游禁中至一閣下見碑題云祐姦黨之碑遂獻詩曰蘓黄不作文章客童蔡反為社稷臣三十年來無定論不知奸黨是何人因得㫖撤碑案此事野史多載考宋史崇寧中籍黨人榜朝堂一刻石端禮門再刻石諸州三刻石文徳殿門帝既親書京復自書頒天下並無刻石閣下道流之言不足據國案蘓黄二句金人馬定詩見中州集未擎手版進名銜正士僉人一例芟安得長書似方鳳清風終不涴朝衫朝野類要初入仕必具鄉貫三代名銜謂之脚色崇觀間當書云不係元祐黨籍紹興間即云不係蔡童朱王等親屬慶元問加不是偽學方與銓除韶又上天子書曰萬言書若上公侯則曰長書方卿集方鳯睦州浦江人久於臨安以三策上陳宜中不能用宋亡不仕與謝翺呉思齊為友黄溍作詩序栁貫撰墓銘易地圅頭事緫非髑髏夜泣佛燈㣲死灰又煽咸陽焰江表難推禍福機翠㣲南征錄華岳因韓侂胄圅首有詩云反漢須知為晁錯成秦恐不在於期感圅首之事非也案岳於開禧元年上皇帝書請誅侂冑及蘓師旦語最伉直及圅首後又為此詩重傷國體蓋不肯逐浮議附和者也呉興掌故云翠㣲集華亷字仲清著誤也塋朝野雜記侂胄既見殺巳詔臨安府塟於其家先之顯親報恩寺後易地議起乃下臨安尹遣本府副將尹明斲棺取首命通謝使許左往金交納時詔復秦檜官爵福僑呉集髙宗享國江表禍倚伏有難明者三班受使拆筠籃欲賦枇杷作美談西域凉𤓰似氷雪不勞速遞到江南大金集禮宋使到闕於三品官班内間插髙麗夏國於五品官班内間插先引宋使副出笏捧書至丹墀面殿立定閤使左下受書奏封全轉讀訖引使副左上露堦齊揖入闌内宣問宋皇帝躬身受勅㫖訖左下至丹墀面殿立定禮物右入左出髙麗夏國亦如之歸潛志宋使至金進枇杷子章宗命状元王澤賦詩澤奏云小臣不識枇杷子王庭筠詩成上喜之案庭筠詩見中州集而枇杷詩不載輿地廣記唐地理志餘杭郡貢枇杷尤松漠紀聞北地西瓜圓而色青翠味甘脆中有汁冷今禁圃亦有之北轅錄金接伴使各帶銀牌一面様如方響上有蕃書急速走遞四字上有御押髙築猨臺靈隱宫松花蕭雪綠蘿風畫師却有拏猨手不管霜牙射月中梁溪集有靈隱宫詩網後邨題跋易元吉以畫猿光堯賜以詩案都穆鐵珊瑚易元吉畫猿猱擇虱圖有東坡題則元吉北宋人或光堯跋其畫不則另有一人又云元吉畫二猿俱有白牙識者云母猿方有白牙春水平隄湖上下相攜早試踏青鞵花枝繞路山南北歸去還乗搖碧齋尊生八牋杭人三月三日上踏青鞵碧梁溪集詩雲深不見孤山寺風急難乗搖碧齋搖齋是當時湖船之名萬松深䖏響秋濤路繞宫城氣象豪驀地西風一行雁山雲江月轉蕭騷南窗紀談錢唐闗注子東松聲詩夢破松聲枕上聞睡魔夜半戰唫魂初疑夜雨連江岸乍覺寒潮上海門招引好風來古寺追隨月色下前村晩行欲向聲來處鬱鬱蒼波盡日奔皇元風雅黄子肅錢唐詩舟泊風林一雁聞白蘋紅蓼共思君月明江氷多於海雨後秋山碧似雲除却梅屏無好梅虞淵簿錄不須猜洛花緫入韓園去越果催從項里来北磵集梅屏賦序北山鮑家田尼菴梅屏甲京都髙宗嘗令待詔院圖進名園記牡丹渡江先入韓相園項㑹稽志㑹稽楊梅佳者出里錢唐産者遜之入貢玉女朝天銀作粧詞臣雪宴捧彫章珠簾十二龍樓捲栁絮吹来涴粉香艾軒集有賀雪表又有謝雪賜宴表不書畫題跋記宋寧宗楊皇后題畫册云風吹醉面知寒信脚千山與萬山天甃瓊街三十里更飛栁絮與君看後書題朱鋭冊賜大少保有坤卦小圓印少保即楊次山花枝馬上蹙雙尖繡鎧非同舞袖纖亦有新詞傳禁苑清華直欲匹香奩滄洲集閤子詩應是君王方右武内家仙子亦知兵韻石齋筆談楊妹子寧宗皇后妹書法類寧宗御府畫多命題咏其題馬逺松院鳴琴詞云閫中一弄七弦琴此曲少知音多因淡然無味不比鄭聲淫松院靜竹樓深夜沈沈清風拂軫明月當軒誰㑹幽心柴柵牽名何太迂詩編著錄號江湖鶴山跋語題鴻寳鍾鼎能凌薛氏無讀書附志江湖集九卷錢唐陳思彚本朝人之詩又刋六十家小集皆南宋人余插架有之鸐山集書苑菁華序臨安鬻書人陳思集漢魏以來論書者為一編最為該博案此書凡二十巻後題臨安府棚北大街陳氏書籍舖刋行又刋寳刻叢編二十卷皆金石文跋鍾鼎彛器款識錢唐薛尚功用敏著凡二十卷皆三代以來款識之文尚功手書世傳石刻僅存其半尚功又有鍾鼎韻七卷千秋史法𢎞綱在十四經文舊目遺兩部聖言齊魯論一編帝學古今師宋季三朝政要理宗嘉熈元年詔國子監下臨安府刋朱子通鑑綱目禮記集説大戴禮列於學宫故當時有十四經之目存中興館閣書錄韓愈李翺共成論語筆解十卷王序云此得於錢唐汪充家又通考云魯論二十篇齊論二十二篇多問王知道兩篇自張禹刪之斯文遂喪至南宋巳難捜求矣帝學建炎四年禮部尚書謝克家等上言以故翰林學士范祖禹所著帝學有益治道可備睿覽案此書凡四卷多少官人馬上看凉衫輕拂據雕鞍昨朝曲宴需雲殿親見官家進小冠清波别志士大夫於馬上盡披凉衫漫錢唐鈔志古宫室考南宋大内有需雲殿雲麓鈔髙宗時隆祐太后遺以小冠曰此祖宗燕閒之所服也内苑新營定一亭擬將射䇿卜文星無端竊得機闗透造牓天輸墨有靈三朝政要嘉熈二年廷對有邵澤攜京墨甚佳有中貴欲之邵無吝色中貴曰主上御苑中方建一亭名曰定一上曰有士人用此立説取為状元邵得其説揮毫如飛上得此卷欲寘榜首時已取周坦乃以澤為榜眼地知稼翁集放榜詩平雷轟造榜天齋廊占籍幾春秋紬史翻經死不休不向殿前喫五盞儘判廋語羃缸頭蠧齋鉛刀編送人失解詩紬史翻經有成約不應從此厭招邀武林舊事上御集英殿唱進士名状元賜酒五盞餘人各賜泡飯文知稼翁集進士入試詩要令痩語題虀臼莫把元覆醬瓿注臨安人以黜卷羃酒翻本蘭亭自取嫌寧知慱議辨尖纎當時最好棠棃拓玉枕偏誇字格嚴後邨題跋蘭亭定武石為薛氏子竊去今都城鬻者皆薛續本案都穆鐵網珊瑚薛珦作帥刻石易去蘭亭續考蘭亭本流傳有玉有石有棠梨板木刻者佳至正直記賈秋壑得一碔砆石枕光瑩可愛欲刻蘭亭而患其小有一鐫者以燈影蹙其字宛如定武本缺損皆全賈開宴以賞之世號玉枕蘭亭今稱玉版者繆也茸衫細􅀈錦鞲稜蕉翠珍珍痛不勝枉自監搜誇玉牒愁攤小雅映秋燈宣和遺事二帝后北狩至正定府一畨官妻自稱肅王女珍珍已戎服見太后訴舊事危學士集宋宗室士暾嘗錄羣從之言號為玉牒勝談載靖康小雅一卷紀北狩事此書通考失霜草稜稜健翮舒秋風獵獵海天虛南中那得巢生犬宫禁空傳㕲潄書東園友聞北方雕作巢官司必設置守之凡三卵及出必有一狗耳上有羽毛獵時雕上飛狗則陸行所逐同至名曰鷹眥狗上肎綮錄臨安有人好養鷹嘗見其几間有書一帙題㕲𠻳二字皆飼鷹之法問所從來則曰先人在北司諸閹往來此從宫中得之國事已荒藍貌鬼南人惟恃黑灰團蠟丸夜達中書省只作牽絲撮㺯觀三朝政要丁大全藍色鬼貌既登寵位北兵渡江大全匿報幾誤國事遂謫竄而死又北兵渡江臨安將謀遷蹕呉潛沮之向士璧曹世雄劉整皆有功似道並欲殺之整懼以城降北遂獻言曰南人所恃惟一黒灰團耳吕文徳號黒灰團又杜清獻集奏藁臣蚤上得吕文徳蠟書以捷聞既有告急之説御筆降出無甚迫急城中有恃而無恐耳制後村集端平之初除拜一新趙南塘起散地掌内有觀傀儡詩云酒䦨有感牽絲戲也伴兒童㸔到明為有宫閨識小名又聞臺閣系羣英傳来都是臨安本粉墨閒銷與漫評姬侍類偶周守忠集女子之名作偶聨韻語嘉定十三年刻於臨安行往諸軍糧料院幹辦鄭域序自號錄錢唐徐光溥輯宋代名人之號淳祐丁未其友譚友序而刋之諸軍糧料院在漾沙坑今蛾眉山東之淺山香奩弟子舊秦風詩法精深碑版工莫效長牋怨夫聓徒揮老淚倚熏籠四朝詩集云閨秀韓玉父秦人家於杭李易安教以詩雲麓漫鈔易安居士有投内翰綦公崇禮啟清照啟素習義方麤明詩禮近因疾病欲至膏肓牛蟻不分灰釘已具嘗藥雖存弱弟應門惟有老兵既爾蒼皇因成造次信彼如簧之説惑兹似錦之言弟既可欺持官文書來輒信身幾欲死非玉鏡架亦安知僶俛難言優柔莫決呻吟未定强以同歸視聴才分實難共處忍以桑榆之晩節配兹駔儈之下才身既懐臭之可嫌惟求脱去彼素抱璧之將往決欲殺之遂肆侵凌日加毆擊可念劉伶之肋難勝石勒之拳局地扣天敢效談孃之善訴升堂入室素非李志之甘心外援難求自陳何害豈期末事乃得上聞取自宸衷付之廷尉被桎梏而置對同凶醜以陳詞豈惟賈生羞絳灌為儕何啻老子與韓非同傳但祈脱死莫望償金友凶横者十旬蓋非天降居囹圄者九日豈是人為抵雀捐金利當安往將頭碎璧失固可知實自繆愚分知獄市此蓋伏遇内翰承㫖搢紳望族冠蓋清流日下無雙人間第一奉天克復本緣陸贄之詞淮蔡底平實以㑹昌之詔哀憐無告雖未解驂感戴鴻恩如正出已故兹白首得免丹書清照敢不省過知慙捫心識媿責全責智巳難逃萬世之譏敗徳敗名何以見中朝之士雖南山之竹豈能窮多口之談惟智者之言可以止無根之謗髙鵬尺鷃本異升沈火鼠氷蠶難同嗜好達人共惜童子皆知願賜品題與加湔洗誓當布衣蔬食溫故知新再見江山依舊一瓶一鉢重歸畎畝更須三沐三薰忝在葭莩敢兹塵凟案易安再適張汝舟竟至對簿啟在臨安作也時崇禮官翰林學士舊說南朝三百寺猶餘兩碣未頑孱誰知千古忠姦蹟却在波崖泐石間興福禪院碑淳熈七年周邽撰記劉士莊書慧雲寺碑史浩撰記樓鑰書此又稱張家寺廣壽熈寧石屋題名陳襄蘓頌陳奕黄顥曾孝章蘓軾同遊熈寧六年二月二十一日案咸淳臨安志蘓公題名黨禁時巳鐫去今摩崖朗然後人重公之名而補刋也咸淳石屋題名咸淳三年九月二十八日賈似道領客束元嚞史有之廖瑩中黄公紹王庭來游子徳生諸孫蕃世侍案此段摩崖賈名漫滅後人惡賈而毁之黄鴦枝上盡情啼何䖏西陵路欲迷款款朱輿繞湖去相君心愛白沙隄呉越備史西陵即今西興錢王渡江以陵非吉語因易之案此則錢唐稱西陵繆也咸淳臨安志無白公堤所謂白公築之堤在上湖與下湖相隔處公自著錢唐湖石記可証今人所指之白堤即白詩所云綠楊隂裏白沙堤白公前已有之宋時稱孤山路故成化府志猶無白堤之名三朝政要賈相出乗朱輪輿自葛嶺至宮城繞堤而行嬌女如花掩畫屏牙旗小校閉松㕔新書仿出奇奇集更著兵門蟋蟀經志雅堂雜鈔賈師憲嘗刋竒竒集萃古人用兵之法蓋自誇其援鄂之功也世傳新書曹孟徳著蟋蟀經三卷相傳賈秋壑著詞頗雅馴有更籌帷幄選將登場諸語徽藩嘗有繪畫本鴟彞不逐五湖雲那肯鎔金獨笵君黄土摶成終是偶沉香爇盡更誰熏三朝政要賈似道既占湖山之勝作半閒堂延羽流塑巳像其中元秘書志延祐七年五月中書省簿籍諸物有賈似道畫像二軸研朱嵌墨離文似沁綠塗青銅匭如久已朝堂不設鼓無勞齋館有辭書三朝政要景定五年造金銀見錢闗子其制上墨印如西字中紅印三相連如目字下兩傍各一小黒印宛如一賈字在又賈似道當國置綠櫃招人告訐兹清波别志行登聞鼔院有院無鼔以鼓在汴京不復設士三朝政要太學生上書輒累百人令臨安尹逐游并削其籍諸生作捲堂文以辭先聖太學在紀家橋今按察司署水西雲北景蒼蒼花塢風晴月有香何似梅花裏湖好長留孤影照滄浪洺水集三賢堂記乾道中移三賢於水仙王廟東廡雖摘取坡公詩配食水仙王之意俛居廡下慢賢滋甚郡守袁韶捜得花塢一所當蘓隄正中建堂奉安又剏三堂曰水西雲北曰月香花影曰晴光雨色興觀集詩咸平處士誠堪羨死守梅花住裏湖爛爛珠光散不收香煙縈郁水空流皇家寳異誰經識冊府猶堪按籍求至正直記宋臨安時有以徑寸珠進御一宦官求賂其人不從宦官取絲絡珠於梁焚乳香熏之須㬰化為水宦官云此非明珠乃猿對月凝視久墮淚含月華而結成也寶貨辨疑一卷宋時掌公帑者所錄凡物源産地用法皆詳述三千上玉只焚身雲氣終虛屍氣親二十金釵共垂手九歌聲裏哭孤辰三朝政要賈似道愛珍寶聞余玠有玉帶發塚取之志雅堂襍鈔盧方喜作秋壑記九歌錦刻蒲桃稱異色當時諫史絶奢華後来輿論成謠諑玉碎琉璃號假花中興編年淳熈中蜀貢葡萄錦却之從臺臣諫也璃佩韋齋輯聞咸淳末禁都下婦人飾珠翠悉以琉代玉民謠曰滿頭多是假無處不琉璃時似道當國假謂賈琉璃謂流離也墨花零亂涴殘脂獨爾烏䦨寫妙詞休話平康舊都事蔡奴留影傳師師四朝詩集云南宋杭妓能詩者蘓小娟白後村詩話汴妓郜六即蔡奴也元豐中命待詔崔圖其貌入禁中學敏求記李師師小傳一卷臨安刋於𣙜場中老菴筆記潘子賤有題蔡奴傳神語云嘉祐問風塵中人亦如此嗚呼盛哉則蔡奴留影正南宋事也潘為紹興中人燕子帶来雙翦雨梨花老去一絲風啼痕染就紅心草誰𦵏金釵葛嶺柬桐江集木綿怨序云賈似道南竄猶攜所謂王生沈生者自隨二生天下絶色也木綿菴既殂二生再展入北後南還善事貴人巧伎藝拙女功願再鬻人為妾因寫之樂府以為世戒㑹向歌樓喚酒京不煩束帶款逄迎玉缸若藉甆罌佐祕色新来雨後晴雲麓漫鈔都人呼酒瓶為酒京侯鯖錄有酒經晉安人餽酒致書云或一經或五經他邦人不知其義聞送五經束帶迎於門自又青甆器李王秘色為最近臨安亦燒之殊勝於前自是清才繼玉瀾鸞釵劃損綠琅玕桃墩緫有傷心淚勒斷筋弦不忍彈斷腸集朱淑真錢唐下里人世居桃村工為詩嫁為市井民妻不得志歿宛陵魏仲恭端禮輯其集名曰斷腸錢唐鄭元佐加注分為十卷刋行有臨安王唐佐傳今失之世所傳二卷田藝衡序者繆也四朝詩集云淑真海寧人文公姪女晩玉瀾堂記朱橰字逢年文公叔父少負才不得志年節愈厲而詩益髙因夢名堂曰玉澗尤延之為序我曽把讀梁溪集五世三公喬木材此日君臣咏魚藻湖園親駕翠龍来梁溪集尤袤延之著凡五十卷嘗萬栁溪邊舊話先莊定公築圃臨安之西湖度宗幸其堂御筆題楹間曰五世三登宰輔奕朝累掌絲綸宫袍掩映牡丹緋裊裊鞭絲出禁闈寄語香街探花使今年春榜號龍飛朝野類要聞喜宴日選年少二人先到瓊林折花迎状元吟詩此唐制今人謂第二名為探花者非也又毎遇主上即位第一次選士謂之龍飛榜蕊珠淡墨尋常事尚見同班兩錄留千古香名磨不滅後来應號小瀛洲紹興十八年王佐榜同年小錄寶祐四年文天祥榜登科錄此二錄後有翻刻為有朱文公及文信國耳文公名在第五甲第九十人字元晦小名沈郎小字季延信國第一甲第一名字宋瑞小名雲孫小字從龍案後村集有甲申同班小錄序即題名小錄也光水天閣集小瀛洲石簣為商半埜題以其地近依堂南宋進士題名之處十里平湖波浪深大魚成抱小魚針放生不禁魚兒活贏取豪家幾笏金金石志有髙文虎徳生堂碑記案慶元中安撫趙師請用天禧故事以西湖為放生池則通西湖皆稱放生池非今一隅之地也徳生堂在石圅橋今昭慶之側而淳熈虞公謂堂在湖心寺指今之放生池殊不知宋時湖心寺即今之湖心亭舊志多訛舛余修邑志駁正之夢粱錄金魚有銀白玳瑁等色錢唐門外多蓄養之入城貨賣名魚兒活羅屏掩處添三尺蘇幕遮來抵一重若使藏鉤勝隔座為因鬬草代分夆雲麓漫鈔紹興末中官以小竹編聨籠以衣畫風雲鷺鶿名曰畫絲好事者大其制施於酒席或野次可以障風易其名曰挂罳又言出於金中目曰話私言遮蔽可話私事然言為話南人方言非北語也玉龍萬捲發靈虛畫裏濤江壯帝居只道鳬車迎伍相不知水馬弔三閭七修續藁葉南屏家有宋宮觀濤圖案圖李嵩畫見張憲玉笥集稊米集詩江風獵獵吹紅旗舟人結束誇水嬉又云飯筒角黍纒五綵楚俗至今猶未改日暮空歌誰在斯不見三誾憔悴時案周紫芝此詩言錢唐江中競渡也他志只言在西湖耳紫芝官臨安久其言有據尊生八牋南方競渡使舟輕利謂之飛鳬又曰鳬車有詩云水馬浮江弔屈魂南朝剰有虞公劍能比金源水造刀待與青城間鼓枻西風一葉泛離騷朱存理鐵網珊瑚宋相虞雍公古劍傳於其八世孫堪處倪瓚作古歌志雅堂襍鈔伯幾家有箆刀乃大金水總管所造上有滲金鐫水造二字直鈔十錠倪雲林集堪字克用僑居錢唐四壁山有鼓枻稿桐華煙細不湏多案上牀間置幾螺怎得清芬如帝子請將墨史試研摩墨史澤州胡景純取桐油燒煙製墨名桐華烟郡又南朝皆稱墨為螺又趙令衿宋宗室封安定王善製墨子子覺孫伯康皆傳其膠法銘曰超然清芬如在超然令衿自號春宴遺風自曲江水晶雲殿百花牎熒煌燈火錢唐夜十隊酣春賽不降朝野類要行都西湖寒食前排辦春宴用舟載伶妓此唐曲江之遺自諸王公卿及六曹郎排日宴㑹並是京尹館伴百天籟集西湖詞十里水晶雲殿舎夢粱錄湖船有花十様錦等名霞外集詩店喧譁徹夜開熒煌燈火映樓臺歡游未曉不歸去早有元宵氣象來剡源集咸淳徳祐中杭有善歌者十人各以才色聞天下兵後散失襜車小隊出通津艷紫文羅半隱身縱使凌波歩羅襪不爭水路蹙絲塵清波别志婦女步通衢以方幅紫羅障蔽半身謂之蓋頭凡貴游出令人持鍍金水罐子前洒方過車名曰水路此猶汴京之遺風也井汲甜𤓰分外清十街三市幾番更水銀不願天宫賜只願官除竹木征夢粱錄六部前有甜瓜井年清波别志臨安人移屋以傍井處為佳中興編紹興二十六年七月臨安雨水銀安三朝政要紹定五年臨蠲竹木之征潮拍樁漘卦畫齊蛟宫荒怪漫然犀鱗蟲水母差堪異更詫毛羣膃肭臍呉越世家疑辯錢武肅築塘以木立於水際去岸二丈九尺立九木作六重象易既濟未濟卦由是潮不能攻如龜溪集錢唐水母詩眼中水怪状莫名出沒沙觜浮嬰渾沌七竅俱未形塊然背負羣鰕行清波别志臨安小民往江口見潮退有一異物褐色有毛有牙有脚有鼻有耳骨軟似不任持重三四十斤或名為海狗後有貴人詢其形状曰此膃肭臍也五酘封蒸按舊經亭童取汲水清渟河陽風月依然是况有如花儐酒伶宴公類要江南五酘酒佳稊米集論麴院書酒與麴相須而成在乎擇水之者西湖之水清甘如飴其外則用龍山鴻雁池水南外用巡檢司大井水江漲北外用下湖水夢粱錄臨安府㸃檢司管城内外諸酒庫毎年清明前開煮擇日開沽呈様各庫預貼告示官私妓女社隊鼓樂謂之迎煮汴都記酒家望上書河陽風月湖目全憑水結叢琉璃地上旱蓮紅鴛鴦豈是能言鳥唼唼經魚粥鼓中北磵集白蓮花寺在風篁嶺下肇法師誦經於此蓮生陸地鴛央亦解誦經湖目蓮子見皮日休詩一生難報狀元㤙日月精光吐復呑不信漁陽撾鼓急回頭無路哭修門文信公傳伯顔駐軍臯亭山公往議和伯顔以危言折之公謂宋状元宰相所欠一死報國耳文山全集鹿鳴宴詩有云二宋髙科猶易事兩蘓清節乃加榮囊書自負應如此肯遜當年禰正平自注提舉李愛梅迪舉送弟璧同薦是年及第里指南錄序臯亭山距修門三十寒鴉啼上萬年枝一片荒坪月去遲滚滚蠻潮等閒過蓬葩江上弔鴟彞江月松風集故宫詩寂寞萬年枝上月夜深猶照舊宫牆滄洲集羅公升之大父從文丞相於閩廣兵敗不食死公升傷大父死節而宋祚已終乃作弔胥濤賦蓬葩見劉乂詩夢斷羅衾冷似氷嘐嘐紅喙語雕棱木波不斷幽人怨梧葉聲中蟋蟀燈乾坤清氣集􅌡國公鸚鵡詩毛羽自然可數仙禽不受凡籠銜得梧桐一葉中含無限秋風湖山類藁瀛國公為僧號木波講師投老湖湘更不歸哀江南後淚空揮傷心釃酒城南路親見鸞皇作隊飛金臺集水雲北歸後往來匡廬彭蠡間若飄風行雨人以為仙畫其像祀之宋遺民錄謝翺賦續琴操哀江南四章為錢唐汪元量作也按水雲集元量以琴供奉扈駕北行既而以黄冠放還徳祐主贈之以詩宫妃屬和以勸君更盡一杯酒西出陽闗無故人分韻王清蕙陳正淑黄慧正何鳯儀朱靜正葉靜慧孔清正鄭惠正方妙靜翁懿淑章妙懿蔣懿順林順徳袁正淑又有章麗正袁正正金徳淑緫十七人其詩並見集中余家藏元量水雲集及湖山類藁二本互有不同千古靈胥氣未銷青霓曳曳下雲翹巫師但擊靈鼉鼓更有何人賦大招金龍山聖蹟記謝公緒㑹稽諸生居錢唐安溪謝太后姪也三宫北行公投安溪死門人𦵏於鄉之金龍山明太祖吕梁之捷神顯靈遂勅封金龍四大王立廟於黄河之上余修錢唐邑志補入忠節傳傳道尋春四壁還江清湖淥有無間元和圖牒分明見何處沉霾界石山朱存理鐵網珊瑚倪瓚題虞堪八世祖雍公古劍歌序云余訪青城山樵於錢唐之四壁山案此山之名咸淳志不載後來作志者均失之之元和郡國志錢唐載二山一靈隱一界石今界石名宋志巳無今不可考故事全憑共討論江闗老去鳳皇門華胥醒後黄粱熟便話南柯也不根松隱集徳壽宫帖子向晩天中月一痕春陽先到鳯皇門東京夢華錄幽蘭居士孟元老追叙東京舊事書成於紹興丁夘自為序淳熈丁未浚儀趙師俠後序夢粱錄呉自牧自序云昔人卧一炊頃而平生事業剔歴皆遍矧時異事殊城郭苑囿之富風俗人物之盛焉保其常緬懐往事殆猶夢也因名夢粱錄逮養䝉集南柯錄序御前提㸃錢唐劉君久居禁近事皇元不失故步退食多間追記舊聞名曰南柯錄蓋紀曩日繁華事也案此編失傳名亦無考名集猶傳六十人湖雲江月話津津而今花栁新題處况是欣逢寳厯春南宋六十家小集錢唐陳思彚集本朝人之詩集尾書刋於臨安府棚北大街陳氏書籍舖者是也題曰羣賢小集鄱陽洪邁野處類稿二卷臨川危正巽齋小藁一卷螺川羅與之雪坡小藁二卷滄洲髙九萬鞠磵小集二卷臨江鄒登龍梅屋吟一卷旴江余觀復北窻詩藁一卷間封趙崇鉘鷗渚微吟一卷古徐朱南杰學吟一卷古栝王琮雅林小藁一卷芳庭斯植采芝集二卷錢唐陳起芸居乙藁一卷霅川呉仲孚鞠潭詩集一卷龍泉沈説庸齋小集一卷唐栖釋永頥雲泉詩集一卷金華王同祖學詩初藁一卷四明陳允平西麓詩藁一卷錢唐何應龍橘潭詩藁一卷柯山毛珝吾竹小藁一卷臨江鄧林皇華曲一巻壺山許棐梅屋詩藁四巻清源胡仲參竹莊小藁一卷三山陳鑒之東齋小集一卷浮玉施樞芸隱横舟藁一卷又芸隱倦游稿一卷建安徐集孫竹所吟藁一卷旴江吳汝弌雲卧詩藁一卷古汴武衍適安藏拙餘藁二卷四明髙似孫疎寮小集一卷建安葉紹翁靖逸小集一卷河陽張弋秋江烟草一卷建人張至龍雪林刪餘一巻金華杜旃癖齋小集一卷廬陵劉僊倫招山小集一卷玉溪嚴粲華谷集一卷旴江黄文雷看雲小集一卷汴人趙希㯝抱拙小藁一卷丹陽葛起耕檜庭吟藁一卷碧澗利登骳稿一卷亷村薛嵎雲泉詩一卷山隂葛天民無懐小集一卷錢唐余桂漁溪詩藁一卷又漁溪乙藁一卷長沙劉翰小山集一卷大梁張良臣雪窻小集一卷邗州張蘊斗野稿支卷一卷南豐黄大受露香拾藁一卷三山林希逸竹溪十一藁一卷長樂敖陶孫臞翁詩集一巻建安朱繼芳靜佳龍尋藁二卷閩人陳必復山存存藁一卷長樂林尚仁端隱吟藁一卷剡溪姚鏞雪篷藁一卷福唐劉翼心㳺摘藁一卷舂陵樂雷發雪磯叢藁一卷苕川宋伯仁雪岩吟革一卷天台戴復古石屏續集四卷笠澤葉茵順適堂吟藁一卷廬陵劉過龍洲小集一巻石塘林同孝詩一卷荷澤李龑梅花衲一卷又翦綃集二卷鄱陽姜䕫白石道人詩一卷臨川李濤䝉泉詩一卷陽穀周文璞方泉詩一卷廬陵沙門紹嵩江浙紀行集句七卷宣城呉淵退安遺藁二卷永嘉薛師石𤓰廬詩一巻又陳起宗之編前賢拾遺五卷又編增廣髙僧前後集四卷此編流傳絶少特著其目如右雨石屏集詩聖朝開寳歴又云江山一夜花栁九州春南宋襍事詩卷二
