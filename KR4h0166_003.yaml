body:
  text: 南宋雜事詩卷三仁和陳芝光撰元朔朝正海國來聽雞探繭曉光催千官鵠立瞻天表萬歲聲長繞殿雷夢粱録元旦禁中景陽鐘罷百官皆冠冕朝服諸州進奏吏各執方物之貢諸外國正副賀正使隨班入賀上御正衙禁衛人髙聲嵩呼聲甚震名為繞殿雷百僚俱鞠躬聽宣制曰履兹新慶與卿等同斗野藁除夕詩京國逢除夕栖遲鬢欲霜春聲生爆竹歲色動椒香戒睡聽雞蚤占詩探繭忙燭花頻送喜兒女笑鬨堂金釘彎橋白玉裝幽奇全勝偉觀堂假山敕賦壺天景又見香蘭設御牀癸辛雜識德壽宫有橋乃中秋賞月之所橋用吳璘所進階石甃之瑩徹如玉以金釘鉸橋下皆千葉白蓮花水南岸宫女童奏清樂水北岸教坊樂工吹笛者二百人方輿勝覽中和堂太上光堯皇帝御書謂斯堂偉特之觀無愧上都薰風南來我意雖暢願與衆人共之後改為偉觀堂海野詞侍宴德壽宫應制賦假山調寄醉蓬萊云向逍遙物外造化工夫做成幽致杳靄壺天映滿空蒼翠聳秀峯巒媚春花木對玉階金砌方丈瀛洲非烟非霧恍移平地况值良辰宴遊時候日永風和暮春天氣金母龜臺傍碧桃隂裏地久天長父堯子舜燦綺羅佳㑹一部仙韶九重鸞仗年年同醉宋史新編理宗在位久董宋臣盧允升作芙蓉閣香蘭亭宫中進倡優傀儡以奉帝遊宴翠寒堂上賞春風壯麗由來絶代工小憩肩輿髙栁下酴醿飛雪夀杯中二老堂雜志淳熙七年三月十八日車駕詣德壽宫恭請太上皇帝壽聖皇后於是乘輿至大內於凌虛閣下三面設酴釄牡丹花皆層級髙數尺一面垂簾設樂酒三行太上皇帝壽聖皇后聨步輦以行今上亦步輦從至翠寒堂棟宇顯敞不加丹雘太上指示曾覿云營造何如覿奏曰宏壯精巧二者兼之今上即曰凡此巨材一椽巳上皆出太上皇帝所賜酒復數行至水堂中路石橋上肩輿少憩面對酴釄花架髙栁參天酴釄引蔓垂梢而下其長袤文芳菲照坐馥郁襲人上亦滿引勸酬者三栁隂橋影步忘歸樓傍雙清碧四圍消得騷人奇絶想荷花欲翦嫁時衣庸齊小集西湖獨步詩小立背橋影緩行隨栁隂可方壺存藁秋日飲錢唐門外雙清樓詩西湖日日尋芳樓上憑闌意未忘斫取荷花三萬朵作他貧女嫁衣裳老木雲煙望裏平小春橋外水風聲猶餘圖畫雙杉古誰把青龍指下生蛻菴集鳯山詩衰草寒烟老木風南朝佳氣落秋空余忠宣集九里松詩言從天竺寺自度小春橋傅與礪集有題李遵道畫靈隱道中二杉圖拈犂眉公集題松雪松圖注云松在白塔詩云趙公筆作古松平地躍出三青龍又云前朝美人鬭草處猶有當時數株樹案小春橋即行春橋酴醿如雪酒初醒修竹風搖著作庭曽說牙籖紛萬軸不如丹筆寫盤銘梅溪集有祕書省道山堂看酴醿詩牆又題祕書省後圃修竹詩不俗更嫌俗風枝時拂青青映藜燭細細雜藝香徑節老方見清隂寒影藏蕭疏似吾輩味向靜中長藤隂劄記光宗讀朱子編次盤銘丹書語朱子曰宫中嘗讀之其要在求放心朱子頓首謝沙河燈火接星關洞裏神龍去不還部伍亭前空緑草戴髙祠畔賸青山默堂集初到臨安詩風際管弦朝病酒雲中樓閣夜焚香十年一夢沙河路獨步春泥覺燕忙抱拙小藁臨平洞兩洞深如許神龍此奠居聊默堂集詩部伍亭前歸路鳯皇山下蕭齊我自無不住君如有興重來江晞髮集吳山謁祠詩吳山坊項戴髙祠禁地凄凉水悲却是北人題記壁迤南耆舊獨無詩思陵筆格入鍾王搜得麻箋僅九行試看當年題識在磁藍籖色逼靈光續書譜髙宗書法出入鍾王更輔以六朝風骨自成一家松雪齊集王獻之洛神賦十三行二百五十字人間只有一本是晉時麻箋紹興間思陵力購僅得九行一百七十六字至賈似道復得七十四字裝潢志宋徽宗金章宗多用磁藍紙泥金字貼籖殊臻壯偉之觀髙宗亦用之梅竹勻將扇面攤江南情思落齊紈可知青紙為承萼儉德猶留後世看夢粱録夜市有崔官人將字攤梅竹扇面兒在五間樓前大街坐鋪玉山璞藁題宋髙宗意思便面詩當朝山色尚烟嵐近侍承恩罷早參邊奏不來春殿寂自將情思寫江南懶真子紹興三年六月明州阿育王山住持淨曇以宸奎閣所藏仁宗御書詣行在所獻凡五十三軸又有團扇三柄皆以青箋紙為承萼制度極草草大哉仁宗之盛德也和王世澤有文孫猶記當時雲洞園搜輯九經竒字在更饒六帖與評論六帖補吕午序云楊伯嵓號泳齊和王曾孫輯六帖補最精核往與豫同仕於朝出示此編命為之序泳齊又作九經補韻行於世天竺山西巖谷深松蘿交翠自成隂老禪慣與猿公戲攫果時來樹下吟帝都賦傍西深入巖谷益秀林竹所吟藁下竺看猿詩渴泉飲罷過别枝株守山得便宜伸手攫拏野僧果貴游玩弄如兒嬉一山桃李占繁華武庫旗翻寂不譁回首蓬萊雲氣近殿司營是太師家龍洲集同郭殿帥遊鳯山詩亷纎小雨久於梅喜得新晴亦快哉五色波光麗鳷鵲十分雲氣近蓬萊旌旗側畔宫牆轉戈㦸叢中武庫回走馬看花生怕晚果然桃李一山開揮麈後録蔡元長少年鼎貴建第錢唐極為雄麗全占江湖山林之勝今行在殿前司是也案殿前司在鳯皇山大內側今呼御校場才過燒燈小雨收玉梅飛上玉搔頭湟槃勝㑹花生日看畫長明寺裏遊斷腸集元夜詩壓塵小雨潤生寒雲影澄鮮月正圓十里綺羅春富貴千門燈火夜嬋娟香街寶馬嘶金轡輦路輕輿響翠軿髙掛危簾凝望處分明星斗下晴天夢粱録杭城大街春冬撲賣玉柵小毬燈竒巧玉柵屏風捧燈沙戲走馬燈鬧蛾兒玉梅花金橘數珠糖水魚龍船兒梭毬香鼓兒等物又云仲春十五日為花朝節崇新門外長明寺建佛涅盤勝㑹羅列􅜖幢種種香花異果供養掛名賢書畫設珍異玩具觀者紛集竟日不絶六日七分添線處五更三點賀冬時地瓶移插梅花吐繡疊簾旌喚舞兒詩林韶濩周必大云冬至與胡邦衡小語端誠殿下邦衡舉易緯六日七分之說輒用子美五更三㸃為對盡霞外集至節即事詩天街曉色瑞烟濃名紙相傳賀冬繡幕家家渾不捲呼盧笑語自從容昨夜梅花巳報春地瓶移插更精神酒酣纎手爭來折鸚鵡回頭不敢嗔已有紗籠照舞兒喧喧鼓笛自相隨誰家院落來呼喚門外天明也不知簾旌疊疊繡鮫綃遮護㕿風不放消却恐酒闌先睡去預教小玉問明朝平案馬霞外自序云年少承之樂誠不易逢也宋家南渡擬東遷為有遺經大道傳不比五山兼十剎崇儒但賦北山篇勿軒集周東遷而夫子出宋南渡而文公生世運升降之㑹三綱五常之道所寄也又南渡初文定胡公造行都有以程氏之學盛行為言公愀然曰吾以程氏之學不行為懼何言盛耶梅村集宋元以來浙東西分立五山十剎而靈隱居其最宗仁山集北山之髙一篇美咸淳天子謂其能繼理師賢而聘何夫子也何即北山先生名基章公太學原竒士周子兵樞亦勝流天下何曽有鵬卵人間可惜重魚頭齊東野語外大父文莊章公少入太學為集正嘗置酒揭饌單於爐亭品目多異其間有鵬卵者最竒大如瓜片切餖飣大盤中衆駭愕不知何物其法乃以鳬彈數十黃白各聚一器先以黃入羊胞蒸熟次復入大猪胞以白入之再蒸而成按章名良能寧宗時登政府二老堂雜志紹興辛巳豫為祕書省正字同館王十朋望見周麟之樞密目為魚頭公問其故云前歲為大金哀謝使金主喜之享以所釣牛魚非舊例也樞公糟其首歸獻於朝故有此號金人甚貴此魚直與牛同海陵集豫憩燕山㑹同館有梁大使者先朝內官也入館傳㫖賜金瀾酒二尊銀魚牛魚二盤演繁露牛魚觜長鱗硬頭有脆骨重百斤即南方鱏魚也夢兒亭下蘚紋青更著佳名謝屐亭誰賦池塘春草句只吟五字對山屏靖逸小藁登謝屐亭贈行之詩君家靈運有山癖平生費却幾緉屐從人喚渠作山賊內史風流定誰識西窗小憩足力疲夢賦池塘春草詩只今屐朽詩不朽五字句法誰能追自注云亭在天竺案西湖志有夢謝亭無謝屐亭龍眠古器寫形新骨董流傳入要津六十卷中彞鼎字不知曽否辱狂秦揮麈録李伯時自畫其所蓄古器為一圖舊在畢少董處少董死乃歸秦伯陽熺學古編云博古圖六十卷紹興間本今無矣黃羅封麵賜頻叨德大王侯始食牢夢裏紅衣有歌句普門何必更相遭全芳備祖蘇公詩注大內當麥熟時以黃羅帕封賜百官外題曰新麵或云以蜜漬尤佳今內廷猶仍此制客墨憨齊笑纂翟公巽紹興初為參政自奉過薄謂曰德大於天子可以食牛德大於諸侯可以食羊所進皆草具丸夷堅别志杭人有中麥毒夢紅衣娘子悲歌有一蘆蔔火吾宫之句咸淳臨安志上天竺觀音祈夢極靈兩浙進士類試者恆往焉多以食物著驗緝熙小殿研山排御墨流香記損齊天語微聞先八法正書派别出垂叉輟耕録葉世英造德壽宫墨葉邦憲造復古殿墨劉士先造緝熙殿墨志雅堂雜鈔髙宗御書損齊二大字並損齊記後有左僕射沈該以下聨名法法書通釋宋髙宗云士於書法必先學正書以八皆備不相附麗蓋篆隸之餘風五栁園前栁線低新開門外草痕齊若從新路看花去一片紅隨碧玉蹄都城紀勝新門外五栁御園巷咸淳臨安志五栁園在金剛寺北按即今之板兒內也又云走馬塘在艮山菜市門外地平坦可馳馬故名舊有花栁號城東新路鄂字書成壯氣存臨安何處望中原蘆川亦有英雄語禾黍西風鼓角喧揮麈新談有請仙者箕書一詩云百戰間關鐵馬雄尚餘壯氣凜秋風有時醉倚箕山望腸斷中原一夢申後大書一鄂字始知為武穆也州蘆川詞賀新郎送胡邦衡待制赴新州云夢繞神路悵秋風連營鼓角故宫禾黍檜案張仲宗以此詞忤秦除名活水穿田一徑微麥潮化蝶作團飛蟠龍舞鳳盆花樣多向都城賣却歸西麓藁馬畻道土詩間拖瘦竹笻獨步馬畻東鳥影青山外春愁碧樹中麥潮風化蝶櫻熟雨生蟲莫向溪頭去溪頭多落紅田斷腸集馬畻詩一畻芳草碧芊芊活水穿花暗護蠶事正忙農事急不知春色為誰妍竒夢粱録錢唐門外東西馬塍諸圃皆植怪松異檜花巧果多為龍蟠鳯舞之狀每日市於都城石八郎祠社鼓鳴龜兒井畔聽溪聲千林吹落梅花雪一段清愁畫不成成淳臨安志安樂山在錢唐下有石八郎祠龜兒井在西溪覆以石龜穴其背以汲雪窗小集過西溪詩罨畫層波蕙草荒冷雲客雁兩回皇梅花到得吹成雪盡是清愁不是香侍讀清才進美譽一筒散卓拜中書叢奎自愛屠希手入貢澄心紙不如渭南文集紹興之間有筆工名屠希者嘗從駕四方皆貴希筆一筒至千錢朝侍讀以道作詩稱譽之六研齊筆記謝塈知徽州於理廟有椒房之親貢新安四寶澄心堂紙汪伯立筆李廷圭墨羊鬭嶺舊坑硯煆銀枉為問工儔帶格曽傳號笏頭不信還來玉包肚可能勝得紫雲樓琅琊漫鈔孝宗乾道中有以銀礦獻於朝上命守臣詢究且將召冶工即禁中煆之帶格凡三十二種其首為笏頭一字執政佩之至煆銀塗銅各有名號宋稗類抄王荆公受賜玉帶號玉抱肚紹興中王之曾孫璹復進入禁中視格古要論王佐紫雲樓金帶考太宗得巧匠親督於紫雲樓下造金帶得三十條以一賜曹彬一以自御餘皆貯庫號鎮庫帶封鐍甚嚴至徽宗以賜童貫諸人欽宗復追還庫髙宗紹興十三年有客來自海外忽出紫雲樓帶蓋欽宗取追不及者上出四銙示嶽珂其金紫磨地光艷溢目其文作醉拂􅀢人皆突起長不及寸眉目生動其華紋則又六七級鏤篆之精若入鬼神懷蘇何處覓芳叢採璧擎珠繡戶中休向酒邉尋搭子京塵空度杏花風嘉禾百咏注懷蘇亭在禾城東宋時建與蘇小墓相望故名江行雜録京都不重生男凡生女則愛護如捧璧擎珠甫長則隨其姿質教以藝業因備士大夫採擇袖中錦京師婦人美者謂之搭子陋者謂之七蓋搭子者女傍著子為好字七字不成女字謂其不成婦女也存餘堂詩話嘗見宋刻一詩云客懷耿耿自難寬老傍京塵更鮮歡逺夢巳回窗未曉杏花風度五更寒因讀渭南集乃知其在都下作也都亭館伴禮殷勤向冷泉亭坐夕曛無奈西湖銷滴水筆端驕語記煙雲方輿勝覽都亭驛在候潮門裏國信所北使至闕先遣館伴使賜御筵於班荆館明日始至都亭驛又明日入見見之二日與伴使皆往天竺寺燒香上賜沈香乳糖齊筵酒果次日至冷泉亭呼猿泂而歸中州集王兢奉使江左讀同官蕭顯之西湖行記詩雲烟濃淡費臨摹行記看來即畫圖雲夢不妨吞八九筆端滴水了西湖平章廟記筆穠纎却費青珉片片劖秋􅊤一生珍玩在右軍小影閉瑤函志雅堂雜鈔廖羣玉刻王橚所作賈氏家廟記題王忠文公集玉枕蘭亭跋云此本後有右軍小像曰秋壑珍玩白石方泉擅賦才西湖寺古共裴回綺牀熏陸多生願得見金銅佛塔來方泉集姜堯章金銅佛塔歌白石招我入書齊使我速禮金塗塔我疑此塔非世有白石云是錢王禁中物上作如來捨身相飢鷹餓虎紛相向拈起靈山受記時龍天帝釋應惆悵形模逺自流沙至鑄出今回更精緻錢王納土歸京師流落多在西湖寺錢王本是英雄人白蓮花現國主身蛇鄉虎落狗腳朕何如紅袍玉帶稱功臣天封坼開即退聽兩浙不聞笳鼓競歸來佛子作護持太師尚父尚書令一枚傳到白石生生今但有能詩聲同袍秦外銛師兄哦詩禮塔作佛事同喫地爐山芋羮何曽薰陸綺牀供但見相輪銅緑明哦詩禮塔猶未畢蘆葉低飛山雨溼喜生拍板宣娘笛唱賺勾䦨盡有名薄媚六么官本外新添三笑月中行武林舊事丁未年撥入勾闌弟子嘌唱賺色施二娘時春春時住住徐勝勝朱安安陳伴伴等又陳宣娘笛陳喜生拍么又官本雜劇段數爭曲六么鞭帽六么王子髙六崔護六么鶯鶯六么女生外向六么請客薄媚錯取薄媚傳神薄媚鄭生遇龍女薄媚栁毅大勝樂霸王中和樂夢巫山彩雲歸風花雪月爨宴瑤池爨夜半樂爨王崇道休妻李勉負心鍾馗爨王魁三鄉題襤哮店休妲秀才下醋擂風流藥三笑月中行即案其名甚多聊摘二三於此此元人院本所自起也蟹黃水不産西湖和樂樓前妓喚酤借問風流趙夫子郎官還似酒監無清波雜志泰州雪酤著名惟舊用州治井蟹黃水紹興間呼匠至都下用西湖水釀成頗不逮吹劍録趙鞏監升陽宫酒庫北使至問趙夫子今何官館伴問何人曰趙鞏其皇帝清問下民賦吾州後生以為矜式呼趙夫子館伴曰今為郎官即日除司封郎中夢粱録南庫元名升陽宫煮界庫在社壇南新界庫在清和坊南酒樓扁曰和樂諸庫皆有官名角妓設法賣酒此郡風流才子欲買一笑則徑往庫內㸃花牌惟意所擇南人養馬不知名馬券傳來為習兵嘆息銷沉熊虎氣八哥空策蹇驢行香溪集南人習水而便舟不熟銜轡雖蓄馬無能名其駑若駿也金石林時地考杭州有宋刻馬券碑帶赤城集陳孚鳯皇山詩故國盡銷熊虎氣荒山空鳯皇形勿軒集賈相葛嶺行有云望塵拜者頌元老伊尹周公所不如豈知一旦事瓦裂鋃鐺鐵鎖載以驢莫問仙巢何處亭雲濤尺五鮮人經鳳城歸去鍾聲急紫水如霞冷翠屏詞海遺珠宋理宗書仙巢吹香亭五字有詩云放鶴去尋三島客任人來看四時花亭為仙巢鍾尚書間居之地今碑在嶽麓山下蒼筤谷山江湖長翁集題趙景安尺五雲濤一亭尺五亭云亭縹眇五雲連雲濤云坐看銀山捲壞雲嶺韋齊集西湖詩有云喚人歸去城鍾急觸處相親月彎太平寰宇記錢唐古泉亭有紫水如霞海門樓櫓散煙塵空憶神州舊日春一自杜鵑啼不歇髙峰呌月有孤臣治世正音甘瑾讀文丞相傳詩有云樓櫓海門西日暗劍歌江介朔風寒又甘瑾錢唐懷古詩神州未復英雄老王業偏安歷數迍萬騎星屯潮捲夕六宫雲散草生春天地間集家鉉翁詩曾向錢唐住聞鵑憶蜀鄉不知今夕夢到蜀到錢唐輕咸淳集湖上詩一望湖光鏡面平暮鴉過盡斷霞狂來飛上髙峰頂趺坐松柯呌月生駕頭不出簾垂晝魚鑰初開肅綺寮閒却蘇堤芳草外游人題字上芭蕉愛日堂藂鈔駕頭舊以一老宦者抱繡裏杌子於馬上髙廟時亦然今乃代以閣門官不知自何年研北雜志云故宋宫中用魚鑰降魚取匙降匙取魚古制也順適堂吟藁蘇堤詩參差臺榭無餘地雜沓輪蹄了四時半梅屋詩藁正珠園詩芭蕉葉上題詩字雨後看來不全餘濕未勝濃墨補且攜巵酒到花前福嚴水曲漾金沙靈苑清鐘客憶家香骨藏埋問逋客詩魂容與伴梅花西湖淨社録劉基福嚴寺硯記仁和縣北三十里有溪曰義溪乃故宋嘉定中有陳氏名迥者廬於溪上後捨身為浮屠名其廬曰福嚴皇慶二年賜額為福嚴寺亞愚江浙紀行集句題靈隱云幾因留我宿吟到五更鍾孤浙音髙九萬拜林和靖詩玉函香骨老雲根占斷山水月村元詩體要徐秋雲詩憶别錢唐第幾春舜江春水落如雲小樓吟倚孤山月只有梅花可寄君漁溪集延祥觀詩御園自有逋梅在約束遊人莫肯開難教騎項便為虀意氣沖霄吐白霓誰道閣中頻賜酒那知膝底著留犂琅琊代醉編朱子云舉世無忠義氣忽自施全身上發出來此論足慰忠魂於地下矣續綱目書施刺秦檜不克而死亦本文公遺意近有人曰今之嶽廟鑄檜像縛於門外亦當鑄施像坐於檜上持刀斫之庶為得也奴野客叢書秦檜自遭施全見刺之後常獨處一閣僕非召不得入㑹疾三衙楊存中成閔趙密往問召入款語久之言及近日表勳酒頗佳表勳賜酒名也各贈兩器自攜出室亦見駕馭之術朱子語録秦太師死髙宗告楊郡王云朕免得膝褲中帶匕首何孟春曰縛膝下褲腳今日婦女下體之飾豈當時男子亦或著膝褲耶騎項見漢書蟲篆初來出野田樂章親製貫奎躔還勞十八章親賜筆意何如玉潤妍鞠堂野史紹興五年春永興軍田夫段義耕得玉璽上於尚書禮部以為秦之傳國璽其文曰受命於天既壽永昌詔與禮部翰林祕書御史太常官驗定集議方員二寸半印文深琢如碑字觜白而地紅也字畫乃蟲篆也於奎章録光堯當內修外攘之際尤以文德服逺至宸章睿藻日星昭垂者非一紹興二十八年將郊祀有司以太常樂章篇序失次文義弗協請遵祖宗故事親製祭享樂章自郊社家廟原廟等共十有四章肆筆而成睿思雅正宸文典贍所謂大哉王言也中興紀事本末髙宗以御書正草孝經賜秦檜檜請刻石以傳於後上曰世人以十八章童䝉書不知聖人精微之學因學草聖遂以賜卿豈足傳後耶出書畫眼思陵筆法其源於玉潤帖猶是飛來小朵峰細泉穿石響琤淙上人昔自稱湖隱拂拭殘碑看舊容清江集天竺簷蔔堂記昔僧慧理自西域至杭以其小朵峰為自身毒飛來者即其地置翻僧院後改院為天竺寺橫攻愧集觀冷泉亭放水詩冷泉淺濁使人愁開板波去不休岸側細泉穿亂石始知别是一清流打𤣥牘記石刻有湖隱上人贊非俗非僧非凡非仙破荆棘林透過金剛圈眉毛厮結鼻孔撩天燒了護身符落紙如雲烟有時結茒晏坐荒山嶺有時長安市上酒家眠氣吞九州囊無一錢時節到來奄如脫蟬湧出舍利八萬四千贊嘆不盡而說偈言烏乎此其所以為濟顛者耶碑版無如羣玉工後來世綵亦稱雄仙花發蕚名書在猶記重翻入禁中墨池編宋羣玉堂帖所載前代遺跡最多韓托胄刋石蹟記世綵堂帖廖瑩中刻金壺記顔書如神劍摧鋒仙花發萼和書畫題跋記顔魯公劉中使帖載於宣譜紹興中重進御春草江南賸一邱空堂餒鬼故園愁十洲春色重門裏餘得春風舊酒樓雙溪集南園詩花驄油壁隱輕雷消却氷山不復來墳土未乾為餒鬼園花雖好為誰開北轅録淳熙丙申詔待制敷文閣張子政充賀金國生辰使至相州闤闠繁盛觀者如堵二樓曰康樂曰月白風清又二樓曰翠樓曰秦樓時方賣酒其上牌書十洲春色酒名也或云韓魏公晝錦堂今為一貴人宅石記猶在好事者叩門打碑不禁也飾攬轡録晝錦堂尚存北人嘗更修之假子清華第一班一飛何事不知還名孫死節留餘羡難洗當初老鳳姦雲莊四六餘話秦相子熺狀元登第李文肅賀啓曰一經教子素欽丞相之賢纍月笞兒敢起鄰翁之羡秦甚喜之孕齊東野語秦熺本王氏子檜素不悅檜畏內妾嘗其妻逐之生子為仙游林氏子曰一飛以檜故杜至侍郎兼給事中其兄一鳴弟一鶚皆位朝列曹詠嘗勸檜還一飛未果而檜死金壘子宋史秦檜曾孫巨通判蘄州金人犯境與郡守李誠之竭力捍戰城破巨率兵巷戰復歸署自焚死子浚瀈皆死奸臣之後一門死忠孝豈復繫其世類乎然檜無子以妻兄王㬇子為後則秦氏世絶於檜久矣詞林海錯宋時紫薇舍人謂之小鳯翰林學士謂之大鳯丞相謂之老鳯竹窗隨筆雁宕僧後身為秦檜居權要造諸惡業海門蒼翠聳雙山忽起清風一線間為有灘沙三百里牛車須避迅濤還見潮論龕赭二山峙為海門故激而為濤今觀其洶湧却去海門之外非二山所為也潮賾潮之將來先以清風渺一線於天末旋隱隱而隆隆之浙江潮候圖說浙江之口南為龕山北為赭山謂海門下有沙灘跨江東西三百餘里若伏檻然堰猗覺寮雜鈔浙江風濤汛險人力不捷故近立諸以牛車舟而過坊間墨本幾差訛更怪麻沙滅裂多自古文風關世運異瀾誰識是同波聽雨紀談古人書籍皆手録唐世始刻板至宋末而益盛麻沙至陋臨安坊間動輒刻板然而滅裂者衆矣至佩玉齊類藁五七言始於漢歷六朝而盛於唐羸宋而音調卑矣同波異瀾用陸機語三絃隔應琴書在八卦奇形古研留可與山家作清事何須更覓鬼功毬書齊夜話張炳炎咸淳辛未及第其父肖說為大理評事嘗與徐南溪論琴謂諸弦隔一之應皆在十徽獨第三弦在十一徽此中吕之宫也南溪琴統玉譜其說本朱子研譜周益公硯作八卦形自為銘家山清事林龍發著林為和靖七世從孫當理宗時髙抗不仕人謂其有祖風格古要論嘗有象牙圓毬一箇中直通一竅內車二重皆可轉動名鬼功毬宋內院中作者雲氣鴻濛樹罛籬判教凡輩不容窺誰知天上春生曲流入金源總淚垂畫繼米友仁被遇光堯官至工部侍郎敷文閣直學士日奉清間之燕方其未遇時士大夫往往可得其筆既貴更自祕重雖新舊亦無緣得之衆嘲曰解作無根樹能描濛鴻雲如今供御也不肯與間人享年八十無疾而逝髙王氏畫苑米友仁畫樹作罛籬筆中州集吳彥米友仁之壻㑹寧府遇老姬善鼓瑟自言梨園舊籍因賦春從天上來詞後三山鄭域從張貴謨使金聞歌此詞當壚鬼女貌如花細雨輕風漾碧紗聞道雷壇覆蛇怪隂池誰遣誤金蟇楮記室宋吳宰撫州人於臨安聽調嘗飲酒肆一賣酒娼故人妾也吳呼問妾引至暗處語曰吾死雖為隂司所録令賣酒於市今市上十之二三皆鬼也言訖不見小窗自紀宋時法師鉢貯白蛇覆於雷峰塔下山文園漫語西湖十景有雷壇夕照忽楮記室魏鶴為參政一日留史教授宿館中夜有兩鬟秉燭出迎云參政有請史隨入有頃鶴山出不見史令遍尋見在池塘中半身沒水問其故則曰丫鬟引至一大屋緑衣人指以小女為妻今夕成禮不知在水中次日令乾塘有一蝦蟇大如斗小者四五而已故人相對泣紅妝一曲清歌欲斷腸雖少霓裳陪鳳輦不教下色等㕑娘行營雜録豐有俊字宅之登青樓偶見小倡疑故人女纍目之酒罷女入曰豐官人識妾否詰之果故人女豐曰汝且退豐與臨安尹有契明日以白尹且云某僅有錢百千從公更貸二百千嫁之尹嘉其誼即取入府厚奩具擇良士嫁焉尹即王宣子佐也見又朱熠本武臣常為內夫人妹內官弟㛰啓理廟之大加賞異特㫖授官至參知政事具啓有令弟從長奕世近龍光月殿斯沾於湛露舍妹夫人十年陪鳯輦霓裳猶粲於朝霞云云朱乃武舉狀元溫州人理廟微時識之江行雜録京都中下之户不重生男生女長成則隨其姿質教以藝業名目不一有所謂身邊人本事人供過人針線人堂前人劇雜人拆洗人琴童棋童廚娘等級截乎不紊就中廚娘最為下色然非極富貴家不可用余以寶祐丁巳參閫嘗聞時官中有舉其族人置廚娘事首末甚悉漫書以發一笑楊栁新塘裊碧絲便娟歌舞泥人時東風過了花飛盡不及銷魂有粉兒湖海新聞德祐太學作百字令云真箇恨殺東風幾番過了不似今番苦東風謂賈似道也新塘楊栁小腰猶自歌舞謂賈妾人宋季三朝政要似道蠱聲色寵妾葉氏本淑妃宫也潘氏倪氏妓也詩詞餘話詹天游名正字可大風流才思不減昔人故宋駙馬楊鎮有十姬皆絶色有粉兒者尤勝一日天游宴盡出諸姬佐觴天游屬意於粉兒口占一詞有不曾正個也消魂之句楊遂以粉兒贈之曰天游今日正個消魂也後為翰林學士玉瓢小印宛如初散佚重窺旅館虛一帖硬黃留健筆人間猶識瘦金書洞天清録徽宗御府所儲書其前必有御筆金書小楷標題後有宣和玉瓢御寶淳祐壬寅於臨安客舍見永嘉一士人藏一法帖乃唐人硬黃倣右軍書前有金字御筆云王右軍書長者帖後有宣和玉瓢樣御寶初書史㑹要徽宗行草正書筆勢徑逸學薛稷變其法度自號瘦金書寒食平章上塜回集賢堂下獨興哀騃兒不解藏書畫可見吳興向氏來詩話雋永賈秋壑於德祐元年寒食上母墳回至集賢堂作詩云寒食家家插栁枝戀春春亦不多時兒孫只解花前醉青冢能消幾箇悲豈非亡國之䜟按西湖志引此詩不載上墳事且後二句作人生有酒須當醉青冢兒孫幾箇悲亦與此異名癸辛雜識吳興向氏后族也三世好古多收法書畫有名公明者騃而誕長城人劉暄多能狡獪登賈師憲之門言之賈公賈大喜因遣劉誘以利祿遂按圖索駿皆六朝神品明兩為離是普安玉觀音進北朝官蕭森佛火松雲裏度廟龍姿繪像寒聖德事迹孝宗為建國公初育於吳婉儀丁丑制建國公封普安郡王年十六時日者尤若納私謂祕書省正字張䦨曰普乃並日字合乎易所謂明兩作離之象殆天授也楮記室宋孝宗擊毬馬偶傷一目金人遣使來慶壽以千手千眼玉觀音為壽蓋寓相謔之意上命迎入徑山暖姝由筆杭州集慶寺有紙軸度宗小像泥金帖子報新名書上綸扉有品評春日桃符非麗句十年而巳悮公卿說略報新進士謂之泥金帖子始於唐至文宗時革之宋則復用稗史洪平齊新第後上史衛王書自宰相至州縣無不指托其短大槩云昔之宰相端委廟堂進退百官今之宰相招權納賄倚勢作威而巳凡及一職必如上式末俱用而巳二字時相怒十年不調洪有桃符云未得之乎一字力只因而已十年閒玉樓簾捲見梅魂催賦清詞月一痕照水圖開天水碧露桃脉脉總無言海野詞坤寧殿得㫖次韻賦照水梅花調驀山溪云催花小雨輕把香塵灑簾捲水亭風梅影轉夕陽初下靚妝窺鑑鴛甃湛清漪浮暗麝翦芳瓊消得連城價玉樓十二寒怯銖衣掛曾是緑華仙眷餘情新詞如畫花隨人聖須信世無雙騰鳯吹駐鸞輿堪與瑤池亞江村消夏録宋馬和之有照水圖林下清録宋顔方叔製諸色箋有杏紅露桃紅天水碧俱砑花竹鱗羽精妙如畫中興為有求賢詔不取金桴發玉函雪下天門空灑淚有人側岸看千帆新定續志有紹興求賢碑䇿鹿皮子集樂雷發宋理宗朝特科狀元舂陵人對有曰求天下之士以文不若淑天下之士以道樂著雪磯叢藁吳雷溪詩選題宋度宗熙明殿古墨詩蚤晚扁舟適越為君揮淚天門雪入能改齊漫録任惇夫紹興間有聲太學後坐上書籍留落者久之有投時相啓云籠中翦羽仰看百鳥之翔岸側沈舟俯閲千帆之過愛他十里清凉國吳越江分指顧間白骨難為補天石太行久已不能山解頥詩話宋行都西山多寺觀鐘鼓相接故楊亷夫詩云入山十里清涼國三百樓臺迤邐開南溪詩話程泰之考古編云到江吳地盡隔岸越山多此吳僧白塔院詩也后山在錢唐亦有句云語音隨地改吳越到江分即用其意不嶽忠武遺事元韓中村拜墓詩末云我恐精忠埋得白日英魂土中泣朽骨斫出荒苔痕獻作君王補天石有栟櫚集靖康迎駕詩有云南渡黃河如履地東太行不能山番犬狺狺給賜多金鈴不動卧晴莎心知不愛春林牧休寫歸牛緩下坡南宋相眼德壽宫發下番狗五十隻禁中留其三餘賜內侍缶鳴集題李迪畫大詩護兒偏吠客花下卧晴莎莫出東原獵春來乳兔多牧大江草堂集閻次平風林放牧圖跋樹木離披老掩面支䇿牛獨舉首掀鼻向風圖嚴氏書畫記李唐放牧圖之淡圃畫品李唐三生作牛背牧童李源缺身揖東圖元覽李唐春牧圖牛欲前行童子力挽之案以上皆南宋畫院人梅花細嚼傍山居佛粥酴醿出定初愛筍顚師能濟物碧螺無尾半焦魚栁塘集西湖除夕詩又來上國看新元細嚼梅花咽冷泉按道璨字無文宋南渡饒州詩僧山家清供一日過靈鷲訪僧蘋洲留午粥甚香詢之乃酴醿花也又濟顛筍疏云拖油盤內煿黃金和米鐺中煮白玉者永興寺志錢唐西溪永興寺唐正觀三年悟明尊開山南宋時濟顛壘石為安樂橋當水嚙處巋然獨存村民食螺巳斷尾顛乞放池中遂活至今螺皆無尾西湖竹枝續集徐楚詞云資嚴古院半邱墟滿壑梅花泛雪渠賸有顛師功德水至今留得半焦魚難尋雲壑巖中跡空見雲龕水面移誰憶東都金世界空傳祝聖到靈芝翰林珠玉有題玉隆宫所藏宋乾道宸翰雲壑二字詩南湖集西湖詩有云美人具清宴畫舫如雲龕浮游六橋間水天遙共涵射宣政雜録徽宗遜位前一年中秋後苑賦詩云日晚霞金世界月臨天宇玉乾坤次年金人入汴亦先兆金世界也因藝隱橫舟藁祝聖所拈香詩幾度來游幾賦詩又將命到靈芝三呼祝了君王壽偷眼湖光立片時一泓寒碧雨連山乳竇峰前聽講閒最是觸鏊修苦行誦經松下鶴初還􅋯翁詩集紹興壬子夏游龍井詩江湖釃兩股一泓乃孤危我愛秦郎記字壓頭陀碑鄭氏聨璧集宋髙宗自題畫扇云萬木雲深隱連山雨未開篷採芝集上天竺詩老樹烟蘿雨殘燈石塔雲雪稿送沖晦歸天竺詩西湖山下多竒石師去今遊乳竇峰遙想石臺登講罷野猿歸洞鶴歸松暌車志臨安下竺式道者苦行修懴置火鏊於像前日夜持誦環繞遇倦即以指觸鏊而醒之逋臣前是老門生游戲清都一笑迎故國三皇廟猶在靈胥江上涕縱橫疉山先生集上丞相留忠齊書友朋自大都來乃謂先生以賤姓名薦皇帝過聽遂煩旌招某乃丙辰禮闈一老門生也先生誤以忠實二字褒之斷不敢枉道隨人以辱大君子知人之明又與魏參政書稱前宋逋播臣皇帝游民謝某為兵解脫屣濁世翀遊清都夢蕉詩話文山之死覆瓿集杭州重修三皇廟碑杭為宋故都以故大醫院地為之立三皇廟須溪集建興廟記東錢唐如雷如霆子胥之所旦而奮也方盛時冠冕大者帝號小者王侯丹雘巨麗擬於鈞天廣內今其故地黯然使人流涕玉津鐘廢暗香凝祕省銅缸碧水澄喝道飯僧何所益香廚翠釡照秋鐙翠雲集有玉津園廢鐘詩按自娛齊集徐青壁使君置酒邀看南關署中宋梅地即德壽宫後圃旁也九蘂雲集宋祕書省有銅缸焉積水生魚梁皇華曲里松詩松是山靈一手栽堯天長就棟材龍髯怒起春風急似怪遊人喝道來鍋靈隱寺志秦檜因風僧激礪發心齊僧其大現在雲廚曲從自製盡堪師雲影孤飛白石詞羡殺王孫才思敏蓮塘惟有落花知白石詞揚州慢暗香疏影並是自製曲蘄樂府指迷姜白石如野雲孤飛去留無迹詞㫖王孫韓鑄字亦顔雅有才思學詞於樂笑翁一日與周公謹泛舟西湖酒半公謹舉似亦顔學詞之意翁指花云蓮子結成花自落鐵綆沉來箭鏃埋巾籠放鳥失安排空饒紅朽豐儲積澤國圖安只自乖寰宇分合志烏珠之陷臨安巳隱然如巴延之臯亭山而宋得以不喪者由其懸軍深入視元無分道之兵席捲北歸視元有江中之衄使舟再沈於鐵綆而䇿不獻於閩人則烏珠為籠中之鳥矣自怡集錢唐詩箭鏃不隨錢氏沒黍苗還向宋陵生之清正集嘗㑹訃豐儲之積約五百萬石多為備荒用而大農每歲廩給止合用米一百萬石通計可支五年中李忠定奏議備攻戰之策必擇形勝然後能制服外以圖事業臨安平江皆澤國褊迫偏霸所據非用武之地也宴開澄碧捧瑤尊再拜彤墀笑語溫日暮玉堂深處宿金蓮燭影獨承恩玉堂雜記淳熙丁酉九月丙辰宣召侍讀進少保浩錫宴澄碧殿抵暮送以金蓮燭宿玉堂直廬上命作詩叙此㑹史進古詩三十韻臨平山下藕風輕軟軟鴻頭似雪螢聞道尚方新薦果安榴猶自號金櫻林泉結契雞頭亦號鴻頭肅天中記杭州號石榴為金櫻避錢武諱而起也苔繞梅身半吐鬚洗鉛何必較施朱鬢絲禪榻藏春塢猶有凌霄絡樹無竹齊集西湖梅有素梅紅梅墨梅數十首其全芳備祖西湖藏春塢門前有一古松凌霄花絡上蘇公嘗為僧清順賦詩今百餘年其花猶茂冠上金貂氣象尊瘦髯誰與貌師垣夜光最訝雙眸少賀啓中間缺片言樂郊私語常氏有像一幅瘦惡而髯帶貂蟬冠上有贊曰佑時生甫同德暨湯云云後題紹興壬申門下士魯璁拜書檢宋苑茂明集有代賀秦太師畫像啓乃知是摘啓中數語為贊耳偃曝談餘檜眼有夜光朝中和議盡姦回錯說官家也好呆不使雙鬟同炭婦春愁脉脉為誰來啽囈集沈持正名樞紹興中參政和議成語同列云官家好呆上聞之摘筠州攜一鬟去數年歸嫁皆處子安吉尉潘方壽以詩寄曰昔年單騎赴筠州覔得歌姬共逺遊去日正宜供夜直歸來渾未識春愁禪人尚有香囊愧道士猶懷炭婦羞鐵石心腸延壽藥不風流處却風流華陽巾子道人如樞院行行近大渠操履甚恭雖隱語陽妃腳也駭程俱揮塵餘話向宗厚履方建炎末為樞密院計議官美髯而若滑稽之狀裹華陽巾纒足極彎長於鈎巨王佾公為戲之曰君唐明皇時四人合而為一何邪向曰願聞之公為曰君狀類黃幡綽頭巾類葉法善腳類楊貴妃心腸似安祿山後程致道行其祠部員外郎告詞云汝佩服髙古操履甚恭又以戲之夢粱録樞密院在南倉前大渠口節樓兩建靜干戈證果曽經過補陀羡煞明良慶㑹閣一門六老共婆娑雨航雜録史衛王浩為尉時至補陀見大士云文潞公後身他時宰相官家要用兵須力諫浩後兩授節鉞遍歷三公壽八十九嘗曰吾口不言兵後必有為宰相者彌逺乃其次子山堂肆考孝宗書明良慶㑹之閣六字賜史浩宋史浩淳熙乙巳掛冠年登八十女兄年八十二四弟又皆髙年同氣至親舉觴相屬朱顔華髮咸壽而康繪為六老圖樓參政為之序雨山霜鞠掩荆扉寓馬畻西客到稀好事河陽張彥發藝居樓畔借書歸馬畻藁嘉熙丁酉五月寓京遭爇僑房西馬畻有寓西馬畻詩十畝荒林屋數間門通小艇水灣環人行逺路多嫌僻我得安居却稱閒樽酒相忘霜後鞠一時難盡雨中山何年脫下浮名事只與田翁賸往還出秋江烟草有從陳宗之借書詩自從春去後少省柴扉樹暗鴉巢隱簷空燕迹稀憶山憐有夢當暑咏無衣案上書堆滿多應借得歸書案吳文英有題陳宗之藝居樓詞即睦親坊開肆陳道人也仁王寺裏熟黃梅誰識方泉杖履來更向九溪十平八澗臨流洗足帝青苔方泉集有歸憩仁王寺詩重到招提未覺遲鉢單初副袂衣時僧房齊院門門閉梅子枇杷樹樹垂蟻䕃經牀求脫化龍纒佛座學慈悲長年無事間來此坐對空山諷小詩又有句云九溪十八澗冷見帝青苔洗足僧書石臨流客放杯閣案仁王寺在吳山南渡時建田志引薩天錫橫山詩乃在閩中烏石山之仁王寺謬矣方泉常居行都者此詩確是吳山之仁王寺也西湖北山亦有護國仁王寺侍郎三覺困瞢騰歇息牌懸客慣憎比較相公三照處裹頭日日近圓氷雞肋集趙叔問為天官侍郎肥而喜睡又厭賓客常掛歇息牌於門首呼為三覺侍郎謂朝回飯後歸第也又云范覺民作相方三十二歲肥白如冠玉旦起與裹頭帶巾必皆攬鏡時謂三照相公按趙范皆髙宗紹興間人鞠苖瀹盞扶春倦花片浮苔怯曉寒御墨搜奇吟逸蝶嬌姿偏奈雨中看花史洪景嚴遵和弟景盧邁登月臺詩云築臺結閣兩爭華便覺流涎過麯車户小難禁竹葉酒睡多須藉鞠苗茶牡山家清供憲聖太后喜清儉令後苑進生菜必采丹花片和之人收楊花為鞋襪氊褥之屬偏海棠譜光宗御製海棠詩東風用意施顔色艷麗宜著雨時朝咏暮吟看不足羡他逸蝶宿深枝門館遙臨南北峰平章堂印日相從他年十萬軍聲亂洲上遺亡何處踪黃氏日鈔賈似道始生之日錢唐宰郭應酉以詞賀之云日長門館坐對南北峰之髙時遊廟堂盡付東西㕔之問東西㕔見韓魏公傳若南北峰殆俗語耳豈一時阿其所好耶兩浙名賢録陳均字子公咸淳初除檢正㑹賈似道以平章奉母居湖濱欲以堂印自隨均爭曰堂印無出城之理由是免官三朝政要賈似道集諸路軍十三萬屯丁家洲我師之敵十三萬軍一時潰散督府之印巳失奔入揚州德夀宫姬取次娛大劉宣過小劉呼夫人更得十平餘輩不數宫中有玉奴朝野雜記德壽妃嬪劉妃臨安人入宫為紅霞帔後拜貴妃時有小劉氏者入宫轉宜春郡夫人進婕妤皆有寵宫中號妃為大劉娘子婕妤為小劉娘子德壽宫又有信安趙夫人咸寧藺夫人平樂王夫人咸寧郭夫人新興陳夫人富平孫夫人縉雲蔡夫人南平張夫人齊安張夫人安定李夫人此十餘人並無品秩紹興中又有馮美人韓吳二才人皆寵幸吳氏名玉奴中宫近屬也南宋相眼內東門司淳熙十四年準德壽宫提㸃傳太上皇帝聖㫖才人李氏王氏並放令遂便其告命四軸并才人李氏從人紅霞帔宣一十道紫霞帔宣聽宣各二十道並降付內東門司才人李氏王氏告紅絲網鍍金銀鐸鈴紅羅銷金袋全齊安郡夫人順政郡夫人告紫絲網銀鐸鈴錦袋全紅霞帔宣九道李惜奴陳來兒等紫霞帔宣二十道藍合兒藍福福陸小美趙九娘談强兒談小郁等聽宣二十道陸閏兒元沖淨等舊碑遺字得雙行聽說西霞浣古香自奉宸居標褉帖神光難掩在宫牆蘭亭考一修城所得本前有薛稷書兩行十八字後髙宗取石入德壽宫王仲信跋云此本西霞老道士云長安政和中修故宫掘地得此其精神鋒鋩出正定本上又蘭亭序髙宗所御宸翰題曰褉帖鬻薪醜語竟能堪異日華班抱隱慙鳳閣裁同妃子笑西風已駕逐臣驂三朝政要吕文德安豐人魁梧勇悍常鬻薪城中趙葵於道傍見其遺履長尺有咫訝之或云安豐鬻薪人也遣使訪其家值文德出獵負虎鹿各一而歸偕見趙留之帳前在邊立功遂至顯宦黃氏日鈔吕文德起土豪似道始結之為大將官至保傅然文德愚鄙小民不識字每佯癡好無禮士大夫似道既入相文德寫醜語罵似道不敢怒至郡不肯禮先聖祭先聖每云不曾教我識字宋史紀事本末賈似道以去要君帝拜留之江萬里曰自古無此君臣禮賈忌之帝常問古人姓名似道不能對江從旁代對王夫人稍知書帝語夫人以為笑賈益慚怒遂逐萬里南荒一逐使人愁林氏油杉蚤見收遷客墨痕蕭寺壁相逢生怕唱杭州癸辛雜識林僉樞存儒久為賈相所擯謫之南州道死於漳有富民蓄油杉甚嘉林氏子弟求為棺而價穹不可得因換其木曰收取收取留與賈丞相自用至賈殂於木綿菴郡守經營竟得此木以斂可謂異矣人正藏書似道貶循州鄭虎臣請行時侍妾尚數十鄭悉屏去奪其寶玉暴行秋日中令舁轎夫唱杭州歌以謔之辱之備至至古寺中壁有吳潛南行所題字呼似道曰賈團練吳丞相何以至此賈慚不能對雁足書傳紫塞長只收鄴瓦貯歸裝忠宣不愧蘇卿節未賜洮瓊御筆光容齊續筆先公自燕歸獲二硯豫為銘建安者曰鄴瓦所範嘻其是耶幾九百年來隨漢槎淬爾筆鋒肆其滂葩僴實寶此以昌我家銘興和者曰元魏之東狗腳於鄴吁其瓦存亦禪千劫上林得雁獲貯歸笈玩而認之哀淚棲睫有談薈宋孝宗賜周必大洮河緑石硯御筆洮瓊二字鞦韆庭館賞花王三殿清遊樂未央唱得舞楊花曲罷天香飛滿萬年觴貴耳録慈寧殿賞牡丹時椒房受冊三殿極歡上洞達音律自製曲名舞楊花命小臣賦詞俾貴人歌以侑玉巵為壽詞有云正鞦韆庭館風絮池塘占東君誰比花王玉輅鐫成玉篆牌猫兒捕鼠對原乖執綏官亦何為者孤負梯緣向御街玉海乾道六年復用五輅玉輅有執綏官備顧問有牌篆玉輅二字以玉為之三朝野史理宗祀明堂徐清叟為執綏官玉音問曰貓兒捕鼠如何答曰愛之欲其生惡之欲其死理宗本命屬鼠一時不覺觸突上亦不之咎小玉堂雜記玉輅執綏官從旁用梯攀緣而上聖節趨班禮數殊紫宸殿下效嵩呼南廊細認髹牌字若個無因入御廚桯史瑞慶節上壽紫宸殿百官皆賜食余待班南廊老兵持二髹牌至金書其上曰輒入御廚流三千里吳鹽如雪繞場堆亭户攤錢晝不開昨夜東風駕濤上石塘堅罫莫崩摧天下鹽法志浙鹽鬆白宋時濱江設立亭户計日課斛支給其法統於轉運使地理指掌圖宋時沿江置捍江軍東風濤上尤加警備塌海塘記序海塘自錢唐以抵鹽官每為風濤所崩故沿江設備守兹土者時寄慮焉場屋誰居第一流柱間小紙亦堪羞不如買却巾箱本喙喙爭鳴語蚤休四朝聞見録慶元二年考官葉翥發䇿首篇士愕莫知對莫子純以小紙帖所出於柱間士皆感之是時舉子不事記誦專習於空虛之談射䇿中至有心心有主喙喙爭嗚之語識者固巳患之鼠璞今巾箱刋本無所不備嘉定間從學官楊璘之奏禁毁小板近又盛行第挾書非備巾箱之藏也酒龍詩虎葛長庚跣足時時自在行太乙宫中因詔館一朝飛去入蓬瀛武夷山志白玉蟾本姓葛名長庚嘉定末詔徴赴闕對御稱㫖命館太乙宫一日不知所往海璚集賀新郎詞昔在神霄府是上皇嬌惜便自酣歌醉舞來此人間不知歲仍是酒龍詩虎老卒曽經百戰場韓家弓樣獻髙皇為銘克敵成功處邉鄙人多號鳳凰揮麈後録洪景伯兄弟應博學宏詞以克敵弓銘為題洪惘然有巡鋪卒曰我本韓世忠部卒目見有人以神臂弓舊樣獻於韓韓令如其式制度以進賜名克敵又邊人又謂鳯皇弓宏簡録和說以䕃為右武大夫威州刺史上制勝强逺弓式能破堅三百步外號為鳯皇弓三朝北盟㑹編金人犯瓜州都統制李橫用克敵弓射却之江湖自古有攸分綿纜牙檣何地乘水勢錢唐居第二韜光東去望西興入越記淳熙元年八月步楓江上俗諺云第一楊子江第二錢唐江第三楓江蓋言其水波之惡也青山集和楊公濟秦皇纜船石詩泰皇兩觀海此石繫樓船錦纜巳無跡蒼苔昏暮煙南歸日記初至靈隱求所謂樓觀蒼海日門對浙江潮竟無所有至韜光了了在吾目中矣名山記內載袁宏道西湖雜記余始入靈隱疑宋之問詩不似及登韜光始知滄海浙江捫蘿刳木數語字字入畫古人正不可及矣問端平詩雋韜光菴詩谷鳥與我言怒殺白太傅借何以然攜却山僧去世間萬事誰始終寂寞寒江起煙霧憑西湖竹枝詞儂住西湖日日愁郎船只在東江頭誰移得吳山去湖水江波一處流毛先舒西湖不通江辨云案舊志云西湖故與江通誤也田學使汝成嘗辨之然未能了了按水經注浙江至錢唐縣又東經靈隱山山下有錢唐故縣靈隱去江巳逺然山川之名古今屢變或當時靈隱山直抵江干俱名靈隱猶言吳中亦稱㑹稽浙江亦稱廣陵耳若以駱賓王楊巨源之詩為徴靈隱山至絶頂何嘗不可觀日對潮楊詩義亦然又西湖南面稍近江而尚有慈雲萬松二嶺大山隔之他處去江更逺古必無湖通江之理也臨安客子動春愁細雨無人深巷幽官吏打門驚午夢清風終憶十三樓橘潭詩藁臨安僦樓詩過了燒燈望燕歸春寒剗地勒芳期杏花深巷無人賣細雨空簾盡日垂文獻通考店宅務掌管官房邸舍軒默堂集昔年曾到十三樓一月西湖十頃秋寒碧中最宜暑只緣修竹近清流院一統志大佛寺有相嚴為樓者十三間九經墨義盡敷陳鎖院深沉聽鬼神試帖不因公薦外邸中先報易官人宋史凡九經帖書一百二十道對墨義六十條負又命士應舉謂之鎖㕔又臺閣近臣得薦所知之藝者號曰公薦店夷堅志士人赴試臨安邸主人夢報榜人至云此有易官人及第明日以告長沙郡故多易姓是時獨無舂陵義太初歷數諸人用易經應詔者惟已一人私自喜果登科酒器新翻日日忙王家孽子習文章水晶宫裏榴皮老虛說東林送渭陽齊東野語熺性蠢騃日治酒器書畫所揮塵餘話秦熺本王㬇孽子嫡母鄭妒熺既誕逐生以熺為檜之乞子騷宏簡録朱敦儒素工詩及樂府時檜當國喜奬用人墨客文飾太平熺亦好詩除敦儒鴻臚少卿談者謂畏避竄逐故其節不終曰萬歷杭州府志李鞉遷將作監檜屢遣子就學鞉吾為天子卿監豈為宰相教子遂乞外甘雲麓漫鈔秦伯陽送其舅王亨道知湖州詩暫別泉豹尾中隼旟仍駐水晶宫文昌地禁論詩少燕寢凝香簿領空可但龔黃宜共理便應顔謝與同風飽聞回老榴皮事試問溪頭鶴髮翁說者謂吕仙常到湖之東林訪沈東老留詩既而登東林寺於壁間以榴皮自畫其像人初不知及秦詩出觀者不絶遺都莫謾溯繁華椒壁觚稜半土沙節用愛人題石在城頭夜月照飛鴉鳧藻集序錢唐為前代之遺都風氣清美有山川臺榭之勝魚稻茶筍之饒民習侈巧㕓屋繁麗歌管之聲不絶於西湖之上故仕者尤樂居焉啄元詩類選杜瑛弔故宫詩月上觚稜椒壁濕饑烏碎琅玕石劫灰飛盡海揚塵廢殿荒臺土花碧誰西湖竹枝續集黃周星詞節用愛人猶勒石風流是老平章按節用愛人視民如傷八字石刻在寶石山足相傳為似道書也大明風雅廣選劉基題白塔寺物换星移事巳迷從來此地惑東西可憐如鏡中天月獨照城烏夜夜啼産閣先期報設排胎衣裝畫寶瓶埋洗兒錢果多珍巧聞道中宫日隋懷容齊四筆車駕都錢唐以來皇子在邸生男女則戚里三衙皆有餉獻隨即放答自金帛以外洗兒錢果動以十數合極其珍巧直武林舊事宫中誕育內司奏排辦産閣令太醫宿供畫産圖方位合用藥材催生物件醽醁沈香酒催生海馬皮裝畫胎衣瓶檀香匣盛唾銅剃刀六龍巡幸護天神畫到通靈果絶倫鱗甲之而飛動處不知誰是㸃睛人夷堅志西北士大夫多挈家南寓相率建黃籙醮就天慶觀設位父老鄭圓持水龍布帳展挂於堂中隂風振動燈火俱滅坐立者毛髮寒聳舉體森顫亟命捲還之帳不知何人所畫其神如此宋元通鑑淳熙十四年以久早頒畫龍祈雨法案天慶觀在杭之吳山天慶坊徒步宫人盡出降滑臺昨夢語猶􅋏丙丁已是留龜鑑頭白金姬夢此邦靖康朝野僉言靖康二年丁未二月初七日上皇與諸王后妃以下乘金銅車子詣北營內人宦官多相攜步從曰昨夢録紹興辛巳省元劉德廣語及余所生之地滑臺戒菴漫筆理宗淳祐中中書省奏名臣柴望衢州人撰丙丁龜鑑言丙午丁未自古多變厄凡三十有一為十卷金姬别傳李嘉謨以部發歲運至元都夜對月歌曰萬里倦行役秋來瘦幾分因看河北月忽憶海東雲夜聞鄰婦倚樓泣者明日訪其家此婦泣曰客非昨夜悲歌人乎此亡宋昭儀黃清惠寄汪水雲詩我亦宫人金德淑也昭儀舊同供奉極相親愛今各流落異鄉彼且為泉下人矣潛齊集杭州詩相逢栁色還青眼說著梅花總白頭表章正學有津涯何事禪房葬艷娃至竟遺民瞻太保龍顔曽寫郭蕭齊史纂左編宋自理宗繼統首黜王安石孔廟崇祀升濓洛九儒表章朱熹四書丕變士習廟號曰理其庶幾乎觀七修類藁宋理宗像在集慶寺雅南歸日録集慶理宗舊像意製寒儉然行筆朴絶不類傅粉大家平宋季三朝政要理宗資貌龎厚號為烏太保太清話宋理宗御像郭蕭齊所寫蘂雲集理宗閻妃冢在集慶寺後弓手兒童貌不羣狀元甘雨掃妖氛鰲頭果見舒龍爪觸石拏開白白雲夷堅志汪應辰本玉山縣弓手兒喻子材為尉授諸子學有兵云汪兵子可學喻呼視之狀貌竒偉出對試之曰馬蹄踏破青青草汪對曰龍爪拿開白白雲宋史趙鼎為相延汪應辰於館孰紹興舉進士第一歲旱鼎命禱雨即應人謂相公雨鼎曰不然狀元雨也為有奇才待至公炎荒草木藴隆風早知名以青雲纍羞煞冬青哭野中宋詔令寶祐四年陳顯伯為考官詔曰爰柬儒官董司文柄議論端確者必忠於體國智略雄偉者必善於籌邊爾其決擇以成盛觀是年文天祥第一及第元音徐世隆挽文丞相詩有云乾坤日月君臣在海嶺風霜草木知相承㫖趙公行狀公見遇世祖上問留夢炎狀元宰當似道誤國時曾無一言卿為朕賦詩以刺之詩成上深賞焉日松鄉集贈唐玉潛詩世上冬青髙誼少山中録好詩多南宋雜事詩卷三
